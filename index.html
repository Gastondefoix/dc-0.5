<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Diritto Commerciale // SYNTHWAVE EDITION</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --cyan: #00f0ff;
  --cyan-dim: #00f0ff22;
  --cyan-glow: #00f0ff88;
  --orange: #ff6f00;
  --magenta: #ff2eaa;
  --magenta-dim: #ff2eaa22;
  --bg: #000000;
  --bg2: #000000;
  --bg3: #000000;
  --text: #e0e0e8;
  --text-dim: #666677;
  --border: #333344;
  --font: 'JetBrains Mono', monospace;
  --radius: 6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* grid floor */
.grid-bg {
  position: fixed;
  bottom: 0; left: 0;
  width: 100%; height: 40vh;
  background:
    linear-gradient(180deg, transparent 0%, var(--bg) 60%),
    repeating-linear-gradient(90deg, var(--cyan-dim) 0px, transparent 1px, transparent 60px),
    repeating-linear-gradient(0deg, var(--cyan-dim) 0px, transparent 1px, transparent 60px);
  perspective: 400px;
  transform: rotateX(55deg);
  transform-origin: bottom;
  opacity: 0.15;
  pointer-events: none;
  z-index: 0;
}

.app {
  position: relative;
  z-index: 1;
  max-width: 900px;
  margin: 0 auto;
  padding: 1.5rem 1rem 4rem;
}

/* HEADER */
.header {
  text-align: center;
  padding: 2rem 0 1.5rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 1.5rem;
}

.header h1 {
  font-size: clamp(1.4rem, 4vw, 2.2rem);
  font-weight: 800;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, var(--cyan), var(--orange));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  line-height: 1.2;
}

.header .sub {
  font-size: 0.75rem;
  color: var(--text-dim);
  margin-top: 0.5rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

/* MODE SWITCH */
.mode-switch {
  display: flex;
  gap: 0;
  margin-bottom: 1.25rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.mode-btn {
  flex: 1;
  padding: 10px 16px;
  background: transparent;
  color: var(--text-dim);
  font-family: var(--font);
  font-size: 0.8rem;
  font-weight: 500;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.mode-btn:not(:last-child) { border-right: 1px solid var(--border); }

.mode-btn.active {
  background: var(--cyan-dim);
  color: var(--cyan);
  text-shadow: 0 0 10px var(--cyan-glow);
}

.mode-btn:hover:not(.active) { background: rgba(0, 240, 255, 0.04); color: var(--text); }

/* TABS */
.tabs {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 1rem;
}

.tab {
  padding: 5px 12px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-family: var(--font);
  font-size: 0.7rem;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.tab.active {
  background: var(--cyan-dim);
  color: var(--cyan);
  border-color: var(--cyan);
}

.tab:hover:not(.active) { border-color: var(--text-dim); color: var(--text); }

/* SEARCH */
.search-wrap {
  position: relative;
  margin-bottom: 1rem;
}

.search-wrap input {
  width: 100%;
  padding: 10px 14px 10px 38px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg2);
  color: var(--text);
  font-family: var(--font);
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.2s;
}

.search-wrap input:focus { border-color: var(--cyan); box-shadow: 0 0 12px var(--cyan-dim); }

.search-wrap input::placeholder { color: var(--text-dim); }

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  font-size: 0.85rem;
  pointer-events: none;
}

/* STATS */
.stats {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1rem;
  font-size: 0.7rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.stats .score { color: var(--cyan); }

/* QA LIST */
.qa-list { display: flex; flex-direction: column; gap: 8px; }

.qa-item {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color 0.2s;
}

.qa-item:hover { border-color: var(--cyan); }

.qa-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 12px 16px;
  cursor: pointer;
  background: #000000;
  gap: 10px;
  transition: background 0.15s;
}

.qa-header:hover { background: rgba(0, 240, 255, 0.04); }

.qa-num {
  color: var(--cyan);
  font-size: 0.65rem;
  font-weight: 700;
  min-width: 28px;
  padding-top: 2px;
  opacity: 0.7;
}

.qa-title {
  flex: 1;
  font-size: 0.85rem;
  line-height: 1.5;
  font-weight: 500;
  color: var(--text);
}

.qa-arrow {
  color: var(--text-dim);
  font-size: 0.65rem;
  flex-shrink: 0;
  transition: transform 0.25s;
  padding-top: 4px;
}

.qa-arrow.open { transform: rotate(180deg); color: var(--cyan); }

.qa-answer {
  display: none;
  padding: 16px;
  border-top: 1px solid var(--border);
  background: #000000;
  font-size: 0.82rem;
  line-height: 1.8;
  color: var(--text);
}

.qa-answer.show { display: block; animation: fadeIn 0.2s ease; }

.qa-answer strong { color: var(--cyan); font-weight: 600; }
.qa-answer em { color: var(--orange); font-style: italic; }

/* DEEPDIVE button */
.deepdive-btn {
  display: inline-block;
  margin-top: 12px;
  padding: 6px 14px;
  background: var(--magenta-dim);
  color: var(--magenta);
  border: 1px solid var(--magenta);
  border-radius: var(--radius);
  font-family: var(--font);
  font-size: 0.7rem;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  transition: all 0.2s;
}

.deepdive-btn:hover { background: var(--magenta); color: #000000; }

.deepdive-content {
  display: none;
  margin-top: 12px;
  padding: 14px;
  border-left: 3px solid var(--magenta);
  background: #000000;
  border-radius: 0 var(--radius) var(--radius) 0;
  font-size: 0.78rem;
  line-height: 1.8;
  color: var(--text);
}

.deepdive-content.show { display: block; animation: fadeIn 0.25s ease; }

.deepdive-content strong { color: var(--magenta); }
.deepdive-content em { color: var(--orange); }

/* BADGES */
.badge {
  display: inline-block;
  font-size: 0.6rem;
  padding: 2px 8px;
  border-radius: 100px;
  margin-left: 6px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 500;
}

.badge-masi { background: transparent; color: var(--orange); border: 1px solid var(--orange); }
.badge-morello { background: transparent; color: var(--orange); border: 1px solid var(--orange); }
.badge-martucci { background: transparent; color: var(--orange); border: 1px solid var(--orange); }
.badge-extra { background: transparent; color: var(--orange); border: 1px solid var(--orange); }

/* QUIZ MODE */
.quiz-container { display: none; }
.quiz-container.active { display: block; }

.quiz-card {
  background: #000000;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 2rem;
  text-align: center;
}

.quiz-progress {
  font-size: 0.65rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-bottom: 1.5rem;
}

.quiz-progress-bar {
  width: 100%;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 8px;
  overflow: hidden;
}

.quiz-progress-fill {
  height: 100%;
  background: var(--cyan);
  transition: width 0.4s ease;
}

.quiz-question {
  font-size: 1rem;
  line-height: 1.6;
  font-weight: 500;
  margin-bottom: 2rem;
  color: var(--text);
}

.quiz-actions { display: flex; flex-direction: column; gap: 10px; }

.quiz-reveal-btn {
  padding: 12px 24px;
  background: transparent;
  border: 1px solid var(--cyan);
  color: var(--cyan);
  font-family: var(--font);
  font-size: 0.8rem;
  cursor: pointer;
  border-radius: var(--radius);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  transition: all 0.2s;
}

.quiz-reveal-btn:hover { background: var(--cyan-dim); }

.quiz-answer-box {
  display: none;
  text-align: left;
  padding: 16px;
  background: #000000;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 0.82rem;
  line-height: 1.8;
  margin-bottom: 1rem;
}

.quiz-answer-box.show { display: block; animation: fadeIn 0.25s ease; }
.quiz-answer-box strong { color: var(--cyan); }
.quiz-answer-box em { color: var(--orange); }

.quiz-rate {
  display: none;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
}

.quiz-rate.show { display: flex; }

.rate-btn {
  padding: 8px 16px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  font-family: var(--font);
  font-size: 0.75rem;
  cursor: pointer;
  border-radius: var(--radius);
  transition: all 0.15s;
}

.rate-btn:hover { border-color: var(--text); }
.rate-btn.r-bad { border-color: var(--magenta); color: var(--magenta); }
.rate-btn.r-bad:hover { background: var(--magenta-dim); }
.rate-btn.r-ok { border-color: var(--orange); color: var(--orange); }
.rate-btn.r-ok:hover { background: rgba(255, 111, 0, 0.13); }
.rate-btn.r-good { border-color: var(--cyan); color: var(--cyan); }
.rate-btn.r-good:hover { background: var(--cyan-dim); }

.quiz-score-final {
  text-align: center;
  padding: 3rem 2rem;
}

.quiz-score-final .big {
  font-size: 3rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--cyan), var(--orange));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.quiz-score-final .label {
  font-size: 0.7rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-top: 0.5rem;
}

.quiz-restart-btn {
  margin-top: 2rem;
  padding: 10px 24px;
  background: var(--cyan-dim);
  border: 1px solid var(--cyan);
  color: var(--cyan);
  font-family: var(--font);
  font-size: 0.8rem;
  cursor: pointer;
  border-radius: var(--radius);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  transition: all 0.2s;
}

.quiz-restart-btn:hover { background: var(--cyan); color: var(--bg); }

/* STUDY LIST (non-quiz) */
.study-container { display: block; }
.study-container.hidden { display: none; }

.no-results {
  padding: 2rem;
  text-align: center;
  color: var(--text-dim);
  font-size: 0.85rem;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

/* Mobile tweaks */
@media (max-width: 600px) {
  .app { padding: 1rem 0.75rem 3rem; }
  .qa-header { padding: 10px 12px; }
  .qa-answer { padding: 12px; }
  .quiz-card { padding: 1.5rem 1rem; }
}
</style>
</head>
<body>

<div class="grid-bg"></div>

<div class="app">
  <div class="header">
    <h1>DIRITTO COMMERCIALE</h1>
    <div class="sub">// Prima Parte &mdash; Synthwave Study Mode</div>
  </div>

  <!-- MODE SWITCH -->
  <div class="mode-switch">
    <button class="mode-btn active" onclick="switchMode('study')">📖 Studio</button>
    <button class="mode-btn" onclick="switchMode('quiz')">⚡ Quiz</button>
  </div>

  <!-- STUDY MODE -->
  <div class="study-container" id="studyContainer">
    <div class="tabs" id="tabs"></div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="cerca domanda o concetto..." oninput="filterQuestions(this.value)" id="searchInput" />
    </div>
    <div class="stats" id="stats"></div>
    <div class="qa-list" id="qaList"></div>
  </div>

  <!-- QUIZ MODE -->
  <div class="quiz-container" id="quizContainer">
    <div id="quizContent"></div>
  </div>
</div>

<script>
// ====== DATA ======
const QA = [
  {
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Art. 2082 – Definizione di imprenditore",
    a: `<strong>Art. 2082 c.c.:</strong> è imprenditore chi esercita <em>professionalmente</em> un'<em>attività economica organizzata</em> al fine della produzione o dello scambio di beni o servizi. I requisiti sono: <strong>(1) attività produttiva</strong> (produzione/scambio di beni o servizi); <strong>(2) organizzazione</strong> (impiego coordinato di fattori produttivi – capitale e/o lavoro – con un minimo di eterorganizzazione); <strong>(3) metodo economico</strong> (i ricavi coprono almeno i costi – non è necessario lo scopo di lucro); <strong>(4) professionalità</strong> (abitualità e non occasionalità dell'attività).`,
    deep: `<strong>I tre requisiti dibattuti:</strong> l'art. 2082 enuncia i requisiti <em>certi</em> (attività produttiva, organizzazione, metodo economico, professionalità). Restano discussi: <em>(a)</em> la <strong>liceità</strong>: opinione prevalente è che la qualifica d'imprenditore spetti anche all'imprenditore illecito; <em>(b)</em> lo <strong>scopo di lucro</strong>: non richiesto (cfr. impresa pubblica, cooperativa, impresa sociale); <em>(c)</em> la <strong>destinazione al mercato</strong>: nessuna norma lo esige espressamente, anche la produzione per uso proprio può costituire impresa.<br><br><strong>Organizzazione – eterorganizzazione vs autoorganizzazione:</strong> non è concepibile impresa senza l'impiego coordinato di fattori produttivi (capitale e/o lavoro). La presenza di lavoratori non è indispensabile: anche il titolare di una gioielleria o di una lavanderia automatica a gettoni è imprenditore, organizzando capitali e il proprio lavoro. Però la <em>semplice autoorganizzazione del proprio lavoro</em> non basta: un elettricista che usa solo telefono e auto non è imprenditore (al limite utilizza strumenti essenziali per qualsiasi attività). Occorre un minimo di <em>eterorganizzazione</em> (impiego di lavoro altrui e/o di capitale). Anche senza un complesso aziendale fisicamente percepibile, l'attività di investimento o finanziamento svolta con organizzazione e professionalità è impresa (es. le società finanziarie).<br><br><strong>Economicità e prezzo politico:</strong> i ricavi devono coprire almeno i costi. Non è imprenditore chi eroga beni o servizi gratuitamente o a <em>prezzo politico</em> (es. associazione privata che gestisce un ospedale a prezzo simbolico). Lo scopo di lucro non è richiesto: impresa pubblica, cooperativa e impresa sociale dimostrano che l'<em>economicità della gestione</em> è il requisito minimo, non il profitto. Ne consegue che associazioni e fondazioni con scopo ideale o altruistico che producono beni o servizi con metodo economico (es. un'associazione che gestisce un teatro) sono imprenditori.<br><br><strong>Professionalità – casi particolari:</strong> non è imprenditore chi compie un'isolata operazione di acquisto-rivendita, né chi organizza un singolo spettacolo sportivo. Tuttavia: <em>(a)</em> le <strong>attività stagionali</strong> (stabilimento balneare, rifugio alpino) sono professionali se si ripetono costantemente secondo le cadenze di quel settore; <em>(b)</em> la professionalità non esige che l'impresa sia l'attività unica o principale: è imprenditore anche il professore o l'impiegato che gestisce un negozio o un albergo; <em>(c)</em> è imprenditore anche il <strong>costruttore di un singolo edificio</strong>, se l'affare richiede organizzazione complessa e più operazioni collegate tra loro.<br><br><strong>Impresa illecita – debole e forte:</strong> si distingue l'illiceità "debole" (es. esercizio di attività bancaria senza autorizzazione) da quella "forte" (es. traffico di stupefacenti). In entrambi i casi l'opinione prevalente riconosce la qualità d'imprenditore, ma chi svolge attività illecita non può beneficiare delle tutele previste per l'imprenditore nei rapporti con i terzi (azienda, segni distintivi, concorrenza sleale).<br><br><strong>Impresa per conto proprio:</strong> anche la produzione destinata all'uso personale può essere impresa, purché condotta con metodo economico. Il costruttore di un edificio per uso proprio sostituisce un costo con un risparmio di spesa o un incremento patrimoniale: ciò è sufficiente per integrare il metodo economico. Vi sono inoltre esigenze di tutela verso i fornitori che hanno contribuito con beni o servizi alla realizzazione. Nessuna norma richiede espressamente la destinazione al mercato.`
  },
  {
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Imprenditore commerciale (art. 2195)",
    a: `È imprenditore commerciale chi esercita: <strong>(1)</strong> attività industriale per la produzione di beni/servizi; <strong>(2)</strong> attività intermediaria nella circolazione dei beni (commercio); <strong>(3)</strong> trasporto per terra, acqua o aria; <strong>(4)</strong> attività bancaria o assicurativa; <strong>(5)</strong> attività ausiliarie delle precedenti (agenzia, mediazione, deposito, ecc.). L'elenco non è tassativo: è commerciale ogni impresa non qualificabile come agricola. Rispetto al piccolo imprenditore, è soggetto allo <strong>statuto speciale</strong>: registro delle imprese, scritture contabili, liquidazione giudiziale.`,
    deep: `<strong>Statuto speciale dell'imprenditore commerciale:</strong> chi è imprenditore commerciale non piccolo è assoggettato a: <em>(a)</em> iscrizione nel registro delle imprese con effetti di pubblicità legale; <em>(b)</em> rappresentanza commerciale (institori, procuratori, commessi – artt. 2203-2213); <em>(c)</em> scritture contabili obbligatorie (artt. 2214-2220); <em>(d)</em> liquidazione giudiziale e concordato preventivo (CCI, d.lgs. 14/2019); <em>(e)</em> amministrazione straordinaria delle grandi imprese insolventi (d.lgs. 270/1999 e d.l. 347/2003).<br><br><strong>Statuto generale dell'imprenditore (applicabile a tutti):</strong> la disciplina dell'azienda (artt. 2555-2562), i segni distintivi (artt. 2563-2574), la concorrenza e i consorzi (artt. 2595-2620). Si applica a tutti gli imprenditori – agricoli, commerciali, piccoli – la legge antitrust (l. 287/1990) e le misure del CCI.<br><br><strong>Imprese civili?</strong> Si è discusso a lungo sull'esistenza di una terza categoria ("impresa civile") per attività come quelle estrattive, minerarie o di produzione di gas, che producono beni senza trasformare materie prime in senso stretto. L'introduzione di questa categoria è considerata problematica e la tesi prevalente la rifiuta: ogni impresa non qualificabile come agricola è commerciale ai sensi dell'art. 2195.<br><br><strong>Imprenditore agricolo esonerato:</strong> non è tenuto alle scritture contabili, non è soggetto alla liquidazione giudiziale (ma può accedere alle procedure da sovraindebitamento: liquidazione controllata, concordato minore). Gode di agevolazioni fiscali e creditizie previste dalla legislazione speciale. Tuttavia può stipulare la "convenzione di moratoria" con i creditori, strumento concorsuale non precluso agli agricoli.`
  },
  {
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Piccolo imprenditore e impresa minore",
    a: `<strong>Art. 2083 c.c.:</strong> è piccolo imprenditore chi esercita un'attività professionale organizzata prevalentemente col lavoro proprio e dei familiari (es. artigiano, piccolo commerciante, coltivatore diretto). Il piccolo imprenditore è esonerato dalla tenuta delle scritture contabili e dallo statuto dell'imprenditore commerciale. L'iscrizione nel registro delle imprese ha solo funzione di pubblicità-notizia. Il CCI definisce <strong>impresa minore</strong> quella al di sotto di soglie dimensionali (attivo ≤300k€, ricavi ≤200k€, debiti ≤500k€): non è soggetta alla liquidazione giudiziale ma può accedere alle procedure da sovraindebitamento.`,
    deep: `<strong>Criterio di prevalenza – senso qualitativo-funzionale:</strong> la prevalenza del lavoro familiare va intesa in senso <em>qualitativo-funzionale</em>: l'apporto dell'imprenditore e dei suoi familiari deve caratterizzare i beni o servizi prodotti. Esempi tipici: il sarto su misura, il piccolo commerciante ambulante, il modesto agente di commercio. Non è piccolo imprenditore chi investe ingenti capitali nell'impresa, anche senza avvalersi di alcun collaboratore (es. un gioielliere con beni rilevanti).<br><br><strong>Impresa artigiana (legge quadro 443/1985):</strong> definizione più ampia di quella ex art. 2083. Si fonda su: <em>(a)</em> <strong>oggetto</strong>: qualsiasi produzione di beni (anche semilavorati) o prestazione di servizi; <em>(b)</em> <strong>ruolo dell'artigiano</strong>: deve svolgere in misura prevalente il proprio lavoro, anche manuale, nel processo produttivo, ma non è richiesto che il suo lavoro prevalga sugli altri fattori produttivi. Di conseguenza, i limiti sui dipendenti sono variabili per settore e spesso poco compatibili con il principio di prevalenza ex art. 2083: una sartoria con 40 dipendenti può essere qualificata come artigiana! La qualifica artigiana è riconoscibile anche a società di persone, Srl e cooperative a determinate condizioni. Tuttavia, il riconoscimento artigiano ai sensi della legge quadro non basta per sottrarre l'artigiano allo statuto dell'imprenditore commerciale: per questo occorre rispettare il criterio di prevalenza dell'art. 2083 c.c. In mancanza, sarà artigiano ai soli fini delle agevolazioni regionali, ma soggetto alle regole dell'imprenditore commerciale anche in ambito concorsuale.<br><br><strong>Il "rompicapo" pre-CCI – doppia nozione di piccolo imprenditore:</strong> la vecchia legge fallimentare aveva una propria definizione di piccolo imprenditore (basata su soglie quantitative di reddito e capitale investito), del tutto diversa da quella codicistica fondata sulla prevalenza. Il coordinamento tra le due creava grande incertezza in sede di dichiarazione di fallimento. Con il CCI, si è sancita la separazione definitiva: il Codice Civile definisce chi è piccolo imprenditore; il CCI individua i parametri dimensionali (<em>impresa minore</em>) al di sotto dei quali non si apre la liquidazione giudiziale, usando volutamente una nomenclatura diversa.<br><br><strong>Soglie impresa minore (CCI) – una sola basta:</strong> basta superare anche <em>una sola</em> delle tre soglie (attivo ≤300.000€, ricavi ≤200.000€, debiti ≤500.000€) per essere esposti alla liquidazione giudiziale. La prova del rispetto di tutti e tre i limiti è a carico del debitore. Novità rispetto alla legge fallimentare: anche le <strong>società commerciali</strong> possono essere esonerate dalla liquidazione giudiziale se rispettano le soglie, purché non svolgano attività commerciale rilevante.`
  },
  {
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Imprenditore agricolo (art. 2135)",
    a: `<strong>Dopo d.lgs. 228/2001:</strong> è imprenditore agricolo chi esercita <em>attività agricole essenziali</em> (coltivazione del fondo, selvicoltura, allevamento di animali), definite come attività dirette alla cura e sviluppo di un <em>ciclo biologico</em>, anche senza sfruttamento della terra. Si prescinde dal fondo: rientrano coltivazioni fuori terra, allevamenti in batteria, acquacoltura. <strong>Attività connesse:</strong> manipolazione, conservazione, trasformazione, commercializzazione di prodotti <em>prevalentemente</em> propri e fornitura di beni/servizi con <em>prevalente</em> utilizzo di risorse aziendali (incluso agriturismo). È esonerato dallo statuto speciale commerciale.`,
    deep: `<strong>Ratio del trattamento di favore – "doppio rischio":</strong> l'imprenditore agricolo è esonerato dallo statuto speciale commerciale perché esposto a un <em>doppio rischio</em>: il rischio economico (comune a tutte le imprese) e il rischio ambientale tipico dell'agricoltura (maltempo, malattie del bestiame, calamità naturali). Per questo motivo il legislatore ha storicamente accordato un trattamento di favore, accentuato da legislazione speciale con incentivi fiscali e agevolazioni creditizie.<br><br><strong>Contrasto dottrinale pre-2001 e scelta del legislatore:</strong> con il progresso tecnologico, l'impresa agricola fondata sul semplice sfruttamento del suolo cede il passo all'agricoltura industrializzata, che prescinde spesso dalla terra (coltivazioni fuori terra, allevamenti in batteria). Si era formato un netto contrasto in dottrina e giurisprudenza: da un lato chi riteneva agricola solo l'attività basata su un ciclo biologico naturale; dall'altro chi dava rilievo al modo di produzione tipico dell'agricoltore (sfruttamento del fondo e delle sue risorse). Il d.lgs. 228/2001 ha optato per la prima impostazione, recependo la nozione di <em>cura e sviluppo di un ciclo biologico</em>.<br><br><strong>Coltivazione del fondo – prescinde dal fondo:</strong> si prescinde dallo sfruttamento della terra. Rientrano nell'attività essenziale: orticoltura, coltivazioni in serra o in vivai, floricultura, coltivazione di ortaggi e frutta anche fuori terra. Ciò che conta è la cura e lo sviluppo di un ciclo biologico vegetale o animale.<br><br><strong>Selvicoltura:</strong> deve essere concepita come attività caratterizzata dalla cura del bosco per ricavarne i relativi prodotti. Non costituisce attività agricola essenziale la <em>semplice estrazione di legname</em> dal bosco.<br><br><strong>Connessione soggettiva + oggettiva:</strong> le attività connesse (manipolazione, conservazione, trasformazione, commercializzazione, fornitura di beni/servizi con attrezzature aziendali, agriturismo) sono oggettivamente commerciali ma diventano agricole se: <em>(a)</em> chi le esercita è già imprenditore agricolo essenziale (<em>connessione soggettiva</em>); <em>(b)</em> riguardano prodotti ottenuti prevalentemente dall'attività essenziale o beni/servizi realizzati con attrezzature aziendali (<em>connessione oggettiva</em>). È sufficiente che le connesse non prevalgano, per rilievo economico, sull'essenziale. Il viticoltore che produce e vende il vino delle proprie uve è agricolo; chi acquista uve da terzi e produce vino è commerciale.<br><br><strong>Allevamento – ampliamento del 2001:</strong> il termine "bestiame" è sostituito con "animali": comprende bovini, caprini, equini, suini, pollame, conigli, pesci e mitili (acquacoltura), cavalli da corsa, animali da pelliccia, gatti e attività cinotecnica (allevamento e selezione di razze canine). Costituisce attività essenziale anche la zootecnia svolta fuori dal fondo (allevamenti in batteria). Equiparato all'imprenditore agricolo: l'<em>imprenditore ittico</em> che esercita pesca professionale.`
  },
  {
    prof: ["Extra"],
    q: "Impresa pubblica: le tre forme e privatizzazione",
    a: `L'impresa pubblica si articola in <strong>tre forme principali</strong>: <em>(1) enti pubblici economici</em>: persone giuridiche di diritto pubblico che esercitano attività d'impresa come oggetto principale (es. vecchio IRI, ENI prima della privatizzazione); <em>(2) società a partecipazione pubblica</em>: SpA o Srl di diritto privato con socio pubblico, anche di maggioranza (es. Enel, Eni, Poste Italiane — disciplinate dal <strong>d.lgs. 175/2016 TUSP</strong>); <em>(3) imprese-organo</em>: attività imprenditoriale svolta direttamente da un ente pubblico non economico tramite un'organizzazione interna separata ma priva di personalità giuridica propria. Dal 1990, il processo di <strong>privatizzazione</strong> ha trasformato quasi tutti gli enti pubblici economici in SpA, mantenendo la partecipazione pubblica tramite MEF o Cassa Depositi e Prestiti. Il <strong>principio di neutralità UE</strong> (art. 345 TFUE) è indifferente alla proprietà pubblica o privata purché le regole concorrenziali siano rispettate.`,
    deep: `<strong>Enti pubblici economici:</strong> persone giuridiche di diritto pubblico la cui creazione, struttura e scioglimento dipendono da leggi speciali, ma la cui attività è soggetta alle norme del Codice Civile (compreso lo statuto dell'imprenditore commerciale). Esempi storici: IRI (liquidato nel 2000), ENI prima della trasformazione in SpA, ENEL prima della privatizzazione. Oggi sopravvivono principalmente nelle aziende speciali degli enti locali e in talune holding pubbliche regionali.<br><br><strong>Società a partecipazione pubblica (TUSP, d.lgs. 175/2016):</strong> le PA possono partecipare solo a società con oggetto strettamente necessario ai fini istituzionali. Princìpi: divieto di partecipazione in società con oggetto non necessario; piani periodici di revisione delle partecipazioni; obbligo di dismissione se non giustificate; disciplina civilistica applicabile integralmente, salvo deroghe (es. in caso di insolvenza, alcune SpA a partecipazione pubblica con finalità di servizio pubblico sono soggette a <em>liquidazione coatta amministrativa</em> anziché giudiziale).<br><br><strong>Imprese-organo:</strong> ente pubblico non economico (es. Comune, Regione) che gestisce direttamente un'attività commerciale tramite un'organizzazione interna. Non ha personalità giuridica autonoma; i terzi contrattano con l'ente pubblico. Il regime giuridico applicabile è controverso: si applicano le norme sull'imprenditore commerciale ma non la liquidazione giudiziale (si applicano invece procedure speciali o la liquidazione coatta amministrativa).<br><br><strong>Privatizzazione — due ondate:</strong> la prima (formale, 1992-1993) ha trasformato gli enti pubblici economici in SpA mantenendo il 100% pubblico (IRI → Finmeccanica, Stet ecc.; ENI SpA, ENEL SpA). La seconda (sostanziale, 1994-2000) ha ceduto quote al mercato tramite Offerte Pubbliche di Vendita (OPV), mantenendo spesso partecipazioni di controllo tramite la <em>golden share</em> (poi dichiarata incompatibile con il diritto UE). La Cassa Depositi e Prestiti (CDP SpA) è oggi il principale veicolo di partecipazione pubblica nelle grandi imprese strategiche (ENI, Enel, Poste, ecc.).<br><br><strong>Principio di neutralità UE (art. 345 TFUE) e art. 106 TFUE:</strong> il diritto UE è neutro rispetto alla titolarità pubblica o privata delle imprese. Tuttavia, le imprese pubbliche e quelle titolari di diritti speciali o esclusivi sono soggette alle regole sulla concorrenza (art. 106 TFUE): lo Stato non può accordare loro privilegi che falsino la concorrenza. La Commissione può intervenire contro gli aiuti di Stato impropri a favore di imprese pubbliche (artt. 107-109 TFUE).`
  },
  {
    prof: ["Extra"],
    q: "Inizio e fine dell'impresa: principio di effettività (art. 33 CCI)",
    a: `Il <strong>principio di effettività</strong> governa sia l'inizio sia la fine dell'impresa: rileva l'esercizio concreto dell'attività, non le formalità giuridiche. <strong>Inizio:</strong> la qualità di imprenditore si acquista con l'avvio effettivo delle operazioni di produzione o scambio, non con la semplice <em>fase di organizzazione preliminare</em> (acquisto attrezzature, locazione locali, assunzione dipendenti). <strong>Fine:</strong> non coincide con la cessazione formale né con la cancellazione dal registro, ma con il completamento delle operazioni di liquidazione. Finché pendono rapporti giuridici inerenti all'impresa, questa continua ad esistere per quegli effetti. <strong>Art. 33 CCI:</strong> entro <strong>12 mesi</strong> dalla cancellazione dal registro delle imprese può ancora aprirsi la liquidazione giudiziale per debiti anteriori alla cancellazione.`,
    deep: `<strong>Inizio — quando inizia la qualità di imprenditore:</strong> la tesi prevalente richiede l'avvio concreto dell'attività produttiva: non bastano la firma del contratto d'affitto dei locali, l'acquisto dei macchinari o l'assunzione dei dipendenti. Occorre che l'imprenditore abbia compiuto almeno un'operazione rientrante nell'oggetto dell'impresa. Tuttavia, non è necessaria la prima vendita al cliente: anche la produzione di beni ancora non venduti può configurare l'inizio. La fase preparatoria è "pre-impresa": i debiti contratti per organizzare la futura attività non sono debiti d'impresa in senso tecnico.<br><br><strong>Rilevanza pratica dell'inizio:</strong> dal momento dell'inizio decorrono tutti gli obblighi dello statuto speciale: iscrizione nel registro delle imprese, tenuta delle scritture contabili, applicabilità della liquidazione giudiziale. La data di inizio è rilevante anche ai fini della <em>revocatoria concorsuale</em>: il periodo sospetto si calcola a ritroso dalla domanda di apertura della procedura, non dalla data di inizio dell'attività.<br><br><strong>Fine — tre momenti distinti:</strong> si distingue tra: <em>(a)</em> <strong>cessazione dell'attività</strong> (l'imprenditore smette di operare); <em>(b)</em> <strong>liquidazione del patrimonio</strong> (fase di dismissione dei beni, incasso crediti, pagamento debiti — ancora "impresa" se svolta con organizzazione e metodo economico); <em>(c)</em> <strong>estinzione della qualità</strong> (quando tutti i rapporti sono definiti). Per le <em>società</em>, la cancellazione dal registro ha effetto costitutivo (art. 2495 c.c.): le società si estinguono con la cancellazione, indipendentemente da residui pendenti.<br><br><strong>Art. 33 CCI — termine annuale:</strong> per i debitori individuali che hanno cessato l'attività e si sono cancellati, la liquidazione giudiziale può ancora essere aperta entro 12 mesi dalla cancellazione, per debiti contratti durante l'attività. Il termine ha lo scopo di evitare che l'imprenditore si "cancelli" per sfuggire alla procedura. Decorso il termine, i creditori possono solo agire individualmente.<br><br><strong>Imprenditore "di fatto":</strong> chi esercita un'attività commerciale senza le dovute iscrizioni è comunque imprenditore, con piena applicazione del relativo statuto. Non ci sono deroghe alla qualifica per violazione di obblighi formali. L'imprenditore di fatto è assoggettabile alla liquidazione giudiziale anche se privo di iscrizione al registro.`
  },
  {
    prof: ["Extra"],
    q: "Capacità e impresa: incapaci e impresa commerciale",
    a: `La regola è che l'esercizio dell'impresa commerciale richiede la <strong>piena capacità d'agire</strong>. Il sistema distingue: <em>Minore d'età e interdetto</em>: non possono <em>iniziare</em> un'impresa; possono <strong>continuarla</strong> tramite il rappresentante legale, previa autorizzazione del tribunale dei minorenni (minore) o del giudice tutelare (interdetto). <em>Inabilitato e minore emancipato</em>: possono continuare un'impresa preesistente con autorizzazione, ma non iniziarne una nuova; il minore emancipato autorizzato acquista la piena capacità d'agire per tutti gli atti d'impresa. <em>Amministrazione di sostegno</em>: il giudice tutelare definisce granularmente i poteri del beneficiario e può autorizzare la prosecuzione o l'inizio dell'impresa. L'obiettivo è proteggere il patrimonio dell'incapace evitando esposizione ai rischi commerciali illimitati.`,
    deep: `<strong>Fondamento della distinzione inizio/continuazione:</strong> il divieto assoluto di esercizio avrebbe conseguenze economiche negative per il patrimonio dell'incapace (es. distruzione del valore dell'azienda ereditata). Di qui il bilanciamento: la <em>continuazione</em> è ammessa (con controllo giurisdizionale), l'<em>inizio ex novo</em> è vietato salvo emancipazione piena.<br><br><strong>Minore d'età:</strong> il minore non emancipato non può compiere atti giuridici autonomamente. Se eredita un'impresa, i genitori (o il tutore) chiedono al <em>tribunale dei minorenni</em> di autorizzarne la continuazione. Con l'autorizzazione, il rappresentante compie gli atti necessari ma il titolare dell'impresa rimane il minore: la qualità d'imprenditore è del minore, i debiti gravano sul suo patrimonio. Il rappresentante risponde eventualmente per <em>mala gestio</em>.<br><br><strong>Minore emancipato:</strong> il minore emancipato (a seguito di matrimonio) ha capacità d'agire limitata agli atti di ordinaria amministrazione. Per atti di straordinaria amministrazione necessita dell'assistenza del curatore. Con l'autorizzazione del tribunale a esercitare l'impresa commerciale acquista la <strong>piena capacità d'agire</strong> per tutti gli atti connessi. Non può però iniziare un'impresa ex novo.<br><br><strong>Interdetto:</strong> totalmente privo di capacità d'agire. Il tutore lo rappresenta. Per continuare un'impresa di cui l'interdetto è titolare, il tutore deve ottenere autorizzazione dal giudice tutelare, che può subordinarla alla prestazione di garanzie. Qualità d'imprenditore spetta all'interdetto; il tutore agisce come rappresentante.<br><br><strong>Inabilitato:</strong> può compiere atti di ordinaria amministrazione autonomamente; per atti di straordinaria amministrazione deve essere assistito dal curatore. Tutti gli atti d'impresa sono straordinaria amministrazione: necessita sempre dell'assistenza del curatore e dell'autorizzazione del tribunale per continuare l'attività.<br><br><strong>Amministrazione di sostegno (l. 6/2004):</strong> strumento flessibile: il decreto di nomina definisce puntualmente gli atti che il beneficiario non può compiere autonomamente. Il giudice tutelare può autorizzare la continuazione o l'inizio dell'impresa, specificando con quali limitazioni. Se le capacità residue lo consentono, il beneficiario può gestire autonomamente la parte dell'impresa non coperta dalle limitazioni del decreto.`
  },
  {
    prof: ["Comune","Masi","Morello"],
    q: "Registro delle imprese: sezioni, pubblicità legale e notizia, efficacia",
    a: `Il registro è tenuto presso le Camere di commercio. <strong>Sezione ordinaria:</strong> imprenditori commerciali non piccoli, tutte le società (tranne s.s.), consorzi con attività esterna, enti pubblici commerciali. <strong>Sezioni speciali:</strong> piccoli imprenditori, imprenditori agricoli, s.s., artigiani, start-up innovative, imprese sociali, ecc.<br><br><strong>Efficacia nella sezione ordinaria:</strong> <em>dichiarativa</em> (di regola: rende opponibile ai terzi); <em>costitutiva</em> (per SpA, Srl, cooperative: senza iscrizione la società non esiste); <em>normativa</em> (per s.n.c./s.a.s.: l'iscrizione determina il regime giuridico applicabile). Nelle sezioni speciali, di regola solo pubblicità notizia; eccezione: imprenditori agricoli hanno pubblicità legale dal 2001.`,
    deep: `<strong>Storia del registro – 50 anni di regime transitorio:</strong> il registro delle imprese era già previsto dal Codice Civile del 1942, ma non fu attivato per oltre cinquant'anni. Nel frattempo si applicò un regime transitorio: iscrizioni presso i registri di cancelleria dei tribunali, con il Busarl (Bollettino ufficiale delle SpA e srl) e il Busc (Bollettino ufficiale delle cooperative) per le relative forme societarie. Solo con la l. 580/1993 e il d.p.r. 581/1995 fu istituito l'attuale registro, diventato operativo nel 1997. Da allora esiste un unico registro ufficiale, gestito dalle Camere di Commercio, completamente informatizzato.<br><br><strong>Efficacia dichiarativa:</strong> <em>efficacia positiva immediata</em>: dall'iscrizione l'atto è opponibile ai terzi (per le società di capitali, opponibilità piena solo dopo 15 giorni). <em>Efficacia negativa</em>: senza iscrizione, l'atto non è opponibile ai terzi, ma l'imprenditore può dimostrare che il terzo ne era comunque a conoscenza. <strong>Efficacia costitutiva totale:</strong> per SpA, Srl e cooperative, senza iscrizione la società non esiste. <strong>Efficacia costitutiva parziale:</strong> es. delibera di riduzione del capitale di s.n.c.: senza iscrizione, i creditori non possono opporsi entro 3 mesi. <strong>Efficacia normativa:</strong> per s.n.c. e s.a.s. non iscritte, si applica la disciplina della società semplice (più svantaggiosa per i soci, soprattutto in tema di responsabilità).<br><br><strong>Procedimento:</strong> l'iscrizione avviene su domanda dell'interessato o d'ufficio se l'interessato è inadempiente. D'ufficio è prevista anche la cancellazione per iscrizioni errate o per imprese che hanno cessato l'attività. L'ufficio verifica regolarità formale e sostanziale (esistenza e veridicità dell'atto) ma non può rilevare nullità o annullabilità. Per atto pubblico o scrittura privata autenticata, l'iscrizione è immediata (il controllo di legalità è già stato effettuato dal notaio). Chi non adempie incorre in sanzioni pecuniarie amministrative.<br><br><strong>Sezione speciale e pubblicità legale agricola:</strong> dal 2001, anche gli imprenditori agricoli (anche piccoli) e le società semplici che svolgono attività agricola hanno pubblicità legale dalla sezione speciale: la distinzione originaria tra sezione ordinaria (pubblicità legale) e speciale (sola notizia) è in parte superata.<br><br><strong>Le 8 sezioni speciali:</strong> (1) imprenditori agricoli e piccoli imprenditori (+ artigiani); (2) società tra professionisti; (3) soggetti con attività di direzione e coordinamento; (4) imprese sociali; (5) atti in lingua straniera di società di capitali; (6) start-up innovative e incubatori certificati; (7) PMI innovative; (8) trasparenza antiriciclaggio (titolari effettivi e trust).`
  },
  {
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Scritture contabili: obbligatorie ed efficacia probatoria",
    a: `Obbligatorie per l'imprenditore commerciale non piccolo (art. 2214). <strong>Libri obbligatori:</strong> libro giornale (registro cronologico giornaliero) e libro degli inventari (stato patrimoniale annuale, chiuso col bilancio). Inoltre: corrispondenza commerciale e altre scritture in base a natura/dimensioni. Conservazione: 10 anni.<br><br><strong>Efficacia probatoria:</strong> le scritture possono essere usate <em>contro</em> l'imprenditore anche se irregolari. Per usarle <em>a proprio favore</em>: devono essere regolari, la controparte deve essere imprenditore, e la controversia riguardi l'impresa.`,
    deep: `<strong>Duplice rilevanza delle scritture:</strong> la tenuta delle scritture ha un duplice ruolo: <em>rilevanza interna</em> (forniscono all'imprenditore uno strumento di controllo e consapevolezza sull'andamento dell'attività) e <em>rilevanza esterna</em> (garantiscono trasparenza nei rapporti con terzi, creditori e autorità).<br><br><strong>Sistema misto (art. 2214):</strong> il legislatore impone libri specifici (giornale, inventari) e, con clausola aperta, tutte le scritture richieste dalla natura e dimensione dell'impresa: <em>libro mastro</em> (sistematico per tipo di operazione/cliente), <em>libro cassa</em> (entrate/uscite di denaro), <em>libro magazzino</em> (operazioni sulle merci), <em>registri tributari</em> (registro fatture, libro cespiti, ecc.). Le scritture contabili sono disciplinate anche dalla legislazione tributaria che solo in parte coincide con il Codice Civile: la legge fiscale impone scritture anche a soggetti non imprenditori, come i professionisti.<br><br><strong>Libri principali:</strong> il <em>libro giornale</em> registra le operazioni giorno per giorno nell'ordine di esecuzione; non occorre registrare separatamente ogni operazione se omogenee (es. importo complessivo delle vendite giornaliere). Il <em>libro degli inventari</em> è redatto all'inizio dell'attività e aggiornato annualmente; si chiude con il bilancio d'esercizio (Stato Patrimoniale + Conto Economico), che deve riflettere con evidenza e verità la situazione del patrimonio. Le società commerciali (tranne la semplice) e le imprese sociali sono obbligate alle scritture anche se non esercitano attività commerciale.<br><br><strong>Formalità estrinseche e intrinseche:</strong> le scritture devono essere redatte senza spazi in bianco, interlinee o parole cancellate ancora leggibili. Le formalità burocratiche sono oggi semplificate (non è più richiesta la vidimazione o la bollatura) per agevolare l'uso di strumenti digitali. Conservazione obbligatoria: 10 anni, anche su supporti informatici.<br><br><strong>Efficacia probatoria:</strong> le scritture, anche se irregolari, possono essere usate <em>contro</em> l'imprenditore da parte di terzi; questi però non possono estrapolare solo le parti favorevoli e l'imprenditore può sempre contestarne la veridicità. Per usarle <em>a proprio favore</em> l'imprenditore deve soddisfare condizioni più rigorose: scritture regolari, controparte imprenditore, controversia relativa all'attività d'impresa. In ogni caso, la valutazione probatoria è rimessa all'apprezzamento del giudice.<br><br><strong>Sanzioni:</strong> chi non adempie all'obbligo rischia sanzioni pecuniarie amministrative. In caso di liquidazione giudiziale, l'assenza o l'irregolarità delle scritture può configurare reati di <em>bancarotta semplice</em> (art. 323 CCI) o <em>bancarotta fraudolenta</em> (art. 322 CCI), con conseguenze penali non solo per l'imprenditore ma, in taluni casi, anche per l'institore.`
  },
  {
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Institore: rappresentanza, poteri e opponibilità",
    a: `<strong>Institore (art. 2203):</strong> ausiliario subordinato preposto all'intera impresa, a una sede o a un ramo. Ha <strong>potere di gestione generale</strong> e <strong>rappresentanza generale</strong> (sostanziale e processuale), anche senza procura espressa. Non può vendere/affittare l'impresa, né alienare/ipotecare immobili senza autorizzazione. I limiti ai poteri devono essere iscritti nel registro per essere opponibili ai terzi. Se omette di spendere il nome dell'imprenditore, è personalmente obbligato; ma anche l'imprenditore è obbligato se l'atto è pertinente all'impresa.`,
    deep: `<strong>Institore assoluto vs relativo:</strong> l'institore può essere preposto all'intera impresa (<em>institore assoluto</em>) oppure solo a una sede secondaria o a un ramo autonomo dell'impresa (<em>institore relativo</em>), in questo caso potendo essere subordinato a un altro institore. È possibile che più institori siano contemporaneamente preposti all'impresa: in tal caso agiscono separatamente, salvo diversa disposizione nella procura.<br><br><strong>Potere di rappresentanza – automatico e ampio:</strong> anche in assenza di espressa procura, l'institore ha la facoltà di compiere in nome dell'imprenditore tutti gli atti necessari per l'esercizio dell'impresa (<em>rappresentanza sostanziale</em>). I limiti ai poteri devono essere pubblicati nel registro delle imprese per essere opponibili ai terzi: limitazioni non iscritte non producono effetti verso i terzi. Limiti assoluti (non derogabili neppure dalla procura): l'institore non può vendere o affittare l'azienda, né alienare o ipotecare beni immobili appartenenti all'imprenditore.<br><br><strong>Rappresentanza processuale:</strong> l'institore può stare in giudizio sia come attore (rappresentanza attiva) che come convenuto (rappresentanza passiva), non solo per gli atti compiuti da lui stesso ma anche per quelli dell'imprenditore.<br><br><strong>Responsabilità condivisa:</strong> l'institore condivide con l'imprenditore l'obbligo di iscrizione nel registro delle imprese e di tenuta delle scritture contabili. In caso di liquidazione giudiziale, può essere penalmente responsabile (bancarotta), ma solo l'imprenditore è sottoposto alla procedura concorsuale e alle relative conseguenze personali e patrimoniali.<br><br><strong>Atti pertinenti – spendita del nome:</strong> se l'institore omette di dichiarare di agire per l'imprenditore, è personalmente obbligato. Tuttavia, se l'atto è pertinente all'impresa, anche l'imprenditore è obbligato. Se le modalità rendono incerto se l'institore abbia operato per sé o per l'imprenditore, la responsabilità è solidale: il riparto è poi questione interna tra le parti.`
  },
  {
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Procuratore e commessi: differenze con l'institore",
    a: `<strong>Procuratore (art. 2209):</strong> ausiliario subordinato non preposto all'intera impresa, ma con potere di compiere atti in un ambito specifico (es. direttore acquisti). Non ha rappresentanza processuale, né obblighi di iscrizione/scritture. Le limitazioni non richiedono pubblicità legale.<br><br><strong>Commessi (art. 2210):</strong> ausiliari con mansioni esecutive (es. commesso di negozio). Potere molto più limitato: solo atti ordinari della specie di operazioni loro affidate. Non possono esigere il prezzo fuori dai locali, né concedere sconti non d'uso.`,
    deep: `<strong>Ausiliari interni vs ausiliari esterni:</strong> gli ausiliari interni (institori, procuratori, commessi) sono lavoratori subordinati il cui potere di rappresentanza deriva automaticamente dalla posizione nell'impresa, commisurato al tipo di mansioni. Gli <em>ausiliari esterni</em> (agenti, mediatori, commissionari, spedizionieri) operano su base contrattuale autonoma (mandato, agenzia, commissione) e i loro poteri rappresentativi sono disciplinati dal contratto, non direttamente dalla legge.<br><br><strong>Gerarchia Institore > Procuratore > Commesso:</strong> tutti e tre hanno potere di rappresentanza automatico. L'imprenditore può modificarne il contenuto, ma la limitazione è opponibile ai terzi con modalità diverse: per l'institore, solo se iscritta nel registro delle imprese; per il procuratore, senza pubblicità legale (quindi valida solo se il terzo ne era a conoscenza); per il commesso, solo se resa nota con mezzi idonei (es. avvisi affissi nei locali) o se provata l'effettiva conoscenza del terzo.<br><br><strong>Procuratore – "generale ma circoscritto":</strong> ha rappresentanza generale dell'imprenditore, ma limitata alle operazioni del proprio settore specifico. Il direttore del settore acquisti può compiere tutti gli atti che tipicamente rientrano in tale funzione (e per nient'altro). Non ha rappresentanza processuale (né attiva né passiva), non è tenuto a iscriversi nel registro né a tenere le scritture contabili. L'imprenditore <em>non risponde</em> per gli atti pertinenti all'impresa compiuti dal procuratore senza spendita del nome dell'imprenditore.<br><br><strong>Commessi – regole specifiche (art. 2210-2213):</strong> non possono esigere il pagamento di merci non ancora consegnate, né concedere dilazioni o sconti non consueti; se preposti alla vendita nei locali, non possono incassare fuori da tali locali; se è presente una cassa apposita, non possono incassare neppure all'interno. L'imprenditore può ampliare o limitare questi poteri, ma senza un sistema di pubblicità legale: le limitazioni sono opponibili ai terzi solo tramite mezzi idonei di comunicazione (es. cartelli affissi) o mediante prova dell'effettiva conoscenza da parte del terzo.`
  },
  {
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Mandato e principio della spendita del nome",
    a: `Nel mandato con rappresentanza, il mandatario agisce in nome e per conto del mandante: gli effetti ricadono nella sfera del mandante (spendita del nome). Nel mandato senza rappresentanza, il mandatario agisce in nome proprio. L'impresa occulta si fonda sul mandato senza rappresentanza: il <em>dominus</em> dirige l'impresa ma non si palesa ai terzi.`,
    deep: `<strong>Imprenditore occulto – teoria di Bigiavi:</strong> chi esercita il potere di direzione di un'impresa deve assumersene i rischi (principio di inscindibilità potere/responsabilità). Quindi il dominus occulto sarebbe imprenditore a tutti gli effetti, esposto alla liquidazione giudiziale. <em>Critica:</em> contrasta col principio della responsabilità limitata nelle società di capitali.<br><br><strong>Tesi dell'impresa fiancheggiatrice (giurisprudenza prevalente):</strong> se il socio che controlla la società la gestisce come "cosa propria" (finanziamento sistematico, ingerenza costante, direzione unitaria), questi comportamenti possono dar luogo a un'<em>autonoma attività d'impresa</em> di finanziamento/gestione. Se ricorrono i requisiti dell'art. 2082, il socio diventa titolare di un'impresa commerciale individuale e può essere sottoposto a liquidazione giudiziale.<br><br><strong>Tutela indiretta dei creditori:</strong> la liquidazione giudiziale della società può chiedere all'impresa fiancheggiatrice di versare le somme necessarie per soddisfare i debiti contratti nel suo interesse.`
  },
  {
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Azienda: definizione, caratteristiche e avviamento (art. 2555)",
    a: `<strong>Art. 2555 c.c.:</strong> l'azienda è il complesso di beni organizzati dall'imprenditore per l'esercizio dell'impresa. Rileva la destinazione d'uso, non il titolo giuridico: anche beni di terzi (es. macchinario in leasing) sono beni aziendali se utilizzati nell'impresa. <strong>Avviamento:</strong> valore aggiunto del complesso aziendale rispetto alla somma dei singoli beni, derivante dall'organizzazione, dalla clientela, dalla reputazione.`,
    deep: `<strong>Natura giuridica – dibattito dottrinale:</strong> la dottrina ha a lungo discusso la natura giuridica dell'azienda. La <em>teoria atomistica</em> vede l'azienda come la semplice somma dei beni che la compongono, senza un'unità giuridica autonoma. La <em>teoria unitaria</em> considera l'azienda un bene distinto, con proprio valore giuridico e oggetto di specifici diritti. Il legislatore non ha sciolto il dibattito: il Codice Civile disciplina l'azienda come una <em>fattispecie concreta</em> (un modello) che, quando si verifica nella pratica, comporta l'applicazione di specifiche norme, riconoscendone la rilevanza economica (artt. 2556-2562 c.c.).<br><br><strong>Beni aziendali – destinazione d'uso, non titolo giuridico:</strong> per qualificare un bene come aziendale rileva solo la sua <em>destinazione d'uso</em>, non il titolo giuridico. Non sono beni aziendali quelli non destinati all'impresa (es. abitazione dell'imprenditore). Possono esserlo anche beni di terzi se utilizzati nell'impresa (es. macchinario in leasing).<br><br><strong>Avviamento oggettivo vs soggettivo:</strong> l'avviamento rappresenta l'attitudine dell'azienda a generare profitto (ricavi eccedenti i costi). L'<em>avviamento oggettivo</em> deriva dall'organizzazione e dal coordinamento dei beni (es. impianto industriale efficiente) e resta anche col cambio del titolare. L'<em>avviamento soggettivo</em> dipende dalle capacità personali dell'imprenditore (es. abilità nel costruire e fidelizzare la clientela) e può venir meno con la sua uscita.<br><br><strong>Piano statico vs dinamico:</strong> il piano statico è la mera somma dei singoli beni aziendali; il piano dinamico (valore d'impresa in funzionamento) è ciò che genera utilità nuove e maggiori rispetto ai beni isolatamente considerati. Questa differenza è il cuore del concetto di avviamento.<br><br><strong>Trasferimento d'azienda vs singoli beni:</strong> non è necessario trasferire l'intero complesso: basta un ramo d'azienda dotato di autonomia operativa. Ciò che conta è trasferire un insieme potenzialmente idoneo all'esercizio di un'attività d'impresa. I beni esclusi dal trasferimento non devono però alterare l'unità economica e funzionale (es. escludere il brevetto industriale su cui si fonda l'attività distruggerebbe l'unità funzionale).`
  },
  {
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Trasferimento d'azienda: concorrenza, contratti, crediti e debiti",
    a: `<strong>Divieto di concorrenza (art. 2557):</strong> l'alienante deve astenersi per max 5 anni da attività idonea a sottrarre clientela. <strong>Contratti (art. 2558):</strong> l'acquirente subentra automaticamente nei contratti non personali; il terzo può recedere per giusta causa entro 3 mesi. <strong>Crediti (art. 2559):</strong> la cessione è opponibile con l'iscrizione nel registro. <strong>Debiti (art. 2560):</strong> l'alienante non è liberato; l'acquirente risponde se i debiti risultano dalle scritture contabili. Per i debiti di lavoro, l'acquirente risponde solidalmente sempre.`,
    deep: `<strong>Forma – validità e opponibilità:</strong> per la validità del trasferimento si seguono le regole dei singoli beni (es. forma scritta a pena di nullità per immobili ex art. 1350 c.c.; atto pubblico per conferimento in società di capitali). Ai fini probatori e di opponibilità ai terzi, solo per le imprese soggette a pubblicità legale è richiesta la forma scritta. L'iscrizione nel registro delle imprese deve avvenire entro 30 giorni dalla stipulazione (atto pubblico o scrittura privata autenticata).<br><br><strong>Divieto di concorrenza – derogabilità e casi controversi:</strong> il divieto (max 5 anni, ambito limitato all'attività idonea a sottrarre clientela) si applica anche alle vendite coattive. Le parti possono estenderlo, purché non si arrivi a vietare ogni attività economica all'alienante e non si superi il termine massimo. Casi controversi ove il divieto è discusso: <em>(a)</em> divisione ereditaria con assegnazione dell'azienda a un erede (non è trasferimento diretto tra soggetti, ma si riconosce l'avviamento); <em>(b)</em> scioglimento di società con assegnazione al socio; <em>(c)</em> cessione dell'intera partecipazione di controllo (raggiunge lo stesso risultato economico della vendita d'azienda). In questi casi, parte della dottrina ritiene comunque applicabile il divieto.<br><br><strong>Successione nei contratti (art. 2558):</strong> l'acquirente subentra automaticamente nei contratti non personali in corso di esecuzione, senza necessità di consenso del terzo. Il terzo può recedere per giusta causa entro 3 mesi dalla conoscenza del trasferimento. Se recede, può chiedere i danni all'alienante, ma solo se dimostra l'assenza di una scelta oculata del cessionario (prova difficile).<br><br><strong>Crediti (art. 2559):</strong> la cessione è efficace verso i terzi con l'iscrizione nel registro delle imprese, senza necessità di notifica al debitore. Il debitore ceduto si libera se paga in buona fede all'alienante, ignorando il trasferimento. Disciplina semplificata solo per imprese soggette a pubblicità legale.<br><br><strong>Debiti di lavoro – tutela rafforzata:</strong> l'acquirente risponde solidalmente anche se i debiti non risultano dalle scritture contabili e anche se ne era ignaro al momento dell'acquisto. La tutela vale anche per aziende non commerciali o rami d'azienda.<br><br><strong>Rapporti interni e usufrutto/affitto:</strong> il Codice Civile non regola espressamente la sorte dei crediti/debiti nel rapporto tra alienante e acquirente: tesi prevalente è che non vi sia automatico trasferimento, occorre apposita pattuizione. Per usufrutto e affitto d'azienda: si applicano divieto di concorrenza e successione nei contratti; la disciplina sui debiti aziendali non si applica (manca richiamo); i debiti di lavoro si trasferiscono anche all'usufruttuario/affittuario.`
  },
  {
    prof: ["Extra"],
    q: "Usufrutto e affitto d'azienda (artt. 2561-2562)",
    a: `L'<strong>usufrutto d'azienda</strong> (art. 2561 c.c.) attribuisce all'usufruttuario il godimento dell'azienda, conservandone la destinazione economica. L'usufruttuario acquista la <strong>qualità di imprenditore</strong>; deve gestire senza modificare la destinazione, mantenere l'efficienza dell'organizzazione e aggiornare le scorte. Al termine restituisce l'azienda: se il valore è diminuito paga un'indennità; se è aumentato può chiedere rimborso. L'<strong>affitto d'azienda</strong> (art. 2562) segue la stessa disciplina per analogia. Si differenzia dalla locazione di singoli beni: l'affittuario subentra nei contratti d'impresa e diventa <em>imprenditore</em>. Si applicano il <strong>divieto di concorrenza</strong> (art. 2557) e la <strong>successione nei contratti</strong> (art. 2558); <strong>non si applica</strong> l'art. 2560 (debiti pregressi dell'alienante/concedente).`,
    deep: `<strong>Usufrutto vs locazione di singoli beni:</strong> l'affitto di un'azienda non è assimilabile alla locazione di immobili o alla cessione di singoli beni. Nell'affitto d'azienda l'affittuario riceve un complesso organizzato e funzionante, assume la qualità d'imprenditore e subentra automaticamente (salvo diverso accordo) nei contratti d'impresa non personali. La locazione di un immobile industriale, invece, non trasferisce la qualità di imprenditore né le situazioni giuridiche dell'impresa.<br><br><strong>Mantenimento della destinazione economica:</strong> l'usufruttuario/affittuario non può modificare l'oggetto dell'impresa o destinare il complesso ad attività radicalmente diverse. Può apportare miglioramenti (es. acquistare nuovi macchinari) ma non può snaturare l'azienda. Il nudo proprietario/concedente ha diritto di vigilanza e, in caso di abuso, può chiedere la cessazione anticipata dell'usufrutto/affitto.<br><br><strong>Inventario e conguaglio:</strong> all'inizio e alla fine si redige un inventario. La differenza tra inventario finale e iniziale determina la somma a conguaglio: se l'usufruttuario ha consumato o deteriorato più di quanto abbia rinnovato, deve corrispondere la differenza; viceversa, ha diritto a indennizzo per i miglioramenti.<br><br><strong>Divieto di concorrenza (art. 2557):</strong> si applica sia al trasferimento sia all'usufrutto/affitto. Durante il periodo di godimento il concedente/nudo proprietario non può svolgere attività concorrenziale idonea a sottrarre clientela (tutela dell'avviamento a favore dell'usufruttuario/affittuario). Al termine dell'affitto il divieto può tornare a operare a favore del reintegrato concedente nei confronti dell'ex affittuario — questione dibattuta in dottrina.<br><br><strong>Successione nei contratti (art. 2558):</strong> i contratti d'impresa non personali in corso si trasferiscono automaticamente all'usufruttuario/affittuario. Il terzo può recedere per giusta causa entro 3 mesi. Compresi i contratti di lavoro: i lavoratori passano all'affittuario mantenendo tutti i diritti (art. 2112 c.c.).<br><br><strong>Mancato richiamo all'art. 2560 (debiti aziendali):</strong> l'art. 2562 richiama solo gli artt. 2557, 2558, 2560 non è richiamato: l'usufruttuario/affittuario non risponde dei debiti pregressi del concedente. I debiti contratti dall'affittuario durante l'affitto sono suoi; il concedente non ne risponde al termine del contratto.<br><br><strong>Affitto d'azienda nella liquidazione giudiziale (art. 212 CCI):</strong> il curatore può affittare l'azienda per preservarne il valore in attesa della vendita definitiva. Il contratto deve prevedere la facoltà del curatore di recedere con equo indennizzo (prededucibile). L'affittuario è imprenditore a tutti gli effetti; i debiti contratti durante l'affitto non gravano sulla procedura.`
  },
  {
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Marchio: definizione, requisiti di validità, marchio notorio",
    a: `<strong>Marchio:</strong> segno distintivo dei prodotti/servizi. Può essere denominativo, figurativo, tridimensionale, sonoro, cromatico. <strong>Requisiti:</strong> <em>(1) liceità</em>; <em>(2) verità</em> (non ingannevole); <em>(3) originalità</em> (capacità distintiva: no denominazioni generiche); <em>(4) novità</em>. Il marchio registrato dura 10 anni, rinnovabile illimitatamente. <strong>Marchio celebre:</strong> tutela ultra-merceologica anche per prodotti non affini se l'uso trae indebito vantaggio dalla rinomanza.`,
    deep: `<strong>Tipi di marchio:</strong> di fabbrica vs di commercio (possono coesistere sullo stesso prodotto, ma il rivenditore non può sopprimere quello del produttore); di servizio; generale vs speciale (es. Fiat-Panda); di certificazione (garantisce origine/qualità, es. Prosciutto di Parma); collettivo (registrato da associazioni).<br><br><strong>Trasferimento:</strong> dal 1992, il marchio può essere ceduto o dato in licenza anche senza l'azienda. La licenza non esclusiva è ammessa (stesso marchio usato da titolare e più concessionari) ma non deve ingannare il pubblico. Il licenziatario deve garantire caratteristiche qualitative uguali. Usata per franchising e merchandising (es. orologi Ferrari).<br><br><strong>Decadenza:</strong> mancato utilizzo per 5 anni; volgarizzazione (il marchio diventa nome comune: es. "Biro").<br><br><strong>Marchio non registrato (art. 2571):</strong> chi ha usato un marchio senza registrarlo può continuare nei limiti dell'uso precedente. La tutela dipende dalla notorietà: nazionale = forte; locale = debole (non impedisce ad altri di registrare lo stesso marchio altrove).`
  },
  {
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Segni distintivi: ditta, insegna, marchio",
    a: `<strong>Ditta:</strong> nome commerciale dell'imprenditore. Deve contenere almeno il cognome/sigla. Trasferibile solo con l'azienda. <strong>Insegna:</strong> identifica i locali. <strong>Marchio:</strong> identifica prodotti/servizi (tutela più elevata). Tutti i segni devono rispettare verità, novità e capacità distintiva. L'uso esclusivo è relativo: opera solo dove c'è rischio di confusione.`,
    deep: `<strong>Ditta – principio di verità:</strong> la ditta originaria deve contenere almeno il cognome dell'imprenditore. La ditta derivata (trasferita da un altro) non richiede integrazione col cognome del nuovo titolare ("verità storica"). <strong>Principio di novità:</strong> chi adotta per primo la ditta ha diritto esclusivo. Per le imprese commerciali, conta la priorità di iscrizione nel registro. Il diritto all'uso esclusivo è relativo: vale solo in settori concorrenziali.<br><br><strong>Insegna:</strong> disciplina minima (un solo articolo: 2568). Non è tutelata se generica (es. "bar"), salvo che l'originalità derivi dalla composizione grafica. Trasferibile, anche con licenza non esclusiva (tipico nel franchising: es. Benetton, Cartier).<br><br><strong>Principi comuni:</strong> ampia libertà di formazione, uso esclusivo relativo, trasferibilità con limiti anti-inganno. Questi principi si applicano per analogia anche ai segni atipici (es. slogan pubblicitari, domain name).`
  },
  {
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Titoli di credito: caratteristiche generali e principi",
    a: `I titoli di credito sono documenti che incorporano un diritto di credito. <strong>Principi:</strong> <em>Incorporazione</em> (il diritto è nel documento); <em>Letteralità</em> (il contenuto è determinato dal testo del titolo); <em>Autonomia</em> (l'acquirente in buona fede acquista un diritto libero dalle eccezioni personali dei precedenti portatori); <em>Legittimazione</em> (chi possiede il titolo nelle forme prescritte può esercitare il diritto senza provare la titolarità).`,
    deep: `<strong>Funzione economica:</strong> i titoli di credito semplificano e rendono sicura la circolazione dei diritti di credito. Il modello è quello dei beni mobili: il diritto immateriale viene "incorporato" in un documento che è cosa mobile. Trasferire il documento = trasferire il diritto.<br><br><strong>Autonomia in sede di circolazione (art. 1994):</strong> chi acquista un titolo in buona fede, anche da un non proprietario (es. ladro), acquista validamente. Ricalca il principio "possesso vale titolo" dei beni mobili (art. 1153). Serve: negozio astrattamente idoneo + possesso + buona fede.<br><br><strong>Autonomia in sede di esercizio:</strong> al portatore di buona fede sono opponibili solo le eccezioni reali (forma, falsità firma, difetto capacità, condizioni d'azione). Le eccezioni personali (rapporti precedenti, exceptio doli) sono opponibili solo al diretto interessato, non ai terzi in buona fede.<br><br><strong>Vincoli (art. 1997):</strong> pegno, sequestro e pignoramento sul diritto devono essere effettuati sul titolo stesso; non hanno effetto se non risultano dal titolo.`
  },
  {
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Titoli al portatore, all'ordine e nominativi: circolazione",
    a: `<strong>Al portatore:</strong> circolano con la sola consegna. <strong>All'ordine:</strong> circolano con girata + consegna; la legittimazione deriva da una serie continua di girate. <strong>Nominativi:</strong> richiedono doppia intestazione (sul titolo e nel registro dell'emittente); circolano tramite transfert o girata autenticata. Per i titoli azionari, la girata basta per esercitare i diritti sociali.`,
    deep: `<strong>Girata – in pieno vs in bianco:</strong> la girata in pieno indica il giratario; la girata in bianco no. Chi riceve un titolo girato in bianco può: completare col proprio nome, girare ulteriormente, o trasferire con semplice consegna.<br><br><strong>Girata con effetti limitati:</strong> <em>girata per l'incasso</em> (il giratario agisce come rappresentante: non acquista diritto autonomo, può girare solo per procura); <em>girata a titolo di pegno</em> (il giratario ha diritto di pegno: acquista diritto autonomo ma limitato, non può trasferire ulteriormente se non per procura).<br><br><strong>Transfert vs girata nei nominativi:</strong> il transfert è il cambio contestuale delle due intestazioni (titolo + registro) fatto dall'emittente. La girata è più semplice: l'alienante annota sul titolo, l'emittente aggiorna il registro solo quando l'acquirente vuole esercitare i diritti. La girata nei nominativi non può essere in bianco e deve essere autenticata.<br><br><strong>Titoli al portatore – ammortamento:</strong> di regola non ammesso (il diritto segue il possesso), salvo eccezioni tassative (es. assegni bancari al portatore).`
  },
  {
    prof: ["Extra"],
    q: "Gestione accentrata dei titoli di massa e dematerializzazione",
    a: `Per i titoli di massa (azioni, obbligazioni, titoli di Stato) il legislatore ha introdotto sistemi per snellire la circolazione. Nel <strong>sistema non dematerializzato</strong>, i titoli fisici vengono accentrati presso un <strong>depositario centrale</strong> (in Italia: <em>Monte Titoli SpA</em>, ora parte di Euroclear Italy): il trasferimento avviene tramite <em>giroconto contabile</em> senza consegna fisica del documento. Nel <strong>sistema dematerializzato</strong> — obbligatorio per i titoli negoziati su mercati regolamentati (d.lgs. 213/1998 e artt. 83-<em>bis</em> ss. TUF) — il titolo <em>non viene mai emesso</em> materialmente: il diritto esiste come mera <strong>scrittura contabile</strong> sul conto dell'intermediario depositario. Il trasferimento avviene con scrittura sul conto dell'acquirente, senza consegna né girata.`,
    deep: `<strong>Monte Titoli SpA / Euroclear Italy:</strong> depositario centrale italiano, parte del gruppo Euroclear. Opera come sistema di regolamento delle transazioni in titoli: ogni intermediario (banca, SIM) ha un conto presso Monte Titoli; le operazioni di compravendita si regolano con accredito/addebito tra i conti degli intermediari, senza movimentazione fisica dei titoli. Ciò elimina i rischi di smarrimento, furto e falsificazione del documento.<br><br><strong>Ammortamento nei sistemi accentrati:</strong> nei sistemi non dematerializzati il titolo fisico è detenuto dal depositario centrale. Se il documento viene distrutto o smarrito all'interno del sistema, la prova della titolarità emerge dalla scrittura contabile, rendendo le regole sull'ammortamento di scarsa rilevanza pratica. Nei sistemi pienamente dematerializzati l'ammortamento è concettualmente impossibile (non esiste documento da ammortizzare).<br><br><strong>Struttura del sistema dematerializzato:</strong> il diritto del titolare è attestato dall'iscrizione nel conto dell'intermediario presso il depositario centrale. L'acquirente acquista diritto reale sui titoli con la scrittura sul conto del suo intermediario, che avviene al <em>regolamento</em> (tipicamente T+2: due giorni di borsa dalla negoziazione). L'intermediario rilascia <em>certificazioni di legittimazione</em> per l'esercizio dei diritti.<br><br><strong>Norme applicabili:</strong> ai titoli dematerializzati si applicano le disposizioni del TUF (artt. 83-<em>bis</em> ss.) e del Regolamento UE 909/2014 (CSDR — Central Securities Depositories Regulation). I princìpi codicistici di incorporazione, letteralità e autonomia si applicano per analogia con adattamenti: la "spossessione" è impossibile; la "serie continua di girate" è sostituita dalla catena di scritture contabili.<br><br><strong>Record date e voto in assemblea:</strong> per l'esercizio dei diritti sociali (voto, dividendi), il sistema italiano adotta il meccanismo della <em>legittimazione al voto per comunicazione dell'intermediario</em>: ha diritto di voto chi risulta titolare dei titoli alla <em>record date</em>, tipicamente il settimo giorno di borsa aperta precedente l'assemblea. L'intermediario comunica alla società l'elenco dei titolari legittimati al voto.`
  },
  {
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Eccezioni cartolari: reali e personali",
    a: `<strong>Reali (opponibili a tutti):</strong> difetto di forma, falsità firma, difetto capacità/rappresentanza, mancanza condizioni per l'azione. <strong>Personali (opponibili a uno specifico portatore):</strong> eccezioni ex causa (rapporto fondamentale), rapporti personali con precedenti possessori, difetto di titolarità. L'exceptio doli (frode dell'attuale portatore) è opponibile se c'è accordo fraudolento intenzionale.`,
    deep: `<strong>Differenza tra mala fede e dolo:</strong> per le eccezioni personali "in senso stretto" (difetto di titolarità, es. titolo rubato), basta che il terzo agisca con <em>mala fede o colpa grave</em> perché l'eccezione sia opponibile. Per le eccezioni "fondate su rapporti personali" (es. rapporto causale), serve qualcosa di più grave: il <em>dolo</em>, ossia un accordo fraudolento intenzionalmente lesivo (collusione). Semplice conoscenza dell'eccezione non basta.<br><br><strong>Esempio pratico:</strong> Marco firma una cambiale a favore di Anna. Anna la gira a Luca. Se Marco e Anna avevano un accordo che Anna doveva consegnare qualcosa in cambio e non l'ha fatto, Marco non può opporre questa eccezione a Luca (eccezione personale). Ma se Luca ha comprato la cambiale proprio per aiutare Anna a frodare Marco, allora c'è exceptio doli e Marco può opporgliela.`
  },
  {
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Insolvenza vs sovraindebitamento",
    a: `<strong>Insolvenza:</strong> incapacità strutturale di adempiere regolarmente le obbligazioni. Presupposto della liquidazione giudiziale. <strong>Crisi:</strong> squilibrio che rende probabile l'insolvenza entro 12 mesi. <strong>Sovraindebitamento:</strong> stato di crisi o insolvenza per debitori non soggetti alla liquidazione giudiziale (consumatori, piccoli imprenditori, professionisti, imprenditori agricoli). Le procedure da sovraindebitamento sono: liquidazione controllata, concordato minore, ristrutturazione dei debiti del consumatore.`,
    deep: `<strong>Insolvenza ≠ inadempimento:</strong> un imprenditore può aver pagato tutti i debiti con mezzi anormali (es. prestiti usurai) ed essere comunque insolvente. Può essere inadempiente senza essere insolvente (es. negligenza, temporanea difficoltà). Solo l'insolvenza apre la liquidazione giudiziale; la temporanea difficoltà si affronta con altri strumenti (composizione negoziata, concordato preventivo).<br><br><strong>Soglie per la liquidazione giudiziale:</strong> l'impresa minore non vi è soggetta. Per aprirla servono: debiti non pagati > 30.000€ + superamento di almeno una soglia dimensionale.<br><br><strong>Sovraindebitamento – non dipende dal rapporto attivo/passivo:</strong> chi possiede molti beni ma non ha redditi sufficienti per i pagamenti è sovraindebitato. Chi ha molti debiti ma riesce a pagare regolarmente non lo è.`
  },
  {
    prof: ["Extra"],
    q: "Assetti organizzativi adeguati e segnalazioni di allerta (art. 3 CCI)",
    a: `Il CCI impone a ogni <strong>imprenditore commerciale</strong> l'adozione di <strong>assetti organizzativi, amministrativi e contabili adeguati</strong> alla natura e dimensione dell'impresa, idonei alla <em>rilevazione tempestiva della crisi</em> e della perdita di continuità aziendale (art. 3 CCI; art. 2086 c.c. modificato). La <strong>crisi</strong> è definita come <em>squilibrio economico-finanziario che rende probabile l'insolvenza entro i successivi 12 mesi</em>. Le <strong>segnalazioni di allerta interna</strong> obbligano gli organi di controllo societari (sindaci, revisore) a segnalare per iscritto all'organo amministrativo i fondati indizi di crisi; se non si interviene entro 30 giorni, possono informare il tribunale. L'<strong>allerta esterna</strong> (segnalazioni da INPS, Agenzia Entrate, agenti della riscossione al superamento di soglie di debito) è stata progressivamente sospesa e non è ancora entrata in vigore nella sua formulazione originaria.`,
    deep: `<strong>Ratio del sistema — emersione anticipata:</strong> la disciplina del CCI è ispirata da una logica di emersione anticipata della crisi, in contrasto con l'approccio reattivo della legge fallimentare del 1942. L'obiettivo è che l'imprenditore rilevi la crisi nelle fasi iniziali, quando è ancora possibile il risanamento; il ritardo nell'intervento aggrava il dissesto e riduce le possibilità di soddisfazione dei creditori.<br><br><strong>Assetti adeguati — contenuto:</strong> l'art. 2086 c.c. (modificato dal CCI) impone a tutte le imprese organizzate in forma collettiva di dotarsi di assetti adeguati. Gli assetti devono consentire: monitoraggio continuo della situazione economico-finanziaria; rilevazione tempestiva di segnali di crisi tramite <em>indicatori</em> (tra cui il <strong>DSCR</strong> — Debt Service Coverage Ratio — a 6 mesi, elaborato dal CNDCEC); redazione di previsioni di cassa a breve termine. Per le imprese di piccole dimensioni, l'adeguatezza è valutata con maggiore flessibilità.<br><br><strong>Allerta interna — organi di controllo:</strong> sindaci e revisori delle società devono verificare che l'organo amministrativo si doti di assetti adeguati. Se rilevano fondati indizi di crisi devono: (a) segnalare per iscritto all'organo amministrativo; (b) se l'organo amministrativo non risponde adeguatamente entro 30 giorni, informare il tribunale. La segnalazione può provenire anche da revisori dei conti e società di revisione. Il rispetto di questa procedura limita la responsabilità degli organi di controllo in caso di successiva liquidazione giudiziale.<br><br><strong>Allerta esterna — sospensione:</strong> l'art. 25-<em>octies</em> CCI (originariamente artt. 14-15) prevedeva segnalazioni automatiche da: INPS (debiti contributivi superiori a soglie), Agenzia Entrate (debiti IVA superiori a soglie), agenti della riscossione (ruoli superiori a soglie). Questa disciplina è stata sospesa più volte per ragioni Covid-19 e difficoltà applicative; non è ancora entrata in vigore. De facto, le segnalazioni alla Centrale Rischi da parte degli intermediari finanziari fungono già da allerta informale.<br><br><strong>Responsabilità degli organi di controllo:</strong> il mancato rispetto degli obblighi di segnalazione può determinare responsabilità civile verso la società e i creditori. In sede di liquidazione giudiziale, i sindaci possono essere chiamati a rispondere dei danni causati dal ritardo nell'emersione della crisi, soprattutto se l'aggravamento del passivo è riconducibile alla tardività dell'intervento.`
  },
  {
    prof: ["Extra"],
    q: "Piattaforma telematica nazionale e piani di rateizzazione automatici (CCI)",
