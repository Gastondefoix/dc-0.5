    deep: `<strong>Composizione (art. 2397 c.c.):</strong> tre o cinque membri effettivi (più due supplenti), almeno uno iscritto al registro dei revisori legali. Gli altri possono essere iscritti negli albi professionali (dottori commercialisti, avvocati) o professori universitari in materie economico-giuridiche. Il presidente è eletto dall'assemblea.<br><br><strong>Funzioni di vigilanza (art. 2403 c.c.):</strong> la vigilanza del collegio sindacale è distinta dalla revisione contabile (affidata al revisore legale o alla società di revisione). Il collegio vigila su: (a) osservanza legge/statuto; (b) principi di corretta amministrazione; (c) adeguatezza assetto organizzativo, amministrativo e contabile; (d) adeguatezza del sistema di gestione del rischio; (e) corretta applicazione dei criteri di valutazione del bilancio.<br><br><strong>Poteri (art. 2403-bis c.c.):</strong> i sindaci possono in qualsiasi momento procedere ad atti di ispezione e controllo, richiedere agli amministratori notizie sull'andamento delle operazioni sociali, scambiare informazioni con i revisori. Possono convocare l'assemblea (art. 2406), ove gli amministratori omettano di farlo. Nei casi più gravi, il collegio denuncia i fatti al tribunale (art. 2409 c.c.).<br><br><strong>Revoca (art. 2400 c.c.):</strong> i sindaci sono nominati per tre esercizi, scadono alla data dell'assemblea convocata per l'approvazione del bilancio del terzo esercizio. La revoca richiede giusta causa, deve essere approvata dal tribunale con decreto. Questo protegge l'indipendenza del collegio.<br><br><strong>Cause di ineleggibilità e decadenza (art. 2399 c.c.):</strong> non possono essere eletti sindaci e, se eletti, decadono: (a) coloro che si trovano nelle condizioni dell'art. 2382 (interdetti, inabilitati, falliti, condannati); (b) il coniuge, i parenti e gli affini entro il quarto grado degli amministratori; (c) coloro che sono legati alla società da rapporto di lavoro; (d) coloro che si trovano in situazioni tali da comprometterne l'indipendenza. Nelle SpA quotate si applicano requisiti di indipendenza più stringenti (TUF).`
  },
  {
    part: 2,
    prof: ["Comune","Morello"],
    q: "Revisore legale: funzioni e revoca",
    a: `Il <strong>revisore legale</strong> (o società di revisione) è incaricato del <strong>controllo contabile</strong>: verifica la regolare tenuta della contabilità, la corretta rilevazione dei fatti di gestione nelle scritture contabili, la corrispondenza del bilancio alle scritture contabili e la conformità alle norme. Esprime un <strong>giudizio professionale</strong> sul bilancio (con o senza rilievi, negativo, o dichiarazione di impossibilità). <strong>Revoca:</strong> solo per giusta causa, con delibera assembleare previa consultazione con l'organo di controllo e comunicazione alla Consob (nelle quotate). L'incarico dura tre esercizi, rinnovabile; nelle quotate vige il <em>mandatory rotation</em>.`,
    deep: `<strong>Distinzione dal collegio sindacale:</strong> il revisore legale svolge il <em>controllo contabile</em> (revisione del bilancio), mentre il collegio sindacale svolge il <em>controllo di legalità e di corretta amministrazione</em>. Nelle SpA non quotate con collegio sindacale, la revisione contabile può essere affidata al collegio stesso se lo statuto lo prevede e se almeno un sindaco è revisore legale (art. 2409-bis c.c.).<br><br><strong>Nomina (art. 2409-bis ss. c.c.):</strong> il revisore è nominato dall'assemblea su proposta dell'organo di controllo. Deve essere iscritto nel Registro dei Revisori Legali (d.lgs. 39/2010). L'indipendenza è requisito essenziale: incompatibilità con la prestazione di altri servizi alla società revisionata.<br><br><strong>Funzioni (d.lgs. 39/2010 + ISA Italia):</strong> (a) revisione del bilancio di esercizio (e consolidato, se dovuto); (b) verifica della regolare tenuta della contabilità; (c) emissione della relazione di revisione con giudizio; (d) comunicazione tempestiva all'organo di controllo delle carenze significative nel sistema di controllo interno. Il giudizio può essere: senza rilievi, con rilievi, negativo, o dichiarazione di impossibilità di esprimere un giudizio.<br><br><strong>Revoca (art. 2409-quaterdecies c.c.):</strong> la revoca dell'incarico al revisore deve avvenire per giusta causa, con delibera assembleare, previa consultazione con l'organo di controllo (collegio sindacale). Nelle SpA quotate, la revoca deve essere comunicata alla Consob. La revoca senza giusta causa obbliga la società al risarcimento del danno.<br><br><strong>Mandatory rotation:</strong> nelle SpA quotate (e in altri enti di interesse pubblico), il revisore deve essere ruotato dopo un incarico massimo di 9 anni. Nelle SpA non quotate non vi è obbligo di rotazione, ma è consigliata dalle best practice.`
  },
  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "SRL: quando l'organo di controllo e il revisore sono obbligatori",
    a: `Nella <strong>SRL</strong>, l'organo di controllo e la revisione legale sono <strong>facoltativi</strong> per statuto, ma diventano <strong>obbligatori</strong> (art. 2477 c.c.) quando: (1) la SRL è tenuta alla redazione del bilancio consolidato; (2) controlla una società soggetta a revisione legale obbligatoria; (3) supera per due esercizi consecutivi <strong>due dei tre limiti</strong>: totale attivo ≥ 4 mln €, ricavi ≥ 4 mln €, dipendenti medi ≥ 20. Se scatta l'obbligo, l'assemblea deve nominare l'organo entro 30 giorni; se non lo fa, provvede il tribunale su istanza di qualsiasi interessato.`,
    deep: `<strong>Art. 2477 c.c. (testo vigente):</strong> l'atto costitutivo può prevedere la nomina di un organo di controllo o di un revisore. La nomina è obbligatoria quando: (a) la società è tenuta alla redazione del bilancio consolidato; (b) la società controlla una società obbligata alla revisione legale; (c) per due esercizi consecutivi vengono superati due dei limiti: totale dell'attivo ≥ 4.000.000 €, ricavi netti ≥ 4.000.000 €, dipendenti occupati in media ≥ 20 unità.<br><br><strong>Organo di controllo monocratico:</strong> a differenza della SpA (dove il collegio sindacale è composto da almeno tre membri), nella SRL l'organo di controllo può essere composto da un solo membro (sindaco unico), iscritto al registro dei revisori legali.<br><br><strong>Revisione legale separata o congiunta:</strong> se la SRL nomina un organo di controllo composto da revisori, questi possono svolgere anche la revisione legale; altrimenti, l'organo di controllo e il revisore sono soggetti distinti. Lo statuto della SRL può prevedere entrambi separatamente.<br><br><strong>Cessazione dell'obbligo:</strong> se per tre esercizi consecutivi non vengono superati i limiti sopra indicati, l'obbligo cessa e l'assemblea può deliberare di non rinnovare la nomina alla scadenza del mandato.<br><br><strong>Intervento del tribunale:</strong> se l'assemblea non provvede entro 30 giorni dalla scadenza prevista, il tribunale, su istanza di qualsiasi interessato (socio, creditore, CCIAA), nomina l'organo di controllo o il revisore con decreto.`
  },
  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Sistemi di amministrazione e controllo: tradizionale, dualistico e monistico",
    a: `Il codice civile (artt. 2380 ss.) prevede tre sistemi alternativi per le SpA. <strong>Tradizionale:</strong> assemblea → CdA (o amministratore unico) + collegio sindacale + revisore legale. <strong>Dualistico</strong> (art. 2409-octies ss.): assemblea → consiglio di sorveglianza (eletto dai soci, controlla e approva il bilancio) → consiglio di gestione (gestisce). <strong>Monistico</strong> (art. 2409-sexiesdecies ss.): assemblea → CdA con comitato per il controllo sulla gestione interno (amministratori indipendenti). Il sistema tradizionale è il <em>default</em>; gli altri si adottano per statuto.`,
    deep: `<strong>Sistema tradizionale (artt. 2380-2409 c.c.):</strong> è il modello italiano classico. L'assemblea nomina il CdA (o l'amministratore unico) e il collegio sindacale. Il CdA gestisce; il collegio sindacale vigila sulla legalità e corretta amministrazione. La revisione contabile spetta al revisore legale esterno (o, nelle SpA non quotate, al collegio stesso se ha i requisiti). Tre organi separati con funzioni distinte.<br><br><strong>Sistema dualistico (artt. 2409-octies ss. c.c.):</strong> ispirato al modello tedesco (Aufsichtsrat/Vorstand). Due organi: <em>consiglio di gestione</em> (gestisce la società, equivalente del CdA) e <em>consiglio di sorveglianza</em> (eletto dall'assemblea, nomina il consiglio di gestione, approva il bilancio, esercita il controllo). L'assemblea perde il potere di approvare il bilancio (lo fa il consiglio di sorveglianza) e di nominare il consiglio di gestione (lo nomina il consiglio di sorveglianza). La revisione contabile spetta sempre al revisore esterno.<br><br><strong>Sistema monistico (artt. 2409-sexiesdecies ss. c.c.):</strong> ispirato al modello anglosassone (board of directors con audit committee). Un unico CdA, al cui interno viene istituito un <em>comitato per il controllo sulla gestione</em>, composto esclusivamente da amministratori indipendenti (non esecutivi) in possesso dei requisiti di onorabilità e professionalità. Il comitato vigila sull'adeguatezza dell'assetto organizzativo, del sistema di controllo interno e di gestione dei rischi. La revisione contabile spetta al revisore esterno.<br><br><strong>Scelta del sistema:</strong> la scelta si fa nell'atto costitutivo o con modifica statutaria (delibera assembleare straordinaria). I sistemi dualistico e monistico sono più diffusi nelle banche e nelle grandi imprese quotate.`
  },
  {
    part: 2,
    prof: ["Comune","Morello"],
    q: "Chi approva il bilancio nei tre sistemi di governance",
    a: `<strong>Sistema tradizionale:</strong> il bilancio è approvato dall'<strong>assemblea ordinaria</strong> dei soci, entro 120 giorni dalla chiusura dell'esercizio (o 180 in casi particolari). <strong>Sistema dualistico:</strong> il bilancio è approvato dal <strong>consiglio di sorveglianza</strong> (non dall'assemblea dei soci); l'assemblea dei soci perde questa competenza. Se il consiglio di sorveglianza non approva il bilancio, la questione è rimessa all'assemblea dei soci. <strong>Sistema monistico:</strong> il bilancio è approvato dall'<strong>assemblea ordinaria</strong> dei soci, come nel sistema tradizionale.`,
    deep: `<strong>Sistema tradizionale — approvazione assembleare (artt. 2364, 2423 ss. c.c.):</strong> l'assemblea ordinaria approva il bilancio entro 120 giorni dalla chiusura dell'esercizio sociale. Lo statuto può prevedere un termine più lungo (fino a 180 giorni) quando la società è tenuta alla redazione del bilancio consolidato o quando particolari esigenze lo richiedono. Prima dell'approvazione assembleare, il bilancio è accompagnato dalla relazione sulla gestione (CdA), dalla relazione del collegio sindacale e dalla relazione del revisore.<br><br><strong>Sistema dualistico — approvazione da parte del consiglio di sorveglianza (art. 2409-terdecies c.c.):</strong> nel sistema dualistico, il consiglio di sorveglianza approva il bilancio di esercizio (art. 2409-terdecies, comma 1, lett. b). Questo è il tratto più caratteristico: l'assemblea dei soci perde il potere di approvare il bilancio. Tuttavia, se il consiglio di sorveglianza non approva il bilancio, ovvero se almeno un terzo dei componenti del consiglio di gestione o del consiglio di sorveglianza lo richiedono, la competenza è rimessa all'assemblea dei soci (art. 2409-terdecies, comma 3).<br><br><strong>Sistema monistico — approvazione assembleare:</strong> nel sistema monistico, la competenza dell'assemblea ordinaria è la stessa del sistema tradizionale, inclusa l'approvazione del bilancio. La differenza riguarda l'organo di controllo interno (il comitato per il controllo sulla gestione, interno al CdA), non le competenze assembleari.<br><br><strong>Rilievo pratico:</strong> nel sistema dualistico, il consiglio di sorveglianza funge da "camera alta" — approva il bilancio, nomina e revoca i componenti del consiglio di gestione, esercita le azioni di responsabilità contro il consiglio di gestione. È un sistema che concentra molto potere nel consiglio di sorveglianza, che però deve rendere conto all'assemblea dei soci (che lo nomina e revoca).`
  },
  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Responsabilità dei soci per obbligazioni sociali (persone e capitali) + escussione preventiva",
    a: `<strong>Società di persone:</strong> i soci rispondono <em>illimitatamente e solidalmente</em> per le obbligazioni sociali (art. 2291 SNC; art. 2313 SAS per i soci accomandatari). I soci accomandanti rispondono nei limiti della quota conferita. <strong>Beneficio di escussione:</strong> il creditore sociale deve prima escutere il patrimonio sociale; solo se insufficiente può aggredire il patrimonio dei soci (art. 2304 SNC). <strong>Società di capitali:</strong> i soci rispondono <em>limitatamente</em> al capitale sottoscritto (art. 2325 SpA; art. 2462 SRL): il patrimonio personale del socio è separato e non aggredibile dai creditori sociali.`,
    deep: `<strong>SNC (art. 2291 c.c.):</strong> tutti i soci rispondono solidalmente e illimitatamente per le obbligazioni sociali. La responsabilità illimitata non può essere derogata nei confronti dei terzi (è inderogabile verso l'esterno), ma tra i soci si possono prevedere patti di limitazione (efficaci solo internamente). Beneficio di escussione (art. 2304): il creditore deve preventivamente escutere il patrimonio della SNC; i soci possono indicare i beni sociali su cui rivalersi. Se il patrimonio sociale è insufficiente, il socio risponde con il proprio patrimonio.<br><br><strong>SAS (art. 2313 c.c.):</strong> i soci accomandatari rispondono illimitatamente e solidalmente (come i soci SNC); i soci accomandanti rispondono nei limiti della quota conferita. L'accomandante che ingerisce nella gestione perde il beneficio della responsabilità limitata (art. 2320 c.c.).<br><br><strong>SpA (art. 2325 c.c.):</strong> "per le obbligazioni sociali risponde soltanto la società con il suo patrimonio". I soci sono obbligati solo a eseguire i conferimenti promessi. Il "piercing the corporate veil" non è previsto in termini generali nel diritto italiano, ma il socio unico (art. 2325, co. 2) risponde illimitatamente se non ha versato il capitale o non ha rispettato le norme sulla pubblicità.<br><br><strong>SRL (art. 2462 c.c.):</strong> come la SpA, la SRL risponde solo con il suo patrimonio. Il socio unico risponde illimitatamente se l'insolvenza è dipesa da atti o omissioni compiuti nell'interesse proprio e non in quello della società, o se le formalità pubblicitarie non sono state rispettate.`
  },
  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Chi risponde delle obbligazioni sociali nei vari tipi di società",
    a: `<strong>SS:</strong> soci illimitatamente (con possibilità di responsabilità sussidiaria se il patto è conosciuto dai terzi). <strong>SNC:</strong> soci illimitatamente e solidalmente + beneficio di escussione (art. 2304). <strong>SAS:</strong> accomandatari illimitatamente + solidalmente; accomandanti nei limiti della quota. <strong>SpA:</strong> solo la società con il suo patrimonio (art. 2325). <strong>SRL:</strong> solo la società (art. 2462); socio unico risponde illimitatamente se non ha versato il capitale o non ha rispettato le formalità. <strong>SAPA:</strong> accomandatari illimitatamente; accomandanti nei limiti della quota.`,
    deep: `<strong>Società semplice (SS, art. 2267 c.c.):</strong> i soci rispondono illimitatamente e solidalmente per le obbligazioni contratte in nome della società. Il patto che limita la responsabilità di alcuni soci è opponibile ai terzi solo se portato a loro conoscenza. Il beneficio di escussione va pattuito (art. 2268).<br><br><strong>SNC (art. 2291 e 2304 c.c.):</strong> responsabilità illimitata e solidale di tutti i soci; beneficio di escussione legale; la responsabilità è inderogabile verso terzi.<br><br><strong>SAS (artt. 2313, 2318, 2320 c.c.):</strong> accomandatari = responsabilità illimitata e solidale + beneficio di escussione; accomandanti = responsabilità limitata alla quota, ma perdono il beneficio se si ingeriscono nella gestione.<br><br><strong>SpA (art. 2325 c.c.):</strong> la società risponde esclusivamente con il proprio patrimonio. Eccezione: socio unico (persona fisica) risponde illimitatamente se (i) al momento in cui è diventato unico azionista non ha effettuato l'integrale versamento delle quote, ovvero (ii) non ha rispettato le formalità pubblicitarie (art. 2362).<br><br><strong>SRL (art. 2462 c.c.):</strong> identica alla SpA: solo il patrimonio sociale risponde. Socio unico: responsabilità illimitata se l'insolvenza dipende da atti compiuti nell'interesse proprio o se non rispettate le formalità.<br><br><strong>SAPA (artt. 2452-2461 c.c.):</strong> gli accomandatari sono illimitatamente responsabili e di diritto amministratori; gli accomandanti rispondono nei limiti delle azioni sottoscritte. Le norme SpA si applicano in quanto compatibili.`
  },
  {
    part: 2,
    prof: ["Comune","Masi"],
    q: "Responsabilità dei soci: è derogabile? A quali condizioni?",
    a: `<strong>Nelle società di capitali</strong> (SpA, SRL): la responsabilità limitata è la <em>regola</em> e non può essere derogata a svantaggio del socio (non si può rendere illimitata la responsabilità di un socio SpA per accordo interno). <strong>Nelle società di persone</strong>: la responsabilità illimitata <em>verso i terzi</em> è inderogabile (art. 2291 per la SNC); è derogabile solo nei rapporti interni tra soci. Nella SS, la responsabilità sussidiaria può essere limitata verso terzi solo se portata a loro conoscenza (art. 2267). La SAS strutturalmente limita la responsabilità degli accomandanti.`,
    deep: `<strong>Principio di inderogabilità verso i terzi nelle società di persone:</strong> l'art. 2291 c.c. stabilisce che nella SNC i soci rispondono illimitatamente e solidalmente. Un patto tra i soci che escluda o limiti la responsabilità di uno di essi è valido solo nei rapporti interni (determina il diritto di regresso del socio che ha pagato verso il socio esonerato), ma è inopponibile ai creditori della società. I creditori possono sempre aggredire il patrimonio di tutti i soci solidalmente.<br><br><strong>Deroga nella SS (art. 2267 c.c.):</strong> nella società semplice è possibile stabilire che alcuni soci abbiano responsabilità sussidiaria (anziché principale) o limitata, a condizione che tale limitazione sia <em>portata a conoscenza dei terzi</em>. Se la limitazione non è conosciuta dal creditore, essa è inopponibile. Questa è l'unica ipotesi in cui la responsabilità limitata è ammessa in una società di persone, purché con adeguata pubblicità.<br><br><strong>SAS e limitazione strutturale (art. 2313 c.c.):</strong> la SAS realizza una limitazione strutturale della responsabilità degli accomandanti, che è una delle caratteristiche tipologiche essenziali del tipo. Non è una deroga ai limiti di legge, ma il tipo stesso prevede due categorie di soci con responsabilità differente.<br><br><strong>Nelle società di capitali — impossibilità di deroga in peius:</strong> non è possibile pattuire che un socio SpA o SRL risponda con il proprio patrimonio per le obbligazioni sociali. Ciò che è possibile è la prestazione di garanzie personali da parte del socio (fideiussione, avallo), che però sono obbligazioni autonome del socio verso il creditore, non conseguenza della partecipazione sociale.`
  },
  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Responsabilità degli amministratori: SpA vs SRL + azioni (artt. 2392-2396)",
    a: `Gli amministratori rispondono verso la società, i creditori sociali e i singoli soci/terzi. <strong>SpA (art. 2392 c.c.):</strong> gli amministratori devono adempiere i doveri imposti dalla legge e dallo statuto con la diligenza professionale richiesta dalla natura dell'incarico. Responsabilità solidale per i danni derivanti dall'inosservanza. <strong>SRL (art. 2476 c.c.):</strong> responsabilità analoga, ma l'azione è esercitabile anche dal singolo socio. <strong>Business Judgment Rule:</strong> i giudici non possono sindacare nel merito le scelte gestionali discrezionali (solo la diligenza nel processo decisionale).`,
    deep: `<strong>Art. 2392 c.c. (SpA — responsabilità verso la società):</strong> gli amministratori devono adempiere i doveri loro imposti dalla legge e dallo statuto con la diligenza richiesta dalla natura dell'incarico e dalle loro specifiche competenze. Sono solidalmente responsabili verso la società dei danni derivanti dall'inosservanza di tali doveri, a meno che si tratti di attribuzioni proprie del comitato esecutivo o di funzioni in concreto attribuite ad uno o più amministratori.<br><br><strong>Esonero da responsabilità (art. 2392, co. 3):</strong> l'amministratore che voglia sottrarsi alla responsabilità solidale deve (a) fare annotare senza ritardo il proprio dissenso nel libro delle adunanze e delle deliberazioni del CdA, e (b) darne immediata notizia per iscritto al presidente del collegio sindacale.<br><br><strong>Art. 2393 c.c. (azione sociale di responsabilità SpA):</strong> l'azione è deliberata dall'assemblea ordinaria (con maggioranza semplice). La delibera comporta la revoca degli amministratori convenuti. L'azione può essere promossa anche dalla minoranza (almeno 1/5 del capitale nelle SpA non quotate, 1/40 nelle quotate). Prescrizione: 5 anni dalla cessazione dell'ufficio.<br><br><strong>Art. 2394 c.c. (azione dei creditori sociali):</strong> i creditori sociali possono agire contro gli amministratori per inosservanza degli obblighi inerenti alla conservazione del patrimonio sociale, quando il patrimonio sociale risulta insufficiente al soddisfacimento dei loro crediti.<br><br><strong>Art. 2395 c.c. (azione del singolo socio o terzo):</strong> il singolo socio o il terzo può agire contro gli amministratori per danni derivanti da atti dolosi o colposi che abbiano direttamente leso il loro patrimonio (danno diretto, non riflesso).<br><br><strong>Art. 2476 c.c. (SRL):</strong> la responsabilità degli amministratori SRL segue principi analoghi, ma l'azione è esercitabile anche dal singolo socio senza delibera assembleare. Questo è uno dei tratti più caratteristici della SRL: maggiore tutela del singolo socio nell'azione di responsabilità.<br><br><strong>Business Judgment Rule (BJR):</strong> i tribunali non possono sindacare il <em>merito</em> delle scelte gestorie discrezionali degli amministratori — cioè non possono sostituire il proprio giudizio a quello del CdA sulla convenienza economica di una decisione (es. se fosse stato meglio acquisire l'impresa X o l'impresa Y). Il controllo giudiziale è limitato a: (a) il rispetto delle procedure decisionali interne (il CdA si è riunito, ha deliberato in modo formalmente corretto, ha verbalizzato?); (b) la qualità dell'informazione acquisita prima della decisione (gli amministratori hanno raccolto le informazioni ragionevolmente disponibili, si sono avvalsi di esperti, hanno valutato i rischi?); (c) l'assenza di conflitti di interesse non dichiarati (l'amministratore aveva un interesse personale nell'operazione che non ha comunicato?). Se questi presupposti sono soddisfatti, anche una decisione rivelatasi economicamente disastrosa non genera responsabilità — il rischio imprenditoriale appartiene alla società, non agli amministratori che hanno deciso diligentemente.`
  },
  {
    part: 2,
    prof: ["Comune","Masi"],
    q: "Responsabilità degli amministratori nelle società in liquidazione",
    a: `Durante la <strong>liquidazione</strong>, gli amministratori cedono i poteri ai <strong>liquidatori</strong> (art. 2487 ss. c.c.). I liquidatori hanno doveri specifici: conservare il patrimonio, liquidare le attività, pagare i creditori, ripartire il residuo tra i soci. Rispondono per inosservanza di questi doveri. <strong>Responsabilità degli ex-amministratori:</strong> rispondono per atti compiuti prima della liquidazione (prescrizione dalla cessazione dell'ufficio). <strong>Mala gestio ante liquidazione:</strong> se la crisi è causata da condotta degli amministratori, la loro responsabilità persiste anche nella fase liquidatoria.`,
    deep: `<strong>Nomina e poteri dei liquidatori (artt. 2487-2488 c.c.):</strong> con la delibera di scioglimento, l'assemblea nomina i liquidatori e ne determina poteri e compenso. I liquidatori possono compiere tutti gli atti utili alla liquidazione (vendere i beni, incassare i crediti, pagare i debiti), ma non compiere nuove operazioni. Il divieto di nuove operazioni tutela i creditori: la società in liquidazione non deve assumere nuovi rischi imprenditoriali.<br><br><strong>Responsabilità dei liquidatori (art. 2489 c.c.):</strong> i liquidatori devono adempiere i loro doveri con la diligenza richiesta dalla natura dell'incarico. Sono solidalmente responsabili verso la società, i creditori sociali e i soci per i danni causati dall'inosservanza di tali obblighi. Si applicano in quanto compatibili le disposizioni sulla responsabilità degli amministratori (artt. 2392-2396 c.c.).<br><br><strong>Pagamento dei creditori (art. 2491 c.c.):</strong> i liquidatori non possono ripartire tra i soci acconti sul risultato della liquidazione se non hanno pagato i creditori sociali o non hanno accantonato le somme necessarie. In violazione di questo principio, i liquidatori che pagano i soci prima dei creditori rispondono personalmente verso questi ultimi.<br><br><strong>Continuità della responsabilità degli ex-amministratori:</strong> l'apertura della liquidazione non estingue la responsabilità degli amministratori per gli atti di gestione compiuti prima dello scioglimento. La prescrizione dell'azione di responsabilità (art. 2393 c.c. — 5 anni dalla cessazione dell'ufficio) decorre dalla cessazione dell'ufficio degli amministratori. Il curatore fallimentare (o i creditori, nella liquidazione giudiziale ex d.lgs. 14/2019) può esercitare l'azione di responsabilità anche durante la procedura concorsuale.`
  },
  {
    part: 2,
    prof: ["Comune","Morello","Martucci"],
    q: "Azione di responsabilità contro gli amministratori: chi la promuove",
    a: `<strong>Azione sociale (art. 2393 SpA):</strong> delibera dell'assemblea ordinaria (o minoranza: 1/5 del capitale nelle SpA non quotate, 1/40 nelle quotate). <strong>Nel fallimento/LG:</strong> l'azione è esercitata dal curatore (artt. 255-256 d.lgs. 14/2019). <strong>Azione dei creditori (art. 2394):</strong> i creditori sociali quando il patrimonio è insufficiente; nel fallimento, esercitata dal curatore. <strong>Azione del singolo (art. 2395):</strong> il socio o il terzo per danno diretto al proprio patrimonio. <strong>SRL (art. 2476):</strong> l'azione sociale è esercitabile anche dal singolo socio.`,
    deep: `<strong>Azione sociale di responsabilità (art. 2393 c.c. — SpA):</strong> è promossa dalla società contro i propri amministratori. La delibera è presa dall'assemblea ordinaria a maggioranza semplice. La delibera importa la revoca degli amministratori convenuti se assunta con la maggioranza richiesta. L'azione si prescrive in 5 anni dalla cessazione dell'ufficio (art. 2393, co. 4).<br><br><strong>Azione della minoranza (art. 2393-bis c.c.):</strong> nelle SpA, i soci che rappresentano almeno 1/5 del capitale sociale (1/40 nelle quotate, o la minore percentuale prevista dallo statuto) possono esercitare l'azione sociale di responsabilità in via autonoma, senza delibera assembleare. Le spese del giudizio sono a carico della società se l'azione è accolta.<br><br><strong>Azione dei creditori sociali (art. 2394 c.c.):</strong> i creditori sociali possono agire contro gli amministratori per inosservanza degli obblighi di conservazione del patrimonio sociale, quando il patrimonio sociale risulta insufficiente al soddisfacimento dei loro crediti. Anche questa azione si prescrive in 5 anni. Nel fallimento/liquidazione giudiziale, il curatore esercita sia l'azione sociale (art. 2393) sia l'azione dei creditori (art. 2394), ex art. 255 d.lgs. 14/2019.<br><br><strong>Azione del singolo socio o terzo (art. 2395 c.c.):</strong> è un'azione individuale. Il socio o il terzo agisce per il risarcimento del danno che ha subito direttamente nel proprio patrimonio (non il danno riflesso dalla perdita di valore della partecipazione). Prescrizione: 5 anni dal fatto.<br><br><strong>SRL (art. 2476 c.c.):</strong> l'azione di responsabilità contro gli amministratori può essere promossa da ciascun socio individualmente, senza delibera assembleare e senza il requisito della minoranza qualificata. Il socio che esercita l'azione può chiedere anche la revoca degli amministratori in via cautelare (art. 2476, co. 3).`
  },
  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Cause di scioglimento della società + fase di liquidazione",
    a: `<strong>Cause di scioglimento (art. 2272 SS; art. 2308 SNC/SAS; art. 2484 SpA/SRL):</strong> (1) decorso del termine; (2) conseguimento dell'oggetto sociale o impossibilità sopravvenuta; (3) volontà dei soci (unanimità nelle persone, delibera straordinaria nelle capitali); (4) mancanza pluralità soci non ricostituita entro 6 mesi; (5) capitale ridotto al di sotto del minimo legale; (6) impossibilità di funzionamento dell'assemblea; (7) altre cause statutarie. <strong>Liquidazione:</strong> dopo lo scioglimento, si apre la fase liquidatoria: nomina dei liquidatori, realizzo dell'attivo, pagamento dei debiti, ripartizione del residuo tra i soci.`,
    deep: `<strong>Cause di scioglimento nelle società di capitali (art. 2484 c.c.):</strong> (1) decorso del termine fissato nello statuto; (2) conseguimento dell'oggetto sociale o sopravvenuta impossibilità di conseguirlo, salvo che l'assemblea non deliberi le opportune modifiche statutarie; (3) impossibilità di funzionamento o continuata inattività dell'assemblea; (4) riduzione del capitale al di sotto del minimo legale (50.000 € per SpA, 10.000 € per SRL); (5) recesso della maggioranza nelle ipotesi previste dalla legge; (6) deliberazione dell'assemblea; (7) altre cause previste dall'atto costitutivo o dallo statuto; (8) pronuncia di nullità della società (art. 2332).<br><br><strong>Accertamento dello scioglimento:</strong> gli amministratori devono senza indugio accertare la causa di scioglimento e convocare l'assemblea per le deliberazioni relative alla liquidazione, oppure procedere direttamente alla nomina dei liquidatori. Se non lo fanno, rispondono in solido per i danni causati (art. 2485 c.c.).<br><br><strong>Fase di liquidazione (artt. 2487-2496 c.c.):</strong> (a) nomina dei liquidatori da parte dell'assemblea (o del tribunale, in mancanza); (b) iscrizione nel registro delle imprese; (c) i liquidatori redigono l'inventario e il programma di liquidazione; (d) liquidano le attività (vendita dei beni, riscossione dei crediti); (e) pagamento dei creditori sociali (priorità rispetto ai soci); (f) redazione del bilancio finale di liquidazione; (g) ripartizione del residuo tra i soci (piano di riparto); (h) cancellazione della società dal registro delle imprese (art. 2495 c.c.).<br><br><strong>Effetti della cancellazione (art. 2495 c.c.):</strong> con la cancellazione, la società si estingue. I creditori insoddisfatti possono agire contro i soci fino alla concorrenza delle somme da questi riscosse in base al bilancio finale di liquidazione, e contro i liquidatori se il mancato pagamento è dipeso da colpa di questi.`
  },
  {
    part: 2,
    prof: ["Comune","Masi"],
    q: "Revoca della liquidazione societaria",
    a: `La liquidazione può essere <strong>revocata</strong> prima della sua conclusione se i soci decidono di continuare l'attività. <strong>SpA/SRL (art. 2487-ter c.c.):</strong> l'assemblea può revocare lo stato di liquidazione con delibera straordinaria, a condizione che la causa di scioglimento sia venuta meno e che non siano iniziati i pagamenti ai soci. <strong>Effetti:</strong> la revoca ripristina i poteri degli amministratori; i liquidatori perdono i loro poteri. <strong>Diritto di recesso:</strong> i soci che non hanno concorso alla delibera di revoca hanno diritto di recesso (art. 2437, co. 1, lett. e).`,
    deep: `<strong>Art. 2487-ter c.c. (revoca dello stato di liquidazione):</strong> la revoca della liquidazione è un istituto introdotto dalla riforma del 2003. Consente alla società di "uscire" dallo stato di liquidazione e riprendere l'attività ordinaria, senza dover costituire una nuova società.<br><br><strong>Condizioni per la revoca:</strong> (a) la causa di scioglimento deve essere venuta meno; (b) non devono essere stati ancora effettuati pagamenti ai soci; (c) delibera assembleare straordinaria (nelle SpA con le maggioranze previste per le modifiche statutarie).<br><br><strong>Opposizione dei creditori:</strong> la delibera di revoca va iscritta nel registro delle imprese. I creditori sociali possono opporsi alla revoca entro 60 giorni dall'iscrizione. Il tribunale può concedere l'esecuzione della delibera a condizione che sia prestata idonea garanzia per la soddisfazione dei creditori opponenti.<br><br><strong>Diritto di recesso (art. 2437, co. 1, lett. e c.c.):</strong> i soci che non hanno concorso alla delibera di revoca hanno diritto di recedere dalla società. Il recesso deve essere esercitato entro 15 giorni dall'iscrizione della delibera nel registro delle imprese. Questo bilanciamento tutela i soci di minoranza: non possono essere costretti a restare in una società che hanno votato per sciogliere.`
  },
  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Recesso del socio: società di persone e capitali + liquidazione della quota",
    a: `<strong>Società di persone:</strong> il socio può recedere in qualsiasi momento se la società è a tempo indeterminato (con preavviso di 3 mesi); se a tempo determinato, solo per giusta causa (art. 2285 c.c.). <strong>SpA (art. 2437 c.c.):</strong> recesso inderogabile (es. cambio oggetto, trasformazione, trasferimento sede all'estero) e recesso derogabile dallo statuto. <strong>SRL (art. 2473 c.c.):</strong> ampia libertà statutaria; recesso inderogabile simile alla SpA. <strong>Liquidazione della quota:</strong> il socio recedente ha diritto alla liquidazione del valore della partecipazione, determinato secondo il valore effettivo del patrimonio netto.`,
    deep: `<strong>Recesso nelle società di persone (art. 2285 c.c.):</strong> il socio può recedere (a) in qualsiasi momento, se la società è contratta a tempo indeterminato o per tutta la vita di un socio, purché il recesso non sia dato in malafede o intempestivamente; (b) nei casi previsti dall'atto costitutivo; (c) per giusta causa in qualsiasi tipo di società. Il recesso deve essere comunicato agli altri soci con preavviso di almeno tre mesi (art. 2285, co. 2). Il socio receduto ha diritto alla liquidazione della quota in ragione della situazione patrimoniale della società nel giorno in cui il recesso ha effetto (art. 2289).<br><br><strong>Recesso nelle SpA — cause inderogabili (art. 2437, co. 1 c.c.):</strong> il diritto di recesso non può essere soppresso dallo statuto (è nullo qualsiasi patto che lo escluda o lo renda più gravoso) nei seguenti casi: (a) modifica significativa dell'oggetto sociale; (b) trasformazione della società; (c) trasferimento della sede all'estero; (d) revoca dello stato di liquidazione; (e) eliminazione di cause di recesso derogabili o statutarie; (f) modificazione dei criteri di valutazione delle azioni in caso di recesso; (g) modificazioni dello statuto concernenti i diritti di voto o di partecipazione. In tutti questi casi il recesso può essere esercitato anche solo per parte delle azioni possedute.<br><br><strong>Cause derogabili (art. 2437, co. 2 c.c.):</strong> il diritto di recesso spetta — salvo diversa previsione statutaria — ai soci che non hanno concorso alla delibera di: (a) proroga del termine di durata della società; (b) introduzione o rimozione di vincoli alla circolazione delle azioni. Nelle sole SpA non quotate, lo statuto può prevedere ulteriori cause di recesso. Nelle SpA a tempo indeterminato (non quotate) i soci possono sempre recedere con preavviso di 180 giorni (allungabile dallo statuto sino a un anno).<br><br><strong>Valutazione delle azioni del recedente (art. 2437-ter c.c.):</strong> nelle SpA non quotate il valore è determinato dagli amministratori, sentito il parere del collegio sindacale e del revisore contabile, tenendo conto: (a) della <em>consistenza patrimoniale</em> della società; (b) delle <em>prospettive reddituali</em>; (c) dell'eventuale <em>valore di mercato delle azioni</em>. Nelle SpA quotate: media aritmetica dei prezzi di chiusura nei sei mesi che precedono la convocazione dell'assemblea. Se il socio non concorda con la valutazione, può entro 30 giorni chiedere la determinazione da parte di un esperto nominato dal tribunale.<br><br><strong>Procedimento di liquidazione (art. 2437-quater c.c.):</strong> le azioni del recedente devono essere anzitutto offerte in opzione agli altri soci (e ai possessori di obbligazioni convertibili) in proporzione alle azioni possedute. La parte non acquistata può essere collocata sul mercato. Se ancora invenduta, le azioni vengono rimborsate dalla società stessa, utilizzando utili distribuibili e riserve disponibili. Solo se nemmeno questa via è praticabile (assenza di utili e riserve), l'assemblea straordinaria deve deliberare la riduzione del capitale sociale o lo scioglimento della società. I creditori possono opporsi alla riduzione secondo la disciplina generale: se l'opposizione è accolta, la società si scioglie.<br><br><strong>SRL (art. 2473 c.c.):</strong> l'atto costitutivo determina le cause e le modalità del recesso. Se la SRL non ha termine di durata, il socio può sempre recedere con preavviso di 180 giorni (modificabile dallo statuto). Il valore di liquidazione è determinato dagli amministratori tenendo conto del valore di mercato; in mancanza di accordo, determinato da un esperto nominato dal tribunale.`
  },
  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Esclusione del socio: in tutti i tipi societari + cause specifiche in SNC",
    a: `<strong>Società di persone (art. 2286 c.c.):</strong> l'esclusione è deliberata dalla maggioranza dei soci (escludendo il voto del socio da escludere) per: gravi inadempienze, interdizione/inabilitazione/fallimento, conferimento che è perito e non sostituito, liquidazione della quota da parte del creditore particolare. <strong>SpA:</strong> non prevede esclusione del socio (salvo morosità per mancato versamento, art. 2344). <strong>SRL (art. 2473-bis c.c.):</strong> lo statuto può prevedere cause specifiche di esclusione. <strong>Liquidazione:</strong> il socio escluso ha diritto alla liquidazione della quota.`,
    deep: `<strong>Esclusione nelle società di persone (artt. 2286-2288 c.c.):</strong> l'esclusione può essere facoltativa o di diritto. L'esclusione facoltativa (art. 2286) è deliberata dagli altri soci con decisione della maggioranza per: (a) gravi inadempienze delle obbligazioni derivanti dalla legge o dal contratto di società; (b) interdizione o inabilitazione del socio; (c) condanna a pena che importa l'interdizione; (d) fallimento del socio (ora liquidazione giudiziale ex d.lgs. 14/2019). L'esclusione di diritto (art. 2288) si verifica automaticamente nei casi di interdizione giudiziale e fallimento (liquidazione giudiziale).<br><br><strong>Cause specifiche nella SNC:</strong> in aggiunta alle cause generali, l'esclusione si applica anche quando: il conferimento consistente in una prestazione d'opera è diventato impossibile (art. 2286, co. 1, lett. d); il creditore particolare del socio ha ottenuto la liquidazione della quota (art. 2270, co. 2).<br><br><strong>Procedura e diritto di opposizione (art. 2287 c.c.):</strong> la delibera di esclusione deve essere comunicata al socio escluso. Il socio può opporsi davanti al tribunale entro 30 giorni. Il tribunale può sospendere l'esecuzione della delibera durante la pendenza del giudizio. L'esclusione ha effetto immediatamente (anche se il socio fa opposizione), salvo sospensiva del tribunale.<br><br><strong>SpA — morosità (art. 2344 c.c.):</strong> nella SpA non esiste l'esclusione del socio in senso proprio. Se il socio è moroso nel versamento dei conferimenti, la società può: (a) offrire le azioni inadempiute agli altri soci; (b) procedere alla vendita coattiva; (c) ridurre il capitale annullando le azioni e restituendo al socio quanto già versato (dedotte le spese).<br><br><strong>SRL — esclusione statutaria (art. 2473-bis c.c.):</strong> l'atto costitutivo può prevedere specifiche cause di esclusione del socio (es. perdita di determinati requisiti soggettivi, violazione di obblighi particolari). L'esclusione è deliberata dai soci (escludendo il voto del socio da escludere).`
  },
  {
    part: 2,
    prof: ["Comune","Martucci"],
    q: "Morte del socio nelle società di persone",
    a: `In caso di morte di un socio, la quota non si trasferisce automaticamente agli eredi. <strong>Regola generale (art. 2284 c.c.):</strong> i soci superstiti possono: (1) liquidare la quota agli eredi; (2) sciogliere la società; (3) continuare la società con gli eredi (se questi consentono). <strong>Patto di continuazione:</strong> lo statuto può prevedere la continuazione automatica con gli eredi, oppure la continuazione tra i soli superstiti con liquidazione della quota agli eredi. <strong>Ratio:</strong> nelle società di persone rileva l'intuitu personae; gli eredi non sono automaticamente "graditi".`,
    deep: `<strong>Art. 2284 c.c. (morte del socio):</strong> salvo contraria disposizione del contratto sociale, in caso di morte di un socio, gli altri soci devono liquidare la quota agli eredi, a meno che preferiscano sciogliere la società ovvero continuarla con gli eredi stessi e questi vi acconsentano.<br><br><strong>Tre opzioni per i soci superstiti:</strong><br>(1) <em>Liquidazione della quota agli eredi:</em> è la soluzione default. La quota viene liquidata in denaro, calcolando il valore della partecipazione alla data della morte. Gli eredi non entrano nella società.<br>(2) <em>Scioglimento della società:</em> se i soci superstiti non vogliono continuare (perché la pluralità minima non è raggiunta, o per altri motivi), possono deliberare lo scioglimento anticipato.<br>(3) <em>Continuazione con gli eredi:</em> richiede il consenso degli eredi (che assumerebbero la responsabilità illimitata) e degli altri soci (per via dell'intuitu personae).<br><br><strong>Clausole di continuazione nello statuto (art. 2284, co. 2):</strong> l'atto costitutivo può prevedere che in caso di morte di un socio la società continui automaticamente con gli eredi (<em>clausola di continuazione</em>) o che continui tra i soli soci superstiti con liquidazione della quota agli eredi (<em>clausola di consolidazione</em>). Le clausole di continuazione con eredi minori o incapaci richiedono l'autorizzazione del giudice tutelare per l'assunzione della qualità di socio illimitatamente responsabile.<br><br><strong>Differenza con le società di capitali:</strong> nelle SpA e SRL, la morte del socio comporta l'automatico trasferimento delle azioni/quote agli eredi (trasmissibili mortis causa come qualsiasi altro diritto patrimoniale), salvo clausole statutarie di gradimento o prelazione che limitino la circolazione.`
  },
  {
    part: 2,
    prof: ["Comune","Masi","Morello"],
    q: "Creditori sociali nelle società di persone",
    a: `Nelle società di persone (SNC, SAS), i <strong>creditori sociali</strong> hanno due livelli di garanzia: il <strong>patrimonio della società</strong> (primo livello) e il <strong>patrimonio personale dei soci illimitatamente responsabili</strong> (secondo livello, previo beneficio di escussione). Il creditore sociale deve prima escutere il patrimonio della società; solo se insufficiente può aggredire il patrimonio del singolo socio. <strong>Solidarietà:</strong> i soci sono solidalmente responsabili, quindi il creditore può scegliere quale socio escutere (dopo aver escusso la società).`,
    deep: `<strong>Beneficio di escussione (art. 2304 SNC c.c.):</strong> i creditori sociali, anche nella esecuzione forzata, non possono procedere contro i singoli soci se non dopo aver escusso il patrimonio sociale. Il socio che è convenuto dal creditore può indicare i beni sociali su cui il creditore può soddisfarsi. Non è necessario che il creditore ottenga prima una sentenza di condanna contro la società: è sufficiente che tenti l'escussione del patrimonio sociale senza soddisfazione.<br><br><strong>Solidarietà tra soci (art. 2291 c.c.):</strong> una volta che il patrimonio sociale è risultato insufficiente, il creditore può agire contro uno qualsiasi dei soci solidalmente responsabili per l'intero debito residuo. Il socio che ha pagato ha poi regresso verso gli altri soci pro quota.<br><br><strong>Responsabilità dei nuovi soci (art. 2269 c.c.):</strong> chi entra a far parte di una società esistente risponde con gli altri soci per le obbligazioni sociali anteriori all'acquisto della qualità di socio. La responsabilità è solidale e illimitata come per le obbligazioni successive. Questa norma tutela i creditori "storici" della società.<br><br><strong>Responsabilità dopo il recesso/esclusione (art. 2290 c.c.):</strong> il socio uscito continua a rispondere verso i terzi per le obbligazioni sociali sorte fino al momento in cui lo scioglimento del rapporto è reso opponibile ai terzi mediante iscrizione nel registro delle imprese.<br><br><strong>SAS — posizione degli accomandanti (art. 2318 c.c.):</strong> i creditori sociali non possono aggredire il patrimonio degli accomandanti (che rispondono solo nei limiti della quota), salvo che l'accomandante si sia ingerito nella gestione (art. 2320, co. 3). I creditori sociali aggrediscono il patrimonio dei soci accomandatari illimitatamente responsabili.`
  },
  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Creditori particolari del socio + liquidazione della quota",
    a: `Il <strong>creditore particolare del socio</strong> (che vanta un credito personale verso il socio, non verso la società) non può aggredire il patrimonio della società. <strong>Società di persone (art. 2270 c.c.):</strong> il creditore può chiedere la liquidazione della quota del socio debitore solo se gli altri suoi beni sono insufficienti. Se la società è a tempo indeterminato, può anche chiedere lo scioglimento del rapporto sociale del socio debitore. <strong>Società di capitali:</strong> il creditore del socio può pignorare le azioni o la quota SRL (nei limiti della circolazione), ma non aggredire il patrimonio sociale.`,
    deep: `<strong>Art. 2270 c.c. (creditore particolare del socio nelle società di persone):</strong> il creditore particolare del socio non può, finché dura la società, far valere i suoi diritti sul patrimonio sociale. Può compiere atti conservativi sulla quota spettante al socio nella liquidazione e può chiedere la liquidazione della quota del socio debitore, se dimostra che gli altri beni del socio debitore sono insufficienti a soddisfare i suoi crediti.<br><br><strong>Diritto di chiedere lo scioglimento (art. 2270, co. 2 c.c.):</strong> nelle società contratte a tempo indeterminato, il creditore particolare del socio può chiedere lo scioglimento del rapporto limitatamente al socio debitore (non dell'intera società), provocando l'uscita del socio e la liquidazione della sua quota.<br><br><strong>Pignorabilità delle azioni SpA:</strong> le azioni SpA sono liberamente pignorabili (salvo clausole statutarie di trasferimento). Il creditore del socio può pignorare le azioni, venderle all'asta e soddisfarsi sul ricavato. Il patrimonio della SpA rimane intatto. Il creditore non può chiedere la liquidazione della quota o lo scioglimento della società.<br><br><strong>Quote SRL e creditore particolare del socio (art. 2471 c.c.):</strong> il creditore particolare del socio SRL può procedere esecutivamente sulla quota del socio debitore. La quota SRL è pignorabile. Se la quota non è alienabile (es. per clausola di gradimento), il creditore può chiedere al tribunale di assegnare la quota o di liquidarla. I soci hanno diritto di prelazione sull'acquisto.<br><br><strong>Separazione patrimoniale:</strong> la regola generale in tutte le società è che il patrimonio sociale è separato dal patrimonio dei soci: i creditori sociali hanno preferenza sul patrimonio sociale rispetto ai creditori particolari dei soci; i creditori particolari del socio non possono aggredire il patrimonio sociale.`
  },
  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Trasformazione societaria: fasi, omogenea/eterogenea, tutela creditori",
    a: `La <strong>trasformazione</strong> (artt. 2498-2500-novies c.c.) consente a una società di mutare tipo senza sciogliersi. <strong>Omogenea:</strong> tra società dello stesso genere (es. SNC → SAS → SpA). <strong>Eterogenea:</strong> tra enti di natura diversa (es. società di capitali → consorzio; associazione riconosciuta → SpA). <strong>Fasi:</strong> delibera di trasformazione (straordinaria nelle capitali), redazione dell'atto, iscrizione nel registro delle imprese. <strong>Tutela creditori:</strong> i creditori anteriori possono opporsi entro 60 giorni dall'iscrizione; il tribunale può concedere l'esecuzione previa garanzia.`,
    deep: `<strong>Art. 2498 c.c. (continuità dei rapporti giuridici):</strong> con la trasformazione, l'ente trasformato conserva i diritti e gli obblighi e prosegue in tutti i rapporti anche processuali dell'ente che ha effettuato la trasformazione. Non vi è estinzione e ricostituzione: la trasformazione è una modifica del contratto sociale, non una successione tra enti distinti. I contratti, i crediti, i debiti, le autorizzazioni continuano in capo all'ente trasformato.<br><br><strong>Trasformazione omogenea progressiva e regressiva:</strong> si distingue tra trasformazione "progressiva" (da tipo meno strutturato a più strutturato, es. SNC → SpA) e "regressiva" (es. SpA → SRL → SNC). La trasformazione progressiva comporta l'assunzione delle regole del tipo più strutturato; quella regressiva può ampliare la responsabilità dei soci (es. da responsabilità limitata a illimitata).<br><br><strong>Trasformazione eterogenea (artt. 2500-septies e 2500-octies c.c.):</strong> la società di capitali può trasformarsi in consorzio, società consortile, società cooperativa, comunione d'azienda, associazione non riconosciuta, fondazione (e viceversa). Richiede: delibera straordinaria con maggioranza rafforzata (almeno 2/3 del capitale nelle SpA), relazione degli esperti, deposito e pubblicità. Diritto di recesso per i soci dissenzienti.<br><br><strong>Tutela dei creditori (art. 2500-bis c.c.):</strong> i creditori sociali anteriori alla trasformazione possono fare opposizione entro 60 giorni dall'iscrizione della delibera nel registro delle imprese. Il tribunale può (a) vietare l'esecuzione della trasformazione, ovvero (b) permetterla previa prestazione di idonea garanzia.<br><br><strong>Responsabilità per debiti anteriori:</strong> nella trasformazione da società personale a società di capitali, i soci illimitatamente responsabili continuano a rispondere per i debiti sorti prima della trasformazione (art. 2499 c.c.), salvo che i creditori abbiano acconsentito alla liberazione.`
  },
  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Fusione: procedimento, incorporazione e rapporto di cambio",
    a: `La <strong>fusione</strong> (artt. 2501 ss. c.c.) unisce due o più società in una sola. <strong>Fusione propria:</strong> le società si fondono in una nuova entità (tutte si estinguono). <strong>Incorporazione:</strong> una società (incorporante) assorbe l'altra (incorporata, che si estingue). <strong>Fasi:</strong> (1) progetto di fusione; (2) relazione degli organi amministrativi; (3) relazione degli esperti; (4) deposito e pubblicità (60 giorni); (5) delibera di fusione (straordinaria); (6) atto di fusione + iscrizione. <strong>Rapporto di cambio:</strong> determina quante azioni/quote dell'incorporante spettano ai soci dell'incorporata.`,
    deep: `<strong>Progetto di fusione (art. 2501-ter c.c.):</strong> deve indicare: (a) tipo, denominazione, sede delle società partecipanti; (b) atto costitutivo della società risultante; (c) rapporto di cambio delle azioni/quote e, se del caso, il conguaglio in denaro (non superiore al 10% del valore nominale); (d) modalità di assegnazione delle azioni/quote; (e) data dalla quale le operazioni delle società partecipanti sono imputate al bilancio della società risultante; (f) trattamento riservato a particolari categorie di soci; (g) vantaggi eventualmente accordati agli amministratori.<br><br><strong>Relazione degli amministratori (art. 2501-quinquies c.c.):</strong> gli organi amministrativi devono redigere una relazione che illustra e giustifica il progetto di fusione dal punto di vista giuridico ed economico, e in particolare il rapporto di cambio.<br><br><strong>Relazione degli esperti (art. 2501-sexies c.c.):</strong> uno o più esperti indipendenti (designati dal tribunale) devono attestare la congruità del rapporto di cambio, i metodi di valutazione seguiti. Nelle fusioni tra società controllate al 100%, la relazione degli esperti può essere omessa.<br><br><strong>Rapporto di cambio:</strong> indica quante azioni (o quale frazione di quota) dell'incorporante riceve ciascun socio dell'incorporata in cambio delle sue partecipazioni che si estinguono. Il rapporto di cambio deve essere equo. Il conguaglio in denaro (art. 2501-ter, lett. c) può colmare le differenze residue, purché non superi il 10% del valore nominale delle azioni assegnate.<br><br><strong>Opposizione dei creditori (art. 2503 c.c.):</strong> i creditori delle società partecipanti possono fare opposizione entro 60 giorni dall'iscrizione del progetto di fusione. La fusione ha effetto con l'ultima delle iscrizioni nel registro delle imprese delle società partecipanti.<br><br><strong>Fusione semplificata (art. 2505 c.c.):</strong> se l'incorporante detiene almeno il 90% delle azioni/quote dell'incorporata, alcune fasi sono semplificate: non è richiesta la relazione degli esperti; non è richiesta la delibera assembleare dell'incorporante (decide il CdA).`
  },
  {
    part: 2,
    prof: ["Comune","Morello"],
    q: "Scissione: totale e parziale, effetti",
    a: `La <strong>scissione</strong> (art. 2506 ss. c.c.) consiste nell'assegnazione dell'intero patrimonio (scissione totale) o di parte di esso (scissione parziale) a una o più società beneficiarie (preesistenti o di nuova costituzione). <strong>Scissione totale:</strong> la società si estingue, il suo patrimonio è diviso tra le beneficiarie, i soci ricevono partecipazioni nelle beneficiarie. <strong>Scissione parziale:</strong> la società scissa sopravvive con la parte di patrimonio non trasferita. <strong>Effetti:</strong> le società beneficiarie sono solidalmente responsabili per i debiti della società scissa non soddisfatti dalla beneficiaria assegnataria.`,
    deep: `<strong>Art. 2506 c.c. (definizione):</strong> con la scissione, una società assegna l'intero suo patrimonio a più società (scissione totale, con conseguente estinzione della scissa) ovvero parte del suo patrimonio, in tal caso rimanendo in vita, ad una o più società (scissione parziale). Le azioni o le quote delle società beneficiarie sono assegnate ai soci della scissa proporzionalmente alle loro partecipazioni.<br><br><strong>Scissione proporzionale vs non proporzionale:</strong> nella scissione proporzionale, ogni socio riceve partecipazioni nelle beneficiarie in proporzione alla sua quota nella scissa. Nella scissione non proporzionale (o asimmetrica), alcuni soci ricevono partecipazioni in alcune beneficiarie e non in altre. La scissione non proporzionale può essere usata per "separare" soci che non vanno d'accordo: ciascuno riceve una società separata.<br><br><strong>Procedimento:</strong> analogo alla fusione (artt. 2506-bis ss.): progetto di scissione, relazione degli amministratori, relazione degli esperti, deposito e pubblicità (60 giorni), delibera straordinaria, atto di scissione + iscrizioni nel registro delle imprese.<br><br><strong>Responsabilità solidale delle beneficiarie (art. 2506-quater, co. 3 c.c.):</strong> ciascuna società beneficiaria è solidalmente responsabile (nei limiti del valore effettivo del patrimonio netto ad essa assegnato) per i debiti della società scissa non soddisfatti dalla società a cui fanno carico. Questo tutela i creditori della scissa.<br><br><strong>Opposizione dei creditori (art. 2506-ter, co. 5 c.c.):</strong> i creditori delle società partecipanti possono fare opposizione entro 60 giorni dall'iscrizione del progetto nel registro delle imprese.`
  },
  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Gruppi di società: controllo (art. 2359), direzione e coordinamento (art. 2497)",
    a: `<strong>Controllo (art. 2359 c.c.):</strong> una società controlla un'altra quando dispone della maggioranza dei voti nell'assemblea ordinaria (controllo di diritto), o dispone di voti sufficienti per esercitare un'influenza dominante (controllo di fatto), o esercita un'influenza dominante in virtù di particolari vincoli contrattuali (controllo contrattuale). <strong>Direzione e coordinamento (art. 2497 c.c.):</strong> la società che esercita attività di direzione e coordinamento risponde verso i soci e i creditori delle controllate per il pregiudizio arrecato alla redditività e al valore della partecipazione, se agisce in violazione dei principi di corretta gestione societaria e imprenditoriale.`,
    deep: `<strong>Art. 2359 c.c. — Tipi di controllo:</strong> (1) controllo di diritto: la controllante dispone della maggioranza dei voti esercitabili nell'assemblea ordinaria della controllata (>50% dei voti); (2) controllo di fatto: la controllante dispone di voti sufficienti per esercitare un'influenza dominante nell'assemblea ordinaria (meno del 50% ma comunque "influenza dominante"); (3) controllo contrattuale: la controllante esercita un'influenza dominante in virtù di particolari vincoli contrattuali. Le società sono "collegate" se la controllante esercita su di esse un'influenza notevole (presunta quando detiene almeno il 20% dei voti in assemblea ordinaria, o il 10% se la collegata è quotata).<br><br><strong>Presunzione di direzione e coordinamento (art. 2497-sexies c.c.):</strong> si presume che la società che controlla una società ex art. 2359 eserciti attività di direzione e coordinamento. La presunzione è relativa: può essere superata dimostrando che la controllata opera con piena autonomia gestionale.<br><br><strong>Responsabilità ex art. 2497 c.c.:</strong> la holding risponde verso i soci e i creditori delle controllate quando agisce nell'interesse imprenditoriale proprio o altrui, violando i principi di corretta gestione societaria e imprenditoriale, e arreca pregiudizio: (a) alla redditività e al valore della partecipazione dei soci della controllata; (b) all'integrità del patrimonio della controllata (per i creditori).<br><br><strong>Vantaggi compensativi (art. 2497, co. 1 c.c.):</strong> la responsabilità della capogruppo non sussiste quando il danno cagionato alla controllata risulta assente — o integralmente eliminato — alla luce del risultato complessivo dell'attività di direzione e coordinamento. La dottrina dei vantaggi compensativi permette di valutare i rapporti infragruppo in un'ottica di <em>bilancio complessivo</em>: se la holding ha imposto alla controllata un'operazione in sé svantaggiosa (es. vendere prodotti a un'altra controllata del gruppo a prezzi inferiori al mercato, rinunciare a un cliente per lasciarlo a una società sorella, o garantire i debiti di un'altra controllata), ma la controllata nel complesso ha beneficiato dell'appartenenza al gruppo (accesso a finanziamenti infragruppo a tassi favorevoli, utilizzo di marchi, tecnologie o know-how della capogruppo, servizi amministrativi e IT accentrati a costo ridotto, garanzie prestate dalla capogruppo nei confronti di banche terze), la responsabilità non scatta. Requisiti affinché il vantaggio compensi il danno: i vantaggi devono essere (a) <em>reali</em> e non meramente ipotetici, (b) <em>quantificabili</em> e commisurabili al danno, (c) riferiti allo stesso periodo in cui si è verificato il pregiudizio. Non è ammissibile invocare vantaggi futuri e incerti per giustificare danni presenti certi.<br><br><strong>Obblighi di pubblicità (art. 2497-bis c.c.):</strong> le società soggette ad attività di direzione e coordinamento devono indicarlo negli atti e nella corrispondenza e iscriverlo nel registro delle imprese.`
  },
  {
    part: 2,
    prof: ["Comune","Morello","Martucci"],
    q: "Società cooperative paritarie e gruppo paritetico cooperativo",
    a: `Le <strong>società cooperative</strong> sono caratterizzate dalla parità tra i soci: ogni socio ha un voto indipendentemente dal capitale conferito (<em>voto capitario</em>, art. 2538 c.c.) e dallo scopo mutualistico (fornire ai soci beni, servizi o occasioni di lavoro a condizioni più vantaggiose di quelle di mercato). Il <strong>gruppo paritetico cooperativo</strong> è una struttura in cui più cooperative si aggregano mantenendo la loro autonomia, coordinando l'attività attraverso accordi o consorzi, senza che una sia subordinata all'altra (differisce dal gruppo gerarchico con holding e controllate).`,
    deep: `<strong>Cooperative — caratteri essenziali (art. 2511 ss. c.c.):</strong> le cooperative sono società a scopo mutualistico: lo scopo è fornire ai soci beni, servizi o occasioni di lavoro a condizioni più vantaggiose di quelle di mercato. I "ristorni" sono la distribuzione ai soci del "vantaggio mutualistico" (riduzione dei costi o incremento dei compensi, rispetto al mercato). Le cooperative non distribuiscono (in linea di principio) utili come dividendi.<br><br><strong>Voto capitario (art. 2538 c.c.):</strong> nella cooperativa, ciascun socio ha un voto nell'assemblea, indipendentemente dalla quota di capitale sottoscritto. Questo principio di "una testa, un voto" distingue radicalmente la cooperativa dalle società di capitali (dove il voto è proporzionale alle azioni). È l'espressione del carattere "personalistico" della cooperativa.<br><br><strong>Mutualità prevalente (art. 2512 c.c.):</strong> le cooperative "a mutualità prevalente" hanno particolari requisiti statutari e operativi (es. operare principalmente con i soci, non distribuire utili oltre certi limiti) e godono di agevolazioni fiscali. Le cooperative non a mutualità prevalente sono soggette alla disciplina ordinaria.<br><br><strong>Gruppo paritetico cooperativo:</strong> a differenza dei gruppi societari tradizionali (con holding e controllate in posizione gerarchica), il gruppo paritetico cooperativo è fondato su accordi di rete o strutture consortili tra cooperative autonome e paritarie. Ogni cooperativa mantiene la propria governance e non è "controllata" dalle altre. Il coordinamento avviene attraverso accordi volontari, consorzi, o una cooperativa di secondo grado (cooperativa i cui soci sono altre cooperative). Questo modello è diffuso nel settore della grande distribuzione cooperativa (es. Coop, Conad) e nel settore agricolo.`
  },
  {
    part: 2,
    prof: ["Comune","Masi","Martucci"],
    q: "Patti parasociali: natura, efficacia e limiti",
    a: `I <strong>patti parasociali</strong> sono accordi tra soci (o tra soci e terzi) che si affiancano al contratto sociale senza modificarlo. Possono riguardare: (a) esercizio del diritto di voto (<em>sindacati di voto</em>); (b) trasferimento delle azioni/quote (<em>sindacati di blocco</em>, lock-up, prelazione, co-sale); (c) esercizio di un'influenza dominante. <strong>Efficacia:</strong> solo <em>obbligatoria</em> tra le parti (inter partes), non reale: la violazione del patto non invalida la delibera assembleare, ma obbliga il socio inadempiente al risarcimento del danno. <strong>Limiti (art. 2341-bis c.c.):</strong> durata massima di 5 anni, rinnovabili.`,
    deep: `<strong>Natura dei patti parasociali:</strong> i patti parasociali sono contratti di diritto comune (non contratti societari in senso stretto). Sono disciplinati dagli artt. 2341-bis e 2341-ter c.c. (per le SpA non quotate e le SpA quotate), e dall'art. 122 TUF (per le SpA quotate, con obblighi di comunicazione alla Consob e al mercato). Non sono parte dell'atto costitutivo o dello statuto sociale, quindi la loro violazione non incide sulla validità degli atti sociali.<br><br><strong>Efficacia obbligatoria (non reale):</strong> il patto parasociale lega le parti come qualsiasi contratto. Il socio che vota in assemblea in modo difforme da quanto pattuito nel sindacato di voto viola il patto e risponde dei danni verso gli altri partecipanti al sindacato. Tuttavia, la delibera assembleare presa con il voto "infedele" rimane valida.<br><br><strong>Principali tipi di patti parasociali:</strong><br>- <em>Sindacati di voto:</em> i soci si accordano su come votare in assemblea.<br>- <em>Sindacati di blocco (lock-up):</em> i soci si impegnano a non trasferire le proprie azioni per un certo periodo, o a farlo solo a determinate condizioni (prelazione, gradimento).<br>- <em>Tag-along (co-sale):</em> il socio di minoranza ha il diritto di vendere la propria quota allo stesso prezzo e alle stesse condizioni del socio di maggioranza che cede. Tutela la minoranza da un cambio di controllo svantaggioso.<br>- <em>Drag-along (trascinamento):</em> il socio di maggioranza può obbligare la minoranza a vendere insieme a lui al terzo acquirente. Facilita le cessioni del pacchetto di controllo totale.<br><br><strong>Limiti di durata (art. 2341-bis c.c.):</strong> i patti non possono avere durata superiore a 5 anni (prorogabili); se stipulati a tempo indeterminato, ciascun contraente può recedere con preavviso di 6 mesi. Nelle SpA quotate (art. 122 TUF), la durata massima è 3 anni; sono soggetti a obblighi di comunicazione alla Consob, a pena di nullità se non comunicati.`
  },
  {
    part: 2,
    prof: ["Comune","Masi","Morello"],
    q: "Partecipazioni in altre società: imprese collegate e controllate",
    a: `Una società può detenere partecipazioni in altre società. <strong>Controllate (art. 2359, co. 1-2 c.c.):</strong> la partecipante esercita il controllo (maggioranza voti, influenza dominante di fatto, controllo contrattuale). <strong>Collegate (art. 2359, co. 3 c.c.):</strong> influenza notevole presunta se la partecipante ha almeno il 20% dei voti (10% se quotata). <strong>Acquisto di azioni proprie (art. 2357 c.c.):</strong> la SpA può acquistare azioni proprie entro i limiti degli utili distribuibili e delle riserve disponibili, con delibera assembleare. <strong>Partecipazioni reciproche (artt. 2359-bis ss.):</strong> limitate per evitare gonfiamento artificiale del capitale.`,
    deep: `<strong>Rilevanza delle partecipazioni nel bilancio:</strong> le partecipazioni nelle controllate e collegate sono iscritte nel bilancio come immobilizzazioni finanziarie (metodo del costo o del patrimonio netto per le collegate e controllate ex OIC 17). Il bilancio consolidato (obbligatorio per i gruppi sopra certi limiti) include le controllate consolidandole linea per linea, eliminando le operazioni infragruppo.<br><br><strong>Acquisto di azioni proprie (artt. 2357-2357-ter c.c.):</strong> la SpA può acquistare azioni proprie nei limiti degli utili distribuibili e delle riserve disponibili risultanti dall'ultimo bilancio regolarmente approvato, previa autorizzazione assembleare. Le azioni proprie non hanno diritto di voto (art. 2357-ter, co. 2), non danno diritto al dividendo e non si computano nelle maggioranze assembleari. Le azioni proprie iscritte all'attivo devono essere compensate da un'apposita riserva indisponibile del pari importo nel passivo.<br><br><strong>Partecipazioni reciproche (art. 2359-bis c.c.):</strong> la società controllata non può acquistare azioni della controllante in misura superiore al 10% del capitale di quest'ultima. Il limite serve a evitare che le società si "finanzino reciprocamente" gonfiando artificialmente il capitale complessivo del gruppo. Le partecipazioni incrociate tra SpA non legate da rapporti di controllo sono limitate al 2% se entrambe sono quotate, al 10% negli altri casi.<br><br><strong>Obbligo di consolidamento:</strong> le società che controllano altre società sono in linea di principio obbligate a redigere il bilancio consolidato (d.lgs. 127/1991). Il consolidato include tutte le controllate. Le collegate (influenza notevole) sono incluse con il metodo del patrimonio netto.`
  }


,
  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Obbligazioni SpA: differenza con azioni, diritti, emissione, limiti e assemblea degli obbligazionisti",
    a: `Le <strong>obbligazioni</strong> (artt. 2410-2420 c.c.) sono titoli di credito che attribuiscono al portatore il diritto al rimborso del capitale e al pagamento degli interessi. <strong>Differenza con le azioni:</strong> il socio azionista è <em>proprietario</em> di una quota del capitale (rischio imprenditoriale, dividendo variabile); l'obbligazionista è <em>creditore</em> della società (rimborso certo a scadenza, interesse fisso o variabile). <strong>Emissione:</strong> deliberata dal CdA (salvo diversa previsione statutaria). <strong>Limiti:</strong> il valore nominale delle obbligazioni emesse non può superare il doppio del capitale sociale + riserve legali + riserve disponibili risultanti dall'ultimo bilancio (art. 2412). <strong>Assemblea degli obbligazionisti:</strong> tutela collettiva degli interessi degli obbligazionisti.`,
    deep: `<strong>Natura giuridica delle obbligazioni:</strong> le obbligazioni sono titoli di massa (emessi in serie) che incorporano un diritto di credito verso la società emittente. Sono strumenti di finanziamento di debito (debt financing), contrapposti alle azioni che rappresentano il capitale di rischio (equity financing). Il detentore di obbligazioni (obbligazionista) non ha diritti amministrativi (voto in assemblea), ma ha diritti patrimoniali certi: rimborso del valore nominale alla scadenza + interessi periodici (cedole).<br><br><strong>Differenze chiave con le azioni:</strong> (a) le azioni non hanno una scadenza (sono perpetue), le obbligazioni hanno una durata determinata; (b) il dividendo azionario dipende dall'utile (e dalla delibera assembleare), la cedola obbligazionaria è contrattualmente determinata; (c) in caso di liquidazione, gli obbligazionisti (creditori) sono soddisfatti prima degli azionisti (soci); (d) le azioni attribuiscono diritti amministrativi (voto, informazione, impugnazione), le obbligazioni no (salvo assemblea degli obbligazionisti per le materie loro riservate).<br><br><strong>Emissione (art. 2410 c.c.):</strong> nelle SpA, l'emissione è deliberata dagli amministratori (CdA), salvo che lo statuto riservi la competenza all'assemblea o la subordini a una delibera assembleare. Non è richiesta la forma dell'atto pubblico. Le obbligazioni possono essere al portatore, nominative, dematerializzate (se quotate). Possono essere convertibili in azioni (obbligazioni convertibili, art. 2420-bis c.c.), nel qual caso l'emissione richiede delibera assembleare straordinaria.<br><br><strong>Limiti quantitativi all'emissione (art. 2412 c.c.):</strong> la SpA può emettere obbligazioni per un ammontare totale non superiore al doppio del capitale sociale versato + riserva legale + riserve disponibili risultanti dall'ultimo bilancio approvato. Questo limite tutela i creditori: le obbligazioni non devono eccedere il "patrimonio netto" disponibile, per evitare un eccessivo indebitamento. Il limite non si applica se le obbligazioni sono quotate o se sono destinate a investitori qualificati. Nelle SpA quotate si applicano regole più flessibili.<br><br><strong>Assemblea degli obbligazionisti (art. 2415 c.c.):</strong> gli obbligazionisti della stessa serie si riuniscono in assemblea per deliberare su: (a) nomina e revoca del rappresentante comune; (b) modifiche delle condizioni del prestito; (c) proposte di amministrazione controllata o concordato; (d) costituzione di un fondo spese; (e) ogni altra materia di interesse comune. Il rappresentante comune degli obbligazionisti (art. 2417 c.c.) tutela gli interessi collettivi: può assistere all'assemblea dei soci, impugnare le delibere societarie pregiudizievoli, partecipare alle procedure concorsuali. Questa struttura è modellata sull'assemblea degli azionisti: anche gli obbligazionisti hanno una forma di governance collettiva per tutelare i propri interessi.`
  },
  {
    part: 2,
    prof: ["Comune","Masi"],
    q: "Titoli di debito nella SRL",
    a: `La SRL può emettere <strong>titoli di debito</strong> (art. 2483 c.c.), ma con limiti più stringenti rispetto alle obbligazioni SpA: possono essere sottoscritti <em>esclusivamente</em> da <strong>investitori professionali</strong> soggetti a vigilanza prudenziale (banche, SIM, fondi, ecc.). <strong>Responsabilità:</strong> chi cede i titoli di debito SRL a investitori non professionali risponde della solvenza della società. <strong>Delibera:</strong> l'emissione è deliberata dai soci (salvo diversa previsione statutaria). I titoli di debito SRL non possono circolare liberamente come le obbligazioni SpA e non prevedono un'assemblea degli investitori.`,
    deep: `<strong>Art. 2483 c.c. (titoli di debito SRL):</strong> se l'atto costitutivo lo prevede, la SRL può emettere titoli di debito. L'emissione è deliberata dai soci o, se l'atto costitutivo lo consente, dagli amministratori. I titoli di debito possono essere emessi esclusivamente in favore di investitori professionali soggetti a vigilanza prudenziale ai sensi delle leggi speciali. In caso di successiva circolazione, chi trasferisce i titoli a soggetti diversi dagli investitori professionali risponde della solvenza della società nei confronti degli acquirenti.<br><br><strong>Ratio della limitazione agli investitori professionali:</strong> la limitazione risponde a un'esigenza di tutela dei risparmiatori non professionali: la SRL ha struttura più chiusa e meno trasparente della SpA (norme di pubblicità meno stringenti, assenza di quotazione in borsa), quindi i suoi strumenti di debito sono considerati più rischiosi per il pubblico indistinto. Gli investitori professionali (banche, fondi, SIM) sono in grado di effettuare una due diligence autonoma sulla solvibilità della SRL.<br><br><strong>Differenze rispetto alle obbligazioni SpA:</strong> (a) circolazione ristretta (solo investitori professionali vs libera circolazione per le obbligazioni SpA quotate); (b) nessuna assemblea degli investitori (non prevista dall'art. 2483); (c) nessun rappresentante comune degli investitori; (d) limiti di emissione non codificati nell'art. 2483 (ma l'atto costitutivo può fissarli); (e) competenza deliberativa nei soci (non nel CdA, salvo delega statutaria).<br><br><strong>Strumenti di finanziamento alternativi per la SRL:</strong> oltre ai titoli di debito, la SRL può finanziarsi con: (a) versamenti in conto capitale / a fondo perduto dei soci (apporti non remunerati); (b) finanziamenti dei soci (art. 2467 c.c.: sono postergati rispetto agli altri creditori in caso di insolvenza se effettuati in un momento in cui la società era in squilibrio); (c) finanziamenti bancari ordinari; (d) crowdfunding (per le start-up innovative, con norme speciali).`
  },
  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Strumenti finanziari partecipativi: cosa sono e differenze con le azioni",
    a: `Gli <strong>strumenti finanziari partecipativi</strong> (SFP, art. 2346, co. 6 c.c.) sono titoli emessi dalla SpA a fronte di apporti di soci o terzi (non necessariamente in denaro: anche opere, servizi, crediti). Attribuiscono <em>diritti patrimoniali</em> (es. partecipazione agli utili) e/o <em>diritti amministrativi</em> (es. nomina di un componente del CdA o del collegio sindacale), ma <strong>non</strong> il diritto di voto nell'assemblea generale. <strong>Differenza con le azioni:</strong> gli SFP non rappresentano una quota del capitale sociale; il loro possessore non è socio in senso pieno; i diritti sono determinati dallo statuto con ampia flessibilità.`,
    deep: `<strong>Art. 2346, co. 6 c.c. (strumenti finanziari partecipativi):</strong> "Resta salva la possibilità che la società, a seguito dell'apporto da parte dei soci o di terzi anche di opera o servizi, emetta strumenti finanziari forniti di diritti patrimoniali o anche di diritti amministrativi, escluso il voto nell'assemblea generale degli azionisti." La norma è volutamente flessibile: rimette allo statuto la determinazione dei diritti spettanti ai possessori degli SFP, le condizioni di emissione e le eventuali sanzioni per inadempimento dell'apporto.<br><br><strong>Apporti a fronte dell'emissione:</strong> a differenza delle azioni, che sono emesse a fronte di conferimenti in denaro o in natura, gli SFP possono essere emessi a fronte di apporti atipici: prestazioni d'opera, servizi, diritti di proprietà intellettuale, crediti verso la società, ecc. Questo li rende particolarmente utili per incentivare collaboratori, consulenti, start-up, o per remunerare soggetti che apportano know-how o lavoro.<br><br><strong>Diritti dei possessori di SFP:</strong> lo statuto determina liberamente: (a) diritti patrimoniali: partecipazione agli utili (con o senza preferenza rispetto agli azionisti ordinari), diritto a un dividendo fisso, diritto al rimborso in caso di liquidazione, ecc.; (b) diritti amministrativi: nomina di un componente del CdA o del collegio sindacale (ma non voto nell'assemblea generale). L'esclusione del voto assembleare generale è l'unica limitazione imperativa.<br><br><strong>Differenze con le azioni ordinarie:</strong> (a) gli SFP non rappresentano una quota del capitale sociale (non aumentano il capitale); (b) il possessore di SFP non è azionista (non ha diritto di recesso ex art. 2437 in quanto tale, non ha diritto di opzione nelle aumenti di capitale); (c) i diritti degli SFP dipendono interamente dallo statuto (non dalla legge); (d) gli SFP possono essere rimborsabili o convertibili in azioni, se lo statuto lo prevede.<br><br><strong>Differenze con le obbligazioni:</strong> le obbligazioni incorporano un diritto di credito certo (rimborso + interessi); gli SFP incorporano diritti patrimoniali variabili (partecipazione agli utili, che può essere zero se non ci sono utili). L'obbligazionista è creditore della società; il possessore di SFP non lo è necessariamente. Gli SFP sono più simili alle azioni (strumento di rischio) che alle obbligazioni (strumento di credito), sebbene siano distinti da entrambi.<br><br><strong>Utilizzo pratico:</strong> gli SFP sono diffusi nelle start-up (per remunerare advisor e fondatori con partecipazione agli utili senza diluire il capitale), nelle joint venture (per bilanciare i diritti delle parti con strutture personalizzate) e nelle operazioni di ristrutturazione del debito (debt-to-equity swap con SFP invece di azioni).`
  },
  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Società cooperative: scopo mutualistico, ristorni, voto per testa e caratteri speciali",
