  },

  // ── D1 ──────────────────────────────────────────────────────────────────
  {
    part: 1,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Ausiliari dell'imprenditore: quadro generale",
    a: `Gli <strong>ausiliari</strong> sono soggetti che collaborano all'esercizio dell'impresa, subordinati o parasubordinati. Si distinguono <em>ausiliari interni</em> (legati da rapporto di lavoro: institore, procuratore, commessi) e <em>ausiliari esterni</em> (autonomi: agente, mediatore, spedizioniere, commissionario). Gli ausiliari interni hanno poteri di <strong>rappresentanza commerciale</strong> (artt. 2203-2213 c.c.) che li legittimano ad agire in nome dell'imprenditore verso i terzi. La disciplina speciale vale solo per l'<em>imprenditore commerciale non piccolo</em>.`,
    deep: `<strong>Rappresentanza commerciale vs procura civile:</strong> la rappresentanza commerciale degli ausiliari interni ha caratteristiche proprie: <em>(a)</em> è una rappresentanza <em>tipica</em>, con poteri definiti dalla legge (non solo dal conferimento individuale); <em>(b)</em> le limitazioni ai poteri legali non sono opponibili ai terzi in buona fede se non iscritte nel registro delle imprese (art. 2206 c.c.); <em>(c)</em> la revoca non vale verso i terzi fino alla pubblicità.<br><br><strong>Ausiliari interni — gerarchia:</strong> <em>Institore</em> (art. 2203): preposto all'intera azienda o a un ramo; poteri più ampi; può stare in giudizio. <em>Procuratore</em> (art. 2209): compie atti pertinenti all'esercizio dell'impresa, non preposto a un'azienda o ramo; poteri circoscritti a una fase dell'attività. <em>Commessi</em> (art. 2210): collaboratori di minor rango; poteri limitati agli atti di ordinaria amministrazione del negozio/ufficio (incassare, rilasciare ricevute, non fare sconti né dilazioni non autorizzati).<br><br><strong>Ausiliari esterni — cenni:</strong> <em>Agente</em> (art. 1742): promuove contratti per conto del preponente in via stabile; non è dipendente. <em>Mediatore</em> (art. 1754): mette in contatto le parti senza mandato; diritto alla provvigione da entrambe. <em>Commissionario</em> (art. 1731): agisce in nome proprio ma per conto del committente; acquista diritti e obblighi direttamente verso i terzi. <em>Spedizioniere</em> (art. 1737): stipula contratti di trasporto per conto del mandante in nome proprio.`
  },

  // ── D8 ──────────────────────────────────────────────────────────────────
  {
    part: 1,
    prof: ["Extra"],
    q: "Opposizione vs impugnazione nella liquidazione giudiziale",
    a: `Nello <strong>stato passivo</strong> della LG si distinguono due rimedi: <strong>opposizione</strong> (art. 206 CCI) — proposta dal creditore <em>escluso</em> che chiede di essere ammesso; <strong>impugnazione</strong> (art. 207 CCI) — proposta da un creditore già <em>ammesso</em> che contesta l'ammissione o il grado di un <em>altro</em> creditore. Entrambe vanno proposte entro 30 giorni dalla comunicazione del decreto che rende esecutivo lo stato passivo. La revocazione (art. 208 CCI) copre il caso di fatti nuovi o prove nuove scoperti dopo.`,
    deep: `<strong>Opposizione allo stato passivo (art. 206 CCI):</strong> il creditore o il titolare di diritti su beni che sia stato escluso o ammesso con riserva può proporre opposizione con ricorso al tribunale entro 30 giorni dalla comunicazione PEC del decreto. Il giudice delegato fissa udienza; il curatore si difende. Il tribunale decide con sentenza impugnabile in Cassazione (non in appello).<br><br><strong>Impugnazione dei crediti ammessi (art. 207 CCI):</strong> ogni creditore ammesso — o il curatore — può impugnare l'ammissione di altro credito o il suo ordine di prelazione. Stessa procedura dell'opposizione. Legittimazione attiva allargata: anche il debitore (in certi casi).<br><br><strong>Revocazione (art. 208 CCI):</strong> rimedio straordinario per fatti o prove nuove scoperti dopo la definitività dello stato passivo, o per dolo o collusione del creditore. Termine: 30 giorni dalla scoperta del fatto nuovo; comunque entro 3 anni dall'esecutività dello stato passivo.<br><br><strong>Differenza pratica — mnemonica:</strong> opposizione = "sono fuori, voglio entrare"; impugnazione = "sono dentro, voglio che qualcun altro esca o cambi posto"; revocazione = "è cambiato qualcosa dopo".`
  },

  // ── F1 ──────────────────────────────────────────────────────────────────
  {
    part: 1,
    prof: ["Comune","Masi","Morello"],
    q: "Concorrenza attiva e passiva nell'azienda (divieto di concorrenza)",
    a: `Nel trasferimento d'azienda opera il <strong>divieto di concorrenza</strong> (art. 2557 c.c.): l'alienante non può, per <em>5 anni</em>, iniziare una nuova impresa che per oggetto, ubicazione e altre circostanze sia idonea a <em>sviare la clientela</em> dell'azienda ceduta (<strong>concorrenza attiva</strong>). Il divieto tutela l'acquirente affinché l'avviamento ceduto non sia immediatamente eroso. Diversa è la <strong>concorrenza passiva</strong>: l'alienante può subire la concorrenza dell'acquirente. Il divieto è derogabile (riduzione di durata o ambito), ma non ampliabile oltre 5 anni.`,
    deep: `<strong>Fondamento e ambito (art. 2557 c.c.):</strong> il divieto scatta automaticamente con il trasferimento (vendita, permuta, conferimento); non occorre patto espresso. Si applica anche all'affitto d'azienda per tutta la durata del contratto. La condotta vietata è quella «idonea a sviare la clientela»: non basta la mera concorrenza in astratto, serve la concreta capacità di attrarre i clienti dell'azienda ceduta.<br><br><strong>Durata e ambito spaziale:</strong> 5 anni dalla cessione. L'ambito geografico e merceologico si determina in concreto: ramo di attività ceduto, zona dove l'azienda era attiva. Patti in deroga che estendano oltre 5 anni sono nulli per eccesso (clausola nulla, non il contratto).<br><br><strong>Concorrenza attiva vs passiva — chiarimento:</strong> la distinzione terminologica non è codificata ma è usata in dottrina. <em>Concorrenza attiva</em>: l'alienante che concorre lui stesso (vietata ex art. 2557). <em>Concorrenza passiva</em>: l'alienante che subisce la concorrenza di terzi (non vietata; l'acquirente deve difendersi da sé). La tutela copre solo il lato attivo dell'alienante.<br><br><strong>Sanzione:</strong> inibitoria della condotta concorrenziale + risarcimento del danno. In caso di violazione grave, il giudice può disporre la cessazione immediata dell'attività concorrente. Applicazione analoga in società di persone (art. 2301 c.c. — divieto di concorrenza per i soci amministratori di s.n.c.).`
  },

  // ── F6 ──────────────────────────────────────────────────────────────────
  {
    part: 1,
    prof: ["Comune","Morello"],
    q: "Marchio non registrato: tutela e limiti",
    a: `Il <strong>marchio non registrato</strong> (o <em>di fatto</em>) gode di tutela limitata rispetto al marchio registrato: è protetto solo nell'ambito geografico e merceologico in cui è <em>effettivamente noto</em>. Non conferisce diritto di esclusiva <em>erga omnes</em> ma consente di opporsi alla registrazione da parte di terzi (preuso) e all'uso confusorio successivo. Chi usa un marchio di fatto anteriore può fare opposizione alla registrazione del marchio identico/simile (art. 12, c.p.i.) e chiederne l'annullamento (art. 25, c.p.i.).`,
    deep: `<strong>Fonti:</strong> Codice della proprietà industriale (d.lgs. 30/2005, <em>c.p.i.</em>), artt. 12 e 25. La tutela del marchio di fatto si fonda sulla notorietà acquisita nell'uso: non è necessaria la registrazione, ma occorre dimostrare che il segno è noto al pubblico di riferimento nel settore e territorio rilevante.<br><br><strong>Differenze rispetto al marchio registrato:</strong> <em>(a)</em> il marchio registrato ha tutela <em>erga omnes</em> dal momento della registrazione (e con priorità dalla domanda); <em>(b)</em> il marchio di fatto è tutelato solo dove e quanto è noto: fuori da quella zona/settore, un terzo può registrarlo e usarlo legittimamente. <em>(c)</em> L'onere della prova della notorietà è a carico del titolare del marchio di fatto.<br><br><strong>Preuso:</strong> chi ha usato un marchio prima della registrazione altrui può continuare a usarlo (diritto di preuso ex art. 12, c. 1, lett. a, c.p.i.), ma solo nei limiti territoriali e merceologici del preuso stesso: non può espandersi. Il preuso evita l'invalidazione del marchio altrui solo se l'uso era locale e notorio localmente.<br><br><strong>Azione di concorrenza sleale:</strong> indipendentemente dalle norme sul marchio, l'uso confusorio del marchio altrui (anche non registrato) costituisce atto di concorrenza sleale ex art. 2598, n. 1 c.c. (imitazione servile o confusione). La tutela è cumulabile con quella del c.p.i.`
  },
  // ── F8 ──────────────────────────────────────────────────────────────────
  {
    part: 1,
    prof: ["Extra"],
    q: "Volgarizzazione del marchio",
    a: `La <strong>volgarizzazione</strong> (<em>Freihaltebedürfnis</em>) è il processo per cui un marchio registrato diventa, nel linguaggio comune, il nome generico del prodotto, perdendo così la <strong>capacità distintiva</strong> e cadendo in <strong>decadenza</strong> (art. 13, co. 4, c.p.i.). Esempi classici: <em>Nylon</em>, <em>Biro</em>, <em>Cellophane</em>. Il rischio si riduce con campagne di difesa del marchio (uso del simbolo ®, pubblicità che distingue il marchio dal genere).`,
    deep: `<strong>Fondamento normativo:</strong> art. 13, co. 4, c.p.i.: il marchio decade «se è divenuto nel commercio denominazione generica del prodotto o del servizio o ha perduto la sua capacità distintiva». L'azione di decadenza può essere proposta da chiunque abbia interesse (art. 122 c.p.i.) davanti all'UIBM o al tribunale.<br><br><strong>Cause della volgarizzazione:</strong> (a) inerzia del titolare che non reagisce all'uso generico da parte di terzi e dei media; (b) assenza del termine generico nella lingua: il marchio colma il vuoto linguistico (es. <em>Aspirina</em> → denominazione comune in alcuni paesi, ma non in Italia dove vale "acido acetilsalicilico"). <br><br><strong>Difese del titolare:</strong> sorveglianza attiva, lettere diffide a media e dizionari che usano il marchio come nome generico, uso sistematico del simbolo ® e di avvertenze ("Biro® è un marchio registrato di BiC"), licensing controllato per mantenere la distintività. La Corte di Giustizia UE ha chiarito (C-409/12, Backaldrin) che la decadenza per volgarizzazione presuppone che la causa sia imputabile all'inerzia del titolare.<br><br><strong>Effetti della decadenza:</strong> il marchio entra in pubblico dominio; chiunque può usarlo come denominazione generica. Il titolare perde ogni diritto di esclusiva. La decadenza ha effetto ex nunc (non retroattivo).`
  },

  // ── F9 ──────────────────────────────────────────────────────────────────
  {
    part: 1,
    prof: ["Extra"],
    q: "Concorrenza nel marchio: confondibilità e tutela",
    a: `Il marchio registrato conferisce al titolare il diritto di vietare a terzi l'uso di segni <strong>identici o simili</strong> per prodotti/servizi identici o affini, quando vi sia <strong>rischio di confusione</strong> per il pubblico (art. 20 c.p.i.). La confondibilità va valutata globalmente: somiglianza visiva, fonetica e concettuale dei segni + affinità dei prodotti + grado di attenzione del consumatore medio.`,
    deep: `<strong>Criteri di valutazione della confondibilità:</strong> (a) <em>impressione d'insieme</em>: il consumatore medio percepisce il marchio come un tutto, non analizza i singoli elementi; (b) <em>interdipendenza</em> tra somiglianza dei segni e affinità dei prodotti: maggiore somiglianza dei segni compensa minore affinità dei prodotti e viceversa; (c) <em>grado di distintività</em>: marchi forti (fantasiosi/arbitrari) godono di tutela più ampia rispetto a marchi deboli (descrittivi).<br><br><strong>Marchi forti vs deboli:</strong> il marchio forte (es. "Apple" per computer) è insuscettibile di imitazioni anche parziali; il marchio debole (es. "Latte Fresco" per latte) tollera variazioni minime senza che vi sia confondibilità. La giurisprudenza ha elaborato il principio per cui le variazioni su marchi deboli sono più facilmente ammesse.<br><br><strong>Tutela per i marchi notori (art. 20, co. 1, lett. c, c.p.i.):</strong> il marchio che gode di rinomanza è protetto anche per prodotti non affini (protezione <em>ultra-merceologica</em>), se l'uso del segno simile consente un indebito vantaggio o reca pregiudizio alla rinomanza. Non serve confondibilità: basta il "parassitismo" o il "diluizione" del marchio noto.<br><br><strong>Rimedi:</strong> azione inibitoria (cessazione dell'uso), risarcimento del danno (lucro cessante = profitto del contraffattore o royalty virtuale), pubblicazione della sentenza. Competenza: tribunali specializzati in materia d'impresa (ex art. 134 c.p.i.).`
  },

  // ── G2 ──────────────────────────────────────────────────────────────────
  {
    part: 1,
    prof: ["Comune","Masi","Morello"],
    q: "Diritto cartolare",
    a: `Il <strong>diritto cartolare</strong> è il diritto incorporato nel titolo di credito: nasce con la creazione del titolo e circola <em>insieme</em> ad esso (<em>incorporazione</em>). Chi possiede il titolo nella forma richiesta ha il diritto cartolare, indipendentemente dal rapporto sottostante. Il diritto cartolare si distingue dal <strong>diritto causale</strong> (fondato sul rapporto di base): i due coesistono ma il creditore che ha il titolo preferisce agire in via cartolare, più rapida e con meno eccezioni opponibili.`,
    deep: `<strong>Incorporazione:</strong> il diritto è incorporato nella cosa materiale (documento). Chi ha il documento ha il diritto; chi trasferisce il documento trasferisce il diritto. L'incorporazione spiega perché il ladro di un titolo al portatore non acquisti il diritto (difetta di buona fede) ma sia legittimato formalmente all'esercizio.<br><br><strong>Autonomia del diritto cartolare:</strong> il diritto del possessore legittimo è autonomo rispetto a quello del cedente. Le eccezioni personali che il debitore avrebbe potuto opporre al cedente non sono opponibili al nuovo portatore in buona fede. Questo è il cuore della tutela della circolazione.<br><br><strong>Letteralità:</strong> il contenuto del diritto è determinato esclusivamente dal tenore del documento. Accordi extra-cartolari non modificano il diritto cartolare (salvo diversa annotazione sul titolo).<br><br><strong>Rapporto tra azione cartolare e causale:</strong> il portatore può agire sia con l'azione cartolare (più vantaggiosa: inversione dell'onere della prova, meno eccezioni opponibili, esecutività) che con l'azione causale (fondata sul contratto di base). Tuttavia, chi agisce in via causale deve restituire o depositare il titolo, per evitare che il debitore paghi due volte (art. 1992 c.c.).`
  },

  // ── G3 ──────────────────────────────────────────────────────────────────
  {
    part: 1,
    prof: ["Comune","Masi","Morello"],
    q: "Rapporto cartolare",
    a: `Il <strong>rapporto cartolare</strong> è il rapporto giuridico che si costituisce tra emittente e primo prenditore con la <em>creazione e consegna</em> del titolo. È distinto dal <strong>rapporto di valuta</strong> (causa per cui il titolo è emesso, es. compravendita) e dal <strong>rapporto di provvista</strong> (es. copertura bancaria per la cambiale tratta). Nei <em>titoli astratti</em> (cambiale, assegno) il rapporto causale non è menzionato nel documento e non incide sul diritto cartolare.`,
    deep: `<strong>I tre rapporti nella cambiale tratta:</strong> (a) <em>rapporto di valuta</em>: tra traente e prenditore (es. debito da forniture); (b) <em>rapporto di provvista</em>: tra traente e trattario (es. conto corrente bancario); (c) <em>rapporto cartolare</em>: nasce con l'emissione e circola. Il trattario che accetta diventa obbligato cartolare principale.<br><br><strong>Rilevanza pratica:</strong> la distinzione importa per le eccezioni opponibili. Le eccezioni fondate sul rapporto causale (es. la merce era difettosa) sono eccezioni "personali" opponibili solo al prenditore originario, non al terzo portatore in buona fede. Il terzo che abbia acquistato il titolo regolarmente non può essere bloccato da contestazioni tra le parti originarie.<br><br><strong>Rapporto cartolare nei titoli causali:</strong> nelle <em>fedi di deposito</em> e nelle <em>polizze di carico</em> il rapporto causale (deposito, trasporto) è menzionato nel titolo e incide sul contenuto del diritto cartolare. Il portatore del titolo ha diritto alla consegna delle merci/cose depositate, come risulta dal documento.<br><br><strong>Creazione vs emissione:</strong> la dottrina distingue tra creazione (redazione del documento) ed emissione (consegna volontaria al primo prenditore). La cambiale "sottratta" prima dell'emissione è comunque valida verso il terzo in buona fede che l'abbia acquistata regolarmente (art. 1994 c.c.).`
  },

  // ── G11 ─────────────────────────────────────────────────────────────────
  {
    part: 1,
    prof: ["Comune","Masi","Morello"],
    q: "Efficacia probatoria dei titoli all'ordine",
    a: `Nei <strong>titoli all'ordine</strong> (cambiale, assegno all'ordine, fede di deposito) la <strong>continuità delle girate</strong> costituisce prova della legittimazione: il possessore che esibisce una serie continua di girate è legittimato all'esercizio del diritto, senza dover provare il titolo di acquisto di ciascun girante (art. 1993, co. 2, c.c.). Il debitore che paga al portatore legittimato è liberato, salvo dolo o colpa grave.`,
    deep: `<strong>Continuità delle girate — regola formale:</strong> la serie di girate deve essere ininterrotta dal primo prenditore all'attuale possessore. Non occorre che le firme dei giranti corrispondano alle generalità indicate: la girata è atto formale. Una girata in bianco (senza nome del giratario) interrompe apparentemente la catena ma è ammessa: il portatore successivo può riempirla o girarla ulteriormente in bianco.<br><br><strong>Legittimazione vs titolarità:</strong> la continuità delle girate prova la legittimazione formale, non la proprietà del diritto. Un portatore può essere legittimato ma non avere diritto (es. titolo rubato). Il debitore, però, paga validamente a chi è formalmente legittimato, salvo sia in dolo o abbia colpa grave nel non riconoscere il vizio.<br><br><strong>Onere della prova in giudizio:</strong> il portatore che agisce in via cartolare deve solo esibire il titolo con serie continua di girate (prova documentale). L'onere di provare l'eccezione (mala fede, vizio della girata) spetta al debitore. Questa inversione dell'onere è uno dei vantaggi dell'azione cartolare rispetto a quella causale.<br><br><strong>Differenza con titoli nominativi:</strong> nei titoli nominativi la legittimazione si prova con l'intestazione nel registro dell'emittente (cd. <em>transfert</em>) o con serie di girate autenticate — procedura più complessa che rende la circolazione meno fluida.`
  },

  // ── G13 ─────────────────────────────────────────────────────────────────
  {
    part: 1,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Transfert nel titolo nominativo",
    a: `Il <strong>transfert</strong> è il procedimento di trasferimento dei <strong>titoli nominativi</strong> (art. 2023 c.c.): si realizza mediante <em>annotazione del nome dell'acquirente sul titolo e nel registro dell'emittente</em> a cura dell'emittente stesso su richiesta dell'alienante. Solo dopo il transfert l'acquirente diventa titolare del diritto cartolare e può esercitarlo verso l'emittente. Alternativa: <em>rilascio di nuovo titolo</em> intestato all'acquirente (art. 2024 c.c.).`,
    deep: `<strong>Procedura (art. 2023 c.c.):</strong> (a) l'alienante si presenta all'emittente con il titolo; (b) l'emittente annota sul titolo il nome dell'acquirente e lo cancella dal registro (o aggiorna il registro); (c) l'acquirente viene iscritto come nuovo titolare. L'emittente può emettere un nuovo titolo intestato all'acquirente in sostituzione del vecchio.<br><br><strong>Girata autenticata come alternativa:</strong> art. 2023, co. 2: il trasferimento può avvenire anche tramite <em>girata autenticata</em> (firma dell'alienante autenticata da un notaio o da un agente di cambio) + consegna del titolo. In questo caso l'acquirente si presenta all'emittente e richiede l'aggiornamento del registro. La girata autenticata non ha l'efficacia della girata normale nei titoli all'ordine: l'emittente deve ancora procedere all'annotazione registrale.<br><br><strong>Confronto con titoli all'ordine:</strong> il transfert è più lento e formale rispetto alla girata semplice nei titoli all'ordine. I titoli nominativi offrono in compenso maggiore sicurezza (il nome del titolare è iscritto nel registro dell'emittente: difficile far circolare titoli rubati) e permettono all'emittente di sapere sempre chi sono i propri creditori/azionisti.<br><br><strong>Azioni (titoli nominativi per eccellenza):</strong> le azioni SpA sono titoli nominativi per disposizione di legge (art. 2355 c.c.). Il trasferimento avviene con annotazione nel libro soci (per le azioni non dematerializzate) o tramite sistema di gestione accentrata (Monte Titoli) per le azioni quotate, dove il transfert è automatizzato elettronicamente.`
  },

  // ── G14 ─────────────────────────────────────────────────────────────────
  {
    part: 1,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Titoli nominativi vs titoli all'ordine: confronto",
    a: `<strong>Titoli all'ordine</strong> (es. cambiale): circolano con <em>girata + consegna</em>; la girata è semplice (non autenticata); la serie di girate prova la legittimazione. <strong>Titoli nominativi</strong> (es. azioni SpA): circolano con <em>transfert</em> (annotazione sul titolo e nel registro dell'emittente) o girata autenticata; la legittimazione si prova con l'intestazione nel registro. I nominativi offrono più sicurezza ma minor fluidità di circolazione.`,
    deep: `<strong>Schema comparativo:</strong><br><br><em>Titoli all'ordine:</em><br>– Circolazione: girata + consegna (art. 2011 c.c.)<br>– Legittimazione: serie continua di girate<br>– Velocità: alta (girata semplice, non autenticata)<br>– Tutela: acquisto a non domino ammesso (buona fede + regole circolazione)<br>– Eccezioni opponibili: solo reali o personali al portatore<br><br><em>Titoli nominativi:</em><br>– Circolazione: transfert (art. 2023) o girata autenticata<br>– Legittimazione: intestazione nel registro emittente<br>– Velocità: bassa (richiede intervento emittente)<br>– Tutela: più sicuri contro furto/smarrimento (debitore non libera pagando a chi non è nel registro)<br>– Eccezioni opponibili: idem titoli all'ordine<br><br><strong>Perché le azioni sono nominative:</strong> la legge impone la nominatività delle azioni (art. 2355 c.c.) per ragioni fiscali (controllo del fisco su dividendi) e societarie (l'emittente conosce i propri soci). Le azioni al portatore erano ammesse prima della l. 1745/1962 e sono state reintrodotte solo per azioni di risparmio in certe condizioni; oggi sono quasi inesistenti nel diritto italiano.<br><br><strong>Azioni quotate — dematerializzazione:</strong> per le azioni quotate su mercati regolamentati, il sistema di gestione accentrata (Monte Titoli SpA) ha eliminato il documento fisico. La "circolazione" avviene mediante registrazioni contabili; la legittimazione è provata dall'estratto del conto titoli. Il regime è misto: formalmente nominativo, ma operativamente dematerializzato.`
  },

  // ── G15 ─────────────────────────────────────────────────────────────────
  {
    part: 1,
    prof: ["Comune","Masi","Morello"],
    q: "Girate delle azioni",
    a: `Le <strong>azioni SpA</strong> sono titoli nominativi e circolano tramite <em>transfert</em> (annotazione nel libro soci) o, per le azioni dematerializzate, tramite registrazione contabile. Lo statuto può limitare la circolazione con <strong>clausole di gradimento</strong> (approvazione dell'organo sociale) o <strong>diritti di prelazione</strong> (preferenza agli altri soci in caso di vendita). Le clausole di intrasferibilità totale sono ammesse per max <em>5 anni</em>. Clausole di gradimento <em>mero</em> (senza obbligo di acquisto) rendono le azioni riscattabili ex lege.`,
    deep: `<strong>Tipologie di clausole limitative (art. 2355-bis c.c.):</strong><br>(a) <em>Clausole di gradimento</em>: trasferimento subordinato all'approvazione dell'organo sociale (CdA o assemblea). Se il gradimento è negato senza obbligo di acquisto e senza indicazione di altro acquirente a prezzo equo → la clausola non ha effetto (art. 2355-bis, co. 2): il socio può vendere liberamente.<br>(b) <em>Clausole di prelazione</em>: il socio che vuole vendere deve offrire prima agli altri soci alle stesse condizioni. Ammesse senza limiti temporali.<br>(c) <em>Clausola di intrasferibilità</em>: vietata per più di 5 anni; trascorso il termine il socio può recedere con diritto alla liquidazione della quota.<br><br><strong>Differenze con le quote SRL:</strong> nelle SRL la circolazione è disciplinata dall'atto costitutivo con maggiore libertà. Il trasferimento inter vivos richiede atto scritto con firma autenticata + iscrizione nel registro delle imprese (art. 2470 c.c.). Non esiste un "libro soci" aggiornato dall'emittente: l'iscrizione nel registro delle imprese è l'atto pubblicitario decisivo.<br><br><strong>Azioni dematerializzate:</strong> per le azioni quotate, la "girata" non esiste più fisicamente: il trasferimento avviene tramite registrazione negli account di gestione accentrata (Monte Titoli). Il regime rimane formalmente nominativo (l'emittente conosce i soci tramite le comunicazioni degli intermediari), ma la circolazione è automatizzata e quasi istantanea.`
  },

  // ── G16 ─────────────────────────────────────────────────────────────────
  {
    part: 1,
    prof: ["Comune","Masi"],
    q: '"Il ladro è legittimato?" – legittimazione e titolarità nei titoli di credito',
    a: `<strong>Sì, il ladro è legittimato, ma non è titolare del diritto.</strong> La <em>legittimazione</em> è la facoltà formale di esercitare il diritto cartolare: spetta a chi possiede il titolo secondo le regole di circolazione (portatore di fatto, possessore in continuità di girate). La <em>titolarità</em> è la spettanza sostanziale del diritto: appartiene al legittimo proprietario. Il ladro possiede il titolo ma non ne è proprietario: è legittimato all'esercizio ma non ha diritto al pagamento; il debitore che paga al ladro senza dolo/colpa grave è liberato.`,
    deep: `<strong>Distinzione legittimazione/titolarità:</strong> la legittimazione è un concetto formale-processuale: chi risulta legittimato può pretendere la prestazione e il debitore deve pagare. La titolarità è il diritto sostanziale al valore del titolo. Nel normale svolgimento i due coincidono; si dissociano in caso di furto, smarrimento, eredità contestata.<br><br><strong>Il ladro di un titolo al portatore:</strong> è immediatamente legittimato (art. 2003 c.c.: il portatore è legittimato per il solo possesso). Se lo presenta all'incasso e il debitore paga in buona fede → debitore liberato; ladro deve restituire al proprietario. Il proprietario spossessato ha solo azione di risarcimento contro il ladro, non verso il debitore che ha pagato in buona fede.<br><br><strong>Il ladro di un titolo all'ordine:</strong> il ladro non compare nella serie di girate (o compare come giratario di girata falsa). Non è legittimato in base alla continuità delle girate. Il debitore che paga al ladro non è liberato. Tuttavia, se il ladro gira il titolo a un terzo che sia in buona fede e non in colpa grave → il terzo acquista il diritto per l'art. 1994 c.c. (acquisto a non domino). Il proprietario perde il diritto e ha solo azione di danni contro il ladro.<br><br><strong>Funzione della distinzione all'esame:</strong> è fondamentale per spiegare perché il debitore paga validamente anche a chi non è il vero proprietario del credito (tutela della circolazione), e perché il ladro-girante non trasmette al terzo più diritti di quanti ne avesse (nemo plus iuris) — ma l'art. 1994 supera questo principio a favore del terzo in buona fede.`
  },

  // ── I1 ──────────────────────────────────────────────────────────────────
  {
    part: 1,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Procedure concorsuali: quadro generale e alternative alla LG",
    a: `Le <strong>procedure concorsuali</strong> (o procedure di gestione della crisi) si applicano all'imprenditore commerciale non piccolo in stato di crisi o insolvenza. Il <strong>CCI (d.lgs. 14/2019)</strong> prevede un sistema graduato: si parte dagli strumenti preventivi (composizione negoziata, accordi di ristrutturazione, piano attestato) per arrivare alle procedure concorsuali vere e proprie (<strong>concordato preventivo</strong>, <strong>liquidazione giudiziale</strong>). L'obiettivo primario è il risanamento; la LG è extrema ratio.`,
    deep: `<strong>Struttura del CCI — gerarchia degli strumenti:</strong><br><em>1. Strumenti di allerta/rilevazione:</em> sistemi di allerta interni (art. 3 CCI), composizione negoziata (art. 12 ss. CCI), piattaforma telematica.<br><em>2. Strumenti negoziali:</em> piano attestato di risanamento (art. 56 CCI); accordi di ristrutturazione dei debiti (artt. 57-64 CCI); convenzione di moratoria (art. 62 CCI); piano di ristrutturazione soggetto a omologazione — PRO (art. 64-bis CCI).<br><em>3. Procedure concorsuali conservative:</em> concordato preventivo in continuità (artt. 84 ss.) e concordato preventivo liquidatorio.<br><em>4. Procedure concorsuali liquidatorie:</em> liquidazione giudiziale (artt. 121 ss.) — sostituisce il fallimento.<br><em>5. Sovraindebitamento:</em> per non assoggettabili alla LG → ristrutturazione dei debiti, concordato minore, liquidazione controllata.<br><br><strong>Principio di preferenza per la continuità:</strong> il CCI incentiva la continuità aziendale. Il concordato liquidatorio è ammesso solo se garantisce ai creditori almeno il 20% dei crediti chirografari. Il concordato in continuità non ha soglia percentuale.<br><br><strong>Presupposto soggettivo:</strong> imprenditore commerciale non piccolo (superamento di almeno una soglia: attivo > 300k€, ricavi > 200k€, debiti > 500k€). Per gli agricoli e i piccoli imprenditori: solo procedure da sovraindebitamento (concordato minore, liquidazione controllata, esdebitazione del debitore incapiente).<br><br><strong>Presupposto oggettivo:</strong> stato di <em>crisi</em> (probabilità di insolvenza) o di <em>insolvenza</em> (incapacità di adempiere regolarmente le obbligazioni). La composizione negoziata può essere avviata anche in mero squilibrio economico-finanziario.`
  },

  // ── I5 ──────────────────────────────────────────────────────────────────
  {
    part: 1,
    prof: ["Comune","Masi"],
    q: "Concordato preventivo e piani concorrenti",
    a: `Nella proposta di <strong>concordato preventivo</strong>, i creditori che rappresentino almeno il <em>10% dei crediti ammessi</em> possono presentare una <strong>proposta concorrente</strong> (art. 90 CCI), anche con piano alternativo a quello del debitore. I creditori votano su tutte le proposte; viene omologata quella che raggiunge le maggioranze richieste. Questo meccanismo rafforza la <em>contendibilità</em> del concordato e incentiva il debitore a fare offerte migliori.`,
    deep: `<strong>Ratio dei piani concorrenti:</strong> introdotti dalla riforma 2015 (poi recepiti nel CCI), rispondono alla critica che il concordato fosse "troppo debitoriale": il debitore proponeva piani al ribasso sapendo di avere il monopolio della proposta. I piani concorrenti creano competizione, spingendo il debitore a offrire condizioni migliori o a rischiare di perdere il controllo della procedura.<br><br><strong>Chi può proporre:</strong> creditori che rappresentino ≥ 10% del totale dei crediti ammessi al voto. La proposta può includere offerte di acquisto dell'azienda o di rami, o prevedere l'assunzione del concordato da parte dei creditori stessi (assuntore).<br><br><strong>Procedura di votazione con piani concorrenti:</strong> tutti i piani vengono sottoposti al voto nella stessa udienza. Se più piani raggiungono le maggioranze, il tribunale omologa quello con il maggior voto favorevole (per valore dei crediti). In caso di parità, prevale il piano del debitore.<br><br><strong>Protezione del debitore:</strong> il debitore può modificare la propria proposta fino a 15 giorni prima dell'udienza di votazione, anche in risposta a piani concorrenti, per rendere la propria più conveniente.<br><br><strong>Applicazione pratica:</strong> i piani concorrenti sono più frequenti nei concordati di grandi imprese con creditori bancari organizzati. In Italia, strumento ancora poco usato rispetto all'esperienza anglosassone.`
  },

  // ── I7 ──────────────────────────────────────────────────────────────────
  {
    part: 1,
    prof: ["Comune","Masi","Martucci"],
    q: "Contratti di carattere personale nella liquidazione giudiziale",
    a: `I <strong>contratti intuitu personae</strong> (a carattere personale) si sciolgono automaticamente con l'apertura della liquidazione giudiziale, perché la prestazione è infungibile e legata alla persona del debitore (es. contratto d'opera intellettuale, mandato, agenzia). A differenza dei contratti in corso di esecuzione, su cui il curatore ha potere di scelta (subentrare o sciogliere), per i contratti personali lo <strong>scioglimento è automatico</strong> per legge (art. 189 CCI).`,
    deep: `<strong>Ratio:</strong> i contratti intuitu personae presuppongono fiducia nella persona del contraente. Con la LG il debitore perde l'amministrazione dei beni; il curatore, persona diversa, non può essere imposto come controparte contrattuale senza snaturare il rapporto. Lo scioglimento tutela entrambe le parti.<br><br><strong>Contratti che si sciolgono automaticamente:</strong> mandato (art. 1722, n. 4, c.c.); agenzia (in quanto fondato su fiducia); contratto d'appalto per opere intellettuali; contratto di società di persone rispetto al socio fallito (scioglimento del rapporto con quel socio, non della società); contratti di lavoro subordinato (la LG non risolve automaticamente i contratti di lavoro, ma i lavoratori godono di tutele speciali — CIGS fallimentare).<br><br><strong>Contratti di lavoro — eccezione importante:</strong> i contratti di lavoro subordinato non si sciolgono automaticamente. Il curatore può continuarli (se c'è esercizio provvisorio) o risolverli con preavviso o accordo sindacale. I crediti dei lavoratori per TFR e ultime mensilità sono privilegiati (art. 2751-bis c.c.) e, in parte, garantiti dal Fondo di Garanzia INPS.<br><br><strong>Scioglimento vs diritto al risarcimento:</strong> nei contratti non personali su cui il curatore esercita la scelta di scioglimento, la controparte ha diritto a un credito concorsuale per il danno. Nei contratti personali che si sciolgono automaticamente, la controparte che ha eseguito parzialmente ha diritto a insinuarsi allo stato passivo per il valore della prestazione eseguita.`
  },

  // ── J1 ──────────────────────────────────────────────────────────────────
  {
    part: 1,
    prof: ["Comune","Morello","Martucci"],
    q: "Fallimento vs liquidazione giudiziale: differenze e continuità",
    a: `La <strong>liquidazione giudiziale</strong> (LG) è la procedura introdotta dal <strong>CCI (d.lgs. 14/2019)</strong> in sostituzione del vecchio <strong>fallimento</strong> (legge fallimentare del 1942). Sostanzialmente equivalenti negli effetti, differiscono nella denominazione (per ridurre lo stigma sociale) e in alcune novità: <em>esdebitazione automatica</em> per le persone fisiche, <em>obbligo di assetti organizzativi adeguati</em>, procedure di allerta anticipate. Il curatore rimane la figura centrale.`,
    deep: `<strong>Perché il cambio di nome:</strong> il termine "fallimento" aveva una connotazione infamante nel diritto storico (dal banchiere che rovesciava il banco — "banca rotta"). Il legislatore del CCI ha voluto marcare la discontinuità culturale: la crisi è un evento fisiologico dell'impresa; la procedura è di gestione ordinata dell'insolvenza, non di punizione.<br><br><strong>Continuità sostanziale:</strong> la disciplina della LG ricalca quasi interamente quella del vecchio fallimento: spossessamento del debitore, formazione dello stato passivo, liquidazione dell'attivo, ripartizione ai creditori in ordine di prelazione. La giurisprudenza formatasi sul fallimento è largamente applicabile alla LG.<br><br><strong>Novità principali del CCI rispetto alla LF:</strong><br>(a) <em>Esdebitazione automatica</em> (art. 278 CCI): al termine della procedura, il debitore persona fisica è liberato automaticamente dai debiti residui (nella LF era necessaria istanza e sussistevano limiti più severi);<br>(b) <em>Procedure di allerta</em> (poi diventate composizione negoziata): sistema di rilevazione precoce della crisi;<br>(c) <em>Concordato semplificato</em>: nuovo strumento post-composizione negoziata;<br>(d) <em>LG di gruppo</em>: disciplina organica per i gruppi d'imprese;<br>(e) Terminologia: giudice delegato, curatore, comitato dei creditori rimangono; cambiano alcune denominazioni procedurali.<br><br><strong>Entrata in vigore:</strong> il CCI è entrato in vigore il 15 luglio 2022 (dopo vari rinvii legati al COVID). Le procedure aperte prima di quella data continuano a essere governate dalla legge fallimentare.`
  },

  // ── J2 ──────────────────────────────────────────────────────────────────
  {
    part: 1,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: 'Ratio della liquidazione giudiziale: è "la procedura più grave"?',
    a: `La LG è la procedura concorsuale più <strong>invasiva e definitiva</strong>: comporta lo spossessamento del debitore, la cristallizzazione del passivo, la liquidazione di tutto il patrimonio e la distribuzione ai creditori. È l'<em>extrema ratio</em> del sistema concorsuale, riservata ai casi in cui non sia possibile o conveniente il risanamento. Non è però necessariamente la "più grave" in assoluto: per il debitore persona fisica l'<em>esdebitazione</em> può rendere la LG preferibile al concordato senza esdebitazione.`,
    deep: `<strong>Ratio del concorso:</strong> la LG serve a trattare in modo equo e ordinato tutti i creditori (par condicio creditorum) quando il patrimonio del debitore non è sufficiente a soddisfarli tutti. Senza una procedura collettiva, i creditori più veloci o più forti incasserebbero a scapito degli altri. La procedura cristallizza la situazione e garantisce la parità di trattamento (con gli opportuni gradi di prelazione).<br><br><strong>Perché è "invasiva":</strong> (a) <em>spossessamento</em>: il debitore perde l'amministrazione e la disponibilità dei beni (art. 142 CCI); (b) <em>inefficacia degli atti successivi</em>: atti del debitore dopo l'apertura sono inefficaci verso i creditori (salvo autorizzazione del giudice); (c) <em>cristallizzazione del passivo</em>: nessun creditore può agire individualmente; tutti devono insinuarsi allo stato passivo; (d) <em>durata</em>: le procedure si trascinano per anni nelle realtà complesse.<br><br><strong>"La più grave?" — sfumatura:</strong> dal punto di vista dell'imprenditore-persona fisica, la LG con esdebitazione finale è un "fresh start" (nuovo inizio liberato dai debiti). Il concordato senza beneficio dell'esdebitazione, al contrario, può lasciare il debitore ancora gravato da debiti residui. Quindi la risposta dipende dalla prospettiva: per l'impresa (che cessa), la LG è definitiva; per la persona fisica, può essere liberatoria.`
  },

  // ── J6 ──────────────────────────────────────────────────────────────────
  {
    part: 1,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Effetti della liquidazione giudiziale per il debitore",
    a: `Con l'apertura della LG il debitore subisce: <strong>(1) spossessamento</strong> — perde l'amministrazione e la disponibilità dei beni esistenti e futuri (fino alla chiusura); <strong>(2) inefficacia degli atti</strong> — gli atti compiuti dopo l'apertura sono inefficaci verso i creditori; <strong>(3) incapacità processuale</strong> — non può stare in giudizio nelle controversie patrimoniali (lo fa il curatore); <strong>(4) obblighi di collaborazione</strong> — deve fornire informazioni al curatore e al giudice, presentarsi se convocato.`,
    deep: `<strong>Spossessamento (art. 142 CCI):</strong> il debitore conserva la capacità giuridica e la titolarità dei beni (non cessa di essere proprietario), ma perde la legittimazione ad amministrarli e disporne. La gestione passa al curatore. Beni acquisiti durante la procedura (es. eredità accettata) entrano nella massa attiva. I beni personali insuscettibili di pignoramento (abiti, strumenti di lavoro indispensabili, alimenti) sono esclusi.<br><br><strong>Inefficacia vs nullità degli atti:</strong> gli atti compiuti dal debitore dopo l'apertura non sono nulli ma <em>inefficaci</em> verso la massa dei creditori. L'acquirente di un bene del debitore in LG non acquista il diritto (il curatore può agire in rivendicazione). Distinzione: nullità colpisce l'atto in sé; inefficacia colpisce l'opponibilità verso i creditori.<br><br><strong>Obblighi del debitore (art. 148 CCI):</strong> consegnare documenti contabili e libri al curatore; comunicare variazioni di residenza; presentarsi agli organi della procedura se convocato; astenersi dall'intralciare la procedura. Violazioni gravi: sanzione penale per bancarotta semplice (art. 323 CCI) o fraudolenta (art. 322 CCI).<br><br><strong>Debitore persona fisica — tutele residue:</strong> mantiene il diritto a ciò che è strettamente necessario per sé e la famiglia; può lavorare e guadagnare (salvo il limite: il 50% del reddito eccedente il necessario per vivere dignitosamente entra nella massa). Al termine della procedura: esdebitazione automatica (liberazione dai debiti residui, art. 278 CCI).`
  },

  // ── K3 ──────────────────────────────────────────────────────────────────
  {
    part: 1,
    prof: ["Comune","Martucci"],
    q: "Atti normali e anormali nella revocatoria concorsuale",
    a: `La <strong>revocatoria concorsuale</strong> (art. 166 CCI) distingue tra <strong>atti anormali</strong> — revocabili senza dover provare la <em>scientia decoctionis</em> del terzo, perché anomali nella vita dell'impresa — e <strong>atti normali</strong> — revocabili solo se il terzo conosceva lo stato di insolvenza. Atti anormali: pegni e ipoteche per debiti preesistenti, pagamenti di debiti non ancora scaduti, atti a titolo gratuito. Atti normali: pagamenti di debiti scaduti ed esigibili, atti a titolo oneroso.`,
    deep: `<strong>Atti anormali (art. 166, co. 1, CCI) — revocabili in ogni caso:</strong> (a) atti a titolo gratuito (donazioni, fideiussioni gratuite) negli 2 anni anteriori; (b) pagamenti di debiti non ancora scaduti compiuti nei 2 anni anteriori; (c) pegni e ipoteche volontari per debiti preesistenti non scaduti nei 2 anni anteriori. Per questi atti la revocatoria prescinde dalla conoscenza dell'insolvenza da parte del terzo: la loro anomalia è presunta.<br><br><strong>Atti normali (art. 166, co. 2, CCI) — revocabili se il terzo conosceva l'insolvenza:</strong> (a) atti a titolo oneroso compiuti nell'anno anteriore in cui le prestazioni del fallito sono sproporzionate; (b) pagamenti di debiti liquidi ed esigibili compiuti nell'anno anteriore. Il curatore deve provare la <em>scientia decoctionis</em> (il terzo sapeva dell'insolvenza al momento dell'atto).<br><br><strong>Onere della prova — inversione per atti anormali:</strong> per gli atti normali: curatore prova scientia decoctionis del terzo. Per gli atti anormali: si presume la revocabilità; il terzo può provare la propria ignoranza (difficile in pratica). È un'inversione parziale dell'onere.<br><br><strong>Confronto con revocatoria ordinaria (art. 2901 c.c.):</strong> la revocatoria ordinaria richiede eventus damni (atto pregiudica i creditori) + consilium fraudis (intenzione fraudolenta del debitore) + scientia fraudis del terzo se atto oneroso. Tempi: 5 anni dall'atto. La revocatoria concorsuale è più agevole (nessun consilium fraudis; termini brevi: 1-2 anni) ma può essere esercitata solo dal curatore nella procedura.`
  }
,
  // ========== PARTE 2: S1 – NOZIONI GENERALI ==========

  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Società di persone vs società di capitali",
    a: `Le <strong>società di persone</strong> (SS, SNC, SAS) si fondano sulla <em>rilevanza della persona del socio</em>: responsabilità illimitata e solidale dei soci per le obbligazioni sociali, assenza di personalità giuridica piena (ma autonomia patrimoniale imperfetta), amministrazione tendenzialmente affidata ai soci. Le <strong>società di capitali</strong> (SpA, SRL, SApA) si basano sulla <em>rilevanza del capitale</em>: personalità giuridica piena, autonomia patrimoniale perfetta, responsabilità limitata dei soci (con eccezioni per il socio unico), organizzazione corporativa con organi distinti.`,
    deep: `<strong>Autonomia patrimoniale perfetta (società di capitali):</strong> nelle SpA, SRL e cooperative — in quanto <em>persone giuridiche</em> — il patrimonio sociale è giuridicamente distinto dal patrimonio dei soci. I creditori sociali possono aggredire solo il patrimonio della società; i creditori personali dei soci possono aggredire solo il patrimonio del singolo socio, non il patrimonio sociale. I soci rispondono esclusivamente nei limiti del conferimento (artt. 2325, 2462 c.c.). Questa separazione è <em>perfetta</em>: opera in entrambe le direzioni, senza eccezioni strutturali (fatta salva la disciplina del socio unico e i casi di confusione patrimoniale fraudolenta).<br><br><strong>Autonomia patrimoniale imperfetta (società di persone):</strong> nelle SS, SNC, SAS — che non hanno personalità giuridica piena — il patrimonio sociale gode di una separazione <em>relativa</em>: (a) i creditori personali dei soci <em>non possono</em> aggredire il patrimonio sociale finché la società dura (possono solo far valere i propri diritti sugli utili spettanti al socio debitore e compiere atti conservativi sulla quota di liquidazione — art. 2270 c.c.); (b) i creditori sociali, invece, possono aggredire il patrimonio personale dei soci illimitatamente responsabili, purché abbiano previamente escusso il patrimonio sociale (<em>beneficio di escussione</em> — art. 2304 SNC; solo convenzionale nella SS ex art. 2268). L'imperfetta autonomia si risolve dunque in una responsabilità <em>sussidiaria</em> dei soci rispetto alla società.<br><br><strong>Rilevanza pratica della distinzione:</strong> nella SS è possibile pattuire che alcuni soci abbiano responsabilità sussidiaria o limitata, ma tale patto è opponibile ai terzi solo se portato a loro conoscenza (art. 2267 c.c.). Nella SNC non è mai opponibile ai terzi alcuna limitazione. Nella SAS la struttura bipartita (accomandatari illimitati + accomandanti limitati) è il compromesso tra autonomia perfetta e imperfetta.<br><br><strong>Conseguenze pratiche per creditori e finanziatori:</strong> chi presta denaro a una SpA o SRL sa che potrà soddisfarsi solo sul patrimonio sociale; chi presta a una SNC sa che, in caso di patrimonio sociale insufficiente, potrà aggredire i soci. Questo spiega perché le banche spesso richiedono fideiussioni personali dei soci di SRL/SpA: la responsabilità limitata dei soci non è automatica garanzia per il creditore, che deve costruirsi una garanzia personale mediante contratto autonomo.<br><br><strong>Tabella comparativa:</strong><br>SS: autonomia patrimoniale imperfetta — responsabilità illimitata e solidale dei soci (con possibilità convenzionale di limitazione opponibile ai terzi solo se conoscibile).<br>SNC: autonomia patrimoniale imperfetta — responsabilità illimitata e solidale di tutti i soci (inderogabile verso i terzi), con beneficio di escussione legale.<br>SAS: autonomia patrimoniale imperfetta per i soci accomandatari (illimitata) / tendenzialmente perfetta per gli accomandanti (limitata al conferimento).<br>SRL/SpA/SApA-azionisti: autonomia patrimoniale perfetta — responsabilità limitata al conferimento; nessuna responsabilità personale del socio verso i creditori sociali (salvo eccezioni per il socio unico).`
  },

  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Società regolari e irregolari (SS, SNC, SAS)",
    a: `Una società di persone è <strong>regolare</strong> quando il contratto è stato iscritto nel registro delle imprese (per SNC e SAS: iscrizione con effetto di pubblicità legale; per SS: iscrizione nella sezione speciale con pubblicità-notizia). È <strong>irregolare</strong> quando non è iscritta o l'iscrizione è incompleta. La SNC irregolare è trattata come <em>società semplice</em> per quanto riguarda i rapporti con i terzi (art. 2297 c.c.): il beneficio di escussione ex art. 2304 non opera; i soci rispondono direttamente e solidalmente.`,
    deep: `<strong>SNC irregolare (art. 2297 c.c.):</strong> fino all'iscrizione nel registro delle imprese, la SNC è irregolare. I soci rispondono solidalmente e illimitatamente come nella SS (senza il beneficio di escussione che spetta ai soci di SNC regolare). La SNC irregolare può comunque agire e stare in giudizio. L'iscrizione non è requisito di validità ma di opponibilità del regime speciale.<br><br><strong>SAS irregolare:</strong> in assenza di iscrizione, tutti i soci (accomandatari e accomandanti) rispondono illimitatamente verso i terzi (art. 2317 c.c.). L'iscrizione è essenziale per far valere la limitazione di responsabilità degli accomandanti.<br><br><strong>SS nella sezione speciale:</strong> la società semplice si iscrive nella sezione speciale del registro delle imprese (pubblicità-notizia). L'iscrizione non produce effetti di pubblicità legale dichiarativa: la mancata iscrizione non rende irregolare la SS ma non consente di opporre ai terzi le modifiche dello statuto.<br><br><strong>Rilevanza pratica:</strong> la distinzione regolare/irregolare è cruciale per determinare il regime di responsabilità dei soci verso i terzi. La regolarizzazione tardiva non sana retroattivamente il regime di responsabilità per le obbligazioni sorte nel periodo di irregolarità.`
  },

  {
    part: 2,
    prof: ["Comune","Masi"],
    q: "Società di fatto",
    a: `La <strong>società di fatto</strong> è una società che non è stata costituita con un atto formale ma la cui esistenza si desume dal <em>comportamento concludente</em> dei soci: esercizio in comune di un'attività economica con intento di dividerne gli utili, organizzazione comune, contribuzione ai costi. Si applica la disciplina della <strong>società semplice</strong> (o SNC se l'attività è commerciale). I soci rispondono illimitatamente e solidalmente; nessun beneficio di escussione.`,
    deep: `<strong>Presupposti del riconoscimento:</strong> la giurisprudenza richiede tre elementi costitutivi: (a) svolgimento in comune di attività economica; (b) contribuzione ai costi e partecipazione agli utili; (c) <em>affectio societatis</em> — volontà, anche tacita, di associarsi. L'onere della prova grava su chi invoca l'esistenza della società. Ad esempio, pensiamo al caso di due fratelli che gestiscono un bar senza atto scritto: se entrambi investono, lavorano e dividono i guadagni, la giurisprudenza riconosce una società di fatto.<br><br><strong>Disciplina applicabile (artt. 2297 e 2249 c.c.):</strong> la società di fatto esercente attività non commerciale è regolata come <em>società semplice</em> (artt. 2251-2290 c.c.); se l'attività è commerciale, si applica la disciplina della <em>SNC irregolare</em> (artt. 2293-2313 c.c.), con responsabilità illimitata e solidale di tutti i soci e senza beneficio di escussione. La mancata iscrizione nel registro delle imprese comporta questa conseguenza per tutti i soci che agiscano nell'esercizio dell'impresa (art. 2297 c.c.).<br><br><strong>Differenza da società occulta e da semplice comunione:</strong> la società di fatto è visibile ai terzi (l'attività è esercitata apertamente), ma priva di atto formale. La società occulta è invece intenzionalmente celata. La comunione (artt. 1100 ss. c.c.) manca dello scopo di esercizio in comune di un'impresa: due comproprietari di un immobile che lo affittano non formano automaticamente una società di fatto, se mancano la condivisione degli utili e l'affectio societatis.<br><br><strong>Liquidazione giudiziale e art. 256 CCI:</strong> se la società di fatto esercente attività commerciale diventa insolvente, si apre la liquidazione giudiziale dell'intero ente (d.lgs. 14/2019, art. 256 CCI), con automatica estensione della procedura a tutti i soci illimitatamente responsabili — inclusi i <em>soci occulti</em>, una volta individuati. La società di fatto non può essere sottoposta a liquidazione giudiziale se il giudice non accerta previamente l'esistenza della struttura societaria.`
  },

  {
    part: 2,
    prof: ["Comune","Masi"],
    q: "Società occulta vs socio occulto",
    a: `La <strong>società occulta</strong> è una società realmente esistente che opera sul mercato tramite un soggetto (<em>prestanome</em>) che agisce in nome proprio ma per conto comune, tenendo celata la struttura societaria. Il <strong>socio occulto</strong> è il soggetto che partecipa agli utili e alle perdite di una società apparentemente individuale o diversamente strutturata, ma senza comparire verso i terzi. Entrambi rispondono illimitatamente: il socio occulto ex art. 2267 c.c. (applicazione analogica) quando venga scoperto.`,
    deep: `<strong>Società occulta — meccanismo (art. 256, co. 5 CCI):</strong> la società esiste nei rapporti interni tra i soci ma non si manifesta verso i terzi. L'attività d'impresa è svolta da un soggetto (<em>prestanome</em>) che agisce in nome proprio per conto della società occulta. Pensiamo al caso di tre soci che accordano tra loro di gestire un'impresa facendola figurare solo come ditta individuale di uno di essi: i terzi creditori dell'imprenditore palese possono, se provano l'esistenza della società occulta, estendere la liquidazione giudiziale alla società e agli altri soci illimitatamente responsabili (art. 256, co. 5, d.lgs. 14/2019 — Codice della Crisi d'Impresa).<br><br><strong>Socio occulto — responsabilità (art. 2267 c.c., applicazione analogica):</strong> per giurisprudenza consolidata (Cass. SS.UU.), il socio occulto di SNC risponde illimitatamente e solidalmente dei debiti sociali anche se non figura nel contratto sociale. Il creditore che scopra l'esistenza del socio occulto può agire direttamente nei suoi confronti senza dover prima escutere il patrimonio sociale (il beneficio di escussione ex art. 2304 c.c. non opera, in quanto la società è occulta e quindi irregolare). Il criterio di prova è quello sostanziale: basta dimostrare la partecipazione agli utili e la <em>affectio societatis</em>, non serve la formale spendita del nome.<br><br><strong>Distinzione da prestanome e interposizione fittizia:</strong> il prestanome agisce in nome proprio senza partecipare realmente alla società; se provata l'interposizione fittizia, il vero titolare risponde direttamente ex art. 1705 c.c. (mandato senza rappresentanza). Diverso dal socio occulto che partecipa realmente agli utili e alle perdite ma si nasconde verso i terzi.<br><br><strong>Indici probatori della società occulta (art. 256 CCI):</strong> il legislatore individua, tra i possibili indici probatori: il sistematico finanziamento dell'imprenditore individuale (anche con fideiussioni omnibus), la partecipazione a trattative commerciali, il compimento di atti di gestione in nome dell'imprenditore palese, il prelievo di somme di pertinenza dell'impresa. Tali indici possono essere valorizzati singolarmente o in concorso tra loro.`
  },

  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Società unipersonali (SRL e SpA): costituzione e responsabilità del socio unico",
    a: `<strong>SRL unipersonale</strong> (art. 2462 c.c.) e <strong>SpA unipersonale</strong> (art. 2325 c.c.) sono ammesse: un unico socio può costituire la società con atto unilaterale. Condizione per la <strong>responsabilità limitata</strong>: il socio unico deve (1) versare integralmente i conferimenti all'atto della costituzione e (2) iscrivere la propria qualità di unico socio nel registro delle imprese. In difetto, risponde illimitatamente delle obbligazioni sorte nel periodo di inadempimento.`,
    deep: `<strong>Ratio della responsabilità illimitata in caso di inadempimento (artt. 2325 e 2462 c.c.):</strong> il capitale sociale svolge funzione di garanzia verso i creditori. Se il socio unico non versa integralmente il capitale o non pubblicizza la propria qualità, i creditori non hanno modo di valutare il rischio. La sanzione dell'illimitata responsabilità è una forma di tutela rafforzata per i creditori in assenza di pluralità di soci. Ad esempio, se la SRL unipersonale si trova in stato di insolvenza e il socio unico non aveva versato integralmente i conferimenti, egli risponde personalmente e illimitatamente di tutte le obbligazioni sociali sorte durante il periodo di inadempimento.<br><br><strong>Adempimenti pubblicitari — termine e conseguenze (art. 2470, co. 4 c.c. per SRL; art. 2362 c.c. per SpA):</strong> il registro delle imprese deve essere aggiornato tempestivamente: (a) all'atto della costituzione unipersonale (entro 30 giorni dall'iscrizione dell'atto costitutivo); (b) quando un socio acquisisce l'intera partecipazione (unipersonalità sopravvenuta, entro 30 giorni dall'acquisto). La mancata iscrizione nei termini fa scattare la responsabilità illimitata per le obbligazioni sorte nel periodo di inadempimento. La responsabilità è pro futuro (non retroattiva): si risponde delle obbligazioni assunte nel periodo di omessa pubblicità, non di quelle precedenti.<br><br><strong>SRL unipersonale vs SpA unipersonale — confronto:</strong> nella SRL unipersonale (art. 2463, co. 2 c.c.) il versamento integrale dei conferimenti in denaro è condizione necessaria alla costituzione se il fondatore è unico; nella SpA pluripersonale il versamento minimo è 25% (art. 2342, co. 1), ma se il costituente è unico deve versare il 100% immediatamente (art. 2342, co. 2 c.c.). Le SRL unipersonali sono molto comuni nella pratica come holding familiari, veicoli per attività professionali organizzate e startup.<br><br><strong>Unipersonalità sopravvenuta:</strong> se tutti i soci di una SRL o SpA trasferiscono le proprie partecipazioni a uno solo, la società diventa unipersonale. Da quel momento scattano gli obblighi di iscrizione nel RI e di versamento del residuo dei conferimenti (se non già integralmente eseguiti). Il socio unico che rispetti tutti gli adempimenti mantiene la responsabilità limitata anche nella prospettiva dell'insolvenza della società.`
  },

  {
    part: 2,
    prof: ["Comune","Morello"],
    q: "Quali sono le società di capitali?",
    a: `Il codice civile disciplina tre tipi di <strong>società di capitali</strong>: <em>(1)</em> <strong>Società per azioni (SpA)</strong> — art. 2325 ss.; capitale minimo 50.000€; azioni liberamente trasferibili; governance corporativa strutturata. <em>(2)</em> <strong>Società in accomandita per azioni (SApA)</strong> — art. 2452 ss.; ibrido con soci accomandatari (amministratori, illimitatamente responsabili) e azionisti (responsabilità limitata). <em>(3)</em> <strong>Società a responsabilità limitata (SRL)</strong> — art. 2462 ss.; capitale minimo 10.000€ (o 1€ per SRL semplificata); quote non rappresentate da azioni; struttura più flessibile.`,
    deep: `<strong>SpA — caratteri essenziali:</strong> personalità giuridica piena; capitale minimo 50.000€; azioni come titoli nominativi liberamente cedibili (salvo clausole statutarie); organo amministrativo separato (CdA o AD); collegio sindacale obbligatorio sopra certi limiti; quotabili in borsa. È il tipo per eccellenza delle grandi imprese.<br><br><strong>SRL — caratteri essenziali:</strong> personalità giuridica piena; capitale minimo 10.000€ (o 1€ per SRLS); quote non rappresentate da titoli (non sono "azioni"); trasferimento con atto notarile + iscrizione RI; maggiore flessibilità statutaria (es. diritti particolari dei soci, esclusione, recesso facilitato); governance semplificata.<br><br><strong>SRL semplificata (SRLS, art. 2463-bis):</strong> introdotta nel 2012 per favorire l'imprenditorialità giovanile; capitale da 1 a 9.999€; solo persone fisiche come soci; atto costitutivo standard (non modificabile); non sono ammesse clausole in deroga. In pratica molto usata per startup e piccole imprese.<br><br><strong>SApA — caratteri e rarità:</strong> è il tipo meno diffuso. I soci accomandatari sono anche gli amministratori (nomina per atto costitutivo; revoca richiede delibera e consenso degli accomandatari, salvo giusta causa). Gli azionisti non possono interferire nell'amministrazione. Utilizzata storicamente per mantenere il controllo familiare di grandi imprese (es. Agnelli-Fiat in passato).`
  },

  // ========== PARTE 2: S2 – COSTITUZIONE E INVALIDITÀ ==========

  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Atto costitutivo: differenze per tipo societario + forma SS/SNC",
    a: `L'<strong>atto costitutivo</strong> è il contratto (o atto unilaterale) con cui si costituisce la società. Per la <strong>SS</strong>: nessuna forma richiesta (art. 2251 c.c. — anche verbale o comportamento concludente). Per la <strong>SNC e SAS</strong>: forma scritta richiesta per l'iscrizione nel registro delle imprese, ma il contratto è valido anche senza forma (la mancata iscrizione rende la società irregolare). Per <strong>SpA e SRL</strong>: atto pubblico notarile obbligatorio a pena di nullità; iscrizione nel RI ha effetto costitutivo.`,
    deep: `<strong>Contenuto minimo dell'atto costitutivo — SpA (art. 2328 c.c.):</strong> generalità dei soci, denominazione, sede, oggetto sociale, capitale (importo, numero e valore azioni, categorie), conferimenti, valore assegnato ai crediti e beni in natura, norme di ripartizione degli utili, numero/poteri/elezione degli amministratori, numero dei sindaci, durata, spese di costituzione. Lo statuto (allegato o incluso) regola il funzionamento.<br><br><strong>Forma e iscrizione — effetti:</strong> per SpA e SRL, l'iscrizione nel RI ha effetto <em>costitutivo</em>: la società acquista personalità giuridica solo con l'iscrizione (art. 2331 c.c.). Prima dell'iscrizione esiste una "società in formazione" (o pre-società): chi agisce in nome della società risponde illimitatamente (art. 2331, co. 2).<br><br><strong>Statuto e atto costitutivo:</strong> nella prassi si distingue l'atto costitutivo in senso stretto (dati dei fondatori, conferimenti, accordo di costituire la società) dallo statuto (regole di funzionamento degli organi, diritti dei soci, clausole speciali). Entrambi devono essere redatti con atto pubblico. Le modifiche statutarie successive richiedono delibera assembleare straordinaria + atto notarile + iscrizione RI.<br><br><strong>Oggetto sociale:</strong> deve essere lecito, possibile, determinato o determinabile. L'oggetto illecito o impossibile causa nullità della società. L'oggetto deve essere concreto (non genericamente "qualsiasi attività"); l'ampliamento avviene con modifica statutaria.`
  },

  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Costituzione delle società: di persone, di capitali e unipersonali",
    a: `<strong>Società di persone:</strong> si costituiscono con contratto tra due o più soci (SS: anche verbale; SNC/SAS: forma scritta per RI). Nessun capitale minimo. <strong>Società di capitali:</strong> atto pubblico notarile + iscrizione nel RI con effetto costitutivo (art. 2331 c.c.); capitale minimo (SpA 50k€, SRL 10k€). <strong>Unipersonali:</strong> un solo socio (persona fisica o giuridica); atto unilaterale; versamento integrale dei conferimenti in denaro all'atto della costituzione.`,
    deep: `<strong>Due modalità di costituzione della SpA (art. 2521 ss. c.c.):</strong> (a) <em>costituzione simultanea</em> (ordinaria): un atto pubblico stipulato contestualmente da tutti i soci fondatori; è la modalità nettamente prevalente; (b) <em>costituzione per pubblica sottoscrizione</em> (artt. 2333-2336 c.c.): procedura complessa per raccogliere il capitale presso il pubblico, con programma, deposito del progetto di statuto, raccolta di adesioni, assemblea costituente; oggi rarissima nella pratica.<br><br><strong>Requisiti pre-iscrizione per SpA (art. 2329 c.c.):</strong> (a) sottoscrizione dell'intero capitale sociale da parte dei soci; (b) versamento in banca di almeno il 25% dei conferimenti in denaro (l'intero 100% se la SpA è costituita con un unico socio fondatore); (c) i conferimenti in natura o crediti devono essere corredati dalla relazione di stima giurata di un esperto nominato dal tribunale (art. 2343 c.c.); (d) stipula dell'atto costitutivo con atto pubblico; (e) deposito al RI entro 20 giorni con richiesta di iscrizione.<br><br><strong>Requisiti per SRL (art. 2464 ss. c.c.):</strong> versamento di almeno il 25% dei conferimenti in denaro (o alternativa: polizza assicurativa o fideiussione bancaria di pari valore). Per SRLS (art. 2463-bis c.c.): statuto standard ministeriale, capitale da 1€ a 9.999€, versamento integrale in denaro al momento della costituzione. L'SRL può essere costituita da un unico socio senza versamento immediato se previsto dall'atto costitutivo, ma in tal caso il socio unico risponde illimitatamente fino al versamento integrale.<br><br><strong>Società in formazione — responsabilità pre-iscrizione (art. 2331, co. 2 c.c.):</strong> tra la stipula dell'atto costitutivo e l'iscrizione nel RI, chi compie atti in nome della SpA/SRL (ancora non esistente come soggetto giuridico) risponde personalmente e solidalmente verso i terzi. Dopo l'iscrizione, se la società ratifica quegli atti, la responsabilità personale cessa e gli atti producono effetti retroattivamente in capo alla società. Senza ratifica, la responsabilità personale permane.<br><br><strong>Società di persone — costituzione:</strong> SS e SNC si costituiscono con semplice contratto (anche orale), sebbene la forma scritta sia richiesta per l'iscrizione nel RI. L'iscrizione della SNC ha effetto <em>costitutivo</em> (crea la SNC regolare con i benefici del statuto speciale); la SNC non iscritta è irregolare e i soci rispondono come nella SS. L'iscrizione della SS ha effetto di mera pubblicità-notizia.<br><br><strong>Nomina dei primi amministratori:</strong> può avvenire nell'atto costitutivo (revocabile solo per giusta causa, con diritto al risarcimento in assenza di essa) o con delibera assembleare successiva (revocabile liberamente).`
  },

  {
    part: 2,
    prof: ["Comune","Masi"],
    q: "Invalidazione del contratto di società",
    a: `Nelle società di persone, i vizi del consenso (errore, dolo, violenza) e l'incapacità di un socio possono causare l'<strong>annullamento del contratto</strong> limitatamente alla partecipazione del socio viziata (scioglimento del rapporto con quel socio, non della società — art. 1446 c.c. adattato). La <strong>nullità</strong> per causa illecita o impossibile travolge l'intera società. Nelle <strong>SpA</strong>, le cause di nullità sono tassative (art. 2332 c.c.) e l'effetto è sempre <em>ex nunc</em> (non retroattivo).`,
    deep: `<strong>Principio di conservazione della società:</strong> il diritto societario tende a conservare la struttura societaria anche in presenza di vizi. Per le società di persone: il vizio del consenso di un socio causa il suo recesso (scioglimento del solo rapporto con lui), non la dissoluzione dell'intera società. Questo purché la società possa continuare con gli altri soci (art. 2272 non si applica se rimane un solo socio per più di 6 mesi).<br><br><strong>Limiti alla nullità nelle SpA (art. 2332 c.c.):</strong> le cause di nullità sono <em>tassative</em>: (a) mancanza dell'atto costitutivo in forma di atto pubblico; (b) illiceità dell'oggetto sociale; (c) mancanza nell'atto costitutivo di indicazioni su denominazione, conferimenti, capitale sottoscritto, oggetto sociale. Non sono cause di nullità: vizi del consenso dei soci, violazione di norme procedurali, omissioni non essenziali.<br><br><strong>Effetto ex nunc della nullità SpA:</strong> la dichiarazione di nullità non pregiudica l'efficacia degli atti compiuti in nome della società (tutela dei terzi). Si apre la liquidazione della SpA nulla come se fosse sciolta ordinariamente. La nullità è sanabile: la mancanza della forma pubblica si sana con l'iscrizione nel RI; l'illiceità dell'oggetto richiede modifica dello statuto prima della sentenza di nullità.`
  },

  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Nullità della SpA: cause e effetti",
    a: `Le <strong>cause di nullità della SpA</strong> sono tassative (art. 2332 c.c.): <em>(1)</em> mancanza dell'atto costitutivo nella forma di <strong>atto pubblico</strong>; <em>(2)</em> <strong>illiceità dell'oggetto sociale</strong>; <em>(3)</em> mancanza di indicazioni essenziali nell'atto (denominazione, conferimenti, capitale sottoscritto, oggetto). La nullità produce effetti solo <strong>ex nunc</strong>: gli atti compiuti rimangono validi; si apre la <em>liquidazione</em> della società come se fosse sciolta. La nullità è sanabile prima della sentenza.`,
    deep: `<strong>Tassatività delle cause:</strong> l'art. 2332 c.c. è norma eccezionale rispetto alla disciplina generale dei contratti. Le cause di nullità sono chiuse: irregolarità procedurali, vizi del consenso, omissioni non essenziali non causano nullità. La ratio è proteggere i terzi che hanno contrattato con la SpA e i soci che hanno investito.<br><br><strong>Sanabilità:</strong> le cause di nullità possono essere eliminate prima che il tribunale pronunci sentenza definitiva: (a) forma mancante → atto pubblico tardivo; (b) illiceità oggetto → modifica dello statuto con delibera straordinaria e iscrizione; (c) mancanza indicazioni → integrazione dell'atto. Il tribunale, prima di pronunciare, fissa un termine per la regolarizzazione.<br><br><strong>Effetto ex nunc — tutela dei terzi:</strong> principio cardine: gli atti compiuti dalla SpA nulla sono validi ed efficaci verso i terzi. I creditori che hanno contrattato con la SpA non vengono pregiudicati dalla nullità. Si apre invece la liquidazione per ripartire il patrimonio residuo tra i creditori e poi tra i soci. Nessuna restituzione dei conferimenti fino al soddisfacimento dei creditori.<br><br><strong>Confronto con nullità del contratto in generale (art. 1422 c.c.):</strong> normalmente la nullità è imprescrittibile e produce effetti retroattivi (ex tunc). Per la SpA la retroattività è esclusa per evidenti ragioni di certezza dei traffici commerciali. Anche la legittimazione è più ristretta: la nullità può essere rilevata d'ufficio o chiesta da chiunque vi abbia interesse, ma la sanabilità ex ante limita fortemente i casi in cui la sentenza è pronunciata.`
  },

  {
    part: 2,
    prof: ["Comune","Masi"],
    q: "Obbligazioni sociali prima dell'iscrizione nel registro (società di capitali)",
    a: `Prima dell'iscrizione nel RI, la SpA/SRL non ha ancora personalità giuridica. Chi compie atti in nome della società <em>in formazione</em> risponde <strong>personalmente e solidalmente</strong> con la società (art. 2331, co. 2 c.c.). Dopo l'iscrizione, se la società <strong>ratifica</strong> gli atti, la responsabilità personale dei promotori <em>cessa</em> per le obbligazioni sorte dopo l'iscrizione; per quelle sorte prima, la responsabilità personale rimane (salvo esonero espresso del terzo).`,
    deep: `<strong>Società in formazione vs società irregolare:</strong> la società di capitali in formazione (tra atto notarile e iscrizione RI) è distinta dalla società irregolare di persone (SNC/SAS non iscritta). Nella prima, la personalità giuridica sorge con l'iscrizione e c'è un termine certo. Nella seconda, l'irregolarità ha effetti permanenti sul regime di responsabilità.<br><br><strong>Ratifica degli atti (art. 2331, co. 2):</strong> la società, dopo l'iscrizione, può ratificare gli atti compiuti in suo nome prima dell'iscrizione. La ratifica ha effetto retroattivo: la società assume le obbligazioni come proprie. Ma la responsabilità personale dei promotori verso i terzi rimane salva, a meno che il terzo abbia espressamente esentato i promotori.<br><br><strong>Responsabilità dei promotori SpA (art. 2341 c.c.):</strong> i promotori della SpA (quando la costituzione avviene per pubblica sottoscrizione) rispondono solidalmente con la società per le obbligazioni assunte prima dell'iscrizione. Dopo 3 anni dall'iscrizione, si liberano salvo ratifica delle obbligazioni da parte dell'assemblea.<br><br><strong>Prassi — gestione del periodo pre-iscrizione:</strong> gli atti compiuti prima dell'iscrizione sono spesso necessari (apertura di un conto corrente, stipula di un contratto di locazione per la sede, acquisto di attrezzature). I soci fondatori assumono queste obbligazioni come persone fisiche e poi le società le ratifica. È buona prassi includere clausole di ratifica automatica nell'atto costitutivo.`
  },

  {
    part: 2,
    prof: ["Comune","Martucci"],
    q: "Nullità ex tunc vs ex nunc nella società",
    a: `In diritto societario vige il principio che la nullità opera <strong>ex nunc</strong> (per il futuro) anziché ex tunc (retroattivamente). Per le <strong>SpA e SRL</strong>, la nullità dichiarata dal tribunale non pregiudica gli atti compiuti (art. 2332, co. 2 c.c.): si apre la liquidazione, i terzi sono tutelati. Per le <strong>società di persone</strong>, i principi generali dei contratti si applicano in forma adattata: la nullità per causa illecita produce la liquidazione della società (con effetti pratici analoghi all'ex nunc); vizi che colpiscono solo un socio determinano il suo scioglimento del rapporto.`,
    deep: `<strong>Ratio dell'ex nunc societario:</strong> una società accumula nel tempo contratti, rapporti di lavoro, obbligazioni verso terzi. Se la nullità travolgesse retroattivamente tutti gli atti (ex tunc), si creerebbero danni enormi a soggetti incolpevoli. Il legislatore ha quindi scelto di conservare gli effetti degli atti già compiuti e di liquidare ordinatamente la società per il futuro.<br><br><strong>Confronto con il contratto comune:</strong> nella disciplina generale, la nullità è imprescrittibile, rilevabile d'ufficio e produce effetti ex tunc (art. 1422-1423 c.c.). Le parti devono restituire quanto ricevuto (art. 2033 c.c. — ripetizione dell'indebito). Applicare questo schema a una società con anni di attività sarebbe impraticabile.<br><br><strong>Effetto pratico ex nunc nelle SpA:</strong> (a) gli atti giuridici compiuti dalla SpA nulla rimangono validi; (b) i contratti in corso continuano a produrre effetti fino alla liquidazione; (c) i creditori vengono soddisfatti con il patrimonio liquidato; (d) solo dopo, i soci ricevono eventuali rimborsi. Nessuna restituzione dei conferimenti prima del soddisfacimento dei creditori.<br><br><strong>SRL — stesso regime:</strong> l'art. 2463 c.c. rinvia alle norme sulla SpA per quanto non espressamente previsto; il regime ex nunc si applica anche alla SRL nulla. La nullità della SRL è però ancora più rara poiché le cause (tassative) si verificano di rado quando l'atto è redatto da un notaio con obblighi di verifica.`
  },

  // ========== PARTE 2: S3 – CONFERIMENTI, CAPITALE, PATRIMONIO ==========

  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Conferimenti: disciplina generale (società di persone vs capitali)",
    a: `Il <strong>conferimento</strong> è l'apporto che ciascun socio si obbliga ad effettuare per partecipare alla società (art. 2247 c.c.). Nelle <strong>società di persone</strong>: possono conferirsi denaro, beni in natura, crediti, <em>prestazioni d'opera o servizi</em> (anche la propria attività lavorativa — art. 2263 c.c.). Nelle <strong>società di capitali</strong>: denaro e beni in natura (con stima); <em>non</em> prestazioni d'opera (per la SpA) o solo con particolari cautele (per la SRL). Il valore dei conferimenti forma il <strong>capitale sociale nominale</strong>.`,
    deep: `<strong>Perché no prestazioni d'opera in SpA:</strong> il capitale sociale nelle SpA svolge funzione di garanzia verso i terzi. Le prestazioni d'opera non sono monetizzabili né aggredibili dai creditori; la loro inclusione nel capitale renderebbe il valore nominale inaffidabile. Art. 2342 c.c.: non possono essere oggetto di conferimento le prestazioni di opera o di servizi.<br><br><strong>SRL — conferimenti atipici (art. 2464 c.c.):</strong> nella SRL è possibile conferire anche: (a) crediti, con le garanzie dell'art. 2254 c.c. (garanzia di solvenza del debitore ceduto); (b) la propria opera o servizi a determinate condizioni (polizza assicurativa o fideiussione bancaria per garantirne il valore); questo consente nelle SRL (non nelle SpA) di capitalizzare il "capitale umano".<br><br><strong>Beni in natura — stima:</strong> il valore dei beni non in denaro va attestato da una relazione giurata di un esperto nominato dal tribunale (art. 2343 SpA; art. 2465 SRL). La stima tutela gli altri soci e i creditori da conferimenti sopravvalutati. Nella SRL la stima può essere sostituita da una attestazione del conferente (con responsabilità rafforzata).<br><br><strong>Conferimenti in crediti:</strong> il socio che conferisce un credito garantisce la solvenza del debitore ceduto (art. 2254, co. 2 c.c.). Se il credito si rivela inesigibile, il socio deve reintegrare il conferimento in denaro. Il conferimento di crediti è quindi più rischioso per il socio rispetto al conferimento in denaro.`
  },

  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Conferimenti in SpA: denaro, natura e perché no prestazioni d'opera",
    a: `In <strong>SpA</strong> (art. 2342 c.c.) si possono conferire: <em>(1)</em> <strong>denaro</strong> — versamento del 25% in banca alla sottoscrizione, saldo al richiamo del CdA; <em>(2)</em> <strong>beni in natura o crediti</strong> — con relazione di stima giurata di esperto nominato dal tribunale (art. 2343 c.c.), e conferimento integrale contestualmente. <em>Non</em> sono ammesse <strong>prestazioni d'opera o servizi</strong> perché non fungibili e non suscettibili di esecuzione forzata: non garantiscono i creditori.`,
