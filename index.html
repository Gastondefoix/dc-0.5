    deep: `<strong>Procedura di stima (art. 2343 c.c.):</strong> (a) l'esperto è nominato dal tribunale nel cui circondario la società ha sede; (b) redige relazione giurata attestante il valore del bene/credito; (c) il CdA, nei 180 giorni dall'iscrizione, controlla la stima e, se il valore effettivo è inferiore di oltre 1/5, deve ridurre corrispondentemente il capitale oppure chiedere al socio di integrare il conferimento in denaro, altrimenti annulla la partecipazione (art. 2343, co. 4).<br><br><strong>Conferimento di beni — effetti:</strong> il bene entra nel patrimonio della SpA dalla data del conferimento. Se il bene è un immobile, è necessaria la trascrizione nei registri immobiliari (il notaio provvede contestualmente all'atto costitutivo). I rischi e i benefici passano alla SpA dalla data del conferimento.<br><br><strong>Esonero dalla stima (art. 2343-ter c.c.):</strong> introdotto nel 2008 per allinearsi alla direttiva UE. La stima non è richiesta se il bene è: (a) valori mobiliari o strumenti del mercato monetario con prezzo di mercato ufficiale negli ultimi 6 mesi; (b) beni già valutati da perito indipendente nei 6 mesi precedenti (es. perizia stragiudiziale) se non sono cambiate le condizioni; (c) in certi casi di conferimento a SpA quotate.<br><br><strong>Garanzia del conferimento:</strong> l'azione di responsabilità contro l'esperto che abbia redatto una stima falsa o gravemente inesatta è prevista dall'art. 2343, co. 5 c.c. L'esperto risponde verso la società e verso i terzi (es. i creditori) del danno causato dalla sovrastima.`
  },

  {
    part: 2,
    prof: ["Comune","Masi","Morello"],
    q: "Relazione di stima nei conferimenti in natura + casi di esonero",
    a: `Nei conferimenti in natura in <strong>SpA</strong> (art. 2343 c.c.) e <strong>SRL</strong> (art. 2465 c.c.) è richiesta una <strong>relazione di stima giurata</strong> di un esperto nominato dal tribunale, che attesta il valore del bene. Il valore deve essere almeno pari al valore nominale della partecipazione ricevuta. <strong>Casi di esonero (art. 2343-ter c.c.):</strong> valori mobiliari con prezzo di mercato ufficiale; beni già stimati da esperto indipendente nei 6 mesi precedenti; altri casi stabiliti dallo statuto in conformità a direttive UE.`,
    deep: `<strong>Art. 2343 c.c. — procedura dettagliata:</strong> l'esperto è nominato dal tribunale (non scelto dalla società o dal socio conferente, per garantire terzietà). La relazione viene allegata all'atto costitutivo o alla delibera di aumento di capitale. Dopo l'iscrizione, il CdA controlla la stima entro 180 giorni: se il valore effettivo è inferiore di oltre 1/5 rispetto al valore dichiarato, scatta l'obbligo di conguaglio o riduzione del capitale.<br><br><strong>SRL — differenza procedurale (art. 2465 c.c.):</strong> la stima può essere effettuata da un revisore contabile o da una società di revisione (non necessariamente nominato dal tribunale). Il socio che conferisce il bene può anche dichiarare sotto la propria responsabilità il valore, rinunciando alla stima tradizionale, ma assume piena responsabilità per danni da sovrastima. Questa flessibilità riflette la struttura meno formale della SRL.<br><br><strong>Ratio della stima:</strong> (a) tutela dei soci: il conferimento in beni sopravvalutato diluisce la partecipazione dei soci che hanno conferito denaro; (b) tutela dei creditori: il capitale sociale (garanzia per i creditori) deve corrispondere a valori reali. Senza stima, potrebbe essere "gonfiato" da beni privi di valore commerciale.<br><br><strong>Esonero per valori mobiliari (art. 2343-ter, co. 1):</strong> se il bene è un'azione o obbligazione quotata, il prezzo di borsa degli ultimi 6 mesi è sufficiente come valore di riferimento. Non serve perizia: i mercati finanziari svolgono già la funzione valutativa. L'esonero è revocabile se le condizioni di mercato cambiano significativamente tra la data di riferimento e l'iscrizione.`
  },

  {
    part: 2,
    prof: ["Comune","Masi","Morello"],
    q: "Strumenti partecipativi e prestazioni accessorie in SpA",
    a: `Gli <strong>strumenti finanziari partecipativi</strong> (art. 2346, co. 6 c.c.) sono emessi dalla SpA a fronte di apporti di opere, servizi o beni che non costituiscono conferimenti stricto sensu. Non attribuiscono qualità di socio né diritti patrimoniali ordinari, ma possono conferire diritti patrimoniali e/o amministrativi (escluso il voto in assemblea ordinaria). Le <strong>prestazioni accessorie</strong> (art. 2345 c.c.) sono obblighi specifici dei soci (non conferimenti) previsti dallo statuto: es. obbligo di fornitura di materie prime, prestazione di servizi tecnici.`,
    deep: `<strong>Strumenti partecipativi (SFP) — caratteri:</strong> (a) non sono azioni e non danno qualità di azionista; (b) possono avere diritti patrimoniali (es. partecipazione agli utili, diritto al rimborso di una quota del patrimonio netto in caso di scioglimento); (c) possono avere diritti amministrativi limitati (nomina di un componente del CdA o del CS, ma non voto in assemblea ordinaria); (d) sono emessi a fronte di apporti non monetizzabili ordinariamente (opera, servizi). Tipicamente usati per remunerare collaboratori, advisor, startup founding team.<br><br><strong>Differenza da azioni e obbligazioni:</strong> azioni → qualità di socio + diritti pieno; obbligazioni → credito verso la società con diritto a rimborso e interessi; SFP → posizione ibrida senza qualità di socio. Il possessore di SFP non partecipa alle perdite (non è socio) ma può partecipare agli utili. In caso di insolvenza, è trattato come creditore (non come socio).<br><br><strong>Prestazioni accessorie (art. 2345 c.c.):</strong> devono essere previste nello statuto con indicazione precisa (tipo, durata, modalità, corrispettivo). Non possono consistere in denaro (non sarebbero "accessorie" ma conferimenti). Il trasferimento di azioni con obbligo di prestazioni accessorie richiede il consenso della società (clausola di gradimento automatica ex lege). Inadempimento: esclusione del socio o risoluzione del contratto di prestazione accessoria.<br><br><strong>Applicazione pratica:</strong> frequenti nelle cooperative (obbligo di conferimento prodotti), nelle imprese agroindustriali (obbligo di apporto del raccolto), nelle joint venture (obbligo di apporto di know-how o tecnologia).`
  },

  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Capitale sociale: funzioni, sottoscrizione e versamento",
    a: `Il <strong>capitale sociale</strong> è la somma dei valori nominali dei conferimenti promessi dai soci all'atto della costituzione (o in sede di aumento). Svolge tre funzioni: <em>(1)</em> <strong>funzione vincolistica</strong> — il patrimonio netto non può scendere sotto il capitale; <em>(2)</em> <strong>funzione organizzativa</strong> — determina i diritti di voto e partecipazione agli utili; <em>(3)</em> <strong>funzione produttiva</strong> — costituisce la dotazione iniziale. <strong>Sottoscrizione</strong>: obbligo di effettuare il conferimento. <strong>Versamento</strong>: effettivo pagamento (almeno 25% alla sottoscrizione per SpA).`,
    deep: `<strong>Capitale vs patrimonio sociale:</strong> il <em>capitale nominale</em> è fisso (varia solo con delibera assembleare straordinaria). Il <em>patrimonio netto</em> (o netto contabile) varia continuamente: aumenta con gli utili, diminuisce con le perdite e con i prelievi. Il patrimonio netto può superare il capitale (se vi sono riserve) o scendere sotto (se vi sono perdite). Quando il patrimonio scende sotto 1/3 del capitale, scattano gli obblighi di intervento degli amministratori (art. 2446 c.c.).<br><br><strong>Funzione vincolistica — meccanismo:</strong> il capitale nominale è un vincolo contabile: il patrimonio corrispondente al capitale non può essere distribuito ai soci. Solo gli utili effettivi e le riserve disponibili possono essere distribuiti. Questo vincolo tutela i creditori: garantisce che almeno la somma del capitale resti "intrappolata" nella società (in senso contabile: non può essere distribuita senza riduzione formale del capitale).<br><br><strong>Riduzione obbligatoria del capitale (art. 2447 c.c.):</strong> se le perdite riducono il capitale sotto il minimo legale (50k€ SpA, 10k€ SRL), gli amministratori devono convocare senza indugio l'assemblea per deliberare la riduzione e il contemporaneo aumento di capitale o lo scioglimento. Se l'assemblea non delibera, il tribunale nomina un liquidatore giudiziale.<br><br><strong>Riserve:</strong> il capitale si accompagna a riserve obbligatorie (riserva legale: 5% degli utili netti fino al 20% del capitale — art. 2430 c.c.) e facoltative (deliberate dall'assemblea). Le riserve fungono da "cuscinetto" prima che le perdite erodano il capitale nominale.`
  },

  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Aumento di capitale: reale, nominale/gratuito + diritto di opzione",
    a: `L'<strong>aumento reale</strong> (a pagamento, art. 2439 c.c.) aumenta sia il capitale nominale sia il patrimonio netto con nuovi conferimenti. Compete all'assemblea straordinaria (salvo delega al CdA). I soci hanno <strong>diritto di opzione</strong> (art. 2441 c.c.) per mantenere la propria percentuale di partecipazione. L'<strong>aumento nominale</strong> (gratuito, art. 2442 c.c.) converte riserve in capitale senza nuovi apporti: aumenta il capitale nominale ma non il patrimonio. Non vi è diritto di opzione (le nuove azioni/quote spettano gratuitamente ai soci proporzionalmente).`,
    deep: `<strong>Diritto di opzione (art. 2441 c.c.) — meccanismo:</strong> nell'aumento reale, le nuove azioni devono essere offerte in opzione ai soci esistenti in proporzione alla partecipazione. Termine minimo: 15 giorni dalla pubblicazione dell'offerta. Il diritto di opzione è trasferibile (i soci possono vendere il diritto a terzi). Finalità: evitare la diluizione della partecipazione degli azionisti esistenti.<br><br><strong>Esclusione del diritto di opzione:</strong> l'assemblea può escludere o limitare il diritto di opzione (art. 2441, co. 4-5 c.c.) per: (a) interesse sociale (es. offrire azioni a un partner strategico); (b) azioni offerte ai dipendenti; (c) conferimenti in natura (il socio conferente non può esercitare l'opzione); (d) SpA quotate: OPS (offerte pubbliche di sottoscrizione). L'esclusione richiede maggioranze qualificate e motivazione.<br><br><strong>Sovrapprezzo di emissione:</strong> nell'aumento a pagamento, le nuove azioni possono essere emesse a un prezzo superiore al valore nominale (con sovrapprezzo). Il sovrapprezzo va interamente alla riserva sovrapprezzo azioni (non distribuibile finché la riserva legale non raggiunge il 20% del capitale). Finalità: chi entra dopo deve "pagare" il valore creato dalla società nei periodi precedenti.<br><br><strong>Aumento del capitale con delega al CdA:</strong> lo statuto può delegare al CdA l'aumento del capitale fino a un massimo determinato per un periodo massimo di 5 anni (art. 2443 c.c. — "capitale autorizzato"). Strumento flessibile per raccogliere capitali rapidamente senza convocare ogni volta l'assemblea.`
  },

  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Riduzione del capitale: reale vs nominale (casi e procedura)",
    a: `La <strong>riduzione reale</strong> (volontaria, art. 2445 c.c.) restituisce ai soci parte del patrimonio eccedente le esigenze sociali. I creditori possono fare <strong>opposizione</strong> entro 90 giorni dall'iscrizione della delibera: il tribunale può sospenderla se il pericolo di pregiudizio è fondato. La <strong>riduzione nominale</strong> (obbligatoria, art. 2446-2447 c.c.) si ha quando le perdite erodono il capitale: non comporta rimborsi ai soci ma "abbassa" il capitale per allinearlo al patrimonio reale.`,
    deep: `<strong>Riduzione reale — procedura (art. 2445 c.c.):</strong> (a) delibera assembleare straordinaria; (b) iscrizione nel RI; (c) pubblicazione su Gazzetta Ufficiale; (d) periodo di opposizione dei creditori (90 giorni); (e) se non vi sono opposizioni (o sono respinte dal tribunale): esecuzione della riduzione (rimborso parziale dei conferimenti o liberazione dall'obbligo di versamento). Il rimborso riduce il patrimonio netto → i creditori sono esposti a maggior rischio → giustifica il diritto di opposizione.<br><br><strong>Riduzione nominale per perdite (art. 2446-2447 c.c.):</strong> non vi è rimborso ai soci. Gli obblighi scattano per livelli: (a) perdite > 1/3 del capitale: assemblea straordinaria entro 30 giorni; si può rinviare all'esercizio successivo se si prevede il riassorbimento; (b) perdite > 1/3 + capitale scende sotto il minimo legale (50k€ SpA / 10k€ SRL): l'assemblea deve deliberare la riduzione e il contemporaneo aumento almeno al minimo, o la trasformazione in tipo non soggetto a minimo, o lo scioglimento. In caso di inerzia: il tribunale nomina un liquidatore.<br><br><strong>Buy-back come forma di riduzione:</strong> l'acquisto di azioni proprie (art. 2357 c.c.) con successivo annullamento equivale a una riduzione reale del capitale. È regolato in modo rigoroso: necessita di autorizzazione assembleare, limite del 20% del capitale, operazioni solo con utili distribuibili e riserve disponibili. Finalità: stabilizzazione del corso azionario, remunerazione degli azionisti in alternativa al dividendo.`
  },

  {
    part: 2,
    prof: ["Comune","Morello"],
    q: "Patrimonio sociale e patrimoni destinati a uno specifico affare (SpA)",
    a: `Il <strong>patrimonio sociale</strong> è l'insieme dei beni della società: garantisce i creditori sociali. Nelle SpA è possibile costituire <strong>patrimoni destinati a uno specifico affare</strong> (art. 2447-bis c.c.): uno o più comparti patrimoniali separati dal patrimonio generale, destinati ad uno specifico affare. I creditori del comparto non possono aggredire il patrimonio generale (e viceversa). Strumento di <em>ring-fencing</em> per attività rischiose senza creare una nuova società.`,
    deep: `<strong>Due modalità (art. 2447-bis c.c.):</strong><br><em>Tipo A</em> — patrimonio destinato con delibera del CdA (approvata dall'assemblea se richiesto dallo statuto): la SpA separa un comparto dal suo patrimonio generale per uno specifico affare. I creditori del comparto non aggrediscono il patrimonio generale, salvo pattuizione contraria o insolvenza complessiva della SpA. Limite: il patrimonio destinato non può superare il 10% del patrimonio netto della SpA.<br><em>Tipo B</em> — finanziamento destinato: la SpA riceve un finanziamento da terzi vincolato a uno specifico affare; il rimborso avviene solo con i proventi dell'affare (nessuna garanzia sul patrimonio generale). I finanziatori sono creditori privilegiati sui proventi dell'affare.<br><br><strong>Confronto con la società veicolo (SPV):</strong> il patrimonio destinato è alternativo alla costituzione di una controllata ad hoc (SPV — Special Purpose Vehicle). Vantaggio: evita i costi e la complessità di una nuova società. Svantaggio: limite del 10% del patrimonio netto e necessità di rendicontazione separata. Le SPV sono preferibili per operazioni di maggiori dimensioni.<br><br><strong>Utilizzi pratici:</strong> project finance (es. costruzione e gestione di un'infrastruttura); cartolarizzazione dei crediti (separazione del portafoglio ceduto); joint venture senza creare una nuova persona giuridica. I patrimoni destinati sono poco diffusi nella pratica italiana (preferita la SPV), ma il CCI li ha valorizzati come alternativa flessibile.`
  },

  {
    part: 2,
    prof: ["Comune","Masi"],
    q: "Socio moroso: conseguenze e rimedi",
    a: `Il <strong>socio moroso</strong> è il socio che non ha versato i conferimenti nei termini stabiliti (art. 2344 c.c. per SpA). Conseguenze: <em>(1)</em> la società può <strong>agire per l'adempimento</strong> forzato; <em>(2)</em> può <strong>vendere le azioni del moroso</strong> ad altri soci o a terzi per conto di lui; <em>(3)</em> se la vendita è impossibile, può <strong>escludere il socio</strong> con delibera del CdA, imputando le somme già versate a riserva. Il socio moroso è sospeso dal <strong>diritto di voto</strong> e dagli altri diritti sociali.`,
    deep: `<strong>Procedura di vendita coattiva (art. 2344 c.c.):</strong> (a) la società deve diffidare il moroso con lettera raccomandata fissando un termine non inferiore a 15 giorni; (b) se il moroso non adempie, il CdA può tentare la vendita delle azioni in borsa (se quotate) o tramite intermediario; (c) il ricavato copre i conferimenti dovuti + interessi + spese; (d) se la vendita non è possibile entro 3 mesi, il CdA può escludere il socio e trattenere le somme già versate a beneficio della società.<br><br><strong>Sospensione dei diritti (art. 2344, co. 1):</strong> durante la mora, il socio non può esercitare il diritto di voto e gli altri diritti sociali collegati (partecipare all'assemblea, esercitare il diritto di opzione). Questo impedisce al moroso di bloccare o alterare le decisioni sociali mentre si trova inadempiente.<br><br><strong>SRL — disciplina analoga (art. 2466 c.c.):</strong> il meccanismo è simile: diffida, vendita coattiva della quota (ma la quota non è un titolo negoziabile come l'azione → la vendita è più complessa). In assenza di compratori, l'assemblea può deliberare la riduzione del capitale corrispondente alla quota del moroso o l'esclusione con rimborso di quanto versato.<br><br><strong>Società di persone — mora del socio:</strong> nelle società di persone, la mora del socio che deve conferire denaro è disciplinata dalle regole generali delle obbligazioni (interessi moratori, risarcimento del danno). Non è prevista la vendita coattiva; è più facile procedere all'esclusione del socio inadempiente (art. 2286, co. 1 c.c.).`
  }
,

  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Azioni vs quote: differenze",
    a: `Le <strong>azioni</strong> (SpA) sono frazioni uguali del capitale sociale rappresentate da titoli di credito nominativi, liberamente cedibili salvo clausole statutarie (art. 2346 c.c.). Le <strong>quote</strong> (SRL) non sono rappresentate da titoli: sono partecipazioni al capitale che si trasferiscono con atto scritto autenticato + iscrizione nel registro delle imprese (art. 2470 c.c.). Le azioni sono fungibili e standardizzate; le quote sono di regola uniche per socio e riflettono la struttura più personalistica della SRL.`,
    deep: `<strong>Azioni — caratteri:</strong> (a) ogni azione è un titolo di credito nominativo che incorpora la partecipazione; (b) le azioni della stessa categoria attribuiscono uguali diritti (art. 2348 c.c.); (c) sono liberamente cedibili con girata o annotazione nel libro soci (o tramite Monte Titoli per le quotate); (d) possono esistere categorie speciali con diritti diversi (es. azioni di risparmio, privilegiate — art. 2351 c.c.).<br><br><strong>Quote SRL — caratteri:</strong> (a) non sono titoli di credito e non circolano con girata; (b) ogni socio ha di regola una quota (che può avere valore nominale diverso dagli altri soci); (c) lo statuto può attribuire a singoli soci diritti particolari (art. 2468, co. 3 c.c.) — impossibile nelle SpA per il principio di parità delle azioni della stessa categoria; (d) il trasferimento è più lento e costoso (atto notarile + RI).<br><br><strong>Implicazioni pratiche:</strong> la differenza strutturale riflette la diversa natura dei due tipi: la SpA è orientata alla circolazione del capitale (mercato), la SRL alla gestione personalistica (patto tra soci). La quotazione in borsa è possibile solo per le azioni SpA (salvo eccezioni introdotte per le PMI innovative). Le quote SRL possono essere "dematerializzate" solo tramite iscrizione nel RI, non attraverso sistemi di gestione accentrata.`
  },

  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Circolazione delle azioni e delle quote + limiti",
    a: `Le <strong>azioni SpA</strong> circolano liberamente per principio (art. 2355 c.c.): il trasferimento avviene con annotazione nel libro soci (azioni non dematerializzate) o tramite Monte Titoli (quotate). Lo statuto può limitare la circolazione con <strong>clausole di prelazione</strong> (diritto di preferenza agli altri soci) o <strong>gradimento</strong> (approvazione di un organo). Le <strong>quote SRL</strong> si trasferiscono con atto autentico + iscrizione nel RI (art. 2470 c.c.); lo statuto può escludere o limitare la cedibilità.`,
    deep: `<strong>Clausole limitative nella SpA (art. 2355-bis c.c.):</strong> sono ammesse: (a) clausola di prelazione: il cedente deve offrire prima agli altri soci alle stesse condizioni; (b) clausola di gradimento: il trasferimento è subordinato all'approvazione di un organo sociale; se il gradimento è negato senza obbligo di acquisto né indicazione di un acquirente a prezzo equo, la clausola è inefficace (art. 2355-bis, co. 2); (c) clausola di intrasferibilità: ammessa per max 5 anni; oltre, il socio può recedere.<br><br><strong>Quote SRL — libertà statutaria:</strong> l'art. 2469 c.c. prevede che lo statuto possa vietare il trasferimento o subordinarlo al gradimento di organi sociali o altri soci. Se il gradimento è negato, il socio può recedere (diritto inderogabile). Lo statuto può anche prevedere la prelazione a favore degli altri soci o della società stessa (con obbligo di acquisto/rimborso entro termini).<br><br><strong>Trasferimento mortis causa:</strong> nelle SpA, il trasferimento per successione è automatico (gli eredi subentrano). Nelle SRL, lo statuto può escludere o limitare il trasferimento agli eredi, riconoscendo però al socio o ai suoi eredi il diritto di recesso con liquidazione della quota.`
  },

  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Quote SRL: trasferimento a terzi + forma richiesta",
    a: `Il trasferimento di quote SRL richiede (art. 2470 c.c.): <em>(1)</em> <strong>atto scritto con firma autenticata</strong> da notaio (o avvocato per SRL semplificate); <em>(2)</em> <strong>deposito e iscrizione</strong> nel registro delle imprese entro 30 giorni; <em>(3)</em> il trasferimento ha effetto verso la società e i terzi dall'iscrizione nel RI. Lo statuto può imporre ulteriori requisiti (gradimento, prelazione). Il cedente risponde della solvenza della società verso il cessionario solo se lo statuto o le parti lo prevedono.`,
    deep: `<strong>Forma e pubblicità:</strong> la firma autenticata è richiesta per garantire la certezza della data e l'identità delle parti. L'iscrizione nel RI costituisce il momento in cui il trasferimento diventa opponibile alla società e ai terzi: fino a quel momento, la cessione è valida tra le parti ma non opponibile. Se due acquirenti acquistano la stessa quota, prevale chi si iscrive per primo nel RI.<br><br><strong>Contratto preliminare di cessione quote:</strong> è ammesso (art. 1351 c.c. — il preliminare deve avere la stessa forma del definitivo, quindi forma scritta ma non necessariamente autenticata per il solo preliminare). Il preliminare obbliga le parti a stipulare il definitivo con atto autenticato; in caso di inadempimento, l'altra parte può chiedere l'esecuzione in forma specifica ex art. 2932 c.c. solo se il contratto definitivo non richiede atto pubblico (la giurisprudenza è divisa).<br><br><strong>Divieto di emissione di titoli:</strong> le quote SRL non possono essere incorporate in titoli di credito (art. 2471-bis c.c.) salvo per le PMI innovative (che possono emettere "quote" circolanti con modalità simili alle azioni). Questa limitazione riflette la natura personalistica della SRL.<br><br><strong>Pegno e usufrutto sulla quota:</strong> ammessi (art. 2471 c.c.); il diritto di voto spetta al socio-debitore (pegno) o all'usufruttuario (usufrutto), salvo diverso accordo. L'iscrizione nel RI è necessaria per l'opponibilità.`
  },

  {
    part: 2,
    prof: ["Comune","Masi","Morello"],
    q: "Vincoli sulle azioni + clausole di gradimento in SpA",
    a: `Lo statuto SpA può apporre vincoli alla circolazione delle azioni: <strong>clausola di gradimento</strong> (trasferimento subordinato all'approvazione del CdA o dell'assemblea), <strong>clausola di prelazione</strong> (obbligo di offrire prima agli altri soci), <strong>clausola di intrasferibilità</strong> (per max 5 anni — art. 2355-bis c.c.). Il gradimento "mero" (negato senza proporre un acquirente a prezzo equo) rende le azioni <em>riscattabili</em>: il socio può esigere il rimborso ai sensi dell'art. 2355-bis, co. 2 c.c.`,
    deep: `<strong>Gradimento (art. 2355-bis, co. 2 c.c.) — tutela del socio:</strong> se lo statuto prevede il gradimento ma non obbliga la società (o altri soci) ad acquistare le azioni al prezzo di mercato in caso di diniego, la clausola è priva di efficacia: il socio può cedere liberamente. Questa norma evita che il "gradimento mero" trasformi l'azionista in prigioniero della società. Solo il gradimento "non mero" (con obbligo di acquisto a prezzo equo o con indicazione di un altro compratore) è pienamente efficace.<br><br><strong>Prelazione — funzionamento:</strong> il socio cedente deve notificare l'offerta agli altri soci indicando prezzo e condizioni. Gli altri soci hanno un termine (solitamente 30 giorni) per esercitare il diritto di prelazione. Se nessuno esercita la prelazione nei termini, il cedente può trasferire liberamente. La prelazione non esclude che il cessionario sia soggetto a gradimento.<br><br><strong>Clausole di covendita (drag-along e tag-along):</strong> frequenti negli statuti. <em>Tag-along</em>: il socio di minoranza ha diritto di cedere alle stesse condizioni del socio di maggioranza (tutela della minoranza). <em>Drag-along</em>: il socio di maggioranza può "trascinare" la minoranza in una cessione totale della società (tutela dell'acquirente). La legittimità del drag-along è discussa: ammesso se prevede un prezzo equo per la minoranza.<br><br><strong>Azioni SpA vs quote SRL:</strong> nella SRL le clausole limitative sono ancora più flessibili (art. 2469): lo statuto può addirittura vietare totalmente il trasferimento inter vivos, con diritto di recesso come valvola di sfogo.`
  },

  {
    part: 2,
    prof: ["Comune","Masi","Martucci"],
    q: "Clausole di mero godimento nella SRL",
    a: `Le <strong>clausole di mero godimento</strong> (o clausole di <em>lock-up</em>) nella SRL vietano al socio di trasferire la quota per un certo periodo, senza attribuire alla società né ad altri soci l'obbligo di acquisto. A differenza della SpA, nella SRL tali clausole sono ammesse <em>senza limite temporale</em>, ma in questo caso il socio ha sempre il <strong>diritto di recesso</strong> (art. 2469, co. 2 c.c.) con liquidazione della quota al valore di mercato.`,
    deep: `<strong>Art. 2469, co. 2 c.c. — diritto di recesso inderogabile:</strong> quando lo statuto SRL esclude o limita il trasferimento delle quote, il socio che intenda cedere può recedere dalla società. Il recesso è un diritto inderogabile: lo statuto non può escluderlo in presenza di clausole di intrasferibilità. Il valore di liquidazione è determinato secondo i criteri dell'art. 2473, co. 3 c.c. (valore di mercato della quota al momento del recesso).<br><br><strong>Differenza SpA (art. 2355-bis):</strong> nella SpA l'intrasferibilità è ammessa solo per max 5 anni; nelle SRL non c'è limite temporale ma c'è sempre il diritto di recesso come bilanciamento. La scelta legislativa riflette la diversa natura: la SRL è più personalistica e può accettare vincoli più stretti alla circolazione.<br><br><strong>Clausole di lock-up nelle SRL di startup:</strong> frequenti negli investimenti in startup SRL dove gli investitori esigono che i fondatori rimangano legati alla società per un certo periodo (vesting). Il fondatore non può cedere la quota per X anni, ma se è costretto ad uscire (es. divergenze con gli investitori), ha sempre il diritto di recesso — che però potrebbe essere oneroso se il prezzo di liquidazione è determinato a valori bassi (clausole di bad leaver/good leaver).<br><br><strong>Clausole di gradimento nella SRL:</strong> lo statuto può subordinare il trasferimento all'approvazione dell'assemblea o di un altro organo, senza obbligo di motivazione. Se il gradimento è negato, il socio ha diritto di recesso. Questa è la principale differenza rispetto alla SpA, dove il gradimento mero privo di offerta a prezzo equo è privo di effetto (art. 2355-bis, co. 2).`
  },

  {
    part: 2,
    prof: ["Comune","Masi"],
    q: "Azioni proprie: acquisto, limiti e diritti sociali sospesi",
    a: `La SpA può acquistare <strong>azioni proprie</strong> (buy-back) solo con delibera assembleare e nei seguenti limiti (art. 2357 c.c.): <em>(1)</em> max <strong>20% del capitale sociale</strong>; <em>(2)</em> solo con <strong>utili distribuibili</strong> e riserve disponibili; <em>(3)</em> azioni interamente liberate. Durante il possesso: il <strong>diritto di voto è sospeso</strong> (per evitare che la società voti su sé stessa); i diritti patrimoniali (dividendo, quota di liquidazione) sono sospesi o imputati proporzionalmente agli altri soci. Le azioni proprie vanno iscritte in bilancio tra le riserve negative.`,
    deep: `<strong>Tre pericoli delle operazioni su azioni proprie (Campobasso):</strong> il legislatore guarda con estremo sfavore all'acquisto di azioni proprie perché è pericoloso su tre fronti: (a) per <em>l'integrità del capitale sociale</em> — può dar luogo all'elusione dell'obbligo dei conferimenti o del divieto di restituzione anticipata del conferimento eseguito; es.: una SpA con patrimonio netto 1.000 acquista proprie azioni per 200 → il patrimonio netto scende a 800 senza che il capitale nominale sia formalmente ridotto; (b) per il <em>corretto funzionamento dell'organizzazione societaria</em> — gli amministratori e il gruppo di comando disporrebbero di una massa aggiuntiva di diritti di voto a spese del patrimonio sociale, rafforzando il controllo senza investire nuovo capitale; (c) per il <em>mercato dei titoli</em> — acquisti e vendite sistematiche di azioni proprie possono alterare artificialmente le quotazioni di borsa (price manipulation).<br><br><strong>Divieto assoluto di sottoscrizione (art. 2357-quater c.c.):</strong> la SpA non può in nessun caso <em>sottoscrivere</em> proprie azioni, né in sede di costituzione né in sede di aumento del capitale, né direttamente né tramite interposta persona. La sanzione è che le azioni si intendono sottoscritte dai promotori, soci fondatori o amministratori che hanno violato il divieto. Il divieto di sottoscrizione è assoluto; il divieto di <em>acquisto</em> è invece relativo (ammesso entro limiti precisi).<br><br><strong>Condizioni per l'acquisto (art. 2357 c.c.):</strong> (a) autorizzazione dell'assemblea ordinaria, che fissa modalità, durata (max 18 mesi), corrispettivo massimo e minimo; (b) limite quantitativo: il valore nominale delle azioni acquistabili non può superare il totale di utili distribuibili e riserve disponibili risultanti dall'ultimo bilancio approvato; (c) solo azioni interamente liberate (per evitare che il cedente si liberi dell'obbligo di versamento cedendo azioni non pagate alla società, che non potrebbe escutersi da sola).<br><br><strong>Diritti sociali sospesi (art. 2357-ter c.c.):</strong> le azioni proprie non hanno diritto di voto (per tutta la durata del possesso), non attribuiscono il diritto al dividendo, non si computano nel quorum deliberativo. La sospensione del voto elimina il conflitto di interessi: se la SpA potesse votare con le proprie azioni, il CdA potrebbe influenzare le delibere assembleari che lo riguardano. A bilancio: le azioni proprie iscritte nell'attivo devono essere compensate da una <em>riserva indisponibile per azioni proprie</em> di pari importo nel passivo, così il patrimonio netto disponibile risulta effettivamente ridotto.<br><br><strong>Assistenza finanziaria (art. 2358 c.c.) e SpA quotate:</strong> la SpA non può finanziare o garantire l'acquisto di proprie azioni da parte di terzi (divieto di assistenza finanziaria), salvo operazioni autorizzate dall'assemblea nel rispetto dei limiti del buy-back. Nelle SpA quotate, il buy-back è disciplinato anche dal TUF e dal Market Abuse Regulation (MAR) europeo: comunicazione preventiva al mercato, rispetto di finestre temporali (no buy-back in periodi di black-out pre-risultati), limiti giornalieri di volume.`
  },

  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Azioni gratuite: quando e come vengono emesse",
    a: `Le <strong>azioni gratuite</strong> vengono emesse nell'ambito di un <strong>aumento gratuito del capitale</strong> (art. 2442 c.c.): la società converte riserve disponibili (utili accantonati, riserva sovrapprezzo, riserva da rivalutazione) in capitale nominale, emettendo nuove azioni e distribuendole gratuitamente ai soci <em>in proporzione alle azioni già possedute</em>. Non vi è apporto di nuova liquidità: aumenta il capitale nominale ma non il patrimonio netto.`,
    deep: `<strong>Meccanismo contabile:</strong> prima dell'aumento: capitale 100, riserva utili 50, patrimonio netto 150. Dopo aumento gratuito di 50: capitale 150, riserva 0, patrimonio netto 150. Il patrimonio non cambia; cambia solo la sua composizione interna (più capitale, meno riserve). L'aumento gratuito non diluisce le partecipazioni esistenti: ogni socio riceve azioni proporzionali alla sua quota preesistente.<br><br><strong>Quali riserve si possono usare:</strong> solo riserve "disponibili": riserva utili, riserva sovrapprezzo azioni, altre riserve facoltative. Non sono convertibili: la riserva legale (obbligatoria per legge, art. 2430 c.c.) finché non supera il 20% del capitale; riserve da rivalutazione monetaria (leggi speciali spesso vietano la conversione); riserve da fair value (voce contabile, non distribuzione reale).<br><br><strong>Finalità pratiche:</strong> (a) segnalare al mercato la solidità della società (il capitale è aumentato con riserve solide); (b) rendere il prezzo unitario dell'azione più accessibile (più azioni in circolazione a parità di capitalizzazione → prezzo più basso per azione); (c) esigenza di riallineare il capitale nominale al capitale economico effettivo; (d) strumento alternativo alla distribuzione di dividendi per remunerare i soci senza uscita di cassa.`
  },

  {
    part: 2,
    prof: ["Comune","Masi","Morello"],
    q: "Sovrapprezzo di emissione (emissione sopra il valore nominale)",
    a: `Il <strong>sovrapprezzo</strong> è la differenza tra il prezzo di emissione delle nuove azioni e il loro valore nominale. Esempio: azione con valore nominale 1€ emessa a 5€ → sovrapprezzo 4€. Il sovrapprezzo va interamente alla <strong>riserva da sovrapprezzo azioni</strong> (art. 2431 c.c.), non distribuibile finché la riserva legale non raggiunge il 20% del capitale. Finalità: chi entra dopo deve "compensare" il valore creato negli anni precedenti, evitando la diluizione patrimoniale degli azionisti preesistenti.`,
    deep: `<strong>Logica economica:</strong> supponiamo che la SpA abbia un valore patrimoniale netto di 5€ per azione (capitale + riserve + utili) a fronte di un valore nominale di 1€. Emettere nuove azioni a 1€ comporterebbe che i nuovi soci acquisiscano una quota del patrimonio accumulato senza avervi contribuito (diluizione patrimoniale degli esistenti). Il sovrapprezzo di 4€ "riequilibra" la situazione.<br><br><strong>Riserva da sovrapprezzo (art. 2431 c.c.):</strong> è una riserva vincolata: non può essere distribuita ai soci finché la riserva legale non raggiunge il 20% del capitale. Una volta raggiunto questo minimo, la riserva da sovrapprezzo diventa disponibile e può essere distribuita o utilizzata per aumento gratuito del capitale.<br><br><strong>Esclusione del diritto di opzione e sovrapprezzo:</strong> quando l'assemblea esclude il diritto di opzione per emettere azioni a un investitore specifico, la determinazione del prezzo (incluso il sovrapprezzo) è cruciale per tutelare gli azionisti esistenti. Se il prezzo è troppo basso rispetto al valore reale → diluizione ingiustificata. La legge richiede che la relazione degli amministratori motivi il prezzo di emissione.<br><br><strong>SpA senza valore nominale:</strong> l'art. 2346, co. 3 c.c. consente azioni senza indicazione del valore nominale (introdotto dalla riforma 2003). In questo caso non ha senso parlare di "sovrapprezzo" come differenza rispetto al nominale: si parla semplicemente del prezzo di emissione delle azioni.`
  },

  {
    part: 2,
    prof: ["Comune","Masi"],
    q: "Valore nominale delle azioni: significato",
    a: `Il <strong>valore nominale</strong> di un'azione è la quota del capitale sociale nominale che essa rappresenta (es. capitale 100.000€ / 100.000 azioni = valore nominale 1€ per azione). Non coincide con il <strong>valore di mercato</strong> (prezzo in borsa, legato alle aspettative) né con il <strong>valore patrimoniale</strong> (quota del patrimonio netto = capitale + riserve + utili non distribuiti / n. azioni). Le azioni possono anche essere <em>senza valore nominale</em> (art. 2346, co. 3 c.c.): in tal caso rappresentano una frazione del capitale senza indicazione numerica.`,
    deep: `<strong>Tre valori dell'azione (art. 2346 c.c.):</strong><br>(a) <em>Valore nominale</em>: fisso, definito dallo statuto. Es: 1€. Cambia solo con modifiche statutarie (aumento/riduzione del capitale — artt. 2438-2447 c.c.). Funzione: base di calcolo per dividendi pro quota e per i diritti di voto (salvo azioni senza diritto di voto o con voto multiplo, come previsto dall'art. 2351 c.c.).<br>(b) <em>Valore patrimoniale</em> (<em>book value per share</em>): (capitale + riserve + utili non distribuiti) / n. azioni. Es: se il patrimonio netto è 500k€ e ci sono 100k azioni, il valore patrimoniale è 5€. Riflette il patrimonio accumulato e si ricava dal bilancio redatto ai sensi degli artt. 2423 ss. c.c.<br>(c) <em>Valore di mercato</em> (<em>market value</em>): prezzo di borsa o prezzo negoziato tra le parti. Riflette le aspettative future di utili e di crescita. Può essere molto superiore o inferiore al valore patrimoniale (es. una SpA innovativa quotata può avere un P/E molto elevato).<br><br><strong>Azioni senza valore nominale (art. 2346, co. 3 c.c.):</strong> introdotte dalla riforma del d.lgs. 6/2003. Consentono maggiore flessibilità nelle operazioni sul capitale (aumento con rapporti non interi, fusioni con rapporti di cambio non interi, senza dover modificare il valore nominale di ogni azione). Ogni azione rappresenta una frazione del capitale senza indicazione numerica del valore unitario. Sono diffuse nei sistemi anglosassoni (shares without par value) e sempre più utilizzate nelle SpA italiane come alternativa alle azioni con valore nominale.<br><br><strong>Rilevanza pratica del valore nominale:</strong> (a) base del diritto di voto (art. 2351 c.c. — di regola un voto per azione); (b) calcolo della soglia del 20% per il buy-back (art. 2357 c.c.); (c) calcolo delle maggioranze assembleari (artt. 2368-2369 c.c.); (d) calcolo del capitale minimo (50.000€ per SpA ex art. 2327 c.c.); (e) per le obbligazioni, il rendimento è calcolato sul valore nominale del titolo (art. 2410 c.c.).`
  },

  {
    part: 2,
    prof: ["Comune","Masi"],
    q: "Azioni interamente liberate: significato e obbligo",
    a: `Un'azione è <strong>interamente liberata</strong> quando il conferimento promesso dal socio è stato integralmente versato. In sede di sottoscrizione in SpA occorre versare almeno il <strong>25% dei conferimenti in denaro</strong> (art. 2342 c.c.); il residuo 75% viene richiesto dal CdA nei tempi e modi stabiliti (richiami). Le <strong>operazioni su azioni proprie</strong> (buy-back) e certi <strong>aumenti di capitale</strong> richiedono che le azioni siano interamente liberate. Il socio moroso (che non versa al richiamo) perde i diritti sociali.`,
    deep: `<strong>Liberazione parziale — ratio:</strong> la possibilità di versare solo il 25% inizialmente nasce da esigenze pratiche: la società può non aver immediatamente bisogno del 100% del capitale e i fondatori possono voler mantenere la liquidità inizialmente. Il CdA "richiama" il residuo quando necessario (es. per investimenti, per superare una crisi di liquidità).<br><br><strong>Operazioni che richiedono liberazione integrale:</strong> (a) acquisto di azioni proprie (art. 2357, co. 1 c.c.): solo azioni interamente liberate; (b) emissione di azioni in caso di aumento con conferimento in natura: il conferimento deve essere integrale contestualmente (art. 2342, co. 3).<br><br><strong>SpA unipersonale:</strong> se la SpA è costituita da un solo socio, il versamento deve essere integrale alla costituzione (art. 2342, co. 2 c.c.). Questa regola è più severa rispetto alla SpA pluripersonale, perché l'unico socio non ha altri soci da cui attendersi un'ulteriore copertura finanziaria.<br><br><strong>Titoli "partly paid" nei mercati internazionali:</strong> nei mercati finanziari anglossassoni, le azioni parzialmente liberate (partly paid shares) circolano apertamente con notazioni distinte in borsa. L'acquirente sa che dovrà versare ulteriori somme al richiamo. In Italia questo meccanismo è meno trasparente verso il mercato ma giuridicamente equivalente.`
  },

  {
    part: 2,
    prof: ["Comune","Masi"],
    q: "Delega e rappresentanza in assemblea SpA",
    a: `Il socio SpA che non intenda partecipare personalmente all'assemblea può farsi rappresentare da un <strong>delegato</strong> (art. 2372 c.c.): la delega deve essere conferita per iscritto e va depositata presso la società. Un delegato non può rappresentare più di <strong>20 soci</strong> (per SpA non quotate) o più di <strong>200 soci</strong> (per quotate). La delega può essere <em>generale</em> (per tutte le assemblee) o <em>specifica</em>. Nelle SpA quotate esiste il <strong>rappresentante designato</strong> (intermediario che raccoglie deleghe standardizzate).`,
    deep: `<strong>Limiti alla delega (art. 2372 c.c.):</strong> il delegato non può esercitare il diritto di voto in modo difforme dalle istruzioni del delegante, salvo cause giustificate sopravvenute. Il delegato che vota in modo difforme è responsabile verso il delegante. Il voto espresso è comunque valido verso la società (tutela dei terzi e della certezza delle delibere).<br><br><strong>Esclusioni dal diritto di delega:</strong> lo statuto può escludere la delega per alcune assemblee o materie (es. delibere su operazioni con parti correlate). I membri del CdA e del CS non possono essere delegati (conflitto di interessi: voterebbero su delibere che li riguardano — es. approvazione del bilancio, nomina/revoca).<br><br><strong>Rappresentante designato nelle SpA quotate (art. 135-undecies TUF):</strong> introdotto con la direttiva shareholders' rights. Per ogni assemblea, la società quotata designa un soggetto (solitamente uno studio legale o un intermediario finanziario) a cui i soci possono conferire la delega con istruzioni di voto. Il rappresentante vota in conformità alle istruzioni. Strumento per agevolare la partecipazione degli azionisti retail.<br><br><strong>Voto per corrispondenza e telematico:</strong> lo statuto può prevedere il voto per corrispondenza o in via elettronica (art. 2370, co. 4 c.c.). Per le SpA quotate, la partecipazione da remoto all'assemblea (video-assemblea) è regolata dal TUF e dalla normativa Consob. Durante l'emergenza COVID-19 tali meccanismi sono stati significativamente ampliati.`
  },

  // ========== PARTE 2: S5 – AMMINISTRAZIONE ==========

  {
    part: 2,
    prof: ["Comune","Masi","Martucci"],
    q: "Atti di amministrazione: cosa sono",
    a: `Gli <strong>atti di amministrazione</strong> sono tutti gli atti compiuti dagli organi sociali per gestire l'impresa e perseguire l'oggetto sociale: stipula di contratti, assunzione di personale, acquisto/vendita di beni, operazioni finanziarie. Si distinguono <strong>atti di ordinaria amministrazione</strong> (gestione corrente, rientrante nell'oggetto sociale normale) e <strong>atti di straordinaria amministrazione</strong> (eccedenti la gestione corrente: alienazione dell'azienda, mutui rilevanti, fideiussioni). Nelle società di persone, alcuni atti straordinari richiedono il consenso di tutti i soci.`,
    deep: `<strong>Distinzione ordinaria/straordinaria amministrazione:</strong> la distinzione non ha una definizione legale univoca; è costruita dalla giurisprudenza in relazione all'oggetto sociale, alle dimensioni dell'impresa e all'entità dell'atto. Un mutuo può essere ordinario per una banca, straordinario per una piccola SRL. L'atto straordinario non è vietato agli amministratori, ma richiede specifiche autorizzazioni (assemblea, organo di controllo) previste dalla legge o dallo statuto.<br><br><strong>Atti degli amministratori SpA e limiti:</strong> gli amministratori SpA possono compiere tutti gli atti rientranti nell'oggetto sociale (art. 2380-bis c.c.). I limiti all'oggetto sociale non sono opponibili ai terzi in buona fede (art. 2384 c.c.): la società risponde anche per atti ultra vires verso terzi incolpevoli. Gli amministratori rispondono verso la società per l'eventuale danno causato dall'atto eccedente l'oggetto.<br><br><strong>Atti gratuiti e liberalità:</strong> gli amministratori di SpA non possono compiere atti di liberalità o a titolo gratuito di entità significativa, salvo siano di modesta entità e confermati da usi commerciali (es. piccoli omaggi, sponsorizzazioni proporzionate). Atti gratuiti rilevanti richiedono l'autorizzazione assembleare. La violazione espone gli amministratori ad azione di responsabilità.`
  },

  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Amministrazione nelle società di persone: disgiuntiva, congiuntiva, esclusiva + opposizione",
    a: `Nelle <strong>società di persone</strong> l'amministrazione spetta di regola a <em>ciascun socio disgiuntamente</em> (<strong>amministrazione disgiuntiva</strong>): ogni socio può compiere atti senza il consenso degli altri (art. 2257 c.c.). L'altro socio può fare <strong>opposizione</strong> prima che l'atto sia compiuto: se l'opposizione è valida, decide la <em>maggioranza</em> per quote. Il contratto può prevedere <strong>amministrazione congiuntiva</strong> (consenso di tutti o di un certo numero) o affidarla a un <strong>amministratore esclusivo</strong> (anche non socio).`,
    deep: `<strong>Amministrazione disgiuntiva (art. 2257 c.c.):</strong> è la regola suppletiva nelle SS e SNC. Ogni socio amministratore può agire da solo. Il vantaggio è la velocità decisionale; lo svantaggio è il rischio di atti contraddittori o dannosi. Il rimedio è l'opposizione preventiva da parte degli altri soci.<br><br><strong>Opposizione (art. 2257, co. 2 c.c.):</strong> l'opposizione può essere esercitata prima che l'atto sia compiuto. Se sollevata, la decisione passa alla maggioranza calcolata per quote di partecipazione (non per teste). L'opposizione non sospende automaticamente l'atto: il socio che lo intende compiere può agire, assumendo rischi se l'opposizione viene poi accolta. L'atto compiuto nonostante l'opposizione valida espone l'amministratore a responsabilità verso la società.<br><br><strong>Amministrazione congiuntiva (art. 2258 c.c.):</strong> il contratto può richiedere il consenso di più soci o di tutti. In caso di urgenza, un singolo socio può compiere l'atto anche senza il consenso altrui. L'amministrazione congiuntiva è più sicura ma meno flessibile; preferita nelle SS a vocazione familiare dove si vogliono evitare atti unilaterali.<br><br><strong>Revoca dell'amministratore:</strong> l'amministratore nominato nel contratto sociale (socio-amministratore) può essere revocato solo per giusta causa, con delibera degli altri soci, o con sentenza del tribunale (art. 2259 c.c.). L'amministratore nominato con atto separato è revocabile come qualsiasi mandatario (art. 1723 c.c.). La revoca senza giusta causa obbliga la società al risarcimento.`
  },

  {
    part: 2,
    prof: ["Comune","Morello"],
    q: "SNC: amministrazione e scioglimento",
    a: `Nella <strong>SNC</strong> l'amministrazione spetta a tutti i soci (disgiuntiva, salvo diversa previsione contrattuale — art. 2293 c.c., che rinvia agli artt. 2257-2258). Lo scioglimento della SNC avviene per le cause dell'art. 2272 c.c.: decorso del termine, conseguimento o impossibilità dell'oggetto, volontà di tutti i soci, mancanza di pluralità dei soci per oltre 6 mesi, apertura della LG, altre cause previste dal contratto. Dopo lo scioglimento, la società entra in <strong>liquidazione</strong>.`,
    deep: `<strong>Scioglimento del singolo rapporto sociale (vs scioglimento della società):</strong> va distinto lo scioglimento della società (art. 2272) dallo scioglimento del rapporto con un singolo socio (artt. 2285-2290 c.c.): recesso (volontario), esclusione (per inadempimento, incapacità sopravvenuta, liquidazione giudiziale del socio), morte. Il singolo socio esce ma la società continua, se rimangono almeno due soci.<br><br><strong>Mancanza di pluralità dei soci (art. 2272, n. 4):</strong> se per 6 mesi rimane un solo socio, la SNC si scioglie — salvo che nel frattempo si ricostituisca la pluralità. Questo spinge a trovare un nuovo socio o a trasformare la società in impresa individuale.<br><br><strong>Liquidazione della SNC:</strong> si applicano gli artt. 2275-2283 c.c. I liquidatori (nominati dai soci o dal tribunale) devono: completare le operazioni in corso, liquidare l'attivo, pagare i creditori, restituire ai soci i conferimenti (nella misura del residuo). I soci rispondono illimitatamente anche durante la liquidazione per i debiti sorti prima dello scioglimento.<br><br><strong>Proroga tacita:</strong> se la società continua a operare dopo la scadenza del termine senza delibera di scioglimento, si considera prorogata a tempo indeterminato (proroga tacita — art. 2273 c.c.). Da quel momento ogni socio può recedere con preavviso di almeno 3 mesi.`
  },

  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "SAS: accomandanti e accomandatari + divieto di immistione",
    a: `Nella <strong>SAS</strong> coesistono due categorie: <strong>accomandatari</strong> — responsabilità illimitata e solidale, hanno il potere-dovere di amministrare; <strong>accomandanti</strong> — responsabilità limitata al conferimento, non possono ingerirsi nell'amministrazione (<strong>divieto di immistione</strong>, art. 2320 c.c.). L'accomandante che viola il divieto di immistione <em>risponde illimitatamente</em> per le obbligazioni sorte durante la sua ingerenza, e può essere escluso.`,
    deep: `<strong>Divieto di immistione (art. 2320 c.c.) — contenuto:</strong> l'accomandante non può compiere atti di amministrazione né trattare o concludere affari in nome della società, salvo che in forza di <em>procura speciale per singoli affari</em> (non è ammessa una procura generale o un'instoria). Sono espressamente consentiti: (a) la procura speciale per singoli affari determinati; (b) la prestazione di opera, manuale o intellettuale, sotto la direzione degli accomandatari; (c) se l'atto costitutivo lo prevede, il rilascio di autorizzazioni e pareri per determinate operazioni; (d) il controllo annuale del bilancio (art. 2320, co. 3 c.c.); (e) la partecipazione all'assemblea per materie che richiedono il consenso degli accomandanti (nomina/revoca degli accomandatari, modifiche dell'atto costitutivo).<br><br><strong>Conseguenze dell'immistione — portata amplissima:</strong> l'accomandante che viola il divieto risponde illimitatamente e solidalmente per <em>tutte</em> le obbligazioni sociali: quelle presenti, quelle passate e quelle future (art. 2320, co. 3 c.c.). La responsabilità non è limitata al periodo dell'ingerenza, ma si estende a qualunque debito sociale, anche anteriore all'atto di immistione. In caso di apertura della liquidazione giudiziale della società, l'accomandante immixtus è automaticamente dichiarato in liquidazione giudiziale al pari degli accomandatari. È inoltre esposto all'esclusione dalla società deliberata a maggioranza dagli altri soci — salvo che l'atto di ingerenza fosse stato autorizzato o ratificato dagli stessi amministratori (accomandatari).<br><br><strong>Interpretazione ampia del divieto (giurisprudenza):</strong> la giurisprudenza interpreta il divieto in modo estensivo. Configurano immistione: partecipazione a riunioni operative con potere decisionale, firma di corrispondenza commerciale o contratti, trattative autonome con fornitori o clienti, rilascio di fideiussioni in nome della società. Non configura immistione: la presenza alle riunioni in veste consultiva, il controllo del bilancio, la designazione degli amministratori concordata con gli accomandatari.<br><br><strong>Ratio della separazione:</strong> la SAS è strutturata per coniugare il capitale degli accomandanti (che si limitano a investire e non gestiscono, e rispondono solo nei limiti della quota) con la gestione e la responsabilità illimitata degli accomandatari. Il divieto tutela i terzi: chi contratta con la SAS sa di poter fare affidamento sulla responsabilità illimitata degli accomandatari. Se gli accomandanti potessero gestire pur beneficiando della responsabilità limitata, questa garanzia verrebbe elusa.<br><br><strong>SApA — analogia strutturale:</strong> nella Società in Accomandita per Azioni (artt. 2452-2461 c.c.), i soci accomandatari sono di diritto amministratori e rispondono illimitatamente; gli azionisti accomandanti rispondono nei limiti delle azioni sottoscritte. La revoca degli accomandatari-amministratori richiede delibera assembleare e — salvo giusta causa — il loro stesso consenso, il che li rende inamovibili senza causa.`
  },

  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "SpA: CdA, amministratore delegato e comitato esecutivo",
    a: `Nella <strong>SpA</strong> il modello tradizionale prevede un <strong>Consiglio di Amministrazione (CdA)</strong> come organo collegiale di gestione. Il CdA può delegare le proprie attribuzioni a un <strong>Amministratore Delegato (AD)</strong> o a un <strong>Comitato Esecutivo</strong> (art. 2381 c.c.), i quali esercitano le deleghe conferite e riferiscono al CdA. Il CdA mantiene la sorveglianza e le funzioni non delegabili (redazione del bilancio, fusioni, aumenti di capitale su delega, emissione di obbligazioni).`,
    deep: `<strong>Deleghe (art. 2381 c.c.):</strong> il CdA può delegare alcune funzioni all'AD o al Comitato Esecutivo, salvo materie riservate per legge o statuto al collegio. Funzioni non delegabili: redazione del bilancio; emissione obbligazioni convertibili; aumento di capitale (salvo delega ex art. 2443); relazioni sulla gestione (art. 2381, co. 5); operazioni con parti correlate rilevanti.<br><br><strong>Flussi informativi (art. 2381, co. 5 c.c.):</strong> gli organi delegati riferiscono al CdA e al Collegio Sindacale almeno ogni 6 mesi sull'andamento della gestione, sull'evoluzione prevedibile e sulle operazioni di maggior rilievo. Il CdA deve valutare l'adeguatezza degli assetti organizzativi. I consiglieri senza delega non sono esonerati dalla responsabilità se non hanno attivato i poteri di controllo e intervento.<br><br><strong>Amministratore unico:</strong> lo statuto può prevedere, in alternativa al CdA, un <em>amministratore unico</em> (art. 2380-bis, co. 1 c.c.) che esercita da solo tutte le funzioni del CdA. Comune nelle SpA chiuse (PMI). Non sono possibili deleghe in senso proprio ma è possibile attribuire procure a terzi per atti specifici.<br><br><strong>SpA quotate — comitati endoconsiliari:</strong> nelle SpA quotate, il Codice di Corporate Governance (adesione volontaria ma pressione istituzionale) prevede comitati endoconsiliari (Comitato per le Remunerazioni, Comitato per il Controllo e Rischi, Comitato per le Nomine) composti da consiglieri indipendenti. Non hanno potere decisionale: funzione consultiva e propositiva verso il CdA.`
  },

  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Limiti ai poteri degli amministratori SpA + rappresentanza (art. 2384)",
    a: `Gli amministratori SpA hanno il potere di compiere tutti gli atti rientranti nell'<strong>oggetto sociale</strong> (art. 2380-bis c.c.). L'art. <strong>2384 c.c.</strong> stabilisce che le limitazioni ai poteri degli amministratori (anche quelle derivanti dallo statuto) <em>non sono opponibili ai terzi in buona fede</em>, anche se iscritte nel RI. La SpA risponde anche per atti <em>ultra vires</em> se il terzo non sapeva dell'eccesso. L'amministratore che eccede i poteri risponde verso la società per i danni.`,
    deep: `<strong>Art. 2384 c.c. — tutela dei terzi:</strong> la norma è di fondamentale importanza pratica. I terzi non devono verificare l'entità delle deleghe interne degli amministratori o lo statuto per ogni operazione. La certezza dei traffici commerciali richiede che chi tratta con una SpA possa fare affidamento sull'autorità dell'amministratore che firma. Solo la mala fede del terzo (consapevolezza dell'eccesso) consente alla società di opporre l'azione ultra vires.<br><br><strong>Limiti opponibili ai terzi — eccezione:</strong> è controverso se il limite dell'"oggetto sociale" sia opponibile ai terzi nonostante l'art. 2384. La dottrina prevalente e la giurisprudenza ritengono che l'oggetto sociale sia l'unico limite che può essere eccepito ai terzi, ma solo se il terzo era in mala fede (sapeva che l'atto era estraneo all'oggetto). In pratica, gli oggetti sociali sono spesso molto ampi per evitare questo problema.<br><br><strong>Responsabilità verso la società:</strong> l'amministratore che compie atti ultra vires o in violazione delle deleghe risponde verso la società ex art. 2392 c.c. (responsabilità per danni). Non si tratta di nullità dell'atto verso i terzi (tutelati dall'art. 2384) ma di responsabilità interna.<br><br><strong>Rappresentanza processuale:</strong> il presidente del CdA (o l'AD se delegato) ha la rappresentanza legale della SpA in giudizio. Nei procedimenti in cui la SpA è convenuta, il legale della società riceve le notifiche e agisce in nome della SpA. In caso di conflitto di interessi tra l'amministratore e la SpA, il Collegio Sindacale nomina un rappresentante ad hoc (art. 2393-bis c.c.).`
  },

  {
    part: 2,
    prof: ["Comune","Masi"],
    q: "Interesse personale degli amministratori: obbligo di disclosure e astensione",
    a: `L'amministratore SpA che abbia un <strong>interesse personale</strong> in una determinata operazione (per conto proprio o di terzi) deve <strong>comunicarlo agli altri amministratori e al Collegio Sindacale</strong> prima dell'approvazione (art. 2391 c.c.). Se è AD, deve astenersi e rimettere la decisione al CdA. Il CdA delibera motivando adeguatamente le ragioni e la convenienza per la società. Le delibere assunte in violazione sono <em>annullabili</em> se l'interesse dell'amministratore ha influito sul risultato.`,
    deep: `<strong>Art. 2391 c.c. — disclosure e procedura:</strong> (a) l'amministratore che ha un interesse (diretto o indiretto, proprio o di terzi) in un'operazione deve comunicarlo specificatamente agli altri amministratori e al CS, prima della delibera; (b) se è AD, deve astenersi dal compiere l'operazione e riferire al CdA; (c) il CdA delibera adeguatamente motivando le ragioni e la convenienza per la società dell'operazione.<br><br><strong>Conseguenze della violazione:</strong> la delibera assunta in violazione dell'art. 2391 è annullabile su azione della società entro 90 giorni dalla delibera (o dalla scoperta del vizio). L'annullabilità presuppone che l'interesse dell'amministratore abbia influito sul voto (causalità). Se il voto dell'amministratore interessato non era determinante, la delibera non è annullabile anche se la disclosure non è avvenuta.<br><br><strong>Conflitto di interessi nelle SpA quotate:</strong> le operazioni con parti correlate (OPC) di SpA quotate sono regolate più rigorosamente dal Regolamento Consob 17221/2010 (recepito dalla direttiva shareholders' rights II): distinzione tra OPC di maggiore rilevanza (delibera CdA con parere obbligatorio del comitato OPC indipendente) e di minore rilevanza (solo informativa). L'obiettivo è tutelare gli azionisti di minoranza dal tunneling (trasferimento di ricchezza verso parti correlate).<br><br><strong>SRL — analoga disciplina (art. 2475-ter c.c.):</strong> l'amministratore SRL con interesse in una determinata operazione deve darne notizia agli altri amministratori e al collegio sindacale (se presente). La delibera adottata con il voto determinante dell'amministratore interessato è annullabile entro 90 giorni.`
  },

  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Nomina e revoca degli amministratori + giusta causa se nominato nel contratto sociale",
    a: `Gli amministratori di SpA sono nominati dall'<strong>assemblea ordinaria</strong> (art. 2383 c.c.), tranne i primi che possono essere nominati nell'atto costitutivo. Sono revocabili <em>in qualsiasi momento</em>, ma se la revoca avviene <strong>senza giusta causa</strong> hanno diritto al <strong>risarcimento del danno</strong>. Nelle <strong>società di persone</strong>, l'amministratore nominato nell'atto costitutivo (socio o non socio) è revocabile solo per <strong>giusta causa</strong> o con consenso unanime (art. 2259 c.c.); se nominato con atto separato, è revocabile liberamente.`,
    deep: `<strong>SpA — revoca senza giusta causa (art. 2383, co. 3 c.c.):</strong> l'assemblea può sempre revocare gli amministratori (principio di primazia assembleare). Ma se la revoca è senza giusta causa, spetta il risarcimento del danno (tipicamente pari alle retribuzioni per il residuo mandato). Questo onere economico non impedisce la revoca ma la rende onerosa. La "giusta causa" comprende: gravi irregolarità gestorie, conflitti di interessi reiterati, violazione della legge o dello statuto.<br><br><strong>Società di persone — distinzione nominato nel contratto vs atto separato:</strong> il socio-amministratore nominato nel contratto sociale è una sorta di condizione essenziale del contratto tra i soci. La revoca richiede giusta causa perché modifica un elemento essenziale dell'accordo societario originario e può legittimare il recesso dell'amministratore-socio. Se nominato con atto separato (delibera successiva), è un mandatario revocabile senza necessità di giusta causa (art. 1723 c.c.), fermo il possibile risarcimento.<br><br><strong>Cumulo con rapporto di lavoro:</strong> l'amministratore-dipendente (es. direttore generale che è anche consigliere) ha due distinti rapporti. La revoca dalla carica di amministratore non risolve automaticamente il contratto di lavoro. Il licenziamento deve essere separatamente giustificato (giusta causa o giustificato motivo).<br><br><strong>Nomina per categorie di azioni (SpA):</strong> lo statuto può riservare la nomina di un certo numero di consiglieri ai possessori di categorie speciali di azioni (es. azioni di risparmio, azioni di categoria B). Questa possibilità consente forme di governance differenziate per i diversi soci.`
  },

  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Amministratori non soci: è possibile?",
    a: `Nelle <strong>SpA</strong>: sì, per legge gli amministratori non devono essere soci (art. 2380-bis c.c.). Lo statuto può però richiedere che i consiglieri siano azionisti. Nella pratica, nelle SpA quotate gran parte dei consiglieri sono professionisti esterni (manager, esperti, indipendenti). Nelle <strong>SRL</strong>: sì, anche i non soci possono amministrare (art. 2475 c.c.). Nelle <strong>società di persone</strong>: è possibile (art. 2257, co. 1 consente l'amministrazione a non soci), ma richiede apposita previsione contrattuale.`,
    deep: `<strong>SpA — amministratori indipendenti:</strong> nelle SpA quotate, il Codice di Corporate Governance raccomanda che almeno un terzo del CdA sia composto da <em>consiglieri indipendenti</em> (criteri: assenza di relazioni significative con la società, i suoi controllanti o il management). Gli indipendenti svolgono funzione di controllo interno e presidio delle minoranze. Obbligatoriamente nominati nei comitati endoconsiliari (es. Comitato Controllo e Rischi).<br><br><strong>Requisiti di onorabilità e professionalità:</strong> per banche, assicurazioni e intermediari finanziari, la normativa di settore (TUB, CAP, TUF) impone requisiti di onorabilità (no condanne penali), professionalità (competenze adeguate) e indipendenza agli esponenti aziendali. Mancanza: decadenza automatica dall'incarico.<br><br><strong>Società di persone — amministratore non socio:</strong> meno comune in pratica. Richiede previsione nel contratto sociale. Il non socio-amministratore ha i poteri che il contratto gli attribuisce; non risponde personalmente dei debiti sociali come un socio illimitatamente responsabile (è un mandatario, non un socio). La revoca segue le regole del mandato (art. 1723 c.c.) o del contratto sociale se nominato in esso.<br><br><strong>Responsabilità degli amministratori non soci:</strong> identica a quella dei soci-amministratori: artt. 2392-2396 c.c. (SpA), art. 2476 c.c. (SRL), art. 2260 c.c. (società di persone). La responsabilità è verso la società, i creditori sociali e i terzi. Non essendo soci, non rispondono delle obbligazioni sociali in senso stretto (responsabilità per debiti sociali propria dei soci di persone illimitatamente responsabili).`
  },

  // ========== PARTE 2: S6 – ASSEMBLEA E DELIBERE ==========

  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Assemblea SpA: ordinaria e straordinaria, quorum e procedimento",
    a: `L'<strong>assemblea ordinaria</strong> (art. 2364 c.c.) si riunisce almeno una volta all'anno entro 120 giorni dalla chiusura dell'esercizio (o 180 in casi particolari): approva il bilancio, nomina/revoca gli amministratori e i sindaci, delibera su responsabilità, dividendi. L'<strong>assemblea straordinaria</strong> (art. 2365 c.c.) delibera su modifiche statutarie, aumenti/riduzioni di capitale, fusioni, scissioni, scioglimento. I <strong>quorum</strong> variano: in prima convocazione occorre la presenza di almeno metà del capitale; in seconda convocazione i quorum si abbassano.`,
    deep: `<strong>Quorum costitutivi e deliberativi — assemblea ordinaria SpA chiusa (artt. 2368-2369 c.c.):</strong> prima convocazione: quorum costitutivo ≥ 50% del capitale avente diritto di voto; deliberativo: maggioranza assoluta dei presenti. Seconda convocazione: nessun quorum costitutivo minimo; deliberativo: maggioranza assoluta dei presenti. Fanno eccezione le delibere riguardanti la nomina e la revoca delle cariche sociali e l'azione di responsabilità, per le quali lo statuto può stabilire maggioranze più elevate.<br><br><strong>Assemblea straordinaria SpA chiusa (art. 2368, co. 2 c.c.):</strong> prima convocazione: quorum costitutivo >50%; deliberativo: 2/3 del capitale rappresentato in assemblea. Seconda convocazione: costitutivo >33%; deliberativo: 2/3 dei presenti. In terza convocazione (se prevista dallo statuto): costitutivo >20%; deliberativo: 2/3 dei presenti. Le modifiche alle clausole di limitazione della circolazione delle azioni e la revoca dello stato di quotazione richiedono quorum rafforzati ulteriori.<br><br><strong>Procedimento assembleare (artt. 2363-2375 c.c.):</strong> (a) convocazione con avviso pubblicato nella Gazzetta Ufficiale o comunicato ai soci almeno 15 giorni prima (30 per SpA quotate, art. 125-bis TUF); l'avviso deve contenere ordine del giorno, luogo, data e ora; (b) legittimazione all'intervento: solo i soci iscritti nel libro dei soci (o titolari di record date per le quotate); (c) presidenza: il presidente del CdA (o chi lo statuto designa) dirige i lavori; (d) votazione: per alzata di mano, per schede o in forma telematica se lo statuto lo consente (art. 2370, co. 4 c.c.); (e) verbalizzazione: segretario dell'assemblea per le ordinarie; notaio per le straordinarie con iscrizione nel RI.<br><br><strong>Assemblea totalitaria (art. 2366, co. 4 c.c.):</strong> è valida anche senza formale convocazione se è rappresentato l'intero capitale sociale e partecipano tutti gli amministratori e sindaci effettivi. Strumento essenziale nelle SpA chiuse per prendere decisioni urgenti senza rispettare i termini di convocazione.<br><br><strong>SpA quotate — assemblea in sede unica:</strong> nelle società quotate (art. 2369, co. 7 c.c.) l'assemblea ordinaria in seconda convocazione delibera con il voto favorevole di almeno 1/5 del capitale ammesso al voto, per alcune materie rilevanti (es. nomina del collegio sindacale, azioni di responsabilità). Il TUF (art. 125 ss.) integra la disciplina con obblighi di pubblicità rafforzati e meccanismi di voto a distanza.`
  },

  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Società di persone: esiste l'assemblea? Modalità decisionali",
    a: `Nelle <strong>società di persone</strong> non esiste un'assemblea formalmente disciplinata dalla legge (a differenza di SpA e SRL). Le decisioni vengono adottate con il <strong>consenso di tutti i soci</strong> (per modifiche del contratto sociale) o con la <strong>maggioranza per quote</strong> (per le decisioni di ordinaria gestione non rientranti nell'amministrazione disgiuntiva). Lo statuto può prevedere procedure specifiche (riunioni, convocazioni, verbali), ma è libero da vincoli di forma.`,
    deep: `<strong>Principio di unanimità per le modifiche del contratto sociale:</strong> nelle società di persone le modifiche dell'atto costitutivo (cambio oggetto, ammissione di nuovi soci, proroga) richiedono il consenso di tutti i soci (art. 2252 c.c. per SS, applicabile per rinvio a SNC e SAS). Il consenso può essere espresso anche tacitamente. Eccezione: lo statuto può prevedere la modificabilità a maggioranza.<br><br><strong>Decisioni di gestione:</strong> le decisioni che rientrano nell'ordinaria amministrazione (all'interno delle deleghe degli amministratori) non richiedono il voto dei soci. Quando un atto supera i poteri degli amministratori o è riservato ai soci dal contratto, si delibera con la maggioranza calcolata per quote (non per teste). Non esiste un quorum deliberativo minimo per legge nelle società di persone.<br><br><strong>Confronto con SRL:</strong> nella SRL le decisioni dei soci possono essere adottate con metodo assembleare (art. 2479-bis c.c.) o per consultazione scritta/consenso espresso per iscritto (art. 2479, co. 3 c.c.) senza convocazione formale di assemblea. La SRL è quindi a metà strada tra la flessibilità delle società di persone e il formalismo delle SpA.<br><br><strong>Verbali nelle società di persone:</strong> non obbligatori per legge, ma raccomandabili per documentare le decisioni (rilevanza probatoria in caso di controversie tra soci o con terzi). Per le SNC con più soci, la prassi di tenere verbali scritti protegge da contestazioni future.`
  },

  {
    part: 2,
    prof: ["Comune","Masi","Martucci"],
    q: "Nullità e annullabilità delle delibere assembleari SpA",
    a: `Le delibere assembleari SpA possono essere invalide per due gradi: <strong>annullabilità</strong> (art. 2377 c.c.) — rimedio ordinario per violazione di legge o statuto; legittimati: soci assenti/dissenzienti che rappresentino almeno il 0,1% del capitale (SpA quotate) o 5% (SpA chiuse), amministratori, sindaci; termine: 90 giorni. <strong>Nullità</strong> (art. 2379 c.c.) — per cause gravi: impossibilità/illiceità dell'oggetto, mancata convocazione assembleare, mancanza del verbale; imprescrittibile; legittimazione generale.`,
    deep: `<strong>Contesto storico — le "delibere inesistenti" pre-riforma 2003:</strong> prima della riforma, le cause di nullità erano limitate alle delibere con oggetto impossibile o illecito; tutti gli altri vizi davano solo luogo all'annullabilità. Dottrina e giurisprudenza avevano però introdotto — in via interpretativa — una terza categoria: le <em>delibere inesistenti</em>, quelle con vizi del procedimento così gravi da non poter nemmeno essere qualificate come delibere assembleari. La riforma del 2003 ha eliminato questa categoria, riconsucendo tutti i vizi possibili nelle sole categorie di nullità e annullabilità: è il <em>principio di tassatività delle cause di invalidità</em>.<br><br><strong>Annullabilità — regola generale (art. 2377 c.c.):</strong> sono annullabili tutte le delibere non conformi alla legge o allo statuto. L'impugnativa compete a: soci assenti, dissenzienti o astenuti, amministratori, collegio sindacale, consiglio di sorveglianza. Per evitare azioni pretestuose, è richiesta una soglia minima di partecipazione: <strong>1/1000 del capitale</strong> nelle SpA che fanno ricorso al mercato del capitale di rischio (quotate), <strong>5%</strong> nelle altre. Lo statuto può ridurre o escludere questa soglia. I soci sotto soglia non perdono l'azione risarcitoria. Termine di impugnazione: <strong>90 giorni</strong> dalla delibera (o dalla sua iscrizione/deposito nel RI se soggetta). L'annullamento ha effetto per tutti i soci (<em>erga omnes</em>), ma i diritti acquistati in buona fede da terzi sulla base della delibera restano salvi.<br><br><strong>Nullità — cause tassative (art. 2379 c.c.):</strong> la nullità è la sanzione eccezionale, prevista solo per tre casi: (a) <em>oggetto impossibile o illecito</em> — es. l'assemblea approva un bilancio falso (l'approvazione del bilancio in sé è lecita, ma è illecito il contenuto del bilancio falso; l'assemblea delibera la distribuzione di dividendi prelevandoli dal capitale sociale); (b) <em>mancata convocazione</em> — l'assemblea si è riunita senza che i soci fossero stati ritualmente convocati (la convocazione non si considera mancante per irregolarità dell'avviso, se questo proviene da un componente dell'organo amministrativo o di controllo ed è idoneo a consentire la partecipazione); (c) <em>mancanza del verbale</em> — assenza assoluta di documentazione scritta della delibera. La nullità può essere fatta valere da chiunque vi abbia interesse, senza limite di tempo — ma entro 3 anni dall'iscrizione nel RI per le delibere sottoposte a tale formalità.<br><br><strong>Sanatoria e sostituzione:</strong> la delibera annullabile si sana: (a) se non è impugnata nei 90 giorni; (b) se è sostituita da delibera sostitutiva conforme alla legge (art. 2377, co. 8 c.c.), fermi i diritti dei terzi sulla delibera originaria. La nullità non si sana per il solo decorso del tempo né per sostituzione, salvo eccezionali ipotesi previste dalla legge (es. iscrizione nel RI dell'atto nullo per vizio non essenziale, art. 2332 c.c.).<br><br><strong>Sospensione dell'esecuzione:</strong> la proposizione dell'azione di annullamento non sospende automaticamente l'esecuzione della delibera; il tribunale può concedere la sospensione su istanza di parte, ma solo se l'esecuzione causerebbe danno grave e irreparabile. Il tribunale può anche esigere che gli opponenti prestino idonea garanzia per l'eventuale risarcimento danni alla società.`
  },

  {
    part: 2,
    prof: ["Comune","Masi"],
    q: "Perché il CdA non può votare in assemblea",
    a: `Gli amministratori SpA non hanno diritto di voto <em>in quanto amministratori</em> nelle delibere assembleari sulle materie che li riguardano direttamente (approvazione del bilancio in presenza di conflitto di interessi, delibere sulla loro responsabilità, loro revoca). In generale, il CdA è un organo <em>separato</em> dall'assemblea: partecipa alle assemblee (relazioni, risposte) ma non vota come organo. I singoli consiglieri <em>possono</em> votare in assemblea come soci, se lo sono, ma non come organo amministrativo.`,
    deep: `<strong>Separazione assemblea/amministrazione:</strong> nelle SpA vige il principio della netta separazione tra organo assembleare (i soci) e organo amministrativo (il CdA). L'assemblea decide sulle materie riservate dalla legge (bilancio, nomina organi, operazioni straordinarie). Il CdA gestisce l'impresa. Questa separazione garantisce il controllo dei soci sulla gestione senza che gli amministratori possano influenzare le delibere assembleari con il voto.<br><br><strong>Eccezioni e conflitti di interessi:</strong> (a) delibera sulla responsabilità degli amministratori (art. 2393 c.c.): i consiglieri-soci che hanno interesse nella materia devono astenersi dal voto (art. 2373 c.c. — conflitto di interessi del socio); (b) approvazione del bilancio: se un azionista è anche amministratore, il conflitto di interessi non lo esclude automaticamente dal voto sul bilancio (la giurisprudenza è divisa), ma se il voto è determinante e la delibera è dannosa, può essere annullata.<br><br><strong>Conflitto di interessi del socio (art. 2373 c.c.):</strong> è diverso dal conflitto di interessi dell'amministratore (art. 2391). Il socio che ha un interesse in conflitto con quello della società può votare (la norma non gli vieta il voto in assemblea), ma la delibera è annullabile se il suo voto è stato determinante e la delibera è dannosa per la società. Questo è il meccanismo che indirettamente "limita" il voto dei soci-amministratori in conflitto.<br><br><strong>CdA nelle assemblee — ruolo partecipativo:</strong> il CdA (tramite il presidente o l'AD) presiede l'assemblea, illustra i punti all'ordine del giorno, risponde alle domande dei soci, propone le delibere. Non vota come organo. La presenza del notaio (per le assemblee straordinarie) garantisce la corretta verbalizzazione.`
  }


,
  {
    part: 2,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Collegio sindacale: funzioni, poteri, revoca e cause di ineleggibilità",
    a: `Il <strong>collegio sindacale</strong> (art. 2397 ss. c.c.) è l'organo di controllo interno nelle SpA. <strong>Funzioni:</strong> vigilanza sull'osservanza della legge e dello statuto, sul rispetto dei principi di corretta amministrazione, sull'adeguatezza degli assetti organizzativi, amministrativi e contabili. <strong>Poteri:</strong> ispezione e controllo, convocazione dell'assemblea, azione di responsabilità contro gli amministratori, segnalazione alle autorità competenti. <strong>Revoca:</strong> solo per giusta causa, con decreto del tribunale su istanza dei soci o d'ufficio. <strong>Cause di ineleggibilità (art. 2399):</strong> parentela con amministratori, rapporti di lavoro dipendente con la società, partecipazioni significative, svolgimento di attività concorrenti.`,
