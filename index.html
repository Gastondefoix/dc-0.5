    a: `Il CCI istituisce una <strong>piattaforma telematica nazionale</strong> (art. 13 CCI, gestita da Unioncamere) a supporto della composizione negoziata della crisi. Funzionalità: <em>test di autovalutazione</em> della situazione aziendale; lista aggiornata degli esperti indipendenti abilitati; modelli per l'istanza e per il contratto con l'esperto. Per i debiti tributari e previdenziali non superiori a <strong>€ 30.000</strong>, il CCI prevede <strong>piani di rateizzazione automatici</strong>: il debitore presenta domanda telematica (senza aprire procedure concorsuali), ottiene rateizzazione fino a <strong>72 rate mensili</strong> e beneficia della sospensione automatica delle azioni esecutive durante il pagamento. Accessibili anche al di fuori della composizione negoziata come strumento ordinario di gestione del debito fiscale/previdenziale.`,
    deep: `<strong>Piattaforma telematica — funzionamento pratico:</strong> accessibile tramite il portale gestito da Unioncamere su delega del Ministero. Il test di autovalutazione elabora i dati finanziari dell'impresa (bilanci, flussi di cassa previsionali) e fornisce un'indicazione sulla probabilità di crisi secondo gli indici CNDCEC. Non è vincolante per il tribunale né per i creditori, ma serve come primo strumento di consapevolezza per l'imprenditore.<br><br><strong>Lista esperti:</strong> la piattaforma mantiene l'albo degli esperti indipendenti iscritti dalle Camere di commercio. Requisiti: esperienza professionale di almeno 5 anni nel settore della crisi d'impresa; assenza di condanne penali rilevanti; iscrizione a un albo professionale (avvocato, commercialista, ecc.). La nomina è effettuata dalla Camera di commercio nel rispetto dei criteri di rotazione e indipendenza.<br><br><strong>Rateizzazione automatica — accesso e condizioni:</strong> <em>(a)</em> debiti tributari e/o previdenziali ≤ €30.000; <em>(b)</em> assenza di precedenti domande di rateizzazione non rispettate negli ultimi 5 anni; <em>(c)</em> presentazione della domanda telematica con indicazione del piano di rientro. Non è necessaria l'assistenza di professionisti né l'apertura di procedure concorsuali. La rateizzazione non preclude l'accesso alla composizione negoziata o ad altri strumenti.<br><br><strong>Effetti della rateizzazione automatica:</strong> sospensione automatica delle azioni esecutive individuali per i debiti rateizzati, per tutta la durata del piano. Se il debitore è inadempiente per <em>due rate consecutive</em>, la rateizzazione decade e i crediti tornano immediatamente esigibili con ripresa delle azioni esecutive. Il debitore può richiedere una sola rateizzazione automatica per gli stessi debiti.<br><br><strong>Differenza dalla composizione negoziata:</strong> la composizione negoziata è uno strumento per crisi più complesse (più creditori, situazione patrimoniale deteriorata, necessità di ristrutturazione strutturale); la rateizzazione automatica è uno strumento semplice per debiti fiscali/previdenziali modesti. I due strumenti sono cumulabili: l'imprenditore in composizione negoziata può contemporaneamente beneficiare della rateizzazione automatica per i debiti minori.`
  },
  {
    part: 1,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Liquidazione giudiziale: presupposti, organi, effetti",
    a: `<strong>Presupposti:</strong> imprenditore commerciale non piccolo + stato di insolvenza + superamento soglie dimensionali. <strong>Organi:</strong> tribunale, giudice delegato, curatore (gestisce l'attivo), comitato dei creditori. <strong>Effetti per il debitore:</strong> spossessamento (perde disponibilità dei beni), limitazioni personali, atti successivi inefficaci verso la massa. <strong>Effetti per i creditori:</strong> cristallizzazione, sospensione interessi chirografari, divieto azioni esecutive individuali, concorso obbligatorio.`,
    deep: `<strong>Spossessamento:</strong> riguarda l'intero patrimonio, compresi beni sopravvenuti. Eccezioni: beni personali, assegni alimentari/stipendi/pensioni nei limiti del mantenimento, beni impignorabili. Il debitore conserva proprietà e capacità di agire, ma gli atti su beni compresi nella liquidazione sono inefficaci verso i creditori.<br><br><strong>Derelizione:</strong> se il valore dei beni sopravvenuti è inferiore ai costi di gestione, il curatore può rinunciare a includerli nell'attivo (previa autorizzazione del comitato creditori). I beni tornano al debitore.<br><br><strong>Curatore:</strong> è il vero gestore del patrimonio. Deve essere iscritto all'albo dei gestori della crisi. Compiti: verifica cause dell'insolvenza, relazione al giudice delegato (entro 60 gg), conserva/gestisce/realizza il patrimonio. Per atti straordinari serve autorizzazione del comitato; per stare in giudizio serve autorizzazione del giudice delegato.<br><br><strong>Comitato dei creditori:</strong> 3-5 membri, ruolo rafforzato dal CCI. Esprime pareri, autorizza atti straordinari, può ispezionare documenti, chiedere chiarimenti, proporre revoca del curatore.<br><br><strong>Esdebitazione:</strong> alla chiusura, il debitore resta obbligato per i debiti residui, salvo che ottenga l'esdebitazione (liberazione). Requisiti di meritevolezza: no condanne per bancarotta, collaborazione con la procedura, no esdebitazioni nei 5 anni precedenti.`
  },
  {
    part: 1,
    prof: ["Extra"],
    q: "Esercizio provvisorio e affitto d'azienda nella liquidazione giudiziale (artt. 211-212 CCI)",
    a: `Il tribunale, alla sentenza di apertura o successivamente, può autorizzare la <strong>prosecuzione temporanea dell'attività</strong> d'impresa se l'interruzione immediata causerebbe un <strong>danno grave e irreparabile</strong> all'attivo (art. 211 CCI). L'esercizio provvisorio è gestito dal <strong>curatore</strong> (o da un gestore delegato), con autorizzazione del comitato dei creditori per gli atti straordinari. I debiti contratti durante l'esercizio provvisorio sono <strong>prededucibili</strong>. In alternativa, il curatore può stipulare un contratto di <strong>affitto d'azienda</strong> (art. 212 CCI) con un terzo: l'affittuario gestisce autonomamente, assicurando la continuità operativa fino alla vendita definitiva. I debiti dell'affittuario non gravano sulla procedura. L'affitto è preferibile quando la gestione diretta è troppo rischiosa o costosa.`,
    deep: `<strong>Autorizzazione all'esercizio provvisorio:</strong> può essere concessa direttamente nella sentenza di apertura o successivamente su richiesta del curatore. Il comitato dei creditori può revocarla se le condizioni cambiano. Deve essere limitata nel tempo e nello scopo: serve a conservare il valore dell'azienda in attesa della vendita, non a trasformare la liquidazione in una ristrutturazione.<br><br><strong>Gestione durante l'esercizio provvisorio:</strong> il curatore compie tutti gli atti di gestione corrente (acquisto materie prime, pagamento fornitori e dipendenti). Per atti di straordinaria amministrazione (contratti pluriennali, cessioni di cespiti) serve autorizzazione del comitato dei creditori o del giudice delegato. I creditori per beni/servizi forniti durante l'esercizio provvisorio sono prededucibili: pagati prima dei creditori concorsuali.<br><br><strong>Rischi e responsabilità del curatore:</strong> il curatore può essere personalmente responsabile se gestisce l'impresa in modo negligente o temerario, aggravando il passivo. Per questo tende a essere conservativo e si avvale spesso di un <em>gestore delegato</em> (manager esperto del settore). La scelta del gestore delegato deve seguire criteri di trasparenza e competenza.<br><br><strong>Affitto d'azienda nella liquidazione (art. 212 CCI):</strong> il contratto deve prevedere: (a) il diritto del curatore di recedere in qualsiasi momento con equo indennizzo (prededucibile); (b) obblighi dell'affittuario di mantenere la destinazione aziendale; (c) possibile preferenza dell'affittuario nella successiva vendita (diritto di prelazione o opzione). I debiti dell'affittuario non sono debiti della procedura.<br><br><strong>Selezione dell'affittuario:</strong> avviene tramite procedura competitiva (confronto di offerte), privilegiando il canone più elevato e le maggiori garanzie occupazionali. La preferenza per chi assicura continuità occupazionale è un obiettivo indicato dal CCI ma non cogente se economicamente svantaggioso per i creditori.<br><br><strong>Affitto e successiva vendita:</strong> il contratto può includere un'opzione d'acquisto a favore dell'affittuario al prezzo di mercato determinato da perizia, consentendo all'affittuario di "testare" l'azienda prima dell'acquisto. L'affitto è così un ponte verso la vendita definitiva, con un duplice vantaggio: conservazione del valore e possibile futuro incasso per la massa.`
  },
  {
    part: 1,
    prof: ["Extra"],
    q: "Esdebitazione nella liquidazione giudiziale (artt. 278-282 CCI)",
    a: `L'<strong>esdebitazione</strong> è la liberazione del debitore <em>persona fisica</em> dai debiti residui non soddisfatti dopo la chiusura della liquidazione giudiziale. È concessa dal tribunale su istanza, verificando condizioni di <strong>meritevolezza</strong>: <em>(a)</em> cooperazione leale con gli organi della procedura; <em>(b)</em> nessuna distrazione o occultamento di beni; <em>(c)</em> nessun aggravamento doloso del dissesto; <em>(d)</em> assenza di condanne per bancarotta fraudolenta o reati economici gravi; <em>(e)</em> nessuna esdebitazione ottenuta nei 5 anni precedenti. <strong>Crediti esclusi:</strong> obblighi alimentari, risarcimento da illecito extracontrattuale doloso, sanzioni penali e amministrative aventi carattere punitivo. <strong>Esdebitazione dell'incapiente</strong> (art. 283 CCI): concessa senza aprire la liquidazione; risolutivamente condizionata — se entro 4 anni il debitore riceve utilità ≥ 10% dei debiti, il beneficio decade.`,
    deep: `<strong>Ratio — fresh start:</strong> ispirata al modello anglosassone: il debitore onesto ma sfortunato ha diritto a una "seconda chance" economica, liberandosi dai debiti residui dopo aver liquidato tutto il liquidabile. Senza esdebitazione il debitore sarebbe perseguitato dai creditori per tutta la vita, il che disincentiva la sana assunzione di rischi imprenditoriali e contraddice la logica del mercato.<br><br><strong>Procedura:</strong> il debitore presenta istanza dopo la chiusura della liquidazione. Il tribunale notifica ai creditori ammessi al passivo, che possono opporsi entro 30 giorni adducendo il difetto delle condizioni di meritevolezza. Se nessuno si oppone e le condizioni sono soddisfatte, il decreto è emesso senza udienza. In caso di opposizione si svolge un'udienza con contraddittorio. Il decreto è pubblicato nel registro delle imprese.<br><br><strong>Effetti:</strong> i creditori esdebitati non possono più agire esecutivamente contro il debitore liberato. L'esdebitazione non pregiudica i diritti dei creditori verso coobbligati, fideiussori o obbligati in via di regresso: questi rimangono vincolati per l'intero importo.<br><br><strong>Crediti esclusi — perché:</strong> gli obblighi alimentari derivano da relazioni familiari, non dall'attività d'impresa; il risarcimento da illecito doloso ha carattere sanzionatorio; le sanzioni penali e amministrative hanno funzione punitiva/deterrente che verrebbe neutralizzata dall'esdebitazione. Tutti questi crediti sopravvivono all'esdebitazione e restano esigibili.<br><br><strong>Esdebitazione dell'incapiente (art. 283 CCI):</strong> per le persone fisiche prive di qualsiasi attivo liquidabile, il tribunale può concedere l'esdebitazione senza nemmeno aprire la liquidazione. Il decreto è "risolutivamente condizionato": se nei 4 anni successivi il debitore riceve utilità (es. eredità, vincita) tali che, sommate all'attivo originario, superano il 10% dei debiti, il beneficio decade e i creditori possono tornare ad agire. Concedibile una sola volta nella vita.<br><br><strong>Confronto con il concordato preventivo:</strong> nel concordato l'effetto esdebitatorio è automatico con l'omologazione: i creditori falcidiati si estinguono per la parte non soddisfatta senza bisogno di una successiva domanda. Nel concordato l'effetto è consensuale (i creditori hanno votato); nell'esdebitazione post-liquidazione è giudiziale (il tribunale decide valutando la meritevolezza).`
  },
  {
    part: 1,
    prof: ["Extra"],
    q: "Patrimoni destinati a uno specifico affare e liquidazione giudiziale (art. 2447-bis c.c.)",
    a: `L'art. 2447-<em>bis</em> c.c. consente alle SpA di costituire <strong>patrimoni destinati a uno specifico affare</strong>: una quota del patrimonio (max <strong>10% del patrimonio netto</strong>) viene segregata e dedicata esclusivamente a un progetto. I creditori dell'affare si soddisfano solo su quel patrimonio; i creditori generali non vi accedono. In caso di <strong>liquidazione giudiziale della SpA</strong>: le masse sono separate; i creditori dell'affare partecipano solo al patrimonio destinato. Se il patrimonio destinato è <strong>incapiente</strong>, il residuo debito entra nella massa generale della società solo se così previsto nell'atto costitutivo. Il <strong>finanziamento destinato</strong> (art. 2447-<em>bis</em>, lett. <em>b</em>) è strutturato diversamente: i finanziatori ricevono quota degli utili dell'affare come corrispettivo, assumendo un rischio imprenditoriale.`,
    deep: `<strong>Due figure distinte:</strong> <em>(a)</em> <strong>patrimonio destinato in senso stretto</strong> (lett. a): la SpA delibera di destinare beni propri a uno specifico affare, creando una massa separata; i terzi contrattano direttamente con la SpA ma solo sul patrimonio destinato; <em>(b)</em> <strong>finanziamento destinato</strong> (lett. b): la SpA riceve un finanziamento da terzi per uno specifico affare, con rimborso condizionato ai proventi dell'affare. Nel primo caso la segregazione è più netta; nel secondo i finanziatori assumono anche un rischio imprenditoriale e sono trattati come investitori.<br><br><strong>Costituzione:</strong> delibera del consiglio di amministrazione (con statuto che lo preveda), depositata nel registro delle imprese. L'atto deve indicare: l'affare specifico; i beni e rapporti compresi nel patrimonio; i terzi coinvolti; il piano finanziario; le modalità di rendiconto separato. Il collegio sindacale deve redigere una relazione sulla ragionevolezza del piano. Limite: max 10% del patrimonio netto della SpA per ciascun patrimonio destinato.<br><br><strong>Separazione patrimoniale:</strong> i beni del patrimonio destinato non possono essere aggrediti dai creditori generali della SpA, salvo diversa previsione nell'atto costitutivo. I creditori dell'affare non hanno azioni contro il patrimonio generale, salvo l'ipotesi di incapienza (se l'atto costitutivo lo prevede). La SpA deve tenere una <em>contabilità separata</em> per ciascun patrimonio destinato.<br><br><strong>In liquidazione giudiziale:</strong> i creditori dell'affare si insinuano nel passivo della liquidazione come creditori del patrimonio destinato; la procedura gestisce separatamente la liquidazione di tale patrimonio. Se il patrimonio destinato è incapiente, i creditori dell'affare possono concorrere al patrimonio generale solo se l'atto costitutivo lo prevede espressamente; altrimenti subiscono integralmente la perdita.<br><br><strong>Confronto con il trust:</strong> i patrimoni destinati realizzano una segregazione patrimoniale simile al trust anglosassone. Differenza principale: nei patrimoni destinati la SpA resta titolare dei beni; nel trust la titolarità passa al trustee. Il trust è riconosciuto in Italia dalla Convenzione dell'Aia del 1985 (ratificata con l. 364/1989) ma non è ancora disciplinato organicamente dal diritto interno.`
  },
  {
    part: 1,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Atti pregiudizievoli: revocatoria ordinaria e concorsuale",
    a: `<strong>Revocatoria ordinaria (art. 2901):</strong> il creditore può far dichiarare inefficaci gli atti dispositivi del debitore che riducono la garanzia. <strong>Revocatoria concorsuale:</strong> il curatore può revocare atti nel "periodo sospetto" (6 mesi/1 anno/2 anni prima della domanda). Per gli atti anormali, la conoscenza dell'insolvenza è presunta (onere della prova sul terzo). Termine: 3 anni dall'apertura, prescrizione 5 anni.`,
    deep: `<strong>Inefficacia di diritto (senza azione):</strong> atti a titolo gratuito (2 anni), pagamenti di debiti non scaduti (2 anni), rimborsi di finanziamenti soci postergati (1 anno).<br><br><strong>Atti anormali (presunzione di conoscenza):</strong> atti a titolo oneroso con notevole sproporzione (1 anno); pagamenti con mezzi anormali (1 anno); pegni/ipoteche per debiti preesistenti non scaduti (1 anno / 6 mesi). Il terzo deve provare di aver ignorato l'insolvenza.<br><br><strong>Atti normali (prova a carico del curatore):</strong> pagamenti ordinari, garanzie contestuali al debito, ogni altro atto oneroso (6 mesi). Il curatore deve provare che il terzo conosceva l'insolvenza.<br><br><strong>Atti non revocabili:</strong> pagamenti per beni/servizi nel normale esercizio dell'impresa, corrispettivi per lavoro, vendite immobiliari a giusto prezzo per abitazione, esecuzione di piani di risanamento attestati, atti in concordato preventivo/accordi di ristrutturazione omologati. Operazioni bancarie specifiche (credito fondiario, agrario, pegni su attività finanziarie).<br><br><strong>Rapporti tra coniugi:</strong> disciplina severissima. Tutti gli atti di disposizione revocabili dall'inizio dell'attività imprenditoriale. Conoscenza dell'insolvenza presunta sempre.`
  },
  {
    part: 1,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Contratti in corso di esecuzione nella liquidazione giudiziale",
    a: `I contratti pendenti non si risolvono automaticamente. Il curatore sceglie, con autorizzazione del comitato creditori: <strong>(a)</strong> subingresso (il credito del terzo è prededucibile); <strong>(b)</strong> scioglimento (il terzo ha solo credito concorsuale). Eccezioni: alcuni contratti si sciolgono di diritto (es. mandato, conto corrente, borsa a termine), altri proseguono automaticamente (es. locazione di immobili, affitto d'azienda).`,
    deep: `<strong>Contratti che si sciolgono di diritto:</strong> contratti di borsa a termine, associazione in partecipazione (se l'associante è in liquidazione), conto corrente, commissione, mandato (in caso di liquidazione del mandatario). Per l'appalto: il curatore può subentrare entro 60 giorni offrendo garanzie, ma il committente può opporsi se la persona dell'appaltatore era determinante.<br><br><strong>Contratti che proseguono:</strong> locazione immobiliare (il curatore può recedere in qualsiasi momento se è il conduttore, o entro 1 anno se è il locatore); affitto d'azienda; contratto di edizione; cessione crediti (factoring); leasing finanziario (se in liquidazione il concedente).<br><br><strong>Rapporto di lavoro:</strong> il curatore può subentrare comunicandolo al lavoratore, oppure recede con effetto retroattivo. Senza decisione, il rapporto si risolve di diritto dopo 4 mesi (prorogabile fino a 12). Al lavoratore spettano TFR e indennità di mancato preavviso, soggetti alla falcidia concorsuale.<br><br><strong>Preliminare di vendita immobiliare:</strong> se trascritto, è opponibile. Se il curatore subentra, trasferisce l'immobile libero da vincoli. Ma solo metà dell'acconto è opponibile: l'acquirente deve versare il saldo + metà dell'acconto.`
  },
  {
    part: 1,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Concordato preventivo",
    a: `Procedura alternativa alla liquidazione giudiziale per imprenditori in crisi o insolvenza. <strong>Tipi:</strong> liquidatorio (cessazione dell'attività) o con continuità aziendale (prosecuzione, diretta o indiretta). <strong>Procedura:</strong> domanda (anche "in bianco") → ammissione → voto creditori → omologazione dal tribunale. Nel concordato liquidatorio serve soddisfare almeno il 20% dei chirografari + apporto esterno ≥10%.`,
    deep: `<strong>Concordato con continuità:</strong> i creditori devono ricevere almeno quanto otterrebbero nella liquidazione. Moratoria fino a 2 anni per privilegiati. Il plusvalore da continuità va distribuito secondo priorità relativa (relative priority rule), non assoluta.<br><br><strong>Domanda "in bianco":</strong> dal 2012, si può presentare una domanda incompleta con riserva di depositare il piano in 30-60 giorni (prorogabili). Intanto si può chiedere il blocco delle azioni esecutive. Il tribunale nomina un commissario giudiziale per vigilare.<br><br><strong>Proposte concorrenti:</strong> se la proposta del debitore offre < 30% ai chirografari, creditori (≥10% dei crediti) e soci (≥10% del capitale) possono presentare proposte alternative.<br><br><strong>Ristrutturazione trasversale (cross-class cram-down):</strong> nel concordato con continuità, se non tutte le classi approvano, il tribunale può comunque omologare se: la proposta rispetta equità e proporzionalità, nessun creditore riceve più del dovuto, e almeno una classe di privilegiati ha votato a favore.<br><br><strong>Nuova finanza concordataria:</strong> i finanziamenti per il concordato possono essere prededucibili con autorizzazione del tribunale. Vale anche per finanziamenti dei soci (fino all'80%).`
  },
  {
    part: 1,
    prof: ["Extra"],
    q: "Concordato preventivo di gruppo (artt. 284-292 CCI)",
    a: `Il CCI disciplina la crisi di imprese appartenenti allo stesso <strong>gruppo</strong> con regole speciali (artt. 284-292). Imprese in crisi o insolvenza del medesimo gruppo possono presentare domanda di concordato preventivo con <strong>procedura unitaria</strong>: un solo tribunale competente, un solo commissario giudiziale, un <em>piano unitario</em> o piani collegati. Le <strong>masse attive e passive restano separate</strong>: ciascuna società ha i propri creditori e il proprio attivo. I <strong>trasferimenti infragruppo</strong> di risorse o beni sono ammessi se funzionali al risanamento e se il <em>vantaggio compensativo</em> per il gruppo compensa il pregiudizio della società cedente. Il <strong>voto è separato per ogni entità giuridica</strong>: la maggioranza si calcola società per società.`,
    deep: `<strong>Definizione di gruppo ai fini del CCI:</strong> insieme di società legate da rapporti di controllo ai sensi dell'art. 2359 c.c. (controllo di diritto o di fatto) e di direzione e coordinamento ai sensi degli artt. 2497 ss. c.c. Non occorre che tutte le società del gruppo siano in crisi: basta che due o più lo siano per attivare le disposizioni speciali del CCI sul gruppo.<br><br><strong>Vantaggi della procedura unitaria:</strong> (a) un solo tribunale evita conflitti di competenza e decisioni contraddittorie; (b) un solo commissario garantisce visione complessiva del gruppo; (c) piani coordinati permettono sinergie (es. trasferimento di rami aziendali, utilizzo di eccedenze di cassa di una società per finanziare un'altra). La procedura unitaria non significa però confusione patrimoniale.<br><br><strong>Trasferimenti infragruppo e vantaggi compensativi:</strong> il CCI consente trasferimenti di beni, crediti e risorse tra le società del gruppo, purché previsti nel piano e purché il piano dimostri che il "vantaggio compensativo" (beneficio netto per il gruppo) compensa il pregiudizio per la società cedente. Questo è un'applicazione del principio elaborato dalla giurisprudenza sulla direzione e coordinamento.<br><br><strong>Separazione delle masse:</strong> nonostante la procedura unitaria, ciascuna società mantiene la propria autonomia patrimoniale. I creditori di una società non possono soddisfarsi sull'attivo di un'altra (nessuna confusione patrimoniale). La concentrazione della procedura serve a coordinare la gestione, non a creare un unico patrimonio di gruppo.<br><br><strong>Votazione separata e cram-down di gruppo:</strong> ogni società vota separatamente per classi; il calcolo delle maggioranze avviene per ogni singola entità. Un concordato di gruppo può essere omologato anche se non tutte le società raggiungono le maggioranze, se il piano dimostra che la soluzione unitaria è comunque superiore a soluzioni disgiunte per tutte le società interessate.<br><br><strong>Responsabilità della capogruppo e liquidazione di gruppo:</strong> se la crisi delle controllate è stata causata da abuso della direzione e coordinamento, i creditori possono agire verso la capogruppo (art. 2497 c.c.). Le stesse regole (tribunale unico, masse separate, revocatoria aggravata per atti infragruppo con termini raddoppiati) si applicano alla liquidazione giudiziale di gruppo (artt. 293-295 CCI).`
  },
  {
    part: 1,
    prof: ["Extra"],
    q: "Piano di ristrutturazione soggetto ad omologazione — PRO (art. 64-bis CCI)",
    a: `Il PRO (art. 64-<em>bis</em> CCI) è uno strumento per ristrutturazioni che richiedono l'approvazione dei creditori ma non seguono le regole del concordato preventivo. Caratteristiche principali: <strong>(1) approvazione per unanimità</strong> delle classi, o per <strong>approvazione qualificata</strong> (≥75% dei crediti <em>e</em> ≥75% in numero di creditori per le classi non unanimi); <strong>(2) nessun cross-class cram-down</strong>: il tribunale non può omologare contro una classe che non ha approvato con la maggioranza qualificata; <strong>(3) nessuna regola di priorità</strong> assoluta o relativa: il plusvalore da risanamento si distribuisce liberamente tra le classi; <strong>(4) accessibile anche in assenza di crisi o insolvenza</strong> (impresa in <em>bonis</em>).`,
    deep: `<strong>Differenza dal concordato con continuità aziendale:</strong> nel concordato con continuità (art. 84 CCI) il tribunale può omologare con <em>cross-class cram-down</em> anche contro classi dissenzienti, purché almeno una classe privilegiata voti a favore. Nel PRO questa possibilità non esiste: se una classe non approva (neppure con la maggioranza qualificata), il piano non può essere omologato contro di essa. Ciò rende il PRO più rigido sull'approvazione ma più flessibile sulla distribuzione del valore.<br><br><strong>Assenza di regole di priorità:</strong> nel concordato con continuità si applica la <em>relative priority rule</em>: i creditori di rango inferiore non possono ricevere più dei superiori se questi non hanno votato a favore. Nel PRO nessuna regola analoga: il piano può prevedere che i soci ricevano una quota, o che certe classi di creditori ricevano più dei privilegiati, purché tutte le classi coinvolte approvino con le maggioranze richieste. Massima autonomia contrattuale.<br><br><strong>Soglia di approvazione qualificata:</strong> nelle classi che non raggiungono l'unanimità, il piano è approvato se i creditori favorevoli rappresentano almeno il 75% dei crediti della classe <em>e</em> almeno il 75% in numero di creditori presenti al voto (doppia maggioranza). Questa soglia più elevata rispetto al concordato ordinario (50%) riflette il peso maggiore dato all'autonomia contrattuale delle parti.<br><br><strong>Accessibilità in bonis:</strong> il PRO può essere adottato anche da imprese non in crisi né insolventi, come strumento di riorganizzazione preventiva. È l'unico strumento concorsuale italiano che consente ristrutturazioni in assenza di difficoltà finanziarie. Questo lo avvicina al <em>creditor scheme of arrangement</em> inglese o al piano di ristrutturazione preventiva previsto dalla Direttiva UE 2019/1023 (Direttiva Insolvency).<br><br><strong>Ruolo del tribunale nell'omologazione:</strong> verifica: (a) corretta formazione delle classi; (b) raggiungimento delle maggioranze qualificate; (c) assenza di atti in frode ai creditori; (d) che nessun creditore sia trattato peggio di quanto otterrebbe nella liquidazione giudiziale (<em>best interest test</em>). Non valuta la convenienza del piano per i creditori (riservata ai creditori stessi). Il decreto di omologazione rende il piano vincolante per tutte le classi, compresi i dissenzienti all'interno delle classi che hanno approvato.`
  },
  {
    part: 1,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Procedure da sovraindebitamento",
    a: `Riservate a soggetti non assoggettabili alla liquidazione giudiziale: consumatori, professionisti, imprenditori agricoli/minori, start-up innovative. Le tre procedure: <strong>(1) Liquidazione controllata:</strong> liquidazione del patrimonio + possibile esdebitazione. <strong>(2) Concordato minore:</strong> piano approvato dalla maggioranza dei creditori. <strong>(3) Ristrutturazione debiti del consumatore:</strong> piano omologato dal giudice senza voto dei creditori (consumatore non colpevole).`,
    deep: `<strong>Liquidazione controllata – differenze dalla liquidazione giudiziale:</strong> effetti meno gravosi per il debitore, nessun effetto personale/penale, no revocatoria concorsuale (solo ordinaria), applicabile anche in caso di mera crisi. Domanda dal debitore o dai creditori (se insolvente). L'OCC (Organismo di Composizione delle Crisi) ha ruolo centrale: redige la relazione e spesso funge da liquidatore.<br><br><strong>Concordato minore familiare:</strong> più familiari conviventi possono presentare domanda congiunta se almeno uno non è consumatore e i debiti hanno origine comune. Masse attive/passive restano separate. Costi OCC ripartiti in proporzione ai debiti.<br><br><strong>Ristrutturazione del consumatore:</strong> la particolarità è che NON serve il voto dei creditori. Il giudice valuta ammissibilità e fattibilità, omologa direttamente. I creditori possono presentare osservazioni entro 20 giorni. Il consumatore deve essere "non colpevole" del sovraindebitamento.<br><br><strong>Esdebitazione del debitore incapiente:</strong> solo per persona fisica, una sola volta. Il decreto è "risolutivamente condizionato": se entro 4 anni il debitore riceve utilità ≥10% dei debiti, torna obbligato.`
  },
  {
    part: 1,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Accordi di ristrutturazione dei debiti",
    a: `Strumento negoziale: l'imprenditore (commerciale o agricolo) raggiunge un accordo con creditori che rappresentano almeno il 60% dei crediti. L'accordo è omologato dal tribunale. I creditori non aderenti devono essere soddisfatti integralmente (entro 120 giorni). Protezione dalle azioni esecutive durante la negoziazione. Differenza dal concordato: è negoziale, non giudiziale.`,
    deep: `<strong>Varianti speciali:</strong> <em>Accordi agevolati:</em> soglia ridotta al 30% dei crediti, ma il debitore rinuncia a moratoria e misure protettive. <em>Accordi con efficacia estesa:</em> se il 75% dei crediti di una categoria aderisce, l'accordo vincola anche il restante 25%. Per accordi liquidatori, l'estensione vale solo per banche/intermediari se i loro crediti superano metà dell'indebitamento totale. <em>Accordi di gruppo:</em> più imprese dello stesso gruppo con domanda unitaria e piano unitario o piani collegati.<br><br><strong>Crediti fiscali e previdenziali:</strong> il tribunale può omologare anche senza adesione di fisco/enti previdenziali, se la proposta è più vantaggiosa della liquidazione giudiziale.<br><br><strong>Prededucibilità della nuova finanza:</strong> come nel concordato, i finanziamenti per l'attuazione dell'accordo possono essere prededucibili. Per i crediti professionali: prededucibili al 75% solo se l'accordo è omologato.`
  },
  {
    part: 1,
    prof: ["Extra"],
    q: "Convenzione di moratoria (art. 62 CCI)",
    a: `La <strong>convenzione di moratoria</strong> è un accordo tra il debitore e i creditori di una o più <strong>categorie omogenee</strong> (es. banche, fornitori, obbligazionisti) per dilazionare o sospendere temporaneamente i pagamenti. Può essere stipulata da qualsiasi debitore, inclusi <strong>imprenditori agricoli</strong> e <strong>debitori civili</strong>. Non richiede omologazione giudiziale. Produce effetti vincolanti anche per i creditori <em>dissenzienti</em> della categoria se: <em>(a)</em> i creditori aderenti rappresentano almeno il <strong>75% dei crediti</strong> della categoria; <em>(b)</em> i creditori dissenzienti sono stati <em>informati</em>; <em>(c)</em> non subiscono un trattamento peggiorativo rispetto all'alternativa liquidatoria. Non produce <em>automatic stay</em> (blocco automatico delle azioni esecutive individuali).`,
    deep: `<strong>Ratio:</strong> la convenzione di moratoria è uno strumento negoziale snello, senza intervento del giudice, per gestire crisi di liquidità temporanee. Il meccanismo del 75% (estensione ai dissenzienti) è modellato sul principio della maggioranza: i creditori che hanno analizzato la situazione e accettato la dilazione impongono la loro valutazione al resto della categoria, evitando che un singolo creditore dissenziente vanifichi l'accordo avviando azioni esecutive.<br><br><strong>Categoria omogenea:</strong> la categoria deve essere formata da creditori con interessi omogenei (es. tutte le banche espositrici, tutti i fornitori con la stessa priorità). Creditori in posizioni diverse (garantiti vs chirografari, banche vs fornitori) devono essere in categorie separate. La correttezza della categorizzazione non è sindacata dal giudice (nessuna omologazione), ma può essere contestata dai dissenzienti in sede ordinaria.<br><br><strong>Estensione ai dissenzienti — condizioni:</strong> per essere vincolati dalla convenzione, i creditori dissenzienti devono: (a) avere un trattamento non peggiorativo rispetto all'alternativa liquidatoria (no haircut imposto); (b) essere stati informati dell'accordo e della sua natura prima della sottoscrizione. Se queste condizioni non sono soddisfatte, i dissenzienti non sono vincolati e possono agire individualmente.<br><br><strong>Nessun automatic stay — differenza fondamentale:</strong> a differenza del concordato preventivo e degli accordi di ristrutturazione, la convenzione di moratoria non sospende automaticamente le azioni esecutive dei creditori non aderenti né dei dissenzienti della categoria. Per ottenere la sospensione, il debitore deve ricorrere alla composizione negoziata (che consente di chiedere misure protettive al tribunale).<br><br><strong>Pubblicità e opponibilità:</strong> la convenzione non richiede iscrizione nel registro delle imprese né pubblicità particolari per produrre effetti tra le parti. Per l'estensione ai dissenzienti è sufficiente la comunicazione dell'accordo ai creditori della categoria. Non produce effetti verso i creditori di categorie diverse da quelle coinvolte.<br><br><strong>Interazione con la composizione negoziata (art. 23 CCI):</strong> nella composizione negoziata, la convenzione di moratoria è uno degli esiti positivi possibili: l'esperto attesta che la moratoria è funzionale al risanamento e soddisfa i requisiti di legge. L'attestazione conferisce maggiore solidità giuridica, riducendo il rischio di contestazioni da parte dei dissenzienti.<br><br><strong>Applicazione all'imprenditore agricolo:</strong> la convenzione di moratoria è l'unico strumento concorsuale "contrattuale" espressamente applicabile anche agli imprenditori agricoli, che non sono soggetti alla liquidazione giudiziale né agli accordi di ristrutturazione omologati. Consente all'agricoltore di gestire una crisi temporanea senza aprire procedure formali.`
  },
  {
    part: 1,
    prof: ["Masi","Morello","Martucci"],
    q: "Composizione negoziata della crisi",
    a: `Strumento stragiudiziale per l'emersione anticipata della crisi. L'imprenditore in squilibrio chiede alla Camera di commercio la nomina di un <em>esperto indipendente</em> che facilita le trattative con i creditori. Misure protettive possibili (max 240 giorni). L'imprenditore mantiene la gestione. Segnalazioni di allerta: interna (organo di controllo) ed esterna (INPS, Agenzia Entrate, banche).`,
    deep: `<strong>Presupposti:</strong> squilibrio patrimoniale/economico-finanziario tale da far presumere crisi o insolvenza, possibilità concreta di risanamento, assenza di procedura concorsuale pendente. Possono presentare istanza anche più imprese dello stesso gruppo per un unico esperto.<br><br><strong>Durata:</strong> fino a 180 giorni dall'accettazione dell'incarico, prorogabili di altri 180. Se non si raggiunge un accordo, l'esperto redige relazione finale e l'istanza viene archiviata. Non si può ripresentare prima di 1 anno.<br><br><strong>Autorizzazioni del tribunale:</strong> di norma l'imprenditore gestisce senza autorizzazioni. Ma con autorizzazione può: contrarre finanziamenti prededucibili (anche da soci/gruppo) ed effettuare trasferimenti d'azienda esonerando il cessionario dai debiti (tranne lavoro).<br><br><strong>Esiti positivi possibili:</strong> contratto con creditori, convenzione di moratoria, accordo equivalente a piano attestato. Se negativa: l'imprenditore può predisporre piano unilaterale, chiedere accordo di ristrutturazione, o accedere a procedura concorsuale.<br><br><strong>Concordato semplificato:</strong> se la composizione negoziata fallisce, l'imprenditore può chiedere (entro 60 giorni) un concordato semplificato per la liquidazione, senza voto dei creditori, omologato direttamente dal tribunale.`
  },
  {
    part: 1,
    prof: ["Extra"],
    q: "Concordato semplificato per la liquidazione del patrimonio (art. 25-sexies CCI)",
    a: `Strumento introdotto dal d.l. 118/2021, oggi art. 25-<em>sexies</em> CCI, come sbocco della <strong>composizione negoziata fallita</strong>. Il debitore può presentare domanda entro <strong>60 giorni</strong> dalla relazione finale negativa dell'esperto. Il piano è <strong>esclusivamente liquidatorio</strong>. Il tribunale omologa <strong>senza il voto dei creditori</strong>, limitandosi a verificare che la proposta non sia deteriore rispetto alla liquidazione giudiziale e che sia fattibile. La soddisfazione dei chirografari deve essere <strong>non inferiore al 20%</strong>. L'esperto della composizione negoziata può essere nominato <strong>commissario giudiziale</strong>. Produce <em>automatic stay</em> (blocco azioni esecutive) dalla domanda.`,
    deep: `<strong>Origine e ratio — incentivo alla composizione negoziata:</strong> il concordato semplificato è stato introdotto come incentivo all'utilizzo della composizione negoziata: l'imprenditore che avvia la procedura e non riesce a raggiungere un accordo ha comunque accesso a uno strumento di uscita rapido. La semplicità sta nell'assenza del voto dei creditori, che nella prassi è spesso il principale ostacolo.<br><br><strong>Differenza dal concordato preventivo liquidatorio ordinario:</strong> nel concordato preventivo ordinario sono richiesti: (a) apporto esterno di risorse fresche ≥10%; (b) soddisfazione chirografari ≥20%; (c) voto dei creditori a maggioranza; (d) possibilità di proposte concorrenti. Nel concordato semplificato: nessun apporto esterno obbligatorio, 20% ai chirografari ma <em>senza voto</em>, nessuna proposta concorrente, omologazione diretta del tribunale.<br><br><strong>Ruolo del tribunale nell'omologazione:</strong> il tribunale verifica: (a) veridicità dei dati e fattibilità del piano (già parzialmente attestata dall'esperto nella relazione finale della composizione negoziata); (b) assenza di atti in frode ai creditori; (c) proposta non deteriore rispetto alla liquidazione giudiziale; (d) soddisfazione ≥20% per i chirografari. Non valuta la convenienza del piano per i creditori (riservata alla loro autonomia nel concordato ordinario). I creditori possono presentare osservazioni scritte.<br><br><strong>Commissario giudiziale:</strong> l'esperto della composizione negoziata che ha redatto la relazione finale negativa può essere nominato commissario giudiziale nel concordato semplificato. Ciò valorizza il lavoro già svolto nella fase negoziata e riduce i costi. Il commissario vigila sull'esecuzione del piano fino al soddisfacimento dei creditori.<br><br><strong>Automatic stay:</strong> dalla domanda di concordato semplificato, le azioni esecutive individuali sono sospese e non possono essere iniziate né proseguite. Il blocco dura fino all'omologazione o al rigetto. Se rigettata, il debitore può chiedere la liquidazione giudiziale o accedere ad altro strumento.<br><br><strong>Limitazioni strutturali:</strong> il concordato semplificato è esclusivamente liquidatorio: non consente la continuità aziendale (non vi si applica la relative priority rule né il cram-down trasversale). Non modifica rapporti obbligatori con creditori estranei. Non preclude la responsabilità personale dell'imprenditore per debiti contratti in malafede.`
  },
  {
    part: 1,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Impresa familiare (art. 230-bis)",
    a: `Istituto residuale: si applica quando un familiare (coniuge, parente entro 3° grado, affine entro 2°) presta lavoro continuativo nell'impresa senza diversa qualificazione giuridica. L'impresa resta individuale (beni di proprietà del titolare). Diritti dei partecipanti: partecipazione agli utili, diritto di prelazione, decisioni straordinarie a maggioranza. Non è un soggetto giuridico distinto.`,
    deep: `<strong>Funzione storica:</strong> prima del 1975, il lavoro familiare si presumeva gratuito e nessun diritto era riconosciuto. L'art. 230-bis ha introdotto una tutela minima inderogabile.<br><br><strong>Diritti patrimoniali:</strong> mantenimento; partecipazione agli utili proporzionale al lavoro; diritti sui beni acquistati con gli utili e sugli incrementi aziendali (anche avviamento); prelazione sull'azienda in caso di divisione ereditaria o cessione.<br><br><strong>Diritti amministrativi:</strong> le decisioni su gestione straordinaria, impiego utili e cessazione dell'impresa sono adottate a maggioranza dei familiari partecipanti. Il diritto di partecipazione è trasferibile solo ad altri familiari nucleari con consenso unanime; è liquidabile in denaro se cessa la prestazione lavorativa.<br><br><strong>Impresa familiare ≠ piccola impresa:</strong> una piccola impresa può non essere familiare (se l'imprenditore non usa familiari). Un'impresa grande può essere familiare se vi collaborano i familiari.<br><br><strong>Convivente (art. 230-ter):</strong> dal 2016, al convivente di fatto che lavora nell'impresa dell'altro spettano solo partecipazione agli utili e diritti sui beni acquistati con essi, proporzionali al lavoro. Meno diritti rispetto ai familiari ex 230-bis.`
  },
  {
    part: 1,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Professioni intellettuali (art. 2238)",
    a: `I liberi professionisti (avvocati, medici, notai) non sono imprenditori. L'art. 2238 stabilisce che la disciplina dell'impresa si applica solo se l'esercizio professionale è elemento di un'impresa più ampia (es. medico che gestisce una clinica). Anche con molti collaboratori e mezzi, il professionista che esercita personalmente resta tale. La ragione è nel prestigio sociale delle professioni.`,
    deep: `<strong>Due attività distinte:</strong> quando un professionista gestisce un'impresa nella quale esercita anche la propria attività intellettuale (es. medico che gestisce una clinica, professore titolare di una scuola privata), si è in presenza di due attività distinte. Si applicano entrambe le discipline: quella della professione intellettuale e quella dell'impresa. Ciò non vale però per chi esercita solo la professione, anche con numerosi collaboratori e rilevanti mezzi materiali: finché il professionista esercita personalmente la propria attività, resta tale e non diventa imprenditore.<br><br><strong>Professioni protette vs non protette:</strong> le professioni <em>protette</em> (medici, avvocati, notai, ingegneri, dottori commercialisti, ecc.) sono disciplinate dalla normativa civilistica (artt. 2229-2238 c.c.) e da regolamentazioni specifiche degli ordini professionali. Le professioni <em>non protette</em> sono prive di disciplina specifica.<br><br><strong>Statuto specifico (artt. 2229-2238 c.c.):</strong> potere disciplinare degli ordini professionali (es. sospensione o radiazione dall'albo); divieto di esercizio per i non iscritti agli albi; obbligo di esecuzione personale della prestazione (non delegabile a chi non ha le specifiche competenze); criterio speciale di determinazione del compenso, che deve essere adeguato all'importanza dell'opera e al decoro della professione.<br><br><strong>Ragione dell'esonero:</strong> la scelta del legislatore del 1942 è ispirata dal particolare prestigio sociale tradizionalmente attribuito alle professioni intellettuali, non dalla natura dell'attività svolta (anche i professionisti producono servizi, operano con metodo economico e a scopo di lucro).<br><br><strong>Esonero – vantaggi e svantaggi:</strong> vantaggi: sottrazione alla liquidazione giudiziale. Svantaggi: inapplicabilità della disciplina dell'azienda, dei segni distintivi e della concorrenza sleale. Il moderno esercizio delle professioni (con ingenti capitali, strutture complesse, associazioni e reti multinazionali) rende la scelta del 1942 sempre più anacronistica: in altri Paesi UE questa distinzione è già stata in gran parte superata.`
  },
  {
    part: 1,
    prof: ["Masi","Morello","Martucci"],
    q: "Consorzi: attività interna ed esterna",
    a: `Il consorzio (art. 2602) è un contratto tra imprenditori per disciplinare o svolgere determinate fasi delle rispettive imprese. <strong>Consorzi interni:</strong> regolano solo i rapporti tra consorziati. <strong>Consorzi esterni:</strong> hanno un ufficio che opera con terzi; prevedono fondo consortile (patrimonio autonomo). Per le obbligazioni del consorzio: in nome del consorzio risponde il fondo; per conto dei singoli rispondono solidalmente il consorziato e il fondo.`,
    deep: `<strong>Contratto di consorzio:</strong> solo tra imprenditori (legge speciale ammette anche enti di ricerca), forma scritta a pena di nullità, durata libera (default 10 anni). Tendenzialmente aperto a nuovi consorziati se le condizioni sono predeterminate.<br><br><strong>Organi:</strong> assemblea (delibera a maggioranza, modifiche del contratto richiedono unanimità) e organo direttivo (funzioni gestionali e di controllo). Nei consorzi esterni, devono essere iscritte nel registro le persone che hanno presidenza, direzione e rappresentanza.<br><br><strong>Fondo consortile:</strong> patrimonio autonomo rispetto ai singoli consorziati. Solo i creditori del consorzio possono aggredirlo; i creditori personali dei singoli consorziati non possono.<br><br><strong>Società consortili (art. 2615-ter):</strong> gli scopi consortili possono essere perseguiti tramite una società (tutti i tipi tranne la s.s.). Scopo: non distribuzione di utili ma vantaggio patrimoniale diretto ai consorziati (minori costi, maggiori ricavi). Affinità con le cooperative, ma la mutualità consortile è tipicamente imprenditoriale.<br><br><strong>GEIE:</strong> strumento europeo di cooperazione transnazionale. Almeno 2 membri in Stati UE diversi. Privo di personalità giuridica. I membri rispondono solidalmente e illimitatamente (responsabilità sussidiaria). Non ha scopo di profitto proprio.`
  },
  {
    part: 1,
    prof: ["Comune","Masi","Morello"],
    q: "Impresa sociale",
    a: `L'impresa sociale (d.lgs. 112/2017) è un ente privato che esercita stabilmente un'attività di interesse generale, senza scopo di lucro, con finalità civica/solidaristica/di utilità sociale. Si iscrive nella sezione speciale del registro. Gli utili devono essere reinvestiti. In caso di insolvenza è soggetta alla liquidazione coatta amministrativa.`,
    deep: `<strong>Qualifica, non tipo di ente:</strong> l'impresa sociale non è un nuovo tipo, ma una qualifica assumibile da qualsiasi ente privato (associazione, fondazione, società, cooperativa). Non possono essere imprese sociali: PA, società unipersonali di persona fisica, organizzazioni che operano solo per i propri soci.<br><br><strong>Attenuazione del divieto di lucro:</strong> se l'impresa sociale è una società o consorzio, meno della metà degli utili netti annuali può essere destinata a: rivalutazione delle partecipazioni in base al costo della vita, oppure distribuzione di dividendi con limite al tasso dei buoni postali + 2,5%.<br><br><strong>Controlli:</strong> interni (uno o più sindaci) ed esterni (vigilanza del Ministero del Lavoro, che può disporre ispezioni e revocare la qualifica in caso di irregolarità non sanabili, con devoluzione del patrimonio al Fondo per l'impresa sociale).<br><br><strong>Scritture contabili e bilancio sociale:</strong> obbligatori per tutte le imprese sociali, indipendentemente dall'attività. Il bilancio sociale attesta l'osservanza delle finalità sociali.`
  },
  {
    part: 1,
    prof: ["Extra"],
    q: "Enti del Terzo settore e impresa (d.lgs. 117/2017, Codice del Terzo Settore)",
    a: `Il <strong>Codice del Terzo Settore</strong> (CTS, d.lgs. 117/2017) regola gli enti privati non profit che svolgono attività di <em>interesse generale</em> (assistenza sociale, sanità, istruzione, protezione civile, sport dilettantistico ecc.). Sono ETS: ODV, APS, enti filantropici, reti associative, società di mutuo soccorso, fondazioni del terzo settore e altri enti. Devono iscriversi nel <strong>RUNTS</strong> (Registro Unico Nazionale del Terzo Settore). Obblighi di <strong>scritture contabili e bilancio sociale</strong> per entrate superiori a €100.000/anno. Se svolgono attività d'impresa in forma <strong>non marginale</strong> (entrate da impresa superiori al 30% del totale), sono soggetti alla liquidazione giudiziale. La qualifica ETS è cumulabile con quella di <strong>impresa sociale</strong> (d.lgs. 112/2017).`,
    deep: `<strong>ETS e qualifica d'imprenditore:</strong> gli ETS possono svolgere attività d'impresa in due modi: <em>(a)</em> come attività principale e non marginale → assumono la qualità di imprenditore ex art. 2082 c.c.; <em>(b)</em> come attività secondaria e marginale (strumentale alle finalità istituzionali) → non sono imprenditori. La distinzione è rilevante per l'applicabilità della liquidazione giudiziale. Il CTS fissa la soglia di "marginalità": entrate da attività d'impresa inferiori al 30% del totale delle entrate dell'ente.<br><br><strong>RUNTS (Registro Unico Nazionale del Terzo Settore):</strong> istituito presso il Ministero del Lavoro, con sezioni gestite dai Centri di Servizio per il Volontariato (CSV). L'iscrizione è obbligatoria per accedere alle agevolazioni fiscali del CTS. Il RUNTS è diverso dal registro delle imprese: non ha la stessa efficacia di pubblicità legale ma serve a qualificare l'ente come ETS per effetti fiscali e sostanziali. Un ETS che svolge attività d'impresa non marginale deve iscriversi anche nel registro delle imprese.<br><br><strong>Scritture contabili e bilancio sociale:</strong> per entrate annue >€100.000: bilancio d'esercizio e bilancio sociale. Per entrate >€220.000: stato patrimoniale, rendiconto gestionale, relazione di missione. Per entrate >€1.000.000: obbligo di revisione legale. La trasparenza contabile è strumentale alla vigilanza ministeriale e alla fiducia del pubblico.<br><br><strong>Impresa sociale vs ETS:</strong> l'impresa sociale (d.lgs. 112/2017) è una qualifica assumibile da qualsiasi ETS che svolga impresa in via principale, con requisiti aggiuntivi: distribuzione utili limitata (non nulla ma vincolata), bilancio sociale obbligatorio, organo di controllo obbligatorio sopra determinate dimensioni. In caso di insolvenza, l'impresa sociale è soggetta a <em>liquidazione coatta amministrativa</em>, non a quella giudiziale. Un ETS non impresa sociale, se svolge attività d'impresa non marginale, soggiace alla liquidazione giudiziale ordinaria.<br><br><strong>Agevolazioni fiscali:</strong> gli ETS beneficiano di: esenzione IRES per attività non commerciali, deducibilità delle erogazioni liberali (art. 83 CTS), regime 5x1000, esenzione da imposte indirette su atti costitutivi e trasferimenti. Le agevolazioni sono condizionate all'iscrizione nel RUNTS e al rispetto dei vincoli del CTS.<br><br><strong>Liquidazione giudiziale degli ETS:</strong> se l'ETS è imprenditore non marginale e supera le soglie dimensionali del CCI, può essere assoggettato alla liquidazione giudiziale. Il CCI non prevede deroghe specifiche per gli ETS (salvo l'applicazione della liquidazione coatta per le imprese sociali). In caso di crisi, gli ETS non impresa sociale possono utilizzare gli strumenti del CCI (composizione negoziata, accordi di ristrutturazione), ma devono ottenere l'autorizzazione del Ministero del Lavoro per atti dispositivi rilevanti del patrimonio.`
  },
  {
    part: 1,
    prof: ["Comune","Masi","Morello"],
    q: "Ammortamento dei titoli di credito",
    a: `Procedura per titoli smarriti, rubati o distrutti. Per titoli all'ordine e nominativi: denuncia al debitore + ricorso al tribunale → decreto di ammortamento (pubblicato in Gazzetta Ufficiale) → il titolo perde funzione di legittimazione. Il terzo detentore può opporsi entro 30 giorni. Per titoli al portatore: ammortamento di regola non ammesso (il diritto segue il possesso).`,
    deep: `<strong>Due fasi:</strong> <em>(1) Fase essenziale:</em> denuncia + ricorso → decreto → pubblicazione in GU → il debitore non è liberato se paga al detentore. <em>(2) Fase eventuale:</em> se il terzo detentore fa opposizione entro 30 gg, si apre un giudizio ordinario sulla proprietà del titolo. Se respinta, il decreto diventa definitivo e il titolo viene consegnato al ricorrente.<br><br><strong>Titoli al portatore – eccezioni:</strong> l'ammortamento è ammesso per alcuni titoli a circolazione ristretta (es. assegni bancari al portatore). In caso di distruzione provata, il possessore può chiedere un duplicato all'emittente. In caso di smarrimento/sottrazione senza prova della distruzione, potrà ottenere la prestazione solo dopo la prescrizione del titolo.`
  },
  {
    part: 1,
    prof: ["Martucci"],
    q: "Imprenditore occulto",
    a: `Chi esercita l'impresa tramite un prestanome senza rivelarsi ai terzi. La teoria di Bigiavi (inscindibilità potere/responsabilità) non ha prevalso. La giurisprudenza preferisce la tesi dell'<em>impresa fiancheggiatrice</em>: se il dominus finanzia sistematicamente, si ingerisce nella gestione e dirige di fatto una o più società, ciò configura un'autonoma attività d'impresa, esponendolo alla liquidazione giudiziale.`,
    deep: `<strong>Perché si fa?</strong> Per aggirare divieti (es. incompatibilità) o per non esporre il patrimonio: si costituisce una società con capitale irrisorio (società di comodo), gestita di fatto dal dominus. Se gli affari vanno male, i creditori del prestanome recuperano poco.<br><br><strong>Critica alla teoria di Bigiavi:</strong> contrasta con la responsabilità limitata nelle società di capitali. Un socio di controllo dirige di fatto la società, ma non risponde dei debiti sociali. Accettare l'imprenditore occulto farebbe crollare questo pilastro.<br><br><strong>Soluzione dell'abuso dello schermo societario (Spada):</strong> non serve qualificare il dominus come imprenditore occulto. Basta verificare se sta usando la struttura societaria in modo distorto per sottrarsi alle responsabilità. In caso di abuso, l'ordinamento interviene per reprimerlo.`
  },
  {
    part: 1,
    prof: ["Masi"],
    q: "Excursus dalla legge fallimentare al CCI",
    a: `La legge fallimentare (1942) aveva approccio punitivo-liquidatorio. Riforme 2005-2012 hanno introdotto concordato preventivo riformato, accordi di ristrutturazione, procedure da sovraindebitamento. Il d.lgs. 14/2019 (CCI) ha riformato integralmente: il "fallimento" diventa "liquidazione giudiziale"; si enfatizza l'emersione anticipata della crisi, la composizione negoziata, il risanamento.`,
    deep: `<strong>Tappe principali:</strong> d.l. 35/2005 (riforma concordato preventivo, introduzione accordi di ristrutturazione); d.lgs. 5/2006 (riforma del fallimento, abolizione amministrazione controllata); d.lgs. 169/2007 (correzioni); d.l. 83/2012 (ulteriori modifiche concordato); legge 3/2012 (procedure sovraindebitamento). L'insieme di queste riforme d'urgenza ha creato complessità e contraddizioni, motivando la riforma organica del CCI.<br><br><strong>Novità principali del CCI:</strong> nuovo sistema di allerta (auto-vigilanza + segnalazioni esterne), composizione negoziata, piattaforma telematica nazionale, concordato semplificato, piano di ristrutturazione soggetto ad omologazione, procedura unitaria di gruppo, ristrutturazione trasversale (cross-class cram-down), nuova disciplina del rapporto di lavoro nella liquidazione giudiziale.`
  },
  {
    part: 1,
    prof: ["Comune","Masi","Morello"],
    q: "Titoli astratti e causali",
    a: `<strong>Astratti:</strong> emessi per qualsiasi rapporto, senza riferimento alla causa (es. cambiale, assegno). Letteralità piena. <strong>Causali:</strong> emessi solo per un rapporto predeterminato per legge (es. azioni, titoli rappresentativi di merci). Letteralità incompleta: il contenuto è integrato dalla disciplina legale del rapporto sottostante.`,
    deep: `<strong>Rapporto cartolare vs rapporto fondamentale:</strong> il rapporto fondamentale (causale) preesiste (es. una vendita). Sulla base di questo, le parti decidono di incorporare la prestazione nel titolo (convenzione di rilascio). La dichiarazione nel titolo (es. impegno a pagare) è il rapporto cartolare, autonomo dal fondamentale.<br><br><strong>Esempio concreto:</strong> in una vendita con pagamento differito (rapporto causale), il compratore rilascia una cambiale (rapporto cartolare). La cambiale menziona solo l'obbligo di pagare una somma a una scadenza. Il terzo acquirente della cambiale non è soggetto alle eccezioni del rapporto di vendita.<br><br><strong>Titoli rappresentativi di merce:</strong> fede di deposito, polizza di carico, duplicato lettera di vettura. Attribuiscono diritto alla consegna delle merci e possesso delle stesse. Se il vettore/depositario non ha mai ricevuto la merce o è difforme, può opporre l'eccezione al terzo portatore? Controverso: i rischi "ex recepto" dovrebbero ricadere sull'emittente.`
  },
  {
    part: 1,
    prof: ["Comune","Masi","Morello"],
    q: "Documenti di legittimazione e titoli impropri",
    a: `<strong>Documenti di legittimazione:</strong> servono solo a identificare il titolare (es. biglietto del treno, scontrino guardaroba). Non sono trasferibili, non incorporano il diritto. <strong>Titoli impropri:</strong> consentono circolazione semplificata (senza notifica) ma con effetti della cessione, non della circolazione cartolare: nessun acquisto a non domino (es. polizza assicurativa all'ordine/al portatore).`,
    deep: `<strong>Differenza chiave:</strong> nei titoli di credito "propri", la circolazione è regolata dalla legge del titolo e il terzo acquirente in buona fede è tutelato (acquisto a non domino). Nei titoli impropri, la circolazione è agevolata (no notifica), ma il diritto non è autonomo: il debitore può opporre tutte le eccezioni, incluse quelle personali. Nei documenti di legittimazione non c'è neppure circolazione: il documento serve solo a facilitare l'adempimento.<br><br><strong>Art. 2002 c.c.:</strong> a entrambe le figure NON si applica la disciplina dei titoli di credito, salvo l'art. 1992 (funzione di legittimazione), perché entrambe svolgono comunque tale funzione.`
  },
  {
    part: 1,
    prof: ["Comune","Masi","Morello"],
    q: "Girata nei titoli all'ordine: effetti e girata in garanzia",
    a: `La girata trasferisce il possesso e il diritto cartolare in modo autonomo. Una serie continua di girate legittima il portatore finale. La <strong>girata in garanzia</strong> (a titolo di pegno) trasferisce il possesso ma non la piena titolarità: il giratario ha un diritto di pegno. Le eccezioni personali verso il girante non sono opponibili al giratario in garanzia.`,
    deep: `<strong>Girata – regole formali:</strong> deve essere scritta sul titolo, non può essere condizionata (condizioni si considerano non scritte), non può essere parziale (nulla se parziale). Trasferisce integralmente tutti i diritti connessi al titolo.<br><br><strong>Di norma, nessuna funzione di garanzia:</strong> salvo diversa disposizione di legge (es. titoli cambiari), il girante non assume obbligazioni verso i giratari successivi. Il giratario acquista diritto autonomo verso l'emittente.<br><br><strong>Girata per l'incasso (per procura):</strong> il giratario è solo rappresentante del girante. Non acquista diritto autonomo. Può girare ulteriormente solo per procura. Il debitore può opporre al giratario per procura le eccezioni che avrebbe opposto al girante.<br><br><strong>Continuità delle girate:</strong> il nome di ogni girante deve corrispondere al giratario della girata precedente, risalendo al primo prenditore. Il debitore verifica solo la regolarità formale, non l'autenticità delle firme.`
  },
  {
    part: 1,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Concordato nella liquidazione giudiziale e figura dell'assuntore",
    a: `Il concordato nella liquidazione giudiziale chiude la procedura con una ristrutturazione dei debiti. Può essere proposto dal debitore, dai creditori o da un terzo. L'<strong>assuntore</strong> è un terzo che si accolla gli obblighi concordatari (accollo cumulativo o liberatorio) in cambio dell'attivo della procedura. Serve approvazione della maggioranza dei creditori e omologazione del tribunale.`,
    deep: `<strong>Tempistiche:</strong> creditori e terzi possono proporre in qualsiasi momento; il debitore solo dopo 1 anno dall'apertura e non oltre 2 anni dal decreto che rende esecutivo lo stato passivo. La proposta del debitore è ammissibile solo se prevede incremento dell'attivo ≥10%.<br><br><strong>Contenuto flessibile:</strong> pagamento immediato di percentuale (remissorio), diGerito per intero (dilatorio), misto. Possibili anche cessioni di beni, quote societarie, strumenti finanziari, suddivisione in classi. Non è più obbligatorio soddisfare integralmente i privilegiati, ma devono ricevere almeno quanto otterrebbero dalla liquidazione.<br><br><strong>Votazione:</strong> hanno diritto di voto i chirografari ammessi al passivo. I privilegiati non votano se soddisfatti integralmente. Sono esclusi dal voto: coniuge, parenti/affini fino al 4° grado, società collegate, cessionari di crediti "vicini" al debitore. Approvazione: maggioranza dei crediti (se classi: maggioranza delle classi, con maggioranza interna).<br><br><strong>Risoluzione e annullamento:</strong> il concordato può essere risolto per inadempimento o annullato se il passivo era dolosamente gonfiato/l'attivo sottratto. In tal caso la liquidazione riapre.`
  },
  {
    part: 1,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Effetti della liquidazione giudiziale per i creditori",
    a: `<strong>Spossessamento:</strong> il debitore perde la disponibilità del patrimonio. <strong>Cristallizzazione:</strong> i crediti si determinano alla data di apertura; crediti a termine diventano esigibili; interessi chirografari sospesi. <strong>Compensazione:</strong> ammessa se entrambi i crediti anteriori; non ammessa se il credito è stato acquistato dopo il deposito della domanda o nell'anno precedente. Creditori: concorsuali, concorrenti (privilegiati, chirografari, postergati), prededucibili (pagati per primi).`,
    deep: `<strong>Prededucibili:</strong> crediti qualificati da legge + crediti sorti durante la procedura per gestione del patrimonio e continuazione dell'impresa + compensi organi + prestazioni professionali richieste dagli organi. Se certi, liquidi ed esigibili, possono essere pagati man mano, fuori dal riparto. Se l'attivo non basta neppure per i prededucibili, anche loro partecipano al riparto proporzionale (par condicio).<br><br><strong>Eccezioni al divieto di azioni individuali:</strong> creditori con pegno/privilegio speciale + diritto di ritenzione (autorizzati dal giudice alla vendita); creditori con pegno mobiliare non possessorio (dopo ammissione al passivo); banche per credito fondiario/agrario (possono agire sugli immobili ipotecati).<br><br><strong>Ripartizione dell'attivo:</strong> ordine: prededucibili → privilegiati → chirografari → postergati. Il ricavato dei beni gravati da pegno/ipoteca va prima ai relativi creditori garantiti. Il curatore predispone il programma di liquidazione (entro 150 gg), approvato dal comitato creditori. Obiettivo: completare entro 5 anni (prorogabili a 7). Si privilegia la vendita dell'azienda in blocco.`
  },
  {
    part: 1,
    prof: ["Comune","Masi","Morello"],
    q: "Stato passivo nella liquidazione giudiziale",
    a: `Elenco ufficiale dei creditori ammessi al concorso. I creditori presentano domanda di ammissione (via PEC, almeno 30 gg prima dell'udienza). Il curatore redige un progetto di stato passivo. Il giudice delegato lo esamina e lo rende esecutivo con decreto. Contro lo stato passivo: opposizione, impugnazione, revocazione. Domande tardive ammesse entro 6 mesi (prorogabili a 12).`,
    deep: `<strong>Domanda di rivendicazione:</strong> analoga alla domanda di ammissione, ma per chi chiede restituzione di beni propri detenuti dal debitore (es. beni in deposito). Le decisioni su rivendicazione acquistano forza di giudicato se non impugnate.<br><br><strong>Crediti ammessi con riserva:</strong> crediti il cui riconoscimento è subordinato a una condizione futura o incerta. Il creditore ammesso con riserva può opporsi per ottenere l'ammissione definitiva.<br><br><strong>Domande tardive:</strong> chi non presenta domanda in tempo deve dimostrare che il ritardo non è imputabile a sé. Se il ritardo è imputabile: partecipa solo ai riparti successivi. Se giustificato: ha diritto anche a quanto sarebbe spettato nei precedenti riparti (salvi i diritti di prelazione).<br><br><strong>Impugnazioni:</strong> opposizione (da esclusi, per ottenere ammissione), impugnazione (da ammessi, per contestare altri crediti), revocazione (se emergono fatti nuovi). Entro 30 gg dalla comunicazione. Ricorso in Cassazione possibile (no appello).`
  },
  {
    part: 1,
    prof: ["Masi","Morello","Martucci"],
    q: "Revoca della liquidazione giudiziale",
    a: `La sentenza di apertura può essere impugnata entro 30 giorni (reclamo alla Corte d'Appello). L'impugnazione non sospende gli effetti, ma la Corte può sospenderli per motivi gravi. Con la revoca, il debitore recupera l'amministrazione; gli atti compiuti durante la procedura restano validi. Il creditore istante risponde dei danni se ha colpa.`,
    deep: `<strong>Termini:</strong> reclamo entro 30 gg dalla notifica (per le parti) o dalla pubblicazione nel registro (per gli altri). Termine massimo assoluto: 6 mesi dalla pubblicazione della sentenza. Contro la decisione della Corte d'Appello: ricorso in Cassazione entro 30 gg.<br><br><strong>Effetti della revoca:</strong> cessano gli effetti della procedura, ma gli atti già compiuti dagli organi concorsuali (es. vendite di beni) restano validi. Il patrimonio dell'imprenditore può essere stato alterato significativamente. Unico rimedio: azione di risarcimento contro il creditore istante (se in colpa), che paga anche spese di procedura e compenso del curatore.`
  },
  {
    part: 1,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Piano attestato di risanamento",
    a: `Il debitore in crisi/insolvenza elabora un piano di risanamento attestato da un professionista indipendente. Non richiede omologazione né intervento del tribunale. <strong>Effetto protettivo:</strong> gli atti compiuti in esecuzione del piano non sono soggetti a revocatoria concorsuale e non configurano bancarotta. Il piano deve avere data certa per essere opponibile.`,
    deep: `<strong>Contenuto del piano:</strong> descrizione delle cause della crisi, azioni da intraprendere, tempi di attuazione, strumenti per gestire scostamenti, risorse per i creditori estranei alle rinegoziazioni. Può riguardare anche un gruppo di imprese (piano unitario).<br><br><strong>Attestazione del professionista:</strong> deve attestare la veridicità dei dati e la fattibilità del piano. Il professionista deve essere indipendente (iscritto al registro dei revisori o all'albo dei gestori della crisi, non legato all'impresa).<br><br><strong>Pubblicazione facoltativa:</strong> il piano può essere pubblicato nel registro delle imprese su richiesta del debitore. Questo gli permette di mantenere riservata la crisi. Ma attenzione: senza data certa, il piano non è opponibile a una successiva procedura concorsuale.<br><br><strong>Limiti:</strong> il piano è unilaterale, non può modificare rapporti obbligatori senza consenso dei creditori. Per ottenere l'accettazione serve inevitabilmente negoziare → per questo il CCI prevede la composizione negoziata.`
  },
  {
    part: 1,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Liquidazione giudiziale delle società",
    a: `Per s.n.c. e s.a.s., la liquidazione della società si estende automaticamente ai soci illimitatamente responsabili (anche occulti, scoperti successivamente). Per società di capitali, colpisce solo la società. Liquidazione di gruppo: procedura unitaria con unico giudice e curatore, ma masse patrimoniali distinte. Revocatoria aggravata per atti infragruppo.`,
    deep: `<strong>Estensione ai soci:</strong> si applica a soci palesi e occulti di s.n.c., accomandatari di s.a.s. e s.a.p.a., accomandanti che hanno violato il divieto di immistione. NON si estende all'unico quotista di Srl o unico azionista. I soci cessati possono essere assoggettati entro 1 anno dalle formalità di uscita, se l'insolvenza riguarda debiti esistenti alla cessazione della responsabilità.<br><br><strong>Masse distinte:</strong> massa passiva della società (solo creditori sociali) e massa passiva del socio (creditori sociali + personali). Masse attive separate. Il concordato della società chiude anche la procedura dei soci; ciascun socio può proporre concordato particolare.<br><br><strong>Liquidazione di gruppo – strumenti speciali:</strong> revocatoria aggravata (termine raddoppiato a 2 anni per atti anormali infragruppo); revocatoria ordinaria potenziata (atti nei 5 anni precedenti); denunzia al tribunale di irregolarità in altre società del gruppo; azione di responsabilità contro la capogruppo; postergazione aggravata dei finanziamenti infragruppo (downstream e upstream, contratti fino a 1 anno prima).`
  },
  {
    part: 1,
    prof: ["Comune","Masi","Morello"],
    q: "Vendita/affitto azienda in liquidazione giudiziale",
    a: `Il curatore può vendere o affittare l'azienda per massimizzare il ricavato. L'affitto preserva il valore in attesa della vendita. Il CCI privilegia la vendita in blocco. L'acquirente non risponde dei debiti pregressi (salvo diverso accordo). È possibile concordare con i sindacati il passaggio parziale dei lavoratori.`,
    deep: `<strong>Affitto d'azienda in liquidazione:</strong> autorizzato dal giudice delegato quando funzionale a una migliore vendita. Il contratto deve prevedere il diritto di recesso del curatore (con equo indennizzo prededucibile). L'affittuario gestisce l'attività e risponde dei propri debiti: la procedura non risponde dei debiti dell'affittuario, neppure per debiti di lavoro. Alla fine dell'affitto, il complesso aziendale "retrocede" alla liquidazione.<br><br><strong>Vendite competitive:</strong> tutte le vendite (mobili e immobili) devono seguire procedure competitive, di regola telematiche, tramite il portale delle vendite pubbliche. Il curatore può avvalersi di professionisti specializzati. Possono essere ceduti anche crediti (inclusi futuri e fiscali) e azioni revocatorie già proposte.<br><br><strong>Programma di liquidazione:</strong> redatto dal curatore entro 150 gg dall'apertura, approvato dal comitato creditori. Il completamento deve essere programmato entro 5 anni (prorogabili a 7). Il curatore può iniziare a liquidare subito dopo l'approvazione, senza attendere l'esecutività dello stato passivo.`
  },
  {
    part: 1,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Legittimazione nei titoli di credito",
    a: `La legittimazione abilita il possessore a esercitare il diritto incorporato. Per titoli al portatore: il mero possessore. Per titoli all'ordine: chi possiede con serie continua di girate. Per titoli nominativi: doppia intestazione (titolo + registro). Il debitore è liberato se paga in buona fede al legittimato, anche se non è il vero titolare.`,
    deep: `<strong>Legittimazione attiva:</strong> il possessore ha diritto alla prestazione presentando il titolo, senza dover provare la proprietà. L'onere di provare il difetto di titolarità grava sul debitore.<br><br><strong>Legittimazione passiva:</strong> il debitore che paga al possessore legittimato senza dolo o colpa grave è liberato, anche se il possessore non è il vero titolare. Questo vale anche quando il debitore sospetta il difetto di titolarità, purché non disponga di prove certe e immediate per contestarlo.<br><br><strong>Dissociazione proprietà/possesso:</strong> può accadere (es. titolo rubato). Il proprietario spossessato può agire in rivendicazione. Per titoli all'ordine e nominativi, può ricorrere all'ammortamento. La dissociazione cessa quando un terzo in buona fede acquista il titolo (art. 1994): prevale la tutela dell'acquirente di buona fede.`
  },
  {
    part: 1,
    prof: ["Comune","Masi","Morello","Martucci"],
    q: "Acquisto a non domino nei titoli di credito",
    a: `Chi acquista un titolo in buona fede, rispettando le regole di circolazione, acquista il diritto anche se l'alienante non era il legittimo titolare (deroga al principio nemo plus iuris). Serve: (1) rispetto delle forme di circolazione, (2) buona fede, (3) assenza di colpa grave. L'ex proprietario può solo agire per il risarcimento contro chi gli ha sottratto il titolo.`,
    deep: `<strong>Fondamento (art. 1994 c.c.):</strong> ricalca il principio "possesso vale titolo" dei beni mobili (art. 1153). La ratio è proteggere la sicurezza della circolazione dei titoli di credito, incentivando la fiducia degli operatori economici.<br><br><strong>Circolazione irregolare:</strong> si verifica quando il trasferimento non avviene in forza di un valido negozio (es. titolo rubato). Il ladro non acquista né proprietà né titolarità del diritto, ma è legittimato (può esercitare il diritto e far circolare il titolo). Il proprietario spossessato può agire in rivendicazione. Ma quando il titolo giunge nelle mani di un terzo in buona fede, prevale quest'ultimo.<br><br><strong>Tre condizioni cumulative:</strong> (a) negozio astrattamente idoneo al trasferimento; (b) possesso materiale del titolo; (c) buona fede dell'acquirente al momento dell'acquisto.`
  },

  // ── A9 ──────────────────────────────────────────────────────────────────
  {
    part: 1,
    prof: ["Comune","Masi","Morello"],
    q: "Società tra professionisti (STP)",
    a: `La <strong>legge 183/2011</strong> (e d.m. 34/2013) consente l'esercizio di professioni regolamentate in forma societaria (<em>STP</em>). Ammessi tutti i tipi di società (persone, capitali, cooperative). Requisiti: <strong>soci professionisti</strong> devono detenere i <em>2/3</em> dei diritti di voto e del capitale; i soci possono essere anche non professionisti (es. finanziatori) fino a 1/3. La prestazione rimane personale: il professionista incaricato risponde disciplinarmente e la responsabilità professionale è del socio esecutore. La STP si iscrive nella sezione speciale del registro delle imprese <em>e</em> nell'albo professionale.`,
    deep: `<strong>Ratio e dibattito preesistente:</strong> prima della l. 183/2011, l'art. 2 l. 1815/1939 vietava alle società di esercitare professioni intellettuali protette. Permetteva solo "studi associati" (associazioni tra professionisti senza personalità giuridica). La riforma ha superato il divieto consentendo la vera forma societaria, con importante eccezione: le professioni sanitarie sono regolate da normativa speciale (l. 124/2017 e s.m.i.).<br><br><strong>Tipi di società ammessi:</strong> il d.m. 34/2013 ammette s.n.c., s.a.s., s.r.l., s.p.a., s.a.p.a. e cooperative. Sono escluse le s.r.l. semplificate (per il vincolo di capitale). Le STP di capitali devono indicare la natura di STP nello statuto e nella ragione/denominazione sociale. La mancata iscrizione all'albo comporta cancellazione dal registro delle imprese.<br><br><strong>Responsabilità:</strong> la STP risponde contrattualmente come qualsiasi società. Ma il professionista che ha eseguito la prestazione risponde personalmente per i danni da errore professionale (art. 10, d.m. 34/2013) — responsabilità concorrente di socio e società. L'assicurazione professionale obbligatoria deve coprire anche la responsabilità della STP.<br><br><strong>Distinzione da studi associati:</strong> lo studio associato (art. 1 l. 1815/1939) è un'associazione senza personalità giuridica: non ha autonomia patrimoniale perfetta, i soci rispondono solidalmente dei debiti dello studio. La STP ha invece personalità giuridica (se di capitali) o autonomia patrimoniale (se di persone) e può iscriversi al registro come soggetto distinto.`
  },

  // ── C2 ──────────────────────────────────────────────────────────────────
  {
    part: 1,
    prof: ["Comune","Masi","Morello"],
    q: "Ramo d'azienda",
    a: `Il <strong>ramo d'azienda</strong> è una <em>parte funzionalmente autonoma</em> di un'azienda più grande, dotata di propria organizzazione e capace di esercitare in modo indipendente un'attività economica. Non basta un insieme di beni: occorre un'<strong>organizzazione preesistente autonoma</strong> al momento del trasferimento. Il ramo può essere ceduto, conferito o affittato separatamente dall'azienda principale. Le stesse regole dell'art. 2558-2560 c.c. (contratti, crediti, debiti) si applicano al trasferimento del ramo.`,
    deep: `<strong>Definizione e autonomia funzionale:</strong> il codice civile non definisce espressamente il ramo d'azienda; la nozione è elaborata dalla dottrina e dalla giurisprudenza (e ora espressamente recepita nel diritto del lavoro — art. 47 d.lgs. 276/2003 — e nel diritto societario per le operazioni straordinarie). L'autonomia funzionale va verificata <em>al momento del trasferimento</em>: basta che il ramo sia già identificabile come unità produttiva, anche se non ancora separato operativamente dall'azienda principale.<br><br><strong>Rapporto con i lavoratori (art. 47 d.lgs. 276/2003):</strong> il trasferimento di ramo d'azienda fa scattare le tutele dell'art. 2112 c.c.: i contratti di lavoro passano automaticamente al cessionario; i lavoratori conservano tutti i diritti maturati; sono previste procedure di informazione/consultazione sindacale. Differenza cruciale: se si tratta di vero ramo autonomo, si applicano le garanzie dell'art. 2112; se è solo un'esternalizzazione di servizi, il lavoratore ha più limitate tutele.<br><br><strong>Prassi societaria — conferimento di ramo:</strong> nelle operazioni di scissione parziale o conferimento societario, spesso si scinde/conferisce un ramo d'azienda (es. si scorporano la rete distributiva, la divisione produttiva, la business unit tecnologica) nella nuova società (beneficiaria/conferitaria). La questione chiave è sempre la verifica dell'autonomia funzionale preesistente al trasferimento, per evitare che l'operazione sia riqualificata come semplice cessione di beni.<br><br><strong>Differenza da cessione di singoli beni:</strong> la cessione di beni isolati non porta con sé le tutele e gli obblighi dell'art. 2558-2560 c.c. Solo quando i beni trasferiti formano un'organizzazione preesistente autonoma il regime aziendalistico si applica. La giurisprudenza ha talvolta ritenuto che un insieme di contratti commerciali, una banca clienti e un gruppo di dipendenti possano costituire ramo, se il cessionario li integra in un'attività preesistente.`
