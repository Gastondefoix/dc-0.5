    a: `Le <strong>cooperative</strong> (art. 2511 ss. c.c.) sono società a <strong>scopo mutualistico</strong>: forniscono ai soci beni, servizi o occasioni di lavoro a condizioni più vantaggiose di quelle di mercato (non hanno scopo di lucro in senso proprio). <strong>Ristorni:</strong> la distribuzione ai soci del "vantaggio mutualistico" (rimborso parziale degli acquisti o incremento dei compensi, proporzionale agli scambi mutualistici). <strong>Voto capitario (art. 2538):</strong> ogni socio ha un voto, indipendentemente dalla quota detenuta. <strong>Porta aperta (art. 2528):</strong> obbligo tendenziale di ammettere nuovi soci. <strong>Vigilanza:</strong> le cooperative sono soggette a vigilanza ministeriale.`,
    deep: `<strong>Scopo mutualistico vs scopo di lucro:</strong> nelle società ordinarie lo scopo è la distribuzione degli utili ai soci (lucro soggettivo). Nelle cooperative lo scopo è la mutualità: i soci beneficiano direttamente dell'attività della cooperativa (es. i soci-lavoratori di una cooperativa di produzione e lavoro hanno occupazione a condizioni migliori di quelle di mercato; i soci consumatori di una cooperativa di consumo acquistano beni a prezzi più bassi). Il "vantaggio mutualistico" non è un utile da distribuire, ma un risparmio di costo o un maggior compenso ottenuto tramite la cooperativa.<br><br><strong>Ristorni (art. 2545-sexies c.c.):</strong> i ristorni sono la quota del risultato di gestione che la cooperativa restituisce ai soci in proporzione alla quantità e qualità degli scambi mutualistici (acquisti, lavoro prestato, ecc.), non in proporzione alla quota di capitale. I ristorni possono essere distribuiti in denaro, assegnati come aumento gratuito del capitale sociale, o emessi come strumenti finanziari. I ristorni sono deducibili dal reddito imponibile della cooperativa, al contrario dei dividendi.<br><br><strong>Voto capitario (art. 2538 c.c.):</strong> il principio "una testa, un voto" garantisce la parità tra i soci nella governance della cooperativa. Nessun socio (anche il più grande investitore) può dominare l'assemblea attraverso il peso del capitale. Questo principio può essere temperato: lo statuto può prevedere il voto plurimo per i soci cooperatori con maggiore partecipazione agli scambi mutualistici, ma in ogni caso ciascun socio non può avere più di 5 voti.<br><br><strong>Principio della porta aperta (art. 2528 c.c.):</strong> le cooperative devono essere aperte all'ingresso di nuovi soci che possiedono i requisiti previsti dallo statuto. Il diniego dell'ammissione deve essere motivato e il candidato può ricorrere all'assemblea. Questo principio distingue la cooperativa dalle società di capitali (dove l'ingresso di nuovi soci può essere bloccato da clausole di gradimento o prelazione senza obbligo di motivazione).<br><br><strong>Mutualità prevalente (art. 2512 c.c.):</strong> le cooperative "a mutualità prevalente" (che svolgono l'attività prevalentemente con i soci, non distribuiscono utili oltre certi limiti, non distribuiscono le riserve tra i soci durante la vita della società) godono di agevolazioni fiscali significative. Le cooperative non a mutualità prevalente sono soggette alla disciplina fiscale ordinaria.<br><br><strong>Vigilanza (art. 2545-bis ss. c.c.):</strong> le cooperative sono soggette alla vigilanza del Ministero dello Sviluppo Economico (ora MIMIT) o delle associazioni nazionali di rappresentanza (Legacoop, Confcooperative, AGCI), che effettuano revisioni periodiche per verificare la gestione e il rispetto della mutualità. In caso di irregolarità gravi, il Ministero può nominare commissari straordinari o disporre la liquidazione coatta amministrativa.`

    deep: `<strong>Art. 2602 c.c. (definizione di consorzio):</strong> con il contratto di consorzio più imprenditori istituiscono un'organizzazione comune per la disciplina o lo svolgimento di determinate fasi delle rispettive imprese. Il contratto deve essere fatto per iscritto a pena di nullità e deve contenere: oggetto e durata, sede dell'ufficio eventualmente costituito, obblighi e contribuzioni dei consorziati, condizioni di ammissione e di recesso. La durata non può superare i 10 anni (salvo proroga).<br><br><strong>Consorzio con attività interna (artt. 2602-2612 c.c.):</strong> il consorzio regola i rapporti interni tra i consorziati (cd. consorzio di coordinamento): es. ripartizione delle commesse, standardizzazione dei prezzi, acquisti comuni, uso di marchi comuni. Non ha rapporti diretti con i terzi. Non ha soggettività giuridica propria (è un contratto organizzativo, non un soggetto di diritto distinto). I consorziati restano autonomi imprenditori, vincolati dalle regole del consorzio nei rapporti interni.<br><br><strong>Consorzio con attività esterna (artt. 2612-2615-bis c.c.):</strong> il consorzio opera direttamente con i terzi attraverso un ufficio comune. Ha un proprio fondo consortile (patrimonio separato) e un rappresentante che stipula contratti in nome del consorzio. La soggettività giuridica del consorzio con attività esterna è riconosciuta dalla giurisprudenza (può acquistare diritti, assumere obbligazioni, stare in giudizio). Responsabilità verso i terzi: per le obbligazioni assunte in nome del consorzio, il creditore può agire sul fondo consortile; se insufficiente, risponde il consorziato che ha agito in nome del consorzio. Gli altri consorziati rispondono solidalmente se lo prevede il contratto.<br><br><strong>Fondo consortile (art. 2614 c.c.):</strong> il fondo consortile è il patrimonio comune del consorzio, costituito dai contributi dei consorziati e dai beni acquistati con questi contributi. I creditori particolari dei consorziati non possono aggredire il fondo (separazione patrimoniale). I consorziati non possono chiedere la divisione del fondo prima della fine del consorzio.<br><br><strong>Consorzi e GEIE:</strong> il Gruppo Europeo di Interesse Economico (GEIE, reg. CEE 2137/85) è uno strumento analogo al consorzio a livello europeo, per la cooperazione transfrontaliera tra imprese. A livello di diritto interno, le società consortili (artt. 2615-ter c.c.) sono una forma ibrida: costituite in forma di società (SpA, SRL, società di persone) ma con scopo consortile (non di lucro diretto). Combinano la struttura societaria (personalità giuridica piena, norme societarie) con la finalità consortile (gestione comune delle fasi delle imprese associate).`
  },
  {

    prof: ["Comune","Morello"],
    q: "Bilancio di esercizio: approvazione e profili giuridici",
    a: `Il <strong>bilancio di esercizio</strong> (artt. 2423-2435-ter c.c.) è il documento contabile che rappresenta la situazione patrimoniale, finanziaria ed economica della società al termine dell'esercizio. È composto da: <strong>stato patrimoniale</strong> (attivo e passivo), <strong>conto economico</strong> (ricavi e costi), <strong>rendiconto finanziario</strong>, <strong>nota integrativa</strong>. Deve essere redatto con chiarezza e rappresentare in modo veritiero e corretto la situazione aziendale (<em>true and fair view</em>). <strong>Approvazione:</strong> assemblea ordinaria entro 120 giorni (o 180 in casi speciali). <strong>Deposito:</strong> presso il registro delle imprese entro 30 giorni dall'approvazione.`,
    deep: `<strong>Clausola generale (art. 2423, co. 2 c.c.):</strong> il bilancio deve essere redatto con chiarezza e deve rappresentare in modo veritiero e corretto la situazione patrimoniale e finanziaria della società e il risultato economico dell'esercizio. Questa è la clausola generale del bilancio italiano, corrispondente al principio anglosassone del "true and fair view". Se le disposizioni specifiche non sono sufficienti a dare una rappresentazione veritiera e corretta, si devono fornire informazioni complementari nella nota integrativa; se la loro applicazione è incompatibile con la rappresentazione veritiera e corretta, vi si deve derogare indicando le ragioni e la loro influenza sulla situazione patrimoniale e sul risultato economico.<br><br><strong>Principi di redazione (art. 2423-bis c.c.):</strong> nella redazione del bilancio devono essere osservati i seguenti principi: (1) continuità (going concern): la valutazione delle voci è fatta nella prospettiva della continuazione dell'attività; (2) prudenza: si possono iscrivere solo gli utili realizzati; i rischi e le perdite devono essere considerati anche se conosciuti dopo la chiusura; (3) prevalenza della sostanza sulla forma (introdotto nel 2016); (4) competenza economica: effetti delle operazioni imputati nell'esercizio a cui si riferiscono; (5) coerenza dei criteri di valutazione nel tempo; (6) rilevanza: le informazioni irrilevanti non devono essere incluse.<br><br><strong>Struttura del bilancio (artt. 2424-2427 c.c.):</strong> (a) Stato patrimoniale: elenca le attività (immobilizzazioni, attivo circolante, ratei e risconti attivi) e le passività (patrimonio netto, fondi per rischi e oneri, TFR, debiti, ratei e risconti passivi) con voci predeterminate dalla legge; (b) Conto economico: espone i ricavi e i costi dell'esercizio secondo una struttura scalare (valore della produzione - costi della produzione = risultato operativo + oneri/proventi finanziari + imposte = utile/perdita); (c) Rendiconto finanziario (introdotto obbligatoriamente nel 2016): illustra i flussi di cassa dell'esercizio; (d) Nota integrativa: completa e integra le informazioni di stato patrimoniale e conto economico.<br><br><strong>Approvazione assembleare (artt. 2364, 2429 c.c.):</strong> il CdA redige il bilancio e lo trasmette al collegio sindacale almeno 30 giorni prima dell'assemblea. Il collegio sindacale e il revisore legale devono predisporre le rispettive relazioni almeno 15 giorni prima dell'assemblea. Il bilancio, corredato delle relazioni degli organi di controllo, è depositato nella sede sociale nei 15 giorni precedenti l'assemblea. L'assemblea ordinaria approva il bilancio entro 120 giorni dalla chiusura dell'esercizio (180 per casi particolari: redazione del consolidato, particolari esigenze). La delibera di approvazione del bilancio è presa a maggioranza semplice.<br><br><strong>Deposito e pubblicità (art. 2435 c.c.):</strong> entro 30 giorni dall'approvazione, gli amministratori devono depositare il bilancio (con allegati, relazioni e verbale assembleare) presso il registro delle imprese. Il bilancio è pubblico e accessibile a chiunque. Le SpA e SRL di grandi dimensioni devono redigere anche il bilancio consolidato (d.lgs. 127/1991) che include le società controllate. L'omesso deposito del bilancio comporta sanzioni amministrative a carico degli amministratori.<br><br><strong>Impugnazione del bilancio:</strong> la delibera assembleare di approvazione del bilancio può essere impugnata come qualsiasi delibera assembleare (art. 2379 ss. c.c.): nullità per illiceità dell'oggetto (bilancio falso che inganna i terzi), annullabilità per vizi procedurali. Il falso in bilancio costituisce anche reato (art. 2621 c.c. — false comunicazioni sociali), sanzionato penalmente a carico degli amministratori.`

// ====== APP STATE ======
let currentMode = 'study';
let currentTab = 'all';
let currentPart = 'all';
let currentSearch = '';
let quizQuestions = [];
let quizIndex = 0;
let quizScore = { good: 0, ok: 0, bad: 0 };

const TABS = ['Tutte', 'Masi', 'Morello', 'Martucci', 'Comune', 'Extra'];

// ====== INIT ======
function init() {
  renderTabs();
  renderStudy();
  document.getElementById('partSwitch').addEventListener('click', function(e) {
    const btn = e.target.closest('.mode-btn');
    if (!btn) return;
    currentPart = btn.dataset.part;
    document.querySelectorAll('#partSwitch .mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderStudy();
  });
}

// ====== MODE SWITCH ======
function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  
  const study = document.getElementById('studyContainer');
  const quiz = document.getElementById('quizContainer');
  
  if (mode === 'study') {
    study.classList.remove('hidden');
    quiz.classList.remove('active');
  } else {
    study.classList.add('hidden');
    quiz.classList.add('active');
    startQuiz();
  }
}

// ====== TABS ======
function renderTabs() {
  const container = document.getElementById('tabs');
  container.innerHTML = TABS.map(t => 
    `<button class="tab${t === 'Tutte' ? ' active' : ''}" onclick="setTab('${t}')">${t}</button>`
  ).join('');
}

function setTab(tab) {
  currentTab = tab === 'Tutte' ? 'all' : tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderStudy();
}


// ====== SEARCH ======
function filterQuestions(val) {
  currentSearch = val.toLowerCase();
  renderStudy();
}

// ====== STUDY MODE ======
function renderStudy() {
  const list = document.getElementById('qaList');
  const statsEl = document.getElementById('stats');
  
  let filtered = QA.filter(item => {
    const matchPart = currentPart === 'all' || item.part === parseInt(currentPart);
    const matchTab = currentTab === 'all' || item.prof.includes(currentTab);
    const matchSearch = !currentSearch || 
      item.q.toLowerCase().includes(currentSearch) || 
      item.a.toLowerCase().includes(currentSearch);
    return matchPart && matchTab && matchSearch;
  });
  
  statsEl.innerHTML = `<span>${filtered.length} domande trovate</span><span class="score">// studio mode</span>`;
  
  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-results">Nessun risultato. Prova un\'altra ricerca.</div>';
    return;
  }
  
  list.innerHTML = filtered.map((item, i) => {
    const idx = QA.indexOf(item);
    const profBadges = item.prof.filter(p => p !== 'Comune').map(p => {
      const cls = p === 'Masi' ? 'badge-masi' : p === 'Morello' ? 'badge-morello' : p === 'Martucci' ? 'badge-martucci' : 'badge-extra';
      return `<span class="badge ${cls}">${p}</span>`;
    }).join('');
    
    const deepBtn = item.deep ? `<button class="deepdive-btn" onclick="event.stopPropagation(); toggleDeep(${idx})">⚡ Approfondisci</button>` : '';
    const deepContent = item.deep ? `<div class="deepdive-content" id="deep-${idx}">${item.deep}</div>` : '';
    
    return `<div class="qa-item">
      <div class="qa-header" onclick="toggleAnswer(${idx})">
        <span class="qa-num">${String(i + 1).padStart(2, '0')}</span>
        <span class="qa-title">${item.q}${profBadges}</span>
        <span class="qa-arrow" id="arr-${idx}">▼</span>
      </div>
      <div class="qa-answer" id="ans-${idx}">${item.a}${deepBtn}${deepContent}</div>
    </div>`;
  }).join('');
}

function toggleAnswer(idx) {
  const ans = document.getElementById('ans-' + idx);
  const arrow = document.getElementById('arr-' + idx);
  const isOpen = ans.classList.contains('show');
  
  // Close all
  document.querySelectorAll('.qa-answer').forEach(a => a.classList.remove('show'));
  document.querySelectorAll('.qa-arrow').forEach(a => a.classList.remove('open'));
  
  if (!isOpen) {
    ans.classList.add('show');
    arrow.classList.add('open');
  }
}

function toggleDeep(idx) {
  const deep = document.getElementById('deep-' + idx);
  deep.classList.toggle('show');
}

// ====== QUIZ MODE ======
function startQuiz() {
  let pool = QA.filter(item => {
    const matchPart = currentPart === 'all' || item.part === parseInt(currentPart);
    const matchTab = currentTab === 'all' || item.prof.includes(currentTab);
    return matchPart && matchTab;
  });
  
  // Shuffle
  quizQuestions = pool.sort(() => Math.random() - 0.5).slice(0, Math.min(15, pool.length));
  quizIndex = 0;
  quizScore = { good: 0, ok: 0, bad: 0 };
  renderQuizCard();
}

function renderQuizCard() {
  const container = document.getElementById('quizContent');
  
  if (quizIndex >= quizQuestions.length) {
    const total = quizQuestions.length;
    const pct = Math.round((quizScore.good / total) * 100);
    container.innerHTML = `
      <div class="quiz-card">
        <div class="quiz-score-final">
          <div class="big">${pct}%</div>
          <div class="label">Quiz completato &mdash; ${quizQuestions.length} domande</div>
          <div style="margin-top:1.5rem; font-size:0.8rem; color:var(--text-dim); line-height:1.8">
            <span style="color:var(--cyan)">✓ Lo so: ${quizScore.good}</span> &nbsp;
            <span style="color:var(--orange)">~ Così così: ${quizScore.ok}</span> &nbsp;
            <span style="color:var(--magenta)">✗ Da ripassare: ${quizScore.bad}</span>
          </div>
          <button class="quiz-restart-btn" onclick="startQuiz()">Ricomincia</button>
        </div>
      </div>`;
    return;
  }
  
  const q = quizQuestions[quizIndex];
  const progress = ((quizIndex) / quizQuestions.length) * 100;
  
  container.innerHTML = `
    <div class="quiz-card">
      <div class="quiz-progress">
        Domanda ${quizIndex + 1} di ${quizQuestions.length}
        <div class="quiz-progress-bar">
          <div class="quiz-progress-fill" style="width:${progress}%"></div>
        </div>
      </div>
      <div class="quiz-question">${q.q}</div>
      <div class="quiz-actions">
        <button class="quiz-reveal-btn" onclick="revealQuizAnswer()">Mostra risposta</button>
        <div class="quiz-answer-box" id="quizAns">${q.a}</div>
        <div class="quiz-rate" id="quizRate">
          <button class="rate-btn r-good" onclick="rateQuiz('good')">✓ Lo so</button>
          <button class="rate-btn r-ok" onclick="rateQuiz('ok')">~ Così così</button>
          <button class="rate-btn r-bad" onclick="rateQuiz('bad')">✗ Da ripassare</button>
        </div>
      </div>
    </div>`;
}

function revealQuizAnswer() {
  document.getElementById('quizAns').classList.add('show');
  document.getElementById('quizRate').classList.add('show');
}

function rateQuiz(rating) {
  quizScore[rating]++;
  quizIndex++;
  renderQuizCard();
}

// GO
init();
</script>
